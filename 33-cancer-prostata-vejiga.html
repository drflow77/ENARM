<script>
let examMode = false;
function setMode(mode) {
  examMode = (mode==='examen');
  document.getElementById('btnRepaso').classList.toggle('active',!examMode);
  document.getElementById('btnExamen').classList.toggle('active',examMode);
  init();
}

const questions = [
  {
    cat:"pros", catName:"Cáncer Próstata",
    q:"Hombre de 65 años con PSA de 7.2 ng/mL y tacto rectal que muestra nódulo duro en lóbulo derecho. ¿Cuál es el siguiente paso diagnóstico?",
    opts:["RM multiparamétrica de próstata urgente","Biopsia prostática guiada por ultrasonido transrectal","Repetir PSA en 3 meses","Cistoscopia"],
    ans:1,
    exp:"La biopsia prostática está indicada cuando el PSA es >4 ng/mL o cuando el tacto rectal es anormal (nódulo, induración, asimetría), independientemente del valor del PSA. La biopsia guiada por USG transrectal con mínimo 12 cilindros es el estándar diagnóstico según la GPC. La RM multiparamétrica puede hacerse antes de la biopsia en centros especializados pero no reemplaza el estudio histológico.",
    tip:"<strong>Indicaciones de biopsia:</strong> PSA >4 ng/mL O tacto rectal anormal. Cualquiera de los dos es suficiente para indicarla. El tacto rectal puede detectar cáncer con PSA normal, de ahí la importancia de no omitirlo.",
    ref:"GPC: Diagnóstico y tratamiento del cáncer de próstata. IMSS/SSA. CENETEC."
  },
  {
    cat:"pros", catName:"Cáncer Próstata",
    q:"Biopsia de próstata reporta adenocarcinoma con Gleason 4+3=7. Gammagrafía ósea negativa. Estadio T2bN0M0. ¿Cómo se clasifica este tumor?",
    opts:["Bajo riesgo — vigilancia activa","Muy alto riesgo — quimioterapia de inicio","Alto riesgo — castración hormonal inmediata","Riesgo intermedio desfavorable — tratamiento activo indicado"],
    ans:3,
    exp:"El sistema de estratificación de riesgo de D'Amico clasifica el cáncer de próstata en bajo riesgo (PSA<10, Gleason≤6, T1-T2a), riesgo intermedio (PSA 10-20 O Gleason 7 O T2b) y alto riesgo (PSA>20 O Gleason 8-10 O T2c-T3). Gleason 4+3=7 con T2b corresponde a riesgo intermedio desfavorable, donde la vigilancia activa no es apropiada y se requiere tratamiento definitivo.",
    tip:"<strong>Gleason 3+4 vs 4+3:</strong> Aunque ambos suman 7, el patrón predominante importa. Gleason 3+4 (predomina patrón 3, menos agresivo) = riesgo intermedio favorable. Gleason 4+3 (predomina patrón 4, más agresivo) = riesgo intermedio desfavorable. El denominador marca la diferencia pronóstica.",
    ref:"GPC: Diagnóstico y tratamiento del cáncer de próstata. IMSS/SSA. CENETEC."
  },
  {
    cat:"pros", catName:"Cáncer Próstata",
    q:"¿Cuál es el sitio más frecuente de metástasis del cáncer de próstata?",
    opts:["Pulmón","Hígado","Hueso (osteoblásticas)","Cerebro"],
    ans:2,
    exp:"El cáncer de próstata metastatiza preferentemente al hueso, produciendo lesiones osteoblásticas (escleróticas) a diferencia de la mayoría de los tumores sólidos que producen lesiones osteolíticas. Los sitios más frecuentes son columna lumbar, pelvis, costillas y fémur proximal. La gammagrafía ósea es el estudio de elección para detectar metástasis óseas.",
    tip:"<strong>Lesiones osteoblásticas = próstata y mama.</strong> El resto de tumores sólidos (riñón, pulmón, tiroides) tienden a dar lesiones osteolíticas. En Rx: lesiones blancas densas en columna/pelvis en hombre anciano → sospechar metástasis de próstata.",
    ref:"GPC: Diagnóstico y tratamiento del cáncer de próstata. IMSS/SSA. CENETEC."
  },
  {
    cat:"psa", catName:"PSA/Diagnóstico",
    q:"PSA total de 6.8 ng/mL. El médico solicita PSA libre y obtiene PSA libre/total = 8%. ¿Cómo interpreta este resultado?",
    opts:["PSA libre/total <10% sugiere malignidad, aumenta indicación de biopsia","PSA libre/total <10% sugiere origen benigno, biopsia no necesaria","PSA libre/total <10% es normal, repetir en 1 año","PSA libre/total no es útil cuando el PSA total es <10 ng/mL"],
    ans:0,
    exp:"En la zona gris del PSA (4-10 ng/mL), el cociente PSA libre/total ayuda a discriminar entre HPB y cáncer. Un cociente <10% se asocia con alta probabilidad de malignidad (sensibilidad 71%, especificidad 80%), mientras que >25% sugiere origen benigno. La GPC recomienda usar este índice en la zona gris para evitar biopsias innecesarias o para reforzar la indicación.",
    tip:"<strong>Regla del PSA libre:</strong> Libre/Total <10% → cáncer probable (biopsia). Libre/Total >25% → benigno probable (observar). En HPB hay más PSA libre porque la glándula produce más isoformas libres. En cáncer el PSA se une más a proteínas, quedando menos libre.",
    ref:"GPC: Diagnóstico y tratamiento del cáncer de próstata. IMSS/SSA. CENETEC."
  },
  {
    cat:"psa", catName:"PSA/Diagnóstico",
    q:"¿Cuál de las siguientes situaciones NO eleva el PSA sérico?",
    opts:["Hiperplasia prostática benigna","Prostatitis aguda bacteriana","Vasectomía realizada hace 10 años","Biopsia prostática realizada hace 48 horas"],
    ans:2,
    exp:"La vasectomía no eleva el PSA. Las causas de elevación del PSA distintas al cáncer incluyen: HPB (eleva levemente por aumento de masa glandular), prostatitis (eleva significativamente por inflamación), biopsia prostática (elevar dramáticamente hasta 4-6 semanas), tacto rectal vigoroso (elevación mínima y transitoria), eyaculación reciente, ejercicio en bicicleta prolongado y cateterismo uretral.",
    tip:"<strong>Antes de medir el PSA:</strong> Evitar biopsia reciente (esperar 6 semanas), prostatitis activa (tratar primero), eyaculación (abstinencia 48h). El tacto rectal tiene efecto mínimo, no es necesario posponerlo. Si PSA elevado por prostatitis: tratar, esperar 6 semanas y repetir.",
    ref:"GPC: Diagnóstico y tratamiento del cáncer de próstata. IMSS/SSA. CENETEC."
  },
  {
    cat:"psa", catName:"PSA/Diagnóstico",
    q:"¿A qué edad y con qué frecuencia recomienda la GPC el cribado de cáncer de próstata con PSA en hombres de riesgo promedio?",
    opts:["Inicio a los 40 años, anual","Inicio a los 50 años, cada 1-2 años hasta los 70","Inicio a los 60 años, cada 5 años","PSA no se recomienda como cribado poblacional"],
    ans:1,
    exp:"La GPC recomienda ofrecer información sobre riesgos y beneficios del cribado con PSA a partir de los 50 años en hombres de riesgo promedio, con una periodicidad de cada 1-2 años. En hombres con factores de riesgo (antecedente familiar en 1er grado, raza afroamericana), el cribado puede iniciarse a los 40-45 años. El cribado se suspende cuando la expectativa de vida es <10 años.",
    tip:"<strong>Cribado individualizado, no poblacional:</strong> A diferencia del cáncer de mama o cervicouterino, el cribado de cáncer de próstata es controvertido. La decisión debe tomarse con el paciente informado sobre sobrediagnóstico y sobretratamiento. PSA>1 ng/mL a los 40 años = factor de riesgo para desarrollar cáncer clínicamente significativo.",
    ref:"GPC: Diagnóstico y tratamiento del cáncer de próstata. IMSS/SSA. CENETEC."
  },

let currentQ = 0, score = 0, answers = [];
let catStats = { pros:{c:0,t:0}, psa:{c:0,t:0}, vej:{c:0,t:0}, tx:{c:0,t:0}, crib:{c:0,t:0} };

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function init() {
  shuffle(questions);
  currentQ=0; score=0; answers=[];
  catStats = { pros:{c:0,t:0}, psa:{c:0,t:0}, vej:{c:0,t:0}, tx:{c:0,t:0}, crib:{c:0,t:0} };
  const r=document.getElementById('resultsArea');
  r.classList.remove('show'); r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion() {
  const qa=questions[currentQ], total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const letters=['A','B','C','D'];
  let html=`<div class="question-card"><div class="q-category cat-${qa.cat}">${qa.catName}</div><div class="q-number">Pregunta ${currentQ+1} de ${total}</div><div class="q-text">${qa.q}</div><div class="options">`;
  qa.opts.forEach((opt,i)=>{html+=`<button class="option-btn" onclick="selectAnswer(${i})" data-idx="${i}"><span class="option-letter">${letters[i]}</span><span>${opt}</span></button>`;});
  html+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=html;
}

function selectAnswer(idx) {
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const isCorrect=idx===qa.ans;
  btns.forEach((btn,i)=>{
    btn.classList.add('disabled'); btn.onclick=null;
    if(i===qa.ans) btn.classList.add('correct-answer');
    if(i===idx&&!isCorrect) btn.classList.add('wrong-answer');
  });
  if(!catStats[qa.cat]) catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(isCorrect){score++;catStats[qa.cat].c++;}
  if(!examMode){
    fb.className=isCorrect?'feedback correct-fb show':'feedback wrong-fb show';
    fb.innerHTML=isCorrect
      ?`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`
      :`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;
  }
  answers.push({q:qa.q,correct:isCorrect,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if(currentQ>=questions.length) showResults();
  else renderQuestion();
}

function showResults() {
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'🏆 ¡Excelente dominio de oncología urológica!':pct>=70?'👏 ¡Muy bien! Repasa los temas con menor puntaje.':pct>=50?'📚 Aceptable, refuerza las áreas débiles.':'⚠️ Revisa las GPC de cáncer de próstata y vejiga.';
  const cats=[
    {name:'Cáncer Próstata',key:'pros',color:'#38bdf8'},
    {name:'PSA/Diagnóstico',key:'psa',color:'#fbbf24'},
    {name:'Cáncer Vejiga',key:'vej',color:'#f472b6'},
    {name:'Tratamiento',key:'tx',color:'#a78bfa'},
    {name:'Cribado',key:'crib',color:'#34d399'},
  ];
  let html=`<div class="results-header"><div class="score-big">${pct}%</div><div class="score-label">${score} de ${questions.length} correctas</div><div class="score-msg">${msg}</div></div>
  <div class="chart-section"><div class="chart-title"><span>📊</span> Rendimiento por Categoría</div><div class="bar-chart">`;
  cats.forEach(cat=>{
    const s=catStats[cat.key]||{c:0,t:0};
    const p=s.t>0?Math.round((s.c/s.t)*100):0;
    html+=`<div class="bar-row"><div class="bar-label">${cat.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${cat.color};">${p}% (${s.c}/${s.t})</div></div></div>`;
  });
  html+=`</div></div><div class="chart-section"><div class="chart-title"><span>🎯</span> Resumen General</div><div class="donut-wrap">
    <svg class="donut-svg" viewBox="0 0 42 42">
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
      <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
    </svg>
    <div class="donut-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#38bdf8;"></div>Total: ${questions.length}</div>
    </div></div></div>
  <div class="chart-section"><div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{
    html+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
      <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
      <div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div>
      <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
      <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
    </div>`;
  });
  html+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const res=document.getElementById('resultsArea');
  res.innerHTML=html; res.classList.add('show');
  res.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(header){header.classList.toggle('open');header.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}

init();
</script>
</body>
</html>
