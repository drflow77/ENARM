let examMode=false, currentQ=0, score=0, answers=[], catStats={};

const questions = [
  /* ── FACTORES DE RIESGO ── */
  {
    cat:"riesgo", catName:"Factores de Riesgo",
    q:"Mujer de 63 años obesa (IMC 38), con HTA y DM2. Consulta por sangrado vaginal posmenopáusico de 3 semanas. ¿Cuál es el factor de riesgo MÁS importante para cáncer de endometrio en esta paciente?",
    opts:["Obesidad (hiperestrogenismo por aromatización periférica)","Diabetes mellitus tipo 2","Hipertensión arterial sistémica","Edad mayor de 60 años"],
    ans:0,
    exp:"La obesidad es el factor de riesgo modificable más importante para el cáncer de endometrio. El tejido adiposo convierte andrógenos suprarrenales en estrona mediante aromatización periférica, generando hiperestrogenismo sin oposición de progesterona que estimula la proliferación endometrial. Las mujeres con IMC >30 tienen riesgo 2-4 veces mayor; con IMC >40, riesgo 6 veces mayor.",
    tip:"<strong>Obesidad = factor de riesgo #1 Ca endometrio.</strong> Aromatización periférica → estrógenos sin progesterona → proliferación endometrial → hiperplasia → cáncer.",
    ref:"GPC Diagnóstico y tratamiento del Cáncer de endometrio 2015."
  },
  {
    cat:"riesgo", catName:"Factores de Riesgo",
    q:"El cáncer de endometrio se clasifica en Tipo I y Tipo II. ¿Cuál de los siguientes describe CORRECTAMENTE al Tipo I?",
    opts:["Adenocarcinoma endometrioide, estrógeno-dependiente, bajo grado, mejor pronóstico","Carcinoma seroso papilar o células claras, no hormonodependiente, peor pronóstico","Mutación en TP53, frecuente en mujeres posmenopáusicas delgadas sin factores hormonales","Representa solo el 10-15% de todos los cánceres de endometrio"],
    ans:0,
    exp:"El Tipo I (75-80% de los casos) es el adenocarcinoma endometrioide, bien diferenciado, estrógeno-dependiente, que se origina sobre hiperplasia con atipia. Afecta a mujeres perimenopaúsicas con factores de riesgo hormonales y tiene buen pronóstico (supervivencia >85% en estadio I). El Tipo II incluye seroso papilar y células claras, con mutación TP53, agresivo y peor pronóstico.",
    tip:"<strong>Tipo I = endometrioide + estrógenos + buen pronóstico (75-80%).</strong> Tipo II = seroso/células claras + TP53 + agresivo (peor pronóstico, sin relación hormonal).",
    ref:"GPC Diagnóstico y tratamiento del Cáncer de endometrio 2015."
  },
  {
    cat:"riesgo", catName:"Factores de Riesgo",
    q:"¿Cuál es el riesgo de por vida de desarrollar cáncer de endometrio en una portadora del síndrome de Lynch (HNPCC) con mutación en MLH1/MSH2?",
    opts:["5-10%","15-25%","40-60%","80-90%"],
    ans:2,
    exp:"El síndrome de Lynch (HNPCC) aumenta el riesgo de cáncer colorrectal y también de cáncer de endometrio (40-60% de riesgo de por vida), que en mujeres portadoras puede ser la primera manifestación del síndrome. Se recomienda vigilancia endometrial anual desde los 30-35 años y considerar histerectomía profiláctica + SOB una vez completada la paridad.",
    tip:"<strong>Lynch/HNPCC: riesgo Ca endometrio 40-60%.</strong> En mujeres puede preceder al cáncer colorrectal. Tamizaje desde los 30-35 años.",
    ref:"GPC Diagnóstico y tratamiento del Cáncer de endometrio 2015."
  },
  {
    cat:"riesgo", catName:"Factores de Riesgo",
    q:"Mujer en tratamiento con tamoxifeno por cáncer de mama durante 5 años. ¿Por qué el tamoxifeno se asocia con mayor riesgo de cáncer de endometrio?",
    opts:["El tamoxifeno aumenta el peso corporal y por ende la aromatización periférica","El tamoxifeno suprime la progesterona endógena favoreciendo hiperestrogenismo directo","El tamoxifeno produce mutaciones directas en el ADN del endometrio","El tamoxifeno actúa como agonista estrogénico en el endometrio (efecto paradójico)"],
    ans:3,
    exp:"El tamoxifeno actúa como antagonista estrogénico en la mama (efecto terapéutico buscado), pero como AGONISTA parcial en el endometrio, estimulando la proliferación endometrial. Las mujeres bajo tamoxifeno tienen 2-3 veces mayor riesgo de cáncer de endometrio. Deben ser vigiladas con ultrasonido transvaginal y biopsia ante cualquier sangrado anormal.",
    tip:"<strong>Tamoxifeno = antiestrogénico en mama pero ESTROGÉNICO en endometrio.</strong> Vigilar sangrado en posmenopáusicas bajo tamoxifeno. Biopsiar ante cualquier hemorragia.",
    ref:"GPC Diagnóstico y tratamiento del Cáncer de endometrio 2015."
  },
  {
    cat:"riesgo", catName:"Factores de Riesgo",
    q:"¿Cuál es la mutación genética somática más frecuente en el cáncer de endometrio Tipo I (endometrioide)?",
    opts:["PTEN (gen supresor tumoral en cromosoma 10q23)","BRCA1/BRCA2","KRAS (protooncogén)","TP53 (gen supresor tumoral)"],
    ans:0,
    exp:"Las mutaciones en PTEN (fosfatasa y homólogo de tensina) son las más frecuentes en el adenocarcinoma endometrioide (40-80% de los casos). PTEN regula negativamente la vía PI3K/AKT; su pérdida provoca proliferación celular descontrolada. Las mutaciones en TP53 son características del Tipo II (seroso). BRCA se asocia principalmente con cáncer de mama y ovario.",
    tip:"<strong>Ca endometrio Tipo I = mutación PTEN (más frecuente, 40-80%).</strong> Tipo II = TP53. BRCA → mama/ovario, no endometrio principalmente.",
    ref:"GPC Diagnóstico y tratamiento del Cáncer de endometrio 2015."
  },

    cat:"diag", catName:"Diagnóstico y Estadificación",
    q:"Mujer posmenopáusica de 67 años sin TRH con sangrado vaginal de 2 semanas. ¿Cuál es la conducta correcta ante el sangrado uterino posmenopáusico?",
    opts:["Es casi siempre benigno (atrofia); solo observar y repetir ultrasonido en 6 meses","Solo se biopsian mujeres con factores de riesgo adicionales (obesidad, DM, Lynch)","Siempre debe evaluarse; realizar ultrasonido transvaginal y biopsia si endometrio ≥4 mm","Es indicación directa de histerectomía sin biopsia previa"],

  },

    ans:3,
    exp:"En mujeres posmenopáusicas SIN TRH, el valor de corte es un grosor endometrial >4 mm por ultrasonido transvaginal. Con TRH combinada el corte se eleva a >5 mm. Esta paciente tiene 6 mm (>4 mm), por lo que requiere biopsia endometrial. El VPN de un endometrio ≤4 mm para cáncer de endometrio en posmenopáusica con sangrado supera el 99%.",

    opts:["Estadificación clínica mediante exploración física + tomografía abdominal","Estadificación quirúrgica: histerectomía + SOB + linfadenectomía + análisis histopatológico","Estadificación solo con RM pélvica + PET-CT sin cirugía","Estadificación por biopsia histeroscópica dirigida sin laparotomía"],
    ans:1,
    exp:"El cáncer de endometrio se estadifica QUIRÚRGICAMENTE según la FIGO. La cirugía (histerectomía total + salpingooforectomía bilateral + linfadenectomía pélvica y paraaórtica ± lavado peritoneal) permite evaluar con precisión la invasión miometrial, el estado ganglionar y la extensión a órganos vecinos. La RM preoperatoria orienta la planeación quirúrgica pero no reemplaza la estadificación histológica.",

  {

  },

    ans:1,
    exp:"El CA-125 está elevado en el 20-25% de los cánceres de endometrio en estadio I y en hasta el 80% en estadios avanzados o recurrentes. No es suficientemente sensible ni específico para diagnóstico o tamizaje inicial, pero es útil para el seguimiento de pacientes con enfermedad avanzada, monitorear respuesta al tratamiento y detectar recurrencia precozmente.",
    tip:"<strong>Ca endometrio avanzado: CA-125 útil para seguimiento y detección de recurrencia.</strong> No es marcador de tamizaje (baja sensibilidad en estadios tempranos).",

  },
  /* ── TRATAMIENTO ── */
  {

    q:"Mujer de 61 años con adenocarcinoma endometrioide estadio IA grado 1 (invasión <50% miometrio, sin factores de alto riesgo). ¿Cuál es el tratamiento estándar?",
    opts:["Radioterapia pélvica externa exclusiva sin cirugía","Quimioterapia con carboplatino + paclitaxel sin cirugía","Histerectomía total + salpingooforectomía bilateral (sin radioterapia adyuvante de rutina)","Progestágenos orales por 12 meses como tratamiento definitivo"],

    tip:"<strong>Estadio IA bajo riesgo = HT + SOB. Sin adyuvante.</strong> Supervivencia >90-95%. La RT adyuvante no mejora la SG en bajo riesgo.",
    ref:"GPC Diagnóstico y tratamiento del Cáncer de endometrio 2015."
  },
  {
    cat:"trat", catName:"Tratamiento",
    q:"Mujer de 34 años con adenocarcinoma endometrioide estadio IA grado 1, sin invasión miometrial (confinado al endometrio), que desea conservar fertilidad. ¿Cuál es la opción de tratamiento conservador?",
    opts:["No existe tratamiento conservador; la histerectomía es siempre obligatoria","Radioterapia braquivaginal exclusiva sin cirugía","Quimioterapia neoadyuvante seguida de cirugía conservadora del útero","Progestágenos en altas dosis (AMP 160-200 mg/día o DIU-LNG) con histeroscopia de control cada 3 meses"],
    ans:3,

    tip:"<strong>Ca endometrio IA G1 + deseo genésico = progestágenos altas dosis + control estricto.</strong> Es transitorio: histerectomía definitiva después del embarazo o si no responde.",

  },
  {

    opts:["Solo observación sin ningún tratamiento adyuvante","Braquiterapia vaginal ± radioterapia pélvica externa","Quimioterapia con carboplatino + paclitaxel exclusivamente como primera opción","Hormonoterapia con progestágenos sistémicos en altas dosis"],

    tip:"<strong>Ca endometrio avanzado: carboplatino + paclitaxel = esquema estándar de QT.</strong> 6 ciclos cada 3 semanas. Puede combinarse con RT (esquema 'sandwich').",
    ref:"GPC Diagnóstico y tratamiento del Cáncer de endometrio 2015."
  },
  {
    cat:"trat", catName:"Tratamiento",
    q:"Mujer joven portadora de síndrome de Lynch (mutación MSH2) que ya completó su paridad y no desea más hijos. ¿Cuál es la conducta preventiva recomendada?",
    opts:["Histerectomía profiláctica total + salpingooforectomía bilateral","Solo vigilancia anual con biopsia endometrial ambulatoria indefinidamente","Tamoxifeno como quimioprevención por 5 años","Progestágenos cíclicos indefinidamente para inducir sangrado regular"],
    ans:0,
    exp:"Las portadoras de síndrome de Lynch con paridad satisfecha deben ser informadas del riesgo de cáncer de endometrio (40-60%) y de ovario. La histerectomía total + salpingooforectomía bilateral profiláctica reduce drásticamente el riesgo de ambas neoplasias ginecológicas. Es la opción recomendada una vez cumplida la paridad. La vigilancia (biopsia endometrial anual + ultrasonido) es alternativa válida si la paciente no desea cirugía.",

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function init(){
  shuffle(questions);
  currentQ=0;score=0;answers=[];
  catStats={riesgo:{c:0,t:0},diag:{c:0,t:0},trat:{c:0,t:0}};
  const r=document.getElementById('resultsArea');
  r.classList.remove('show');r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion(){
  const qa=questions[currentQ],total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const L=['A','B','C','D'];
  let h=`<div class="question-card">
    <div class="q-category cat-${qa.cat}">${qa.catName}</div>
    <div class="q-number">Pregunta ${currentQ+1} de ${total}</div>
    <div class="q-text">${qa.q}</div>
    <div class="options">`;
  qa.opts.forEach((o,i)=>h+=`<button class="option-btn" onclick="selectAnswer(${i})">
    <span class="option-letter">${L[i]}</span><span>${o}</span></button>`);
  h+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=h;
}

function selectAnswer(idx){
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const ok=idx===qa.ans;
  btns.forEach((b,i)=>{b.classList.add('disabled');b.onclick=null;
    if(i===qa.ans)b.classList.add('correct-answer');
    if(i===idx&&!ok)b.classList.add('wrong-answer');});
  if(!catStats[qa.cat])catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(ok){score++;catStats[qa.cat].c++;}
  if(!examMode){
    fb.className=ok?'feedback correct-fb show':'feedback wrong-fb show';
    fb.innerHTML=ok
      ?`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`
      :`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;
  }
  answers.push({q:qa.q,correct:ok,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,tip:qa.tip,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion(){currentQ++;if(currentQ>=questions.length)showResults();else renderQuestion();}

function showResults(){
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'🏆 ¡Excelente dominio! Listo para el ENARM.':pct>=70?'👏 ¡Muy bien! Repasa las áreas con menor puntaje.':pct>=50?'📚 Aceptable, hay áreas de oportunidad.':'⚠️ Refuerza este tema. Revisa las GPC correspondientes.';
  const cats=[
    {name:'Factores de Riesgo',key:'riesgo',color:'#fbbf24'},
    {name:'Diagnóstico y Estadificación',key:'diag',color:'#38bdf8'},
    {name:'Tratamiento',key:'trat',color:'#f87171'}
  ];
  let h=`<div class="results-header"><div class="score-big">${pct}%</div><div class="score-label">${score} de ${questions.length} correctas</div><div class="score-msg">${msg}</div></div>
  <div class="chart-section"><div class="chart-title"><span>📊</span> Rendimiento por Categoría</div><div class="bar-chart">`;
  cats.forEach(c=>{const s=catStats[c.key]||{c:0,t:0};const p=s.t>0?Math.round((s.c/s.t)*100):0;if(s.t>0)h+=`<div class="bar-row"><div class="bar-label">${c.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${c.color};">${p}% (${s.c}/${s.t})</div></div></div>`;});
  h+=`</div></div><div class="chart-section"><div class="chart-title"><span>🎯</span> Resumen General</div><div class="donut-wrap">
    <svg class="donut-svg" viewBox="0 0 42 42">
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
      <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
    </svg>
    <div class="donut-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Total: ${questions.length}</div>
    </div></div></div>
  <div class="chart-section"><div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{h+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
    <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
    <div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div>
    <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
    <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
  </div>`;});
  h+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const r=document.getElementById('resultsArea');r.innerHTML=h;r.classList.add('show');r.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
init();
</script>
