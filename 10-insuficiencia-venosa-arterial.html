  .retry-btn { display:block; margin:28px auto; padding:14px 40px; background:linear-gradient(135deg,var(--accent),var(--purple)); color:var(--bg); border:none; border-radius:100px; font-family:inherit; font-size:1rem; font-weight:700; cursor:pointer; transition:all 0.2s; }
  .retry-btn:hover { transform:scale(1.05); }
  .hamburger { display:none; position:fixed; top:16px; left:16px; z-index:200; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px; cursor:pointer; font-size:1.2rem; }

<script>
let examMode = false;

function setMode(mode) {
  examMode = (mode === 'examen');
  document.getElementById('btnRepaso').classList.toggle('active', !examMode);
  document.getElementById('btnExamen').classList.toggle('active', examMode);
  init();
}

const questions = [
  {
    cat:"ven", catName:"Insuficiencia Venosa",
    q:"Mujer de 52 años con pesadez y edema en miembros inferiores que mejora con elevación, telangiectasias y venas reticulares visibles, sin úlceras ni cambios tróficos. Según la clasificación CEAP, ¿en qué categoría clínica se encuentra?",
    opts:["C0 — sin signos visibles ni palpables","C1 — telangiectasias o venas reticulares","C3 — edema sin cambios de piel","C4 — cambios cutáneos por enfermedad venosa"],
    ans:1,
    exp:"La clasificación CEAP (Clínica, Etiológica, Anatómica, Patofisiológica) es el sistema estándar para clasificar la insuficiencia venosa crónica. C0: sin signos. C1: telangiectasias (&lt;1mm) o venas reticulares (1–3mm). C2: várices (>3mm). C3: edema. C4a: pigmentación o eccema. C4b: lipodermatoesclerosis o atrofia blanche. C5: úlcera cicatrizada. C6: úlcera activa. La GPC establece que la clasificación CEAP guía el manejo.",
    tip:"<strong>Mnemotecnia CEAP C0–C6:</strong> 0=Nada, 1=Telang, 2=Várices, 3=Edema, 4=Piel cambia, 5=Úlcera cerrada, 6=Úlcera abierta. El sufijo 'S' indica sintomático y 'A' asintomático (p.ej., C2S). La clasificación CEAP reemplazó la clasificación antigua; es la que ENARM evalúa.",
    ref:"GPC: Prevención, diagnóstico y tratamiento de la insuficiencia venosa crónica. IMSS. 2009."
  },
  {
    cat:"ven", catName:"Insuficiencia Venosa",
    q:"Paciente con insuficiencia venosa crónica CEAP C6 presenta úlcera en el maléolo medial del tobillo, de bordes irregulares, base granulomatosa, eritema perilesional y exudado moderado. ¿Cuál es la característica diferencial más importante de la úlcera venosa respecto a la arterial?",
    opts:["Localización en el talón y zonas de presión","Bordes necróticos, ausencia de pulsos y dolor intenso en reposo","Localización supramaleolar medial, bordes irregulares y dolor leve que mejora con elevación","Fondo pálido, atrófico y sin sangrado al desbridar"],
    ans:2,
    exp:"Las úlceras venosas se localizan clásicamente en el área supramaleolar medial (gaiter area), tienen bordes irregulares pero bien definidos, base granulomatosa rojiza, exudado moderado-abundante y dolor leve que mejora al elevar el miembro. Las úlceras arteriales, por el contrario, se localizan en zonas distales (dedos, talón), tienen bordes bien definidos, fondo pálido/necrótico, son extremadamente dolorosas y el dolor empeora con la elevación.",
    tip:"<strong>Venosa vs Arterial — clave diferencial:</strong> Venosa: maléolo medial, bordes irregulares, base roja, dolor leve, mejora elevando. Arterial: dedos/talón, bordes nítidos, fondo pálido/necrótico, dolor severo en reposo, empeora elevando. El ITB diferencia ambas: venosa ITB normal (&gt;0.9), arterial ITB bajo (&lt;0.9).",
    ref:"GPC: Prevención, diagnóstico y tratamiento de la insuficiencia venosa crónica. IMSS. 2009."
  },
  {
    cat:"ven", catName:"Insuficiencia Venosa",
    q:"¿Cuál es el tratamiento de primera línea recomendado por la GPC para la insuficiencia venosa crónica sintomática CEAP C2–C3 (várices con edema)?",
    opts:["Terapia de compresión elástica con medias de 20–30 mmHg + medidas higienodiéteticas","Safenectomía de urgencia","Anticoagulación oral indefinida","AINES y reposo absoluto"],
    ans:0,
    exp:"La GPC establece que el tratamiento de primera línea para IVC sintomática es la terapia compresiva con medias de compresión graduada (20–30 mmHg para C2–C3; 30–40 mmHg para C4–C6), combinada con medidas higienodiéteticas: elevación del miembro, ejercicio físico (caminar), control de peso y evitar bipedestación prolongada. La cirugía se reserva para casos con fracaso de tratamiento conservador o complicaciones.",
    tip:"<strong>Compresión graduada: principio clave:</strong> La presión es mayor en tobillo y disminuye hacia la rodilla/muslo, favoreciendo el retorno venoso. Contraindicada si ITB &lt;0.6 (isquemia). Clases: I=15–20mmHg (profilaxis), II=20–30mmHg (IVC leve-moderada), III=30–40mmHg (IVC severa/úlceras), IV=&gt;40mmHg (linfedema).",
    ref:"GPC: Prevención, diagnóstico y tratamiento de la insuficiencia venosa crónica. IMSS. 2009."
  },
  {
    cat:"ven", catName:"Insuficiencia Venosa",
    q:"¿Cuál es el tratamiento indicado para várices tronculares de la safena mayor sintomáticas (CEAP C2S) con reflujo confirmado por eco Doppler, en paciente sin contraindicaciones quirúrgicas?",
    opts:["Safenectomía (stripping) de la vena safena mayor o ablación endovascular (láser/radiofrecuencia)","Escleroterapia con espuma en todas las várices tronculares","Medias de compresión de por vida como único tratamiento","Anticoagulación profiláctica y observación"],
    ans:0,
    exp:"Para várices tronculares de la safena mayor (CEAP C2) con insuficiencia valvular confirmada, el tratamiento definitivo es la safenectomía (stripping) o la ablación endovascular (láser endovenoso o radiofrecuencia). La GPC recomienda la cirugía cuando el tratamiento conservador no controla los síntomas o existe reflujo safeno-femoral. La ablación endovascular tiene resultados comparables con menor morbilidad y recuperación más rápida. La escleroterapia con espuma se reserva para recidivas o várices no tronculares.",
    tip:"<strong>Algoritmo de tratamiento de várices:</strong> Telangiectasias/reticulares → escleroterapia o láser cutáneo. Várices tronculares (safena incompetente) → ablación endovascular (primera línea) o safenectomía. Recidivas posquirúrgicas → escleroterapia con espuma. La ligadura de la unión safeno-femoral sin stripping tiene alta tasa de recidiva.",
    ref:"GPC: Prevención, diagnóstico y tratamiento de la insuficiencia venosa crónica. IMSS. 2009."
  },
  {
    cat:"art", catName:"Insuficiencia Arterial",
    q:"Hombre de 65 años, diabético y fumador, refiere dolor en pantorrilla al caminar 200 metros que cede con el reposo. No hay dolor en reposo ni úlceras. El índice tobillo-brazo (ITB) es de 0.65. ¿Cuál es el diagnóstico y estadio según la clasificación de Fontaine?",
    opts:["Fontaine I — enfermedad asintomática, ITB normal","Fontaine IIa — claudicación leve (>200m)","Fontaine III — dolor en reposo","Fontaine IIb — claudicación moderada-grave (&lt;200m)"],
    ans:3,
    exp:"La clasificación de Fontaine estadifica la insuficiencia arterial periférica: I=asintomático (ITB 0.7–0.9), IIa=claudicación &gt;200m, IIb=claudicación &lt;200m, III=dolor en reposo (ITB &lt;0.5), IV=úlceras o gangrena (isquemia crítica). El ITB de 0.65 confirma enfermedad arterial periférica moderada. La claudicación a 200m corresponde a Fontaine IIb (claudicación moderada-grave), ya que el límite entre IIa y IIb es exactamente 200 metros.",

    tip:"<strong>Isquemia crítica vs neuropatía diabética:</strong> Isquémica: dolor en reposo que mejora al declinar (gravitacional), ausencia de pulsos, ITB &lt;0.5, pie frío y pálido/cianótico, úlceras en zonas de presión o distales. Neuropática: úlcera en zonas de carga (talón, metatarsos), pie caliente, pulsos presentes, insensibilidad, piel seca con fisuras. Frecuentemente coexisten (pie diabético mixto).",

let currentQ = 0, score = 0, answers = [];
let catStats = { ven:{c:0,t:0}, art:{c:0,t:0}, tve:{c:0,t:0}, isq:{c:0,t:0}, tx:{c:0,t:0} };

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function init() {
  shuffle(questions);
  currentQ=0; score=0; answers=[];
  catStats = { ven:{c:0,t:0}, art:{c:0,t:0}, tve:{c:0,t:0}, isq:{c:0,t:0}, tx:{c:0,t:0} };
  const r=document.getElementById('resultsArea');
  r.classList.remove('show'); r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion() {
  const qa=questions[currentQ], total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const letters=['A','B','C','D'];
  let html=`<div class="question-card">
    <div class="q-category cat-${qa.cat}">${qa.catName}</div>
    <div class="q-number">Pregunta ${currentQ+1} de ${total}</div>
    <div class="q-text">${qa.q}</div>
    <div class="options">`;
  qa.opts.forEach((opt,i)=>{
    html+=`<button class="option-btn" onclick="selectAnswer(${i})" data-idx="${i}">
      <span class="option-letter">${letters[i]}</span><span>${opt}</span></button>`;
  });
  html+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=html;
}

function selectAnswer(idx) {
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const isCorrect=idx===qa.ans;
  btns.forEach((btn,i)=>{
    btn.classList.add('disabled'); btn.onclick=null;
    if(i===qa.ans) btn.classList.add('correct-answer');
    if(i===idx&&!isCorrect) btn.classList.add('wrong-answer');
  });
  if(!catStats[qa.cat]) catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(isCorrect){score++;catStats[qa.cat].c++;}
  if(!examMode){
    fb.className=isCorrect?'feedback correct-fb show':'feedback wrong-fb show';
    fb.innerHTML=isCorrect
      ?`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`
      :`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;
  }
  answers.push({q:qa.q,correct:isCorrect,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if(currentQ>=questions.length) showResults();
  else renderQuestion();
}

function showResults() {
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'🏆 ¡Dominio excelente de patología vascular!':pct>=70?'👏 ¡Muy bien! Repasa los temas con menor puntaje.':pct>=50?'📚 Aceptable, refuerza las áreas débiles.':'⚠️ Revisa las GPC de insuficiencia venosa y arterial periférica.';
  const cats=[
    {name:'Insuf. Venosa',key:'ven',color:'#fbbf24'},
    {name:'Insuf. Arterial',key:'art',color:'#38bdf8'},
    {name:'Trombosis Venosa',key:'tve',color:'#a78bfa'},
    {name:'Isquemia Crítica',key:'isq',color:'#f472b6'},
    {name:'Tratamiento',key:'tx',color:'#34d399'},
  ];
  let html=`<div class="results-header">
    <div class="score-big">${pct}%</div>
    <div class="score-label">${score} de ${questions.length} correctas</div>
    <div class="score-msg">${msg}</div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📊</span> Rendimiento por Categoría</div>
    <div class="bar-chart">`;
  cats.forEach(cat=>{
    const s=catStats[cat.key]||{c:0,t:0};
    const p=s.t>0?Math.round((s.c/s.t)*100):0;
    html+=`<div class="bar-row"><div class="bar-label">${cat.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${cat.color};">${p}% (${s.c}/${s.t})</div></div></div>`;
  });
  html+=`</div></div>
  <div class="chart-section">
    <div class="chart-title"><span>🎯</span> Resumen General</div>
    <div class="donut-wrap">
      <svg class="donut-svg" viewBox="0 0 42 42">
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
        <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
      </svg>
      <div class="donut-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#38bdf8;"></div>Total: ${questions.length}</div>
      </div>
    </div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{
    html+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
      <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
      <div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div>
      <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
      <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
    </div>`;
  });
  html+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const res=document.getElementById('resultsArea');
  res.innerHTML=html; res.classList.add('show');
  res.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(header){header.classList.toggle('open');header.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}

init();
</script>
</body>
</html>
