function setMode(m){

const questions = [
  /* ── AMENORREA PRIMARIA ── */
  {
    cat:"pri", catName:"Amenorrea Primaria",
    q:"¿Cuándo debe evaluarse una adolescente por ausencia de menarquia?",
    opts:["A los 16 años en cualquier caso, o a los 14 años si tampoco hay telarquia","Solo a los 18 años si no ha menstruado","A los 12 años como tamizaje rutinario universal","Cuando cumplan 2 años de ausencia de menstruación tras la telarquia"],
    ans:0,
    exp:"La evaluación de amenorrea primaria se indica en dos situaciones: (1) ausencia de menarquia a los 16 años independientemente del desarrollo puberal, o (2) ausencia de menarquia a los 14 años si además no hay desarrollo mamario (telarquia). La ausencia de telarquia a los 13 años también amerita evaluación para descartar hipogonadismo primario o central.",
    tip:"<strong>Evaluar amenorrea primaria: 16 años siempre, o 14 años si no hay telarquia.</strong> La ausencia de telarquia a los 13 = también estudiar. No esperar hasta los 18.",
    ref:"GPC Diagnóstico y tratamiento de insuficiencia ovárica primaria, IMSS 2013."
  },
  {
    cat:"pri", catName:"Amenorrea Primaria",

    exp:"El síndrome de Turner (monosomía 45,X o mosaico) es la causa más frecuente de amenorrea primaria con ausencia de desarrollo mamario. Características: talla baja, cuello alado (pterygium colli), cúbito valgo, linfedema, disgenesia gonadal y cardiopatías congénitas (coartación de aorta, válvula aórtica bicúspide en 15-30% de los casos).",
    tip:"<strong>Turner = talla baja + cuello alado + amenorrea primaria + sin desarrollo mamario.</strong> Cariotipo 45,X. Cardiopatía más frecuente: coartación aórtica. Siempre ecocardiograma.",
    ref:"GPC Insuficiencia ovárica primaria, IMSS 2013."
  },
  {
    cat:"pri", catName:"Amenorrea Primaria",
    q:"Adolescente de 16 años sin menarquia, desarrollo mamario y vello pubiano normales (Tanner V), pero con dolor pélvico cíclico intenso cada mes. ¿Cuál es el diagnóstico?",
    opts:["Hematocolpos por himen imperforado","Anovulación crónica con ciclos sin menstruación","Insuficiencia ovárica primaria con ciclos anovulatorios","Síndrome de Asherman congénito"],

    exp:"El himen imperforado produce criptomenorrea: el sangrado menstrual se acumula en vagina (hematocolpos), útero (hematómetra) y trompas (hematosálpinx). Se manifiesta como amenorrea primaria con caracteres sexuales secundarios normales (los ovarios y estrógenos funcionan) y dolor pélvico cíclico mensual. A la inspección se observa membrana himeneal abombada violácea. Tratamiento: incisión quirúrgica.",
    tip:"<strong>Menarquia ausente + desarrollo normal + dolor cíclico = himen imperforado.</strong> Masa pélvica en ECO (hematocolpos). Tratar: himenotomía quirúrgica urgente.",
    ref:"GPC Insuficiencia ovárica primaria, IMSS 2013."
  },
  {
    cat:"pri", catName:"Amenorrea Primaria",
    q:"Adolescente de 17 años sin menarquia, desarrollo mamario normal, vello pubiano escaso y vagina corta en fondo de saco. Cariotipo 46,XY. ¿Cuál es el diagnóstico?",
    opts:["Síndrome de Turner con mosaicismo 46,XY","Disgenesia gonadal mixta 46,XY con fenotipo femenino","Síndrome de Mayer-Rokitansky (agenesia mülleriana 46,XX)","Síndrome de insensibilidad a los andrógenos (síndrome de Morris)"],
    ans:3,
    exp:"El síndrome de insensibilidad a los andrógenos (SIA) cursa con: cariotipo 46,XY, fenotipo femenino (los receptores de andrógenos no responden), buen desarrollo mamario (la testosterona se convierte a estrógenos periféricos), vello pubiano y axilar muy escaso (los folículos pilosos no responden a andrógenos) y vagina corta o en fondo de saco. Las gónadas (testículos) son intraabdominales e inguinales con riesgo de malignización (gonadoblastoma ~15%).",
    tip:"<strong>SIA = 46,XY + fenotipo femenino + mamas normales + vello escaso + vagina corta.</strong> Gónadas intraabdominales = gonadectomía profiláctica tras pubertad. Muy diferente a Turner (45,X).",
    ref:"GPC Insuficiencia ovárica primaria, IMSS 2013."
  },
  {
    cat:"pri", catName:"Amenorrea Primaria",
    q:"Mujer de 18 años sin menarquia, desarrollo mamario y vello pubiano normales, útero ausente en imagen, ovarios normales y cariotipo 46,XX. ¿Cuál es el diagnóstico?",
    opts:["Síndrome de Mayer-Rokitansky-Küster-Hauser (aplasia mülleriana 46,XX)","Síndrome de insensibilidad a andrógenos (46,XY)","Síndrome de Turner 45,X con mosaicismo","Síndrome de Asherman congénito por sinequias uterinas prenatales"],

    tip:"<strong>IOP = FSH alta + estradiol bajo en mujer <40 años.</strong> Hipergonadotrópico (hipófisis normal, ovario falla). 10% puede recuperar ovulación espontánea.",

    tip:"<strong>FMR1 en IOP = consejo genético.</strong> Hijos varones de portadoras: riesgo de síndrome X frágil (discapacidad intelectual). Ofrecer diagnóstico prenatal en futuras gestaciones.",

    exp:"En IOP el pool folicular está agotado o muy reducido. La ovodonación (FIV con óvulos de donante) tiene tasas de éxito del 40-60% por ciclo y es la opción reproductiva más eficaz. La estimulación ovárica propia rara vez produce respuesta. Solo el 5-10% de mujeres con IOP logra embarazo espontáneo. Las gonadotropinas a altas dosis no mejoran significativamente la respuesta folicular.",

  },
  {
    cat:"iop", catName:"Insuficiencia Ovárica Primaria",
    q:"Comorbilidad autoinmune más frecuentemente asociada a insuficiencia ovárica primaria de causa autoinmune:",
    opts:["Diabetes mellitus tipo 1 autoinmune","Lupus eritematoso sistémico","Enfermedad tiroidea autoinmune (tiroiditis de Hashimoto / Graves)","Anemia perniciosa por anticuerpos anti-factor intrínseco"],
    ans:2,
    exp:"La IOP autoinmune representa ~20-30% de los casos. La enfermedad tiroidea autoinmune (tiroiditis de Hashimoto, enfermedad de Graves) es la comorbilidad más frecuente asociada. También se asocia a insuficiencia suprarrenal autoinmune (buscar siempre Addison), diabetes tipo 1 y miastenia gravis. Se recomiendan tamizajes periódicos de función tiroidea (TSH anual) y suprarrenal (cortisol basal).",
    tip:"<strong>IOP autoinmune → tamizar tiroides (Hashimoto) y suprarrenal (Addison).</strong> TSH anual. Cortisol basal + ACTH si síntomas. Anticuerpos anti-ovario no tienen utilidad clínica práctica.",

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function init(){
  shuffle(questions);
  currentQ=0;score=0;answers=[];
  catStats={pri:{c:0,t:0},sec:{c:0,t:0},iop:{c:0,t:0}};
  const r=document.getElementById('resultsArea');
  r.classList.remove('show');r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion(){
  const qa=questions[currentQ],total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const L=['A','B','C','D'];
  let h=`<div class="question-card">
    <div class="q-category cat-${qa.cat}">${qa.catName}</div>
    <div class="q-number">Pregunta ${currentQ+1} de ${total}</div>
    <div class="q-text">${qa.q}</div>
    <div class="options">`;
  qa.opts.forEach((o,i)=>h+=`<button class="option-btn" onclick="selectAnswer(${i})">
    <span class="option-letter">${L[i]}</span><span>${o}</span></button>`);
  h+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=h;
}

function selectAnswer(idx){
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const ok=idx===qa.ans;
  btns.forEach((b,i)=>{b.classList.add('disabled');b.onclick=null;
    if(i===qa.ans)b.classList.add('correct-answer');
    if(i===idx&&!ok)b.classList.add('wrong-answer');});
  if(!catStats[qa.cat])catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(ok){score++;catStats[qa.cat].c++;}
  if(!examMode){
    fb.className=ok?'feedback correct-fb show':'feedback wrong-fb show';
    fb.innerHTML=ok
      ?`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`
      :`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;
  }
  answers.push({q:qa.q,correct:ok,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,tip:qa.tip,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion(){currentQ++;if(currentQ>=questions.length)showResults();else renderQuestion();}

function showResults(){
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'🏆 ¡Excelente dominio! Listo para el ENARM.':pct>=70?'👏 ¡Muy bien! Repasa las áreas con menor puntaje.':pct>=50?'📚 Aceptable, hay áreas de oportunidad.':'⚠️ Refuerza este tema. Revisa las GPC correspondientes.';
  const cats=[{name:'Amenorrea Primaria',key:'pri',color:'#f472b6'},{name:'Amenorrea Secundaria',key:'sec',color:'#38bdf8'},{name:'Insuficiencia Ovárica Primaria',key:'iop',color:'#a78bfa'}];
  let h=`<div class="results-header"><div class="score-big">${pct}%</div><div class="score-label">${score} de ${questions.length} correctas</div><div class="score-msg">${msg}</div></div>
  <div class="chart-section"><div class="chart-title"><span>📊</span> Rendimiento por Categoría</div><div class="bar-chart">`;
  cats.forEach(c=>{const s=catStats[c.key]||{c:0,t:0};const p=s.t>0?Math.round((s.c/s.t)*100):0;if(s.t>0)h+=`<div class="bar-row"><div class="bar-label">${c.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${c.color};">${p}% (${s.c}/${s.t})</div></div></div>`;});
  h+=`</div></div><div class="chart-section"><div class="chart-title"><span>🎯</span> Resumen General</div><div class="donut-wrap">
    <svg class="donut-svg" viewBox="0 0 42 42">
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
      <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
    </svg>
    <div class="donut-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#a78bfa;"></div>Total: ${questions.length}</div>
    </div></div></div>
  <div class="chart-section"><div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{h+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
    <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
    <div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div>
    <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
    <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
  </div>`;});
  h+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const r=document.getElementById('resultsArea');r.innerHTML=h;r.classList.add('show');r.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
init();
</script>
