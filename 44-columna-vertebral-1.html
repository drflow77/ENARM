<style>

  .back-btn{display:flex;align-items:center;gap:8px;padding:14px 20px;color:var(--text-dim);font-size:0.8rem;text-decoration:none;border-bottom:1px solid var(--border);transition:color 0.2s;}

  .specialty-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.9rem;flex-shrink:0;}
  .chevron{font-size:0.65rem;color:var(--text-dim);transition:transform 0.3s;}
  .specialty-header.open .chevron{transform:rotate(90deg);}
  .topics-list{display:none;padding:4px 0 8px;}

  .topic-link{display:flex;align-items:center;gap:10px;padding:8px 16px 8px 56px;font-size:0.78rem;color:var(--text-dim);text-decoration:none;transition:all 0.2s;border-left:2px solid transparent;line-height:1.4;}
  .topic-link:hover{color:var(--text);background:var(--surface3);}
  .topic-link.active{color:var(--accent);border-left-color:var(--accent);background:var(--accent-glow);font-weight:600;}
  .topic-link.coming-soon{opacity:0.4;cursor:not-allowed;pointer-events:none;}
  .topic-num{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--text-dim);min-width:20px;}
  .badge-soon{margin-left:auto;background:rgba(136,150,179,0.1);color:var(--text-dim);font-size:0.62rem;font-weight:600;padding:2px 7px;border-radius:100px;}
  .badge-ready{margin-left:auto;background:rgba(52,211,153,0.15);color:var(--correct);font-size:0.62rem;font-weight:600;padding:2px 7px;border-radius:100px;}

  .main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;}
  .container{max-width:760px;margin:0 auto;padding:20px 16px 40px;width:100%;}

  .mode-bar{display:flex;align-items:center;gap:10px;margin:24px 0 20px;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:6px;width:fit-content;}
  .mode-btn{padding:8px 20px;border-radius:100px;border:none;cursor:pointer;font-family:inherit;font-size:0.82rem;font-weight:600;transition:all 0.2s;color:var(--text-dim);background:transparent;}

  .header{text-align:center;padding:40px 20px 24px;position:relative;overflow:hidden;}
  .header::before{content:'';position:absolute;top:-60%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(56,189,248,0.08) 0%,transparent 70%);pointer-events:none;}
  .header-badge{display:inline-flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);padding:6px 16px;border-radius:100px;font-size:0.78rem;color:var(--blue);font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:16px;}
  .header h1{font-size:clamp(1.4rem,4.5vw,2.2rem);font-weight:800;background:linear-gradient(135deg,var(--text) 0%,var(--blue) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;line-height:1.2;}
  .header p{color:var(--text-dim);font-size:0.95rem;max-width:600px;margin:0 auto;line-height:1.4;}

  .progress-wrap{background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:12px 20px;margin:20px 0 28px;display:flex;align-items:center;gap:14px;}
  .progress-bar-bg{flex:1;height:8px;background:var(--surface3);border-radius:100px;overflow:hidden;}
  .progress-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:100px;transition:width 0.5s ease;}
  .progress-text{font-size:0.82rem;font-weight:600;color:var(--text-dim);white-space:nowrap;font-family:'JetBrains Mono',monospace;}

  .question-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;margin-bottom:20px;animation:slideIn 0.4s ease;position:relative;overflow:hidden;}
  .question-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--purple),var(--pink));}
  @keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

  .q-category{display:inline-flex;align-items:center;gap:6px;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;padding:4px 12px;border-radius:100px;margin-bottom:14px;}
  .cat-esgui{background:rgba(56,189,248,0.12);color:#38bdf8;}
  .cat-espo{background:rgba(167,139,250,0.12);color:#a78bfa;}
  .cat-esco{background:rgba(52,211,153,0.12);color:#34d399;}
  .cat-frac{background:rgba(248,113,113,0.12);color:#f87171;}

  .q-number{font-family:'JetBrains Mono',monospace;font-size:0.78rem;color:var(--text-dim);margin-bottom:10px;}
  .q-text{font-size:1.05rem;font-weight:600;line-height:1.55;margin-bottom:20px;color:var(--text);}
  .options{display:flex;flex-direction:column;gap:10px;}
  .option-btn{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:all 0.2s;text-align:left;font-size:0.92rem;color:var(--text);font-family:inherit;line-height:1.5;width:100%;}
  .option-btn:hover:not(.disabled){border-color:var(--blue);background:rgba(56,189,248,0.08);transform:translateX(4px);}
  .option-letter{display:flex;align-items:center;justify-content:center;min-width:30px;height:30px;border-radius:8px;background:var(--surface3);font-weight:700;font-size:0.82rem;color:var(--blue);flex-shrink:0;}
  .option-btn.correct-answer{border-color:var(--correct-border);background:var(--correct-bg);}
  .option-btn.correct-answer .option-letter{background:var(--correct);color:var(--bg);}
  .option-btn.wrong-answer{border-color:var(--wrong-border);background:var(--wrong-bg);}
  .option-btn.wrong-answer .option-letter{background:var(--wrong);color:var(--bg);}
  .option-btn.disabled{cursor:default;}
  .option-btn.disabled:hover{transform:none;}

  .feedback{margin-top:18px;padding:18px;border-radius:12px;font-size:0.88rem;line-height:1.65;animation:fadeIn 0.3s ease;display:none;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .feedback.show{display:block;}
  .feedback.correct-fb{background:var(--correct-bg);border:1px solid var(--correct-border);color:var(--correct);}
  .feedback.wrong-fb{background:var(--wrong-bg);border:1px solid var(--wrong-border);color:#fca5a5;}
  .feedback-title{font-weight:700;font-size:0.95rem;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
  .feedback .tip{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.08);color:var(--text-dim);font-size:0.82rem;}
  .feedback .tip strong{color:var(--gold);}
  .feedback .ref{margin-top:8px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;}

  .next-btn{display:none;margin:20px auto 0;padding:12px 32px;background:linear-gradient(135deg,var(--blue),var(--purple));color:var(--bg);border:none;border-radius:100px;font-family:inherit;font-size:0.92rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
  .next-btn:hover{transform:scale(1.05);}
  .next-btn.show{display:block;}

  .results{display:none;animation:slideIn 0.5s ease;}
  .results.show{display:block;}
  .results-header{text-align:center;padding:30px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px;position:relative;overflow:hidden;}
  .results-header::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--blue),var(--purple),var(--pink));}
  .score-big{font-family:'JetBrains Mono',monospace;font-size:3.5rem;font-weight:800;color:var(--blue);line-height:1;}
  .score-label{font-size:1rem;color:var(--text-dim);margin:8px 0;}
  .score-msg{font-size:1.05rem;font-weight:600;color:var(--text);}
  .chart-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
  .chart-title{font-size:0.9rem;font-weight:700;color:var(--text-dim);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
  .bar-chart{display:flex;flex-direction:column;gap:12px;}
  .bar-row{display:flex;flex-direction:column;gap:6px;}
  .bar-label{font-size:0.82rem;font-weight:600;color:var(--text);}
  .bar-track{height:28px;background:var(--surface3);border-radius:6px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:10px;font-size:0.78rem;font-weight:700;color:var(--bg);min-width:40px;transition:width 0.8s ease;}
  .donut-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
  .donut-svg{width:100px;height:100px;flex-shrink:0;}
  .donut-legend{display:flex;flex-direction:column;gap:8px;}
  .legend-item{display:flex;align-items:center;gap:8px;font-size:0.82rem;color:var(--text-dim);}
  .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .review-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;}
  .review-card.review-correct{border-color:var(--correct-border);}
  .review-card.review-wrong{border-color:var(--wrong-border);}
  .review-q{font-size:0.85rem;font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.5;}
  .review-answer{font-size:0.82rem;line-height:1.5;}
  .retry-btn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,var(--blue),var(--purple));border:none;border-radius:12px;color:var(--bg);font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;margin-top:20px;transition:all 0.2s;}
  .retry-btn:hover{filter:brightness(1.1);}

  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:90;}
  .overlay.show{display:block;}
  .hamburger{display:none;position:fixed;top:14px;left:14px;z-index:200;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 10px;cursor:pointer;font-size:1.1rem;}
  .footer{text-align:center;padding:16px;font-size:0.72rem;color:var(--text-dim);border-top:1px solid var(--border);opacity:0.6;}

  @media(max-width:900px){
    .sidebar{transform:translateX(-100%);}
    .sidebar.open{transform:translateX(0);}
    .main{margin-left:0;}
    .hamburger{display:block;}
    .container{padding-top:60px;}
  }
</style>
</head>

<main class="main">

  <div style="display:flex;justify-content:center;">

<script>
let examMode = false;
let currentQ = 0, score = 0, answers = [], catStats = {};

function setMode(mode) {
  examMode = (mode === 'examen');
  document.getElementById('btnRepaso').classList.toggle('active', !examMode);
  document.getElementById('btnExamen').classList.toggle('active', examMode);
  init();
}

const questions = [
  /* ─── ESGUINCE CERVICAL ─── */
  {
    cat:"esgui", catName:"Esguince Cervical",
    q:"Mujer de 34 años involucrada en colisión trasera de tráfico. Presenta cervicalgia con irradiación a hombros, sin déficit neurológico. Rx de columna cervical normal. ¿Cuál es el mecanismo lesional del latigazo cervical (whiplash)?",
    opts:["Flexión cervical directa por impacto anterior","Hiperextensión seguida de flexión brusca por desaceleración brusca del tronco","Compresión axial por carga vertical","Rotación lateral extrema con distracción unilateral"],
    ans:1,
    exp:"El latigazo cervical ocurre por desaceleración brusca: el tronco se detiene mientras la cabeza continúa en hiperextensión (segmento inferior), seguido de flexión rebote anterior. Lesiona ligamentos, músculos y discos cervicales sin fractura visible. El mecanismo es característico de colisiones traseras.",
    tip:"<strong>Colisión trasera + cervicalgia + Rx normal = latigazo cervical.</strong> Mecanismo: hiperextensión → flexión. Whiplash injury.",
    ref:"GPC Atención del paciente con esguince cervical en el primer nivel de atención, IMSS 2014."
  },
  {
    cat:"esgui", catName:"Esguince Cervical",
    q:"Según la clasificación de Quebec Task Force, esguince cervical grado II se define como:",
    opts:["Dolor cervical o rigidez sin signos físicos objetivos","Dolor cervical + signos musculoesqueléticos (punto doloroso, limitación de rango articular)","Dolor cervical + signos neurológicos (hipoestesia, debilidad, arreflexia)","Fractura o luxación cervical"],
    ans:1,
    exp:"Clasificación de Quebec: Grado 0 = sin síntomas; Grado I = síntomas (dolor, rigidez) sin signos objetivos; Grado II = síntomas + signos musculoesqueléticos (rigidez, puntos dolorosos); Grado III = síntomas + signos neurológicos; Grado IV = fractura/luxación. La mayoría de los casos son grado I-II.",
    tip:"<strong>Quebec:</strong> I = solo síntomas; II = +signos musculo; III = +neurológico; IV = fractura. El grado define el tratamiento.",
    ref:"GPC Esguince cervical, IMSS 2014."
  },
  {
    cat:"esgui", catName:"Esguince Cervical",
    q:"¿Cuál es el tratamiento recomendado en esguince cervical grado I-II según la evidencia actual?",
    opts:["Collarín cervical rígido por 6 semanas + reposo absoluto en cama","Movilización activa temprana + AINE y analgésicos de primer nivel","Tracción cervical hospitalaria + fisioterapia intensiva inmediata","Infiltración epidural de corticosteroides como primera línea"],
    ans:1,
    exp:"La evidencia actual favorece la movilización activa temprana sobre la inmovilización con collarín. El collarín prolongado perpetúa el dolor, genera atrofia muscular y deteriora el pronóstico. Tratamiento: analgesia (AINE, paracetamol), calor local y ejercicios de rango de movimiento activo desde el inicio.",
    tip:"<strong>Esguince cervical = movilización temprana.</strong> Collarín: solo en dolor muy intenso, máximo 72h. Collarín prolongado = peor pronóstico.",
    ref:"GPC Esguince cervical, IMSS 2014."
  },
  {
    cat:"esgui", catName:"Esguince Cervical",
    q:"¿Cuáles son los factores de mal pronóstico en esguince cervical por latigazo?",
    opts:["Edad joven, sexo masculino y mecanismo de baja energía","Alta intensidad inicial del dolor, síntomas neurológicos precoces, litigio legal y edad avanzada","VSG elevada, dolor nocturno y antecedente familiar de cervicalgia","Ausencia de inmovilización inicial y retorno laboral precoz"],
    ans:1,
    exp:"Los factores de mal pronóstico incluyen: alta intensidad inicial del dolor (≥5/10 en escala visual), síntomas neurológicos precoces, componente psicológico (catastrofización, kinesofobia), litigio legal o compensación económica y edad avanzada. El sexo femenino también se asocia con peor recuperación.",
    tip:"<strong>Mal pronóstico: dolor intenso + síntomas múltiples + litigio + edad avanzada.</strong> La movilización temprana mejora consistentemente el pronóstico.",
    ref:"GPC Esguince cervical, IMSS 2014."
  },
  /* ─── ESPONDILOLISTESIS ─── */
  {
    cat:"espo", catName:"Espondilolistesis",
    q:"Adolescente de 16 años, gimnasta, con lumbalgia crónica que se exacerba con extensión lumbar. Rx muestra defecto en la pars interarticularis de L5. ¿Cuál es el tipo y nivel más frecuente de espondilolistesis en adolescentes?",
    opts:["Degenerativa (tipo III) en L4-L5","Ístmica (tipo II) en L5-S1","Displásica (tipo I) en L3-L4","Traumática (tipo IV) en L1-L2"],
    ans:1,
    exp:"La espondilolistesis ístmica (tipo II de Wiltse) es la más frecuente en adolescentes y adultos jóvenes. Se produce por defecto en la pars interarticularis (espondilólisis), más común en L5-S1 (>80%). Las actividades con extensión lumbar repetitiva (gimnasia, futbol americano) son factores predisponentes.",
    tip:"<strong>Adolescente + lumbalgia extensión + defecto pars = espondilolistesis ístmica en L5-S1.</strong> Espondilólisis = defecto pars; espondilolistesis = deslizamiento.",
    ref:"Guía clínica de rehabilitación de espondilolistesis, IMSS."
  },
  {
    cat:"espo", catName:"Espondilolistesis",
    q:"Clasificación de Meyerding grado III de espondilolistesis corresponde a deslizamiento del:",
    opts:["<25% del diámetro del cuerpo vertebral","25-50%","50-75%","75-100%"],
    ans:2,
    exp:"Clasificación de Meyerding: Grado I (<25%), Grado II (25-50%), Grado III (50-75%), Grado IV (75-100%), Grado V = espondiloptosis (>100%). Los grados III-IV generalmente requieren tratamiento quirúrgico (artrodesis vertebral). Grados I-II se manejan conservadoramente sin déficit neurológico.",
    tip:"<strong>Meyerding I-II = conservador.</strong> III-IV = cirugía (fusión vertebral). V (espondiloptosis) = cirugía de urgencia.",
    ref:"Guía de rehabilitación de espondilolistesis, IMSS 2020."
  },
  {
    cat:"espo", catName:"Espondilolistesis",
    q:"Mujer de 45 años con espondilolistesis L5-S1 grado I presenta dolor irradiado a la cara posterior del muslo y pierna derecha con pérdida del reflejo aquíleo ipsilateral. ¿Qué raíz nerviosa está comprometida?",
    opts:["L4: reflejo rotuliano y cara medial de la pierna","L5: extensores del pie y cara lateral de la pierna","S1: reflejo aquíleo, plantar y cara posterior","S2-S4: función esfinteriana y perineal"],
    ans:2,
    exp:"La raíz S1 es la más frecuentemente comprometida en espondilolistesis L5-S1. Su afectación produce: reflejo aquíleo disminuido o abolido, parestesias en cara posterior de pierna y planta del pie, y debilidad de flexión plantar (puntillas). La raíz L5 se afecta con mayor frecuencia en hernia de disco L4-L5.",
    tip:"<strong>S1 = aquíleo + plantar + cara posterior.</strong> L5 = dorsiflexión + cara lateral pierna + dorso pie. L4 = rotuliano + cara medial.",
    ref:"Guía de rehabilitación de espondilolistesis, IMSS 2020."
  },
  {
    cat:"espo", catName:"Espondilolistesis",
    q:"Tratamiento de primera línea en espondilolistesis grado I-II sin déficit neurológico:",
    opts:["Artrodesis vertebral posterior con tornillos pediculares de urgencia","Fisioterapia con fortalecimiento de core, AINE y modificación de actividades","Laminectomía descompresiva por vía posterior","Infiltración intradiscal con corticosteroide + anestésico local"],
    ans:1,

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}

function init() {
  shuffle(questions);
  currentQ=0; score=0; answers=[];
  catStats={esgui:{c:0,t:0},espo:{c:0,t:0},esco:{c:0,t:0},frac:{c:0,t:0}};
  const r=document.getElementById('resultsArea');
  r.classList.remove('show'); r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion() {
  const qa=questions[currentQ];
  const total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const letters=['A','B','C','D'];
  let html=`<div class="question-card">
    <div class="q-category cat-${qa.cat}">${qa.catName}</div>
    <div class="q-number">Pregunta ${currentQ+1} de ${total}</div>
    <div class="q-text">${qa.q}</div>
    <div class="options">`;
  qa.opts.forEach((opt,i)=>{
    html+=`<button class="option-btn" onclick="selectAnswer(${i})" data-idx="${i}">
      <span class="option-letter">${letters[i]}</span><span>${opt}</span></button>`;
  });
  html+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=html;
}

function selectAnswer(idx) {
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const isCorrect=idx===qa.ans;
  btns.forEach((btn,i)=>{
    btn.classList.add('disabled'); btn.onclick=null;
    if(i===qa.ans) btn.classList.add('correct-answer');
    if(i===idx&&!isCorrect) btn.classList.add('wrong-answer');
  });
  if(!catStats[qa.cat]) catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(isCorrect){score++;catStats[qa.cat].c++;}
  if(!examMode){
    if(isCorrect){
      fb.className='feedback correct-fb show';
      fb.innerHTML=`<div class="feedback-title">✅ ¡Correcto!</div>
        <div>${qa.exp}</div>
        <div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div>
        <div class="ref">📖 ${qa.ref}</div>`;
    } else {
      fb.className='feedback wrong-fb show';
      fb.innerHTML=`<div class="feedback-title">❌ Incorrecto</div>
        <div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div>
        <div style="margin-top:8px;">${qa.exp}</div>
        <div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div>
        <div class="ref">📖 ${qa.ref}</div>`;
    }
  }
  answers.push({q:qa.q,correct:isCorrect,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,tip:qa.tip,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if(currentQ>=questions.length) showResults();
  else renderQuestion();
}

function showResults() {
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  let msg=pct>=90?'🏆 ¡Excelente dominio! Listo para el ENARM.':
          pct>=70?'👏 ¡Muy bien! Repasa las áreas con menor puntaje.':
          pct>=50?'📚 Aceptable, hay áreas de oportunidad.':'⚠️ Refuerza este tema. Revisa las GPC correspondientes.';
  const cats=[
    {name:'Esguince Cervical',key:'esgui',color:'#38bdf8'},
    {name:'Espondilolistesis',key:'espo',color:'#a78bfa'},
    {name:'Escoliosis Idiopática',key:'esco',color:'#34d399'},
    {name:'Síndromes Medulares',key:'frac',color:'#f87171'},
  ];
  let html=`<div class="results-header">
    <div class="score-big">${pct}%</div>
    <div class="score-label">${score} de ${questions.length} correctas</div>
    <div class="score-msg">${msg}</div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📊</span> Rendimiento por Categoría</div>
    <div class="bar-chart">`;
  cats.forEach(cat=>{
    const s=catStats[cat.key]||{c:0,t:0};
    const p=s.t>0?Math.round((s.c/s.t)*100):0;
    if(s.t>0) html+=`<div class="bar-row">
      <div class="bar-label">${cat.name}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${cat.color};">${p}% (${s.c}/${s.t})</div></div>
    </div>`;
  });
  html+=`</div></div>
  <div class="chart-section">
    <div class="chart-title"><span>🎯</span> Resumen General</div>
    <div class="donut-wrap">
      <svg class="donut-svg" viewBox="0 0 42 42">
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4"
          stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4"
          stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
        <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
      </svg>
      <div class="donut-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#38bdf8;"></div>Total: ${questions.length}</div>
      </div>
    </div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{
    html+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
      <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
      <div class="review-answer">${a.correct
        ?`<strong>✅ ${a.correctAns}</strong>`
        :`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`
      }</div>
      <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
      <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
    </div>`;
  });
  html+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const res=document.getElementById('resultsArea');
  res.innerHTML=html; res.classList.add('show');
  res.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}

init();
</script>
