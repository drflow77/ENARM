<script>
let examMode=false, currentQ=0, score=0, answers=[], catStats={};

function setMode(m){
  examMode=(m==='examen');
  document.getElementById('btnRepaso').classList.toggle('active',!examMode);
  document.getElementById('btnExamen').classList.toggle('active',examMode);
  init();
}

const questions = [
  /* ── LESIONES PRECURSORAS ── */
  {
    cat:"pre", catName:"Lesiones Precursoras",
    q:"¿Cuáles son los genotipos del VPH de alto riesgo que causan la mayoría de los cánceres cervicouterinos?",
    opts:["VPH 16 y 18 (causan aproximadamente el 70% de los cánceres cervicouterinos)","VPH 6 y 11 (responsables del 90% de los condilomas acuminados)","VPH 31 y 33 (los más prevalentes en México)","VPH 45 y 52 (afectan exclusivamente a mujeres posmenopáusicas)"],
    ans:0,
    exp:"Los genotipos 16 y 18 del VPH causan el 70% de los cánceres cervicouterinos a nivel mundial. El VPH 16 se asocia principalmente con carcinoma epidermoide; el VPH 18 con adenocarcinoma. Los genotipos 6 y 11 son de bajo riesgo y causan condilomas acuminados pero no cáncer. La vacuna nonavalente cubre VPH 6, 11, 16, 18, 31, 33, 45, 52 y 58.",
    tip:"VPH 16 y 18 = 70% Ca cervical. VPH 16 → epidermoide. VPH 18 → adenocarcinoma. VPH 6/11 → condilomas (bajo riesgo).",
    ref:"GPC Prevención, detección, diagnóstico, tratamiento y seguimiento de lesiones precursoras de cáncer de cérvix 2014"
  },
  {
    cat:"pre", catName:"Lesiones Precursoras",
    q:"¿Cuál es el esquema de tamizaje para cáncer cervicouterino recomendado en la GPC para mujeres de 25-65 años en México?",
    opts:["Papanicolaou anual desde el inicio de la vida sexual","Papanicolaou cada 3 años (25-65 años); o co-test citología+VPH cada 5 años (30-65 años)","Solo prueba molecular de VPH cada 10 años sin citología","Colposcopia anual en toda mujer sexualmente activa >25 años"],
    ans:1,
    exp:"El tamizaje cervical se realiza con: (1) citología (PAP) sola cada 3 años en mujeres de 25-65 años, o (2) co-test citología + prueba de VPH cada 5 años en mujeres de 30-65 años. Si ambos son negativos, la mujer puede espaciar el tamizaje 5 años. Una sola citología negativa no es suficiente para dejar de tamizar.",
    tip:"Tamizaje CCU: PAP cada 3 años (25-65a) o co-test c/5 años (30-65a). Dos PAP negativos consecutivos = espaciar.",
    ref:"GPC Prevención, detección, diagnóstico, tratamiento y seguimiento de lesiones precursoras de cáncer de cérvix 2014"
  },
  {
    cat:"pre", catName:"Lesiones Precursoras",
    q:"Resultado de PAP: ASCUS (células escamosas atípicas de significado indeterminado). ¿Cuál es la conducta correcta según la GPC?",
    opts:["Prueba refleja de VPH de alto riesgo: si positiva → colposcopia inmediata; si negativa → co-test en 3 años","Repetir PAP en 6 meses sin prueba adicional de VPH","Histerectomía inmediata por alto riesgo de malignidad","Tratamiento empírico con crioterapia sin colposcopia previa"],
    ans:0,
    exp:"Ante un ASCUS, la GPC recomienda la prueba refleja de VPH de alto riesgo (en la misma muestra si es posible): VPH positivo → colposcopia inmediata para biopsia dirigida; VPH negativo → seguimiento con co-test en 3 años (muy bajo riesgo de NIC de alto grado). El ASCUS no requiere tratamiento inmediato sin confirmación histológica.",
    tip:"ASCUS → prueba VPH. Positivo → colposcopia. Negativo → co-test en 3 años. No tratar sin biopsia.",
    ref:"GPC Prevención, detección, diagnóstico, tratamiento y seguimiento de lesiones precursoras de cáncer de cérvix 2014"
  },
  {
    cat:"pre", catName:"Lesiones Precursoras",
    q:"NIC I (displasia leve/neoplasia intraepitelial cervical grado 1) en biopsia colposcópica de mujer de 28 años, VPH 16 positivo. ¿Cuál es el manejo?",
    opts:["LEEP inmediato para evitar progresión a NIC III","Conización con márgenes amplios","Observación activa con citología y colposcopia cada 6-12 meses (regresión espontánea 60-70% a 2 años)","Histerectomía si el NIC I persiste más de 6 meses"],
    ans:2,
    exp:"El NIC I tiene una tasa de regresión espontánea del 60-70% en 2 años; progresa a NIC III en solo el 1% de los casos. La observación es el estándar: citología + colposcopia cada 6-12 meses por 2 años. Si persiste >2 años o progresa → tratamiento. Incluso con VPH 16 se prefiere observar en NIC I por la alta tasa de regresión.",
    tip:"NIC I = observar, no tratar. Regresión espontánea 60-70%. Solo tratar si persiste >2 años o progresa.",
    ref:"GPC Prevención, detección, diagnóstico, tratamiento y seguimiento de lesiones precursoras de cáncer de cérvix 2014"
  },
  {
    cat:"pre", catName:"Lesiones Precursoras",
    q:"¿Cuál es el tratamiento estándar para NIC II-III (displasia moderada a severa/carcinoma in situ) en una mujer de 30 años con deseo genésico?",
    opts:["Solo observación por 24 meses antes de cualquier intervención","Histerectomía total como único tratamiento aceptable","LEEP/LLETZ (escisión con asa electroquirúrgica): efectivo, preserva fertilidad y permite estudio histológico del espécimen","Ablación con láser CO₂ sin biopsia de la zona de transformación"],
    ans:2,
    exp:"El LEEP (Loop Electrosurgical Excision Procedure) o LLETZ es el tratamiento de elección para NIC II-III. Ventajas: mínimamente invasivo, preserva fertilidad, el espécimen puede analizarse histológicamente (a diferencia de ablación). El margen quirúrgico limpio es el objetivo. La crioterapia y el láser son alternativas ablativas válidas para NIC II en mujeres jóvenes.",
    tip:"NIC II-III = LEEP primera línea. Escinde, no abla. Permite histología del margen. Preserva fertilidad.",
    ref:"GPC Prevención, detección, diagnóstico, tratamiento y seguimiento de lesiones precursoras de cáncer de cérvix 2014"
  },
  {
    cat:"pre", catName:"Lesiones Precursoras",
    q:"¿Cuál es el esquema actual de vacunación contra el VPH recomendado en México?",

    ans:1,
    exp:"El esquema de vacunación VPH actual: 2 dosis en niñas de 9-14 años (meses 0 y 6) porque la respuesta inmune es superior a esta edad con 2 dosis. En mujeres ≥15 años o inmunocomprometidas (VIH, trasplantadas) se requieren 3 dosis (meses 0, 1-2 y 6). La vacuna es preventiva, no terapéutica: no elimina infecciones previas. La vacunación NO elimina la necesidad de tamizaje.",

    ref:"GPC Prevención, detección, diagnóstico, tratamiento y seguimiento de lesiones precursoras de cáncer de cérvix 2014"
  },
  {
    cat:"pre", catName:"Lesiones Precursoras",
    q:"Mujer de 33 años con NIC III en biopsia colposcópica. Se realiza LEEP y el reporte histológico indica margen endocervical comprometido (positivo). ¿Cuál es el siguiente paso?",
    opts:["Observar con PAP a los 6 meses sin ninguna intervención adicional","Aplicar crioterapia en la zona de transformación residual","Iniciar quimiorradioterapia concurrente de inmediato","Re-excisión (nueva conización) o histerectomía si la paridad está cumplida"],

    exp:"El margen endocervical positivo tras LEEP indica enfermedad residual en el canal cervical, con mayor riesgo de persistencia/recurrencia de NIC. Las opciones son: (1) re-excisión (nueva conización o LEEP más profundo) en mujeres con deseo genésico, o (2) histerectomía simple en mujeres con paridad satisfecha o si técnicamente no es posible nueva excisión. El seguimiento solo no es adecuado.",

    ref:"GPC Prevención, detección, diagnóstico, tratamiento y seguimiento de lesiones precursoras de cáncer de cérvix 2014"

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function init(){
  shuffle(questions);
  currentQ=0;score=0;answers=[];
  catStats={pre:{c:0,t:0},ccu:{c:0,t:0}};
  const r=document.getElementById('resultsArea');
  r.classList.remove('show');r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion(){
  const qa=questions[currentQ],total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const L=['A','B','C','D'];
  let h=`<div class="question-card">
    <div class="q-category cat-${qa.cat}">${qa.catName}</div>
    <div class="q-number">Pregunta ${currentQ+1} de ${total}</div>
    <div class="q-text">${qa.q}</div>
    <div class="options">`;
  qa.opts.forEach((o,i)=>h+=`<button class="option-btn" onclick="selectAnswer(${i})">
    <span class="option-letter">${L[i]}</span><span>${o}</span></button>`);
  h+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=h;
}

function selectAnswer(idx){
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const ok=idx===qa.ans;
  btns.forEach((b,i)=>{b.classList.add('disabled');b.onclick=null;
    if(i===qa.ans)b.classList.add('correct-answer');
    if(i===idx&&!ok)b.classList.add('wrong-answer');});
  if(!catStats[qa.cat])catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(ok){score++;catStats[qa.cat].c++;}
  if(!examMode){
    fb.className=ok?'feedback correct-fb show':'feedback wrong-fb show';
    fb.innerHTML=ok
      ?`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`
      :`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;
  }
  answers.push({q:qa.q,correct:ok,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,tip:qa.tip,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion(){currentQ++;if(currentQ>=questions.length)showResults();else renderQuestion();}

function showResults(){
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'🏆 ¡Excelente dominio! Listo para el ENARM.':pct>=70?'👏 ¡Muy bien! Repasa las áreas con menor puntaje.':pct>=50?'📚 Aceptable, hay áreas de oportunidad.':'⚠️ Refuerza este tema. Revisa las GPC correspondientes.';
  const cats=[
    {name:'Lesiones Precursoras',key:'pre',color:'#34d399'},
    {name:'Cáncer Cervicouterino',key:'ccu',color:'#f87171'}
  ];
  let h=`<div class="results-header"><div class="score-big">${pct}%</div><div class="score-label">${score} de ${questions.length} correctas</div><div class="score-msg">${msg}</div></div>
  <div class="chart-section"><div class="chart-title"><span>📊</span> Rendimiento por Categoría</div><div class="bar-chart">`;
  cats.forEach(c=>{const s=catStats[c.key]||{c:0,t:0};const p=s.t>0?Math.round((s.c/s.t)*100):0;if(s.t>0)h+=`<div class="bar-row"><div class="bar-label">${c.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${c.color};">${p}% (${s.c}/${s.t})</div></div></div>`;});
  h+=`</div></div><div class="chart-section"><div class="chart-title"><span>🎯</span> Resumen General</div><div class="donut-wrap">
    <svg class="donut-svg" viewBox="0 0 42 42">
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
      <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
    </svg>
    <div class="donut-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Total: ${questions.length}</div>
    </div></div></div>
  <div class="chart-section"><div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{h+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
    <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
    <div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div>
    <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
    <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
  </div>`;});
  h+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const r=document.getElementById('resultsArea');r.innerHTML=h;r.classList.add('show');r.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
init();
</script>
