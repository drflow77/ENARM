<script>
let examMode=false, currentQ=0, score=0, answers=[], catStats={};

function setMode(m){
  examMode=(m==='examen');
  document.getElementById('btnRepaso').classList.toggle('active',!examMode);
  document.getElementById('btnExamen').classList.toggle('active',examMode);
  init();
}

const questions = [
  /* ── OSTEOPOROSIS ── */
  {
    cat:"osteo", catName:"Osteoporosis",
    q:"Mujer de 62 años posmenopáusica con fractura de muñeca por caída de propia altura. DXA: T-score de −2.8 en columna lumbar. ¿Cuál es el diagnóstico según criterios de la OMS?",
    opts:["Osteopenia (T-score entre −1.0 y −2.5)","Osteoporosis establecida (T-score ≤ −2.5 con fractura por fragilidad)","Osteoporosis (T-score ≤ −2.5 sin fractura)","Normal (T-score ≥ −1.0)"],
    ans:1,
    exp:"Criterios OMS por DXA: Normal ≥−1.0; Osteopenia: −1.0 a −2.5; Osteoporosis: ≤−2.5; Osteoporosis establecida: ≤−2.5 + fractura por fragilidad. Esta paciente tiene T-score de −2.8 Y fractura de muñeca por caída de propia altura (fractura por fragilidad), lo que define osteoporosis establecida.",
    tip:"<strong>OMS:</strong> ≥−1 = normal; −1 a −2.5 = osteopenia; ≤−2.5 = osteoporosis; ≤−2.5 + fractura = <strong>establecida</strong>. La fractura por fragilidad es caída desde la propia altura.",
    ref:"GPC Diagnóstico y tratamiento de osteoporosis en mujeres postmenopáusicas, IMSS 2018."
  },
  {
    cat:"osteo", catName:"Osteoporosis",
    q:"¿Cuál es el sitio preferido para medir densidad mineral ósea en mujeres posmenopáusicas menores de 65 años sin artrosis lumbar?",
    opts:["Radio distal 1/3","Columna lumbar L1-L4","Calcáneo por ultrasonido","Falanges de la mano"],
    ans:1,
    exp:"En mujeres menopáusicas jóvenes (50-65 años), la columna lumbar L1-L4 refleja mejor los cambios tempranos de DMO por predominio de hueso trabecular. En mujeres >65 años o con artrosis lumbar se prefiere la cadera total/cuello femoral para evitar falsos negativos por osteofitos y calcificaciones.",
    tip:"<strong>Posmenopáusica joven = columna lumbar.</strong> >65 años o artrosis = cadera. DXA es el gold standard (no ultrasonido ni radiografía).",
    ref:"GPC Osteoporosis posmenopáusica, IMSS 2018."
  },
  {
    cat:"osteo", catName:"Osteoporosis",
    q:"Tratamiento farmacológico de primera línea para osteoporosis posmenopáusica confirmada por DXA:",
    opts:["Calcitonina intranasal como agente único","Solo calcio 1500 mg/día sin fármaco antiresortivo","Teriparatida subcutánea diaria desde el inicio","Bifosfonatos (alendronato o risedronato) + calcio 1000 mg/día + vitamina D 800 UI/día"],
    ans:3,
    exp:"Los bifosfonatos (alendronato 70 mg/semana o risedronato 35 mg/semana) son la primera línea. Reducen riesgo de fractura vertebral 40-70% y de cadera 40-50%. Siempre combinados con calcio (1000-1200 mg/día) y vitamina D (800-1000 UI/día). La teriparatida es segunda línea para casos graves o fracaso de bifosfonatos.",
    tip:"<strong>Primera línea = bifosfonato + calcio + vit D.</strong> Alendronato 70 mg/semana o risedronato 35 mg/semana. Tomar en ayuno con vaso lleno de agua, sin acostarse 30 min.",
    ref:"GPC Osteoporosis posmenopáusica, IMSS 2018."
  },
  {
    cat:"osteo", catName:"Osteoporosis",
    q:"¿A qué edad se recomienda iniciar tamizaje con DXA en mujeres sin factores de riesgo adicionales?",
    opts:["45 años al inicio de la perimenopausia","55 años en todas las mujeres posmenopáusicas","65 años","70 años solamente"],
    ans:2,
    exp:"La USPSTF y la GPC IMSS recomiendan tamizaje con DXA a los 65 años en mujeres sin factores de riesgo. En mujeres posmenopáusicas <65 años con factores de riesgo (tabaquismo, IMC <19, fractura previa, corticosteroides crónicos, antecedente familiar de fractura de cadera) se puede iniciar antes usando la herramienta FRAX.",
    tip:"<strong>Tamizaje rutinario: 65 años.</strong> Con factores de riesgo: calcular FRAX primero. Factores de riesgo clave: bajo IMC, tabaquismo, corticoides, fractura familiar.",
    ref:"GPC Osteoporosis posmenopáusica, IMSS 2018."
  },
  {
    cat:"osteo", catName:"Osteoporosis",
    q:"El mecanismo fisiopatológico central de la osteoporosis posmenopáusica es:",
    opts:["Malabsorción intestinal de calcio por déficit de vitamina D","Hiperparatiroidismo secundario como causa primaria","Deficiencia de estrógenos que aumenta la resorción ósea osteoclástica sin compensación formativa","Disminución de síntesis de colágeno tipo I en los osteoblastos"],
    ans:2,
    exp:"Los estrógenos inhiben la actividad osteoclástica y promueven la apoptosis de osteoclastos. Con la menopausia, la caída estrogénica elimina este freno: la resorción ósea supera a la formación. La pérdida ósea es de 2-3% anual en los primeros 5-10 años posmenopáusicos. Este mecanismo explica el beneficio de la TRH en la prevención de osteoporosis.",
    tip:"<strong>Menopausia → ↓ estrógenos → ↑ osteoclastos → resorción > formación → osteoporosis.</strong> Los bifosfonatos inhiben osteoclastos; TRH previene la pérdida.",
    ref:"GPC Osteoporosis posmenopáusica, IMSS 2018."
  },
  /* ── SOP ── */
  {
    cat:"sop", catName:"SOP",
    q:"Mujer de 25 años con oligomenorrea, acné facial y ecografía que muestra 14 folículos de 2-9 mm en cada ovario. ¿Qué criterios diagnósticos se aplican para SOP?",
    opts:["Solo ecografía con ≥12 folículos por ovario sin necesidad de otros criterios","Criterios de Rotterdam: 2 de 3 (oligoanovulación, hiperandrogenismo clínico/bioquímico, ovarios poliquísticos en ECO)","Testosterona total >150 ng/dL como criterio obligatorio","Cociente LH/FSH >3 como único criterio diagnóstico"],
    ans:1,
    exp:"Los criterios de Rotterdam (2003) requieren 2 de 3: (1) oligo/anovulación, (2) hiperandrogenismo clínico (acné, hirsutismo) o bioquímico (testosterona elevada), (3) morfología ovárica poliquística en ECO (≥12 folículos de 2-9mm/ovario o volumen >10 mL). Esta paciente cumple los 3 criterios. Siempre descartar otras causas: CAH, hipotiroidismo, hiperprolactinemia.",
    tip:"<strong>Rotterdam = 2 de 3: anovulación + hiperandrogenismo + ECO.</strong> Descartar SIEMPRE: TSH, prolactina, 17-OH-progesterona (CAH). Solo cumplir 2 de 3 es suficiente.",
    ref:"GPC Diagnóstico y tratamiento del síndrome de ovarios poliquísticos, IMSS 2010."
  },
  {
    cat:"sop", catName:"SOP",
    q:"Mujer de 28 años con SOP, IMC 31 kg/m² y deseo genésico. ¿Cuál es el fármaco de primera línea para inducción de ovulación?",
    opts:["Citrato de clomifeno 50-150 mg/día por 5 días (días 3-7 del ciclo)","Gonadotropinas (FSH recombinante) IM desde el día 2","Metformina 1700 mg/día como única medida farmacológica","Letrozol 2.5 mg/día como primera línea universal"],
    ans:0,
    exp:"El citrato de clomifeno es el fármaco de primera línea para inducción de ovulación en SOP (tasa de ovulación 70-85%, embarazo 40-50% acumulado). Se inicia a 50 mg/día días 3-7 y se puede incrementar a 150 mg/día si no hay respuesta. El letrozol tiene ventajas en mujeres obesas o resistentes al clomifeno. Las gonadotropinas son tercera línea.",
    tip:"<strong>SOP + deseo genésico: clomifeno primero.</strong> Si falla → letrozol. Si falla → gonadotropinas. Siempre bajar peso si IMC >30 antes de fármacos.",
    ref:"GPC SOP, IMSS 2010."
  },
  {
    cat:"sop", catName:"SOP",
    q:"¿Cuál es el tratamiento de primera línea en mujer con SOP sin deseo genésico para regular ciclos y reducir hiperandrogenismo?",
    opts:["Metformina 1700 mg/día como único tratamiento","Espironolactona 200 mg/día en monoterapia","Anticonceptivos orales combinados (estrógeno + progestágeno con actividad antiandrogénica)","Solo dieta hipocalórica sin tratamiento farmacológico"],
    ans:2,
    exp:"Los anticonceptivos orales combinados (AOC) son la primera línea en SOP sin deseo genésico. Regulan ciclos, reducen LH y producción ovárica de andrógenos, aumentan SHBG (disminuye testosterona libre) y protegen el endometrio contra hiperplasia. Se prefieren progestágenos con efecto antiandrogénico (acetato de ciproterona, drospirenona). La metformina es adyuvante si hay resistencia a la insulina.",
    tip:"<strong>SOP sin deseo genésico = AOC primera línea.</strong> Para hirsutismo refractario: añadir espironolactona. Metformina: adyuvante en resistencia a la insulina o intolerancia a AOC.",

  {
    cat:"sop", catName:"SOP",
    q:"La hiperinsulinemia en el SOP produce hiperandrogenismo mediante:",

    exp:"La hiperinsulinemia actúa de dos formas: (1) estimula directamente las células de la teca ovárica para producir andrógenos (androstenediona, testosterona) a través de receptores IGF-1, y (2) inhibe la síntesis hepática de SHBG, aumentando la fracción libre de testosterona biológicamente activa. Este mecanismo explica por qué la metformina, al mejorar la sensibilidad a la insulina, reduce el hiperandrogenismo.",
    tip:"<strong>Insulina ↑ → teca produce más andrógenos + ↓ SHBG hepática → testosterona libre ↑.</strong> Metformina mejora sensibilidad insulínica → reduce andrógenos. Por eso funciona en SOP.",
    ref:"GPC SOP, IMSS 2010."
  },
  {
    cat:"sop", catName:"SOP",
    q:"Complicación endometrial más importante del SOP no tratado a largo plazo:",
    opts:["Hiperplasia y cáncer de endometrio por exposición estrogénica sin oposición de progesterona","Cáncer de ovario por estimulación folicular crónica","Endometriosis severa por reflujo menstrual crónico","Insuficiencia ovárica prematura por agotamiento folicular"],
    ans:0,
    exp:"La anovulación crónica del SOP produce estimulación estrogénica endometrial continua sin la progesterona de la fase lútea. Esto lleva a hiperplasia endometrial y aumenta el riesgo de cáncer de endometrio (riesgo relativo x3 vs. población general). Los AOC o la progesterona cíclica protegen el endometrio al inducir sangrado regular.",
    tip:"<strong>SOP + anovulación crónica → estrógenos sin progesterona → hiperplasia → cáncer de endometrio.</strong> Inducir sangrado cíclico cada 3 meses como mínimo.",
    ref:"GPC SOP, IMSS 2010."
  },
  /* ── MENOPAUSIA ── */
  {
    cat:"meno", catName:"Menopausia/Climaterio",
    q:"¿Cómo se define clínicamente la menopausia?",
    opts:["Última menstruación confirmada retrospectivamente tras 12 meses consecutivos de amenorrea sin otra causa","FSH >40 UI/L en dos determinaciones separadas por 4 semanas","Ausencia de menstruación por 6 meses en mujer >45 años","Temperatura basal menor de 36.5°C durante 6 meses consecutivos"],
    ans:0,
    exp:"La menopausia se define como la última menstruación, confirmada retrospectivamente tras 12 meses consecutivos de amenorrea sin otra causa patológica. No se puede diagnosticar prospectivamente: solo cuando han pasado 12 meses desde la última regla. La edad promedio en México es 49-51 años.",
    tip:"<strong>Menopausia = última menstruación + 12 meses de amenorrea.</strong> No se puede diagnosticar antes de los 12 meses. Antes de eso = perimenopausia o climaterio.",
    ref:"GPC Diagnóstico y tratamiento de la perimenopausia y postmenopausia, IMSS 2013."
  },
  {
    cat:"meno", catName:"Menopausia/Climaterio",
    q:"Síntoma vasomotor más frecuente y característico de la perimenopausia y postmenopausia:",
    opts:["Sequedad vaginal con dispareunia como primer síntoma","Palpitaciones e insomnio como manifestaciones aisladas","Depresión mayor e irritabilidad grave","Bochornos (sofocos) y sudoración nocturna"],
    ans:3,
    exp:"Los bochornos (sofocos, hot flashes) son el síntoma vasomotor más frecuente (70-80% de las mujeres) y el principal motivo de consulta. Se producen por inestabilidad del centro termorregulador hipotalámico secundaria a la caída de estrógenos y elevación de noradrenalina. Duran en promedio 7-10 años desde la perimenopausia.",
    tip:"<strong>Bochornos = síntoma cardinal de la menopausia.</strong> Primer síntoma en aparecer, mayor impacto en calidad de vida. TRH reduce frecuencia 75-90%.",
    ref:"GPC Perimenopausia y postmenopausia, IMSS 2013."
  },
  {
    cat:"meno", catName:"Menopausia/Climaterio",
    q:"¿Cuál es el tratamiento más efectivo para síntomas vasomotores moderados a graves en la menopausia?",
    opts:["Terapia de reemplazo hormonal (estrógenos ± progestágeno)","Isoflavonas de soja a altas dosis como primera línea","Venlafaxina 75 mg/día como primera opción","Clonidina 0.1 mg cada 12 horas"],
    ans:0,
    exp:"La TRH es el tratamiento más efectivo para síntomas vasomotores, con reducción del 75-90% de la frecuencia e intensidad. Las alternativas no hormonales (venlafaxina, paroxetina, gabapentina) se usan cuando la TRH está contraindicada: cáncer de mama activo, TEP/TVP activa o reciente, enfermedad coronaria activa.",
    tip:"<strong>TRH = más efectiva (75-90% reducción bochornos).</strong> Contraindicaciones absolutas: Ca mama, TEP/TVP activa, ECV reciente. Alternativa: venlafaxina 37.5-75 mg/día.",

    opts:["Estrógenos solos (sin progestágeno) para mayor eficacia analgésica","Estrógenos + progestágeno combinados para proteger el endometrio de la hiperplasia","Solo progestágeno sin estrógenos para evitar riesgo cardiovascular","Tibolona como única opción en mujeres con útero"],
    ans:1,
    exp:"En mujeres con útero intacto, la TRH SIEMPRE debe incluir progestágeno junto con estrógenos. Los estrógenos solos en mujeres con útero producen hiperplasia endometrial y aumentan el riesgo de cáncer de endometrio x4-8. El progestágeno (medroxiprogesterona 2.5-10 mg, progesterona micronizada 200 mg) contrarresta este efecto. En histerectomizadas: estrógenos solos.",
    tip:"<strong>Útero intacto = estrógenos + progestágeno OBLIGATORIO.</strong> Histerectomizada = estrógenos solos. Estrógenos solos + útero = riesgo x4-8 de Ca endometrio.",
    ref:"GPC Perimenopausia y postmenopausia, IMSS 2013."
  },
  {
    cat:"meno", catName:"Menopausia/Climaterio",
    q:"¿Cuál es la 'ventana de oportunidad' óptima para iniciar TRH con mayor beneficio y menor riesgo cardiovascular?",
    opts:["Después de los 60 años cuando los síntomas son máximos","Después de 5 años de menopausia para confirmar diagnóstico definitivo","Solo durante la perimenopausia cuando aún persisten estrógenos endógenos","Dentro de los primeros 10 años de menopausia o en menores de 60 años"],
    ans:3,
    exp:"La 'hipótesis de la ventana de oportunidad' establece que iniciar TRH en los primeros 10 años posmenopausia o en mujeres <60 años ofrece mayor beneficio cardiovascular y menor riesgo tromboembólico. El estudio WHI mostró que iniciar TRH >10 años de menopausia o >60 años aumenta el riesgo cardiovascular y de ACV. La ventana se relaciona con la ausencia de aterosclerosis establecida.",
    tip:"<strong>TRH: iniciar <10 años de menopausia o <60 años = ventana de oportunidad.</strong> >10 años o >60 años = mayor riesgo CV. Evaluar relación beneficio/riesgo individualmente.",

];

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function init(){
  shuffle(questions);
  currentQ=0;score=0;answers=[];
  catStats={osteo:{c:0,t:0},sop:{c:0,t:0},meno:{c:0,t:0}};
  const r=document.getElementById('resultsArea');
  r.classList.remove('show');r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion(){
  const qa=questions[currentQ],total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const L=['A','B','C','D'];
  let h=`<div class="question-card">
    <div class="q-category cat-${qa.cat}">${qa.catName}</div>
    <div class="q-number">Pregunta ${currentQ+1} de ${total}</div>
    <div class="q-text">${qa.q}</div>
    <div class="options">`;
  qa.opts.forEach((o,i)=>h+=`<button class="option-btn" onclick="selectAnswer(${i})">
    <span class="option-letter">${L[i]}</span><span>${o}</span></button>`);
  h+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=h;
}

function selectAnswer(idx){
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const ok=idx===qa.ans;
  btns.forEach((b,i)=>{b.classList.add('disabled');b.onclick=null;
    if(i===qa.ans)b.classList.add('correct-answer');
    if(i===idx&&!ok)b.classList.add('wrong-answer');});
  if(!catStats[qa.cat])catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(ok){score++;catStats[qa.cat].c++;}
  if(!examMode){
    fb.className=ok?'feedback correct-fb show':'feedback wrong-fb show';
    fb.innerHTML=ok
      ?`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`
      :`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;
  }
  answers.push({q:qa.q,correct:ok,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,tip:qa.tip,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion(){currentQ++;if(currentQ>=questions.length)showResults();else renderQuestion();}

function showResults(){
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'🏆 ¡Excelente dominio! Listo para el ENARM.':pct>=70?'👏 ¡Muy bien! Repasa las áreas con menor puntaje.':pct>=50?'📚 Aceptable, hay áreas de oportunidad.':'⚠️ Refuerza este tema. Revisa las GPC correspondientes.';
  const cats=[{name:'Osteoporosis',key:'osteo',color:'#fbbf24'},{name:'SOP',key:'sop',color:'#a78bfa'},{name:'Menopausia/Climaterio',key:'meno',color:'#f472b6'}];
  let h=`<div class="results-header"><div class="score-big">${pct}%</div><div class="score-label">${score} de ${questions.length} correctas</div><div class="score-msg">${msg}</div></div>
  <div class="chart-section"><div class="chart-title"><span>📊</span> Rendimiento por Categoría</div><div class="bar-chart">`;
  cats.forEach(c=>{const s=catStats[c.key]||{c:0,t:0};const p=s.t>0?Math.round((s.c/s.t)*100):0;if(s.t>0)h+=`<div class="bar-row"><div class="bar-label">${c.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${c.color};">${p}% (${s.c}/${s.t})</div></div></div>`;});
  h+=`</div></div><div class="chart-section"><div class="chart-title"><span>🎯</span> Resumen General</div><div class="donut-wrap">
    <svg class="donut-svg" viewBox="0 0 42 42">
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
      <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
    </svg>
    <div class="donut-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f472b6;"></div>Total: ${questions.length}</div>
    </div></div></div>
  <div class="chart-section"><div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{h+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
    <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
    <div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div>
    <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
    <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
  </div>`;});
  h+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const r=document.getElementById('resultsArea');r.innerHTML=h;r.classList.add('show');r.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
init();
</script>
