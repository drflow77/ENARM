<script>
let examMode = false;

function setMode(mode) {
  examMode = (mode === 'examen');
  document.getElementById('btnRepaso').classList.toggle('active', !examMode);
  document.getElementById('btnExamen').classList.toggle('active', examMode);
  init();
}

const questions = [
  {
    cat:"ca", catName:"Cáncer de Laringe",
    q:"Hombre de 58 años, fumador de 40 años-paquete y consumidor crónico de alcohol, con disfonía persistente de 5 semanas de evolución. La laringoscopía indirecta revela lesión blanquecina en cuerda vocal izquierda. ¿Cuál es el tipo histológico más frecuente de cáncer de laringe?",
    opts:["Carcinoma epidermoide (escamoso)","Adenocarcinoma","Carcinoma de células pequeñas","Linfoma laríngeo"],
    ans:0,
    exp:"El carcinoma epidermoide (escamoso) representa el 95% de todos los cánceres de laringe. La GPC de Diagnóstico y tratamiento del cáncer epidermoide de laringe (2011) establece que el tabaco y el alcohol son los principales factores de riesgo, con efecto sinérgico. La disfonía persistente mayor de 3 semanas en fumador debe considerarse cáncer hasta demostrar lo contrario.",
    tip:"<strong>95% epidermoide:</strong> Si una pregunta del ENARM menciona cáncer de laringe sin especificar histología, asume carcinoma epidermoide. Tabaco = factor 1, alcohol = factor 2 con efecto sinérgico multiplicativo. Disfonía >3 semanas en fumador → laringoscopía obligatoria.",
    ref:"GPC: Diagnóstico y tratamiento del cáncer epidermoide de laringe. SSA-237-09. 2011."
  },
  {
    cat:"ca", catName:"Cáncer de Laringe",
    q:"Respecto a la localización del cáncer de laringe y su pronóstico, ¿cuál de las siguientes afirmaciones es CORRECTA?",
    opts:["El cáncer supraglótico tiene mejor pronóstico que el glótico por su menor tamaño al diagnóstico","El cáncer glótico se diagnostica en estadios avanzados por ser asintomático","El cáncer subglótico es el más frecuente con 60% de los casos","El cáncer glótico tiene mejor pronóstico porque produce disfonía temprana y tiene escasa red linfática"],
    ans:3,
    exp:"El cáncer glótico (60% de los casos) tiene mejor pronóstico que el supraglótico porque las cuerdas vocales producen disfonía al inicio de la enfermedad (diagnóstico temprano) y tienen escasa red linfática (menor riesgo de metástasis ganglionares). El cáncer supraglótico tiene peor pronóstico: es asintomático hasta estadios avanzados y la región supraglótica tiene rica red linfática bilateral, lo que favorece metástasis cervicales tempranas.",
    tip:"<strong>Glótico = mejor pronóstico:</strong> Disfonía temprana + pocas linfáticas = diagnóstico precoz + menos metástasis. Supraglótico = peor pronóstico: rico en linfáticos bilaterales → ganglios bilaterales → N+ en el 50% al diagnóstico. Subglótico: el más raro (&lt;5%), extensión traqueobronquial.",
    ref:"GPC: Diagnóstico y tratamiento del cáncer epidermoide de laringe. SSA-237-09. 2011."
  },
  {
    cat:"ca", catName:"Cáncer de Laringe",
    q:"¿Cuál es el síntoma más precoz y característico del cáncer glótico de laringe?",
    opts:["Disfagia progresiva","Masa cervical palpable","Disfonía persistente mayor de 3 semanas","Hemoptisis recurrente"],
    ans:2,
    exp:"La disfonía persistente mayor de 3 semanas es el síntoma cardinal y más temprano del cáncer glótico, ya que las cuerdas vocales son las estructuras fonatorias y cualquier lesión en ellas altera la voz. La GPC establece que toda disfonía persistente >3 semanas en adulto fumador o mayor de 40 años debe estudiarse con laringoscopía. La masa cervical indica metástasis ganglionares (estadio avanzado N+).",
    tip:"<strong>Regla de las 3 semanas:</strong> Disfonía >3 semanas = laringoscopía obligatoria. No tratar con analgésicos o antiácidos sin visualizar la laringe. La disfagia es más característica del cáncer supraglótico (afecta epiglotis/aritenoides). Hemoptisis y disnea = enfermedad avanzada.",
    ref:"GPC: Diagnóstico y tratamiento del cáncer epidermoide de laringe. SSA-237-09. 2011."
  },
  {
    cat:"ca", catName:"Cáncer de Laringe",
    q:"¿Cuál es el método diagnóstico de confirmación para el cáncer de laringe?",
    opts:["Laringoscopía directa con biopsia de la lesión","Tomografía computarizada de cuello con contraste","Resonancia magnética de laringe","Citología de esputo en tres muestras"],
    ans:0,
    exp:"El diagnóstico definitivo de cáncer de laringe se establece mediante laringoscopía directa (con microscopio o endoscopio rígido bajo anestesia general) con toma de biopsia y estudio histopatológico. La laringoscopía indirecta o fibroscopía flexible es el primer paso para visualizar la lesión, pero la biopsia es indispensable para confirmación histológica. La TC es complementaria para estadificación.",
    tip:"<strong>Visualización + biopsia = diagnóstico:</strong> La TC ayuda a estadificar (invasión cartílago, extensión extralaríngea, ganglios) pero no diagnostica. El PET-CT se usa para descartar metástasis a distancia en estadios avanzados. Siempre biopsia antes de cualquier tratamiento.",
    ref:"GPC: Diagnóstico y tratamiento del cáncer epidermoide de laringe. SSA-237-09. 2011."
  },
  {
    cat:"tx", catName:"Tratamiento",
    q:"Paciente con cáncer glótico estadio T1N0M0 (lesión limitada a una cuerda vocal con movilidad conservada). ¿Cuál es el tratamiento de elección?",
    opts:["Laringectomía total + radioterapia adyuvante","Quimioterapia de inducción + cirugía","Radioterapia radical o cordectomía con láser CO2 (preservación laríngea)","Laringectomía parcial supraglótica"],
    ans:2,
    exp:"En el cáncer glótico T1N0M0, la GPC recomienda tratamientos con preservación laríngea: radioterapia radical (con tasas de control local >90%) o cordectomía endoscópica con láser CO2. Ambos tienen resultados oncológicos equivalentes. La elección depende de disponibilidad, preferencia del paciente y características de la lesión. La laringectomía total se reserva para estadios avanzados T3-T4 o recurrencia.",
    tip:"<strong>T1-T2 glótico = preservar laringe:</strong> RT radical o láser CO2 tienen control local >85-90% y preservan la voz. Laringectomía total solo en T3-T4, invasión de cartílago, o fallo de tratamiento conservador. El ENARM pregunta mucho sobre preservación de órgano en estadios tempranos.",
    ref:"GPC: Diagnóstico y tratamiento del cáncer epidermoide de laringe. SSA-237-09. 2011."
  },
  {
    cat:"tx", catName:"Tratamiento",
    q:"Paciente con cáncer de laringe T3N2M0 (parálisis de cuerda vocal, dos ganglios ipsilaterales <6cm). ¿Cuál es el abordaje terapéutico más adecuado?",
    opts:["Radioterapia paliativa exclusiva","Observación y manejo de síntomas","Cordectomía láser como único tratamiento","Laringectomía total + vaciamiento ganglionar cervical + radioterapia/quimioterapia adyuvante"],

    opts:["Parálisis del nervio laríngeo superior bilateral","Luxación aritenoides bilateral por intubación","Parálisis bilateral del nervio laríngeo recurrente","Parálisis unilateral del nervio laríngeo recurrente izquierdo"],
    ans:3,
    exp:"La parálisis unilateral del nervio laríngeo recurrente (NLR) es la complicación más frecuente de la tiroidectomía total. Se manifiesta con voz soplada, bitonal o ronca, y aspiración leve. La cuerda vocal ipsilateral queda inmóvil en posición paramediana (entre aducción y abducción). La causa más frecuente de parálisis del NLR en general es iatrogénica (tiroidectomía), seguida de neoplasia (pulmón, tiroides, esófago) y aneurisma aórtico (NLR izquierdo más largo).",
    tip:"<strong>Tiroidectomía → NLR:</strong> El NLR izquierdo rodea el cayado aórtico (más largo y vulnerable). El NLR derecho rodea la arteria subclavia derecha. Parálisis UNILATERAL: voz bitonal/soplada, sin disnea grave → manejo expectante 6-12 meses (puede recuperar). Parálisis BILATERAL: disnea grave, estridor → traqueotomía de urgencia.",

    tip:"<strong>Bilateral en mediana = emergencia respiratoria:</strong> Regla nemotécnica: 'Uno canta, dos ahoga'. Parálisis unilateral → voz bitonal pero respira. Parálisis bilateral en mediana → voz casi normal pero DISNEA GRAVE → traqueotomía urgente. Bilateral en abducción (lateral): respira bien pero voz soplada grave y aspira.",

  {

    ans:1,
    exp:"Según la clasificación TNM del AJCC adoptada por la GPC, T4a corresponde al tumor localmente avanzado resecable que invade el cartílago tiroides y/o se extiende a estructuras extralaríngeas (tráquea, tejidos blandos del cuello, tiroides, esófago). T4b (irresecable) implica invasión del espacio prevertebral, arteria carótida o estructuras mediastínicas. T1: limitado a un subsitio con movilidad normal. T2: extensión a subsitios adyacentes. T3: limitado a laringe con fijación de cuerda o invasión del espacio paraglótico.",
    tip:"<strong>TNM laríngeo resumido:</strong> T1 = subsitio único, móvil. T2 = varios subsitios, móvil. T3 = cuerda fija O espacio paraglótico. T4a = cartílago tiroides O extralaríngeo (resecable). T4b = carótida O mediastino (irresecable). N1 = ganglio único ipsilateral &lt;3cm. N2 = múltiples o &lt;6cm. N3 = >6cm.",

let currentQ = 0, score = 0, answers = [];
let catStats = { ca:{c:0,t:0}, pap:{c:0,t:0}, dis:{c:0,t:0}, par:{c:0,t:0}, tx:{c:0,t:0} };

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function init() {
  shuffle(questions);
  currentQ=0; score=0; answers=[];
  catStats = { ca:{c:0,t:0}, pap:{c:0,t:0}, dis:{c:0,t:0}, par:{c:0,t:0}, tx:{c:0,t:0} };
  const r=document.getElementById('resultsArea');
  r.classList.remove('show'); r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion() {
  const qa=questions[currentQ], total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const letters=['A','B','C','D'];
  let html=`<div class="question-card">
    <div class="q-category cat-${qa.cat}">${qa.catName}</div>
    <div class="q-number">Pregunta ${currentQ+1} de ${total}</div>
    <div class="q-text">${qa.q}</div>
    <div class="options">`;
  qa.opts.forEach((opt,i)=>{
    html+=`<button class="option-btn" onclick="selectAnswer(${i})" data-idx="${i}">
      <span class="option-letter">${letters[i]}</span><span>${opt}</span></button>`;
  });
  html+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=html;
}

function selectAnswer(idx) {
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const isCorrect=idx===qa.ans;
  btns.forEach((btn,i)=>{
    btn.classList.add('disabled'); btn.onclick=null;
    if(i===qa.ans) btn.classList.add('correct-answer');
    if(i===idx&&!isCorrect) btn.classList.add('wrong-answer');
  });
  if(!catStats[qa.cat]) catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(isCorrect){score++;catStats[qa.cat].c++;}
  if(!examMode){
    fb.className=isCorrect?'feedback correct-fb show':'feedback wrong-fb show';
    fb.innerHTML=isCorrect
      ?`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`
      :`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;
  }
  answers.push({q:qa.q,correct:isCorrect,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if(currentQ>=questions.length) showResults();
  else renderQuestion();
}

function showResults() {
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'🏆 ¡Dominio excelente de patología laríngea!':pct>=70?'👏 ¡Muy bien! Repasa los temas con menor puntaje.':pct>=50?'📚 Aceptable, refuerza las áreas débiles.':'⚠️ Revisa las GPC de cáncer de laringe y papilomatosis.';
  const cats=[
    {name:'Cáncer de Laringe',key:'ca',color:'#fbbf24'},
    {name:'Papilomatosis',key:'pap',color:'#38bdf8'},
    {name:'Disfonía/Nódulos',key:'dis',color:'#a78bfa'},
    {name:'Parálisis Cuerdas',key:'par',color:'#f472b6'},
    {name:'Tratamiento',key:'tx',color:'#34d399'},
  ];
  let html=`<div class="results-header">
    <div class="score-big">${pct}%</div>
    <div class="score-label">${score} de ${questions.length} correctas</div>
    <div class="score-msg">${msg}</div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📊</span> Rendimiento por Categoría</div>
    <div class="bar-chart">`;
  cats.forEach(cat=>{
    const s=catStats[cat.key]||{c:0,t:0};
    const p=s.t>0?Math.round((s.c/s.t)*100):0;
    html+=`<div class="bar-row"><div class="bar-label">${cat.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${cat.color};">${p}% (${s.c}/${s.t})</div></div></div>`;
  });
  html+=`</div></div>
  <div class="chart-section">
    <div class="chart-title"><span>🎯</span> Resumen General</div>
    <div class="donut-wrap">
      <svg class="donut-svg" viewBox="0 0 42 42">
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
        <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
      </svg>
      <div class="donut-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#38bdf8;"></div>Total: ${questions.length}</div>
      </div>
    </div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{
    html+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
      <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
      <div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div>
      <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
      <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
    </div>`;
  });
  html+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const res=document.getElementById('resultsArea');
  res.innerHTML=html; res.classList.add('show');
  res.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(header){header.classList.toggle('open');header.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}

init();
</script>
</body>
</html>
