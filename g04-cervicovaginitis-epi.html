    exp:"En el embarazo (especialmente primer trimestre) el fluconazol oral está contraindicado por posible riesgo teratogénico (defectos del tabique interventricular con exposición prolongada). Se recomiendan azoles tópicos: clotrimazol 100 mg óvulo por 7 días o clotrimazol crema al 1%, que son seguros y efectivos.",
    tip:"<strong>Embarazo + candidiasis = azoles TÓPICOS (clotrimazol). Fluconazol oral contraindicado en 1er trimestre.</strong>",
    ref:"GPC Diagnóstico y tratamiento de la candidiasis vulvovaginal en mujeres mayores de 12 años 2019"
  },
  {
    cat:"cand", catName:"Candidiasis",
    q:"¿Cómo se confirma el diagnóstico de candidiasis vulvovaginal en la práctica clínica de primer nivel cuando la microscopía directa no es concluyente?",
    opts:["Determinación de pH vaginal >4.5","Determinación de IgE específica para Candida","Cultivo de secreción vaginal en agar Sabouraud","Examen en fresco con KOH al 10% mostrando hifas o pseudohifas"],
    ans:3,
    exp:"El examen con KOH al 10% (que lisa las células epiteliales) es el método diagnóstico de primer nivel más útil, mostrando hifas, pseudohifas o levaduras en gemación. El cultivo (Sabouraud) se reserva para candidiasis recurrente o resistente para identificar especies no-albicans (C. glabrata, C. krusei).",
    tip:"<strong>KOH 10% = hifas/pseudohifas = candidiasis. pH <4.5 apoya el diagnóstico (normal en candidiasis).</strong>",
    ref:"GPC Diagnóstico y tratamiento de la candidiasis vulvovaginal en mujeres mayores de 12 años 2019"
  },
  /* ── EPI ── */
  {
    cat:"epi", catName:"EPI",
    q:"Mujer de 18 años, sexualmente activa, con dolor pélvico bajo de 4 días, temperatura 38.5°C. La exploración revela dolor a la movilización cervical y sensibilidad uterina bilateral. ¿Cuál es el diagnóstico de trabajo y los criterios mínimos para iniciarlo?",
    opts:["Apendicitis aguda; requiere TAC abdominal para confirmar","Endometriosis; requiere laparoscopia diagnóstica","Enfermedad pélvica inflamatoria; basta con dolor a movilización cervical O sensibilidad uterina/anexial","Quiste ovárico roto; requiere ultrasonido urgente"],
    ans:2,
    exp:"Los criterios MÍNIMOS de los CDC para el diagnóstico clínico y tratamiento empírico de EPI son (basta uno): dolor a la movilización cervical, O sensibilidad uterina, O sensibilidad anexial. No se debe esperar confirmación microbiológica para iniciar tratamiento, dado el riesgo de secuelas si se retrasa.",
    tip:"<strong>EPI: basta UN criterio mínimo (CDC) para tratar empíricamente. No esperar cultivos.</strong>",
    ref:"GPC Diagnóstico y tratamiento de la enfermedad pélvica inflamatoria 2008"
  },
  {
    cat:"epi", catName:"EPI",
    q:"¿Cuáles son los microorganismos más frecuentemente implicados en la etiología de la enfermedad pélvica inflamatoria aguda?",
    opts:["Escherichia coli y Klebsiella pneumoniae","Candida albicans y Trichomonas vaginalis","Chlamydia trachomatis y Neisseria gonorrhoeae","Treponema pallidum y Mycoplasma genitalium"],
    ans:2,
    exp:"Chlamydia trachomatis y Neisseria gonorrhoeae son los agentes más frecuentes en EPI, aunque es una infección polimicrobiana que incluye anaerobios (Bacteroides, Prevotella), gramnegativos facultativos y Mycoplasma. Por eso el tratamiento cubre amplio espectro (cefalosporina + doxiciclina ± metronidazol).",
    tip:"<strong>EPI = Chlamydia + Gonorrea (más frecuentes). Cobertura polimicrobiana en el tratamiento.</strong>",
    ref:"GPC Diagnóstico y tratamiento de la enfermedad pélvica inflamatoria 2008"
  },
  {
    cat:"epi", catName:"EPI",
    q:"Paciente con EPI leve sin signos de sepsis ni absceso, que tolera vía oral. ¿Cuál es el esquema de tratamiento ambulatorio recomendado?",
    opts:["Amoxicilina-clavulanato 875/125 mg cada 12h por 10 días","Ciprofloxacino 500 mg cada 12h por 14 días (monoterapia)","Azitromicina 1 g oral semanal por 2 semanas","Ceftriaxona 500 mg IM dosis única + doxiciclina 100 mg cada 12h por 14 días ± metronidazol 500 mg cada 12h por 14 días"],
    ans:3,
    exp:"El esquema ambulatorio de los CDC para EPI leve-moderada incluye: ceftriaxona 500 mg IM dosis única (o cefoxitina 2g IM) para cubrir N. gonorrhoeae, más doxiciclina 100 mg c/12h x 14 días para Chlamydia y otros, con o sin metronidazol para cobertura de anaerobios (especialmente si hay vaginosis concomitante).",
    tip:"<strong>EPI ambulatoria = ceftriaxona IM DU + doxiciclina 14 días ± metronidazol.</strong>",

  },
  {

    q:"Mujer de 19 años con EPI. El ultrasonido transvaginal muestra una colección tubo-ovárica derecha de 6 cm. ¿Cuál es la indicación de hospitalización y el manejo más adecuado?",
    opts:["Tratamiento ambulatorio es suficiente si tolera la vía oral","Hospitalización para antibióticos intravenosos: clindamicina 900 mg IV c/8h + gentamicina 1.5 mg/kg IV c/8h","Cirugía laparoscópica de urgencia sin antibióticos previos","Punción transvaginal guiada por ultrasonido como primer paso"],
    ans:1,
    exp:"El absceso tubo-ovárico (ATO) es indicación de hospitalización y antibióticoterapia IV. Esquema de elección: clindamicina 900 mg IV c/8h + gentamicina (o cefoxitina + doxiciclina IV). Si no hay respuesta en 72h, se considera drenaje quirúrgico laparoscópico. Los ATOs >9 cm o rotos requieren cirugía urgente.",
    tip:"<strong>ATO = hospitalización + ATB IV. Clindamicina + gentamicina. Cirugía si falla o rotura.</strong>",
    ref:"GPC Diagnóstico y tratamiento de la enfermedad pélvica inflamatoria 2008"
  },
  {
    cat:"epi", catName:"EPI",
    q:"¿Cuál es la consecuencia a largo plazo más frecuente de la EPI no tratada o tratada tardíamente, y cuál es su mecanismo?",
    opts:["Infertilidad tubárica por oclusión fibrosa secundaria a la inflamación","Cáncer de ovario por inflamación crónica","Endometriosis por siembra peritoneal retrograda","Síndrome de ovario poliquístico por alteración hormonal"],
    ans:0,
    exp:"La infertilidad tubárica es la secuela más frecuente de EPI. La inflamación repetida genera fibrosis y adherencias que ocluyen las trompas de Falopio. Tras un episodio de EPI el riesgo de infertilidad es ~12%; tras tres episodios supera el 50%. Otras secuelas: embarazo ectópico, dolor pélvico crónico y síndrome de Fitz-Hugh-Curtis (perihepatitis).",

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function init(){
  shuffle(questions);
  currentQ=0;score=0;answers=[];
  catStats={vag:{c:0,t:0},cand:{c:0,t:0},epi:{c:0,t:0}};
  const r=document.getElementById('resultsArea');
  r.classList.remove('show');r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion(){
  const qa=questions[currentQ],total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const L=['A','B','C','D'];
  let h=`<div class="question-card">
    <div class="q-category cat-${qa.cat}">${qa.catName}</div>
    <div class="q-number">Pregunta ${currentQ+1} de ${total}</div>
    <div class="q-text">${qa.q}</div>
    <div class="options">`;
  qa.opts.forEach((o,i)=>h+=`<button class="option-btn" onclick="selectAnswer(${i})">
    <span class="option-letter">${L[i]}</span><span>${o}</span></button>`);
  h+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=h;
}

function selectAnswer(idx){
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const ok=idx===qa.ans;
  btns.forEach((b,i)=>{b.classList.add('disabled');b.onclick=null;
    if(i===qa.ans)b.classList.add('correct-answer');
    if(i===idx&&!ok)b.classList.add('wrong-answer');});
  if(!catStats[qa.cat])catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(ok){score++;catStats[qa.cat].c++;}
  if(!examMode){
    fb.className=ok?'feedback correct-fb show':'feedback wrong-fb show';
    fb.innerHTML=ok
      ?`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`
      :`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;
  }
  answers.push({q:qa.q,correct:ok,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,tip:qa.tip,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion(){currentQ++;if(currentQ>=questions.length)showResults();else renderQuestion();}

function showResults(){
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'🏆 ¡Excelente dominio! Listo para el ENARM.':pct>=70?'👏 ¡Muy bien! Repasa las áreas con menor puntaje.':pct>=50?'📚 Aceptable, hay áreas de oportunidad.':'⚠️ Refuerza este tema. Revisa las GPC correspondientes.';
  const cats=[{name:'Vaginitis',key:'vag',color:'#fbbf24'},{name:'Candidiasis',key:'cand',color:'#34d399'},{name:'EPI',key:'epi',color:'#f87171'}];
  let h=`<div class="results-header"><div class="score-big">${pct}%</div><div class="score-label">${score} de ${questions.length} correctas</div><div class="score-msg">${msg}</div></div>
  <div class="chart-section"><div class="chart-title"><span>📊</span> Rendimiento por Categoría</div><div class="bar-chart">`;
  cats.forEach(c=>{const s=catStats[c.key]||{c:0,t:0};const p=s.t>0?Math.round((s.c/s.t)*100):0;if(s.t>0)h+=`<div class="bar-row"><div class="bar-label">${c.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${c.color};">${p}% (${s.c}/${s.t})</div></div></div>`;});
  h+=`</div></div><div class="chart-section"><div class="chart-title"><span>🎯</span> Resumen General</div><div class="donut-wrap">
    <svg class="donut-svg" viewBox="0 0 42 42">
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
      <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
    </svg>
    <div class="donut-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#fbbf24;"></div>Total: ${questions.length}</div>
    </div></div></div>
  <div class="chart-section"><div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{h+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
    <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
    <div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div>
    <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
    <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
  </div>`;});
  h+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const r=document.getElementById('resultsArea');r.innerHTML=h;r.classList.add('show');r.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
init();
</script>
