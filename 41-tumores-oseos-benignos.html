<script>
let examMode=false;
function setMode(m){examMode=(m==='examen');document.getElementById('btnRepaso').classList.toggle('active',!examMode);document.getElementById('btnExamen').classList.toggle('active',examMode);init();}

const questions=[
  {
    cat:"dx",catName:"Diagnóstico",
    q:"Adolescente de 15 años con masa dura, no dolorosa, en la cara medial de la rodilla derecha de 2 años de evolución. La Rx muestra lesión ósea pediculada con continuidad cortical y medular con el hueso adyacente. ¿Cuál es el diagnóstico más probable?",
    opts:["Osteosarcoma parostal","Osteocondroma (exostosis osteocartilaginosa)","Tumor de células gigantes","Condrosarcoma periférico"],
    ans:1,
    exp:"El osteocondroma es el tumor óseo benigno más frecuente (35-40% de los tumores óseos benignos). Se caracteriza por una proliferación ósea con cubierta cartilaginosa que tiene continuidad cortical y medular con el hueso subyacente (hallazgo patognomónico). Predomina en adolescentes cerca de las fisis (rodilla distal, hombro proximal). El 85% son solitarios; el 15% son múltiples (exostosis hereditaria múltiple, EHM).",
    tip:"<strong>Osteocondroma - clave diagnóstica:</strong> Continuidad cortical + medular con hueso base = patognomónico. Cubierta cartilaginosa (capuchón) >2cm en adulto → sospecha transformación maligna a condrosarcoma secundario. EHM (múltiples) = riesgo mayor de malignización. Crece junto con el hueso, se detiene al cierre fisario.",
    ref:"GPC: Diagnóstico y Tratamiento de Tumores Óseos Benignos. SSA. 2010."
  },
  {
    cat:"dx",catName:"Diagnóstico",
    q:"Joven de 18 años con dolor nocturno en la diáfisis tibial que mejora dramáticamente con AINEs (aspirina/ibuprofeno). La TC muestra una lesión radiolúcida central (nidus) <2 cm rodeada de esclerosis reactiva densa. ¿Cuál es el diagnóstico?",
    opts:["Absceso de Brodie (osteomielitis crónica)","Granuloma eosinófilo","Osteoblastoma","Osteoide osteoma"],
    ans:3,
    exp:"El osteoide osteoma es un tumor benigno productor de prostaglandinas que explica el dolor nocturno característico y la respuesta dramática a AINEs (que inhiben COX y reducen prostaglandinas). El nidus (<2 cm) es la lesión tumoral; la esclerosis periférica es reacción del hueso adyacente. Predomina en la diáfisis de huesos largos (fémur y tibia), en jóvenes de 10-30 años. TC es el estudio de elección.",
    tip:"<strong>Tríada del Osteoide Osteoma:</strong> Dolor nocturno + mejora con AAS/AINEs + nidus <2cm en TC. Mecanismo: el nidus produce PGE2 → dolor + hiperemia. Los AINEs bloquean COX → alivio. Tratamiento: ablación percutánea por radiofrecuencia (de elección) o escisión quirúrgica del nidus. Si no se reseca el nidus, recidiva.",
    ref:"GPC: Diagnóstico y Tratamiento de Tumores Óseos Benignos. SSA. 2010."
  },
  {
    cat:"dx",catName:"Diagnóstico",
    q:"Niño de 8 años con fractura patológica del húmero proximal. La Rx muestra lesión osteolítica central, bien delimitada, con adelgazamiento de la cortical y sin reacción perióstica. No hay dolor previo. ¿Cuál es el diagnóstico más probable?",
    opts:["Quiste óseo simple (unicameral)","Quiste óseo aneurismático","Displasia fibrosa","Tumor de células gigantes"],
    ans:0,
    exp:"El quiste óseo simple (unicameral) o quiste óseo solitario es la causa más frecuente de fractura patológica en niños. Es una cavidad llena de líquido seroso, localizada en la metáfisis proximal del húmero (50%) y fémur (25%), con máxima incidencia entre 5-15 años. En la Rx: lesión osteolítica central, cortical adelgazada ('fallen leaf sign' al fracturarse), sin reacción perióstica agresiva.",
    tip:"<strong>Quiste óseo simple:</strong> Niño + fractura patológica + húmero proximal = diagnóstico hasta demostrar lo contrario. 'Fallen leaf sign' = fragmento óseo que cae al fondo del quiste por la fractura (patognomónico). Tratamiento: inyección de corticosteroide intralesional (metilprednisolona) o clavos intramedulares elásticos.",
    ref:"GPC: Diagnóstico y Tratamiento de Tumores Óseos Benignos. SSA. 2010."
  },
  {
    cat:"lab",catName:"Imagen y Diagnóstico",
    q:"¿Cuál es el estudio de imagen de primera línea para la evaluación inicial de una masa ósea sospechosa?",
    opts:["Resonancia magnética con gadolinio","Radiografía simple en dos proyecciones","Gammagrama óseo con tecnecio-99m","Tomografía por emisión de positrones (PET-CT)"],
    ans:1,
    exp:"La radiografía simple en dos proyecciones es siempre el estudio inicial y frecuentemente diagnóstico en tumores óseos. Proporciona información esencial: localización (epífisis/metáfisis/diáfisis), tipo de lesión (lítica/blástica/mixta), márgenes (bien/mal definidos), reacción perióstica, extensión. La RM complementa para extensión intramedular y partes blandas. La TC para evaluar matriz y cortical. El PET para estadificación.",
    tip:"<strong>Secuencia de imagen en tumor óseo:</strong> Rx simple (siempre primero) → RM (extensión local, partes blandas) → TC (cortical, matriz mineralizada) → Gammagrafía (lesiones múltiples) → PET (estadificación en malignos). La Rx puede ser diagnóstica por sí sola en muchos tumores benignos.",
    ref:"GPC: Diagnóstico y Tratamiento de Tumores Óseos Benignos. SSA. 2010."
  },
  {
    cat:"dx",catName:"Diagnóstico",
    q:"Adulto de 30 años con lesión osteolítica epifisaria en la rodilla, expansiva, con patrón 'en jabón' (trabéculas internas), sin reacción perióstica. La biopsia muestra células gigantes multinucleadas (tipo osteoclasto) en abundancia. ¿Cuál es el diagnóstico?",
    opts:["Condrosarcoma de células claras","Quiste óseo aneurismático","Tumor de células gigantes (osteoclastoma)","Osteoblastoma"],
    ans:2,
    exp:"El tumor de células gigantes (TCG) u osteoclastoma es un tumor de comportamiento benigno pero localmente agresivo, localizado en la epífisis de huesos largos (rodilla distal/proximal del fémur y tibia, radio distal). Se presenta en adultos de 20-40 años, tras el cierre fisario. Rx: lesión lítica epifisaria excéntrica, patrón 'en jabón', sin esclerosis marginal ni mineralización. Potencial de transformación maligna <1-5%.",
    tip:"<strong>TCG (osteoclastoma) - características clave:</strong> Epífisis (no metáfisis) + adulto joven + células gigantes = TCG. Localización más frecuente: rodilla (fémur distal + tibia proximal = 50%). Radio distal = 10%. Tratamiento: curetaje + injerto ± cemento óseo. Alta tasa de recidiva local (15-30%). El 1-2% metastatiza a pulmón (aun siendo 'benigno').",
    ref:"GPC: Diagnóstico y Tratamiento de Tumores Óseos Benignos. SSA. 2010."
  },
  {
    cat:"tx",catName:"Tratamiento",
    q:"¿Cuál es el tratamiento de elección para el osteoide osteoma sintomático en la actualidad?",
    opts:["Resección quirúrgica en bloque con márgenes","Radioterapia de haz externo","AINEs indefinidamente sin intervención","Ablación percutánea por radiofrecuencia (RFA) guiada por TC"],
    ans:3,
    exp:"La ablación percutánea por radiofrecuencia (RFA) guiada por TC es el tratamiento de elección actual para el osteoide osteoma. Se introduce una aguja de radiofrecuencia directamente en el nidus y se destruye con calor (90°C, 4-6 min). Tasa de éxito >90%, con mínima morbilidad y corta hospitalización. Ha desplazado a la cirugía abierta como estándar. La cirugía abierta se reserva para nidus no accesibles percutáneamente.",
    tip:"<strong>Osteoide osteoma - tratamiento:</strong> RFA percutánea (>90% éxito, mínima morbilidad) = primera línea actual. Cirugía abierta = segunda línea si no accesible. AINEs = solo para control sintomático temporal o pacientes que rechazan procedimiento. La enfermedad puede remitir espontáneamente en 3-7 años, pero la mayoría opta por tratamiento.",
    ref:"GPC: Diagnóstico y Tratamiento de Tumores Óseos Benignos. SSA. 2010."
  },
  {
    cat:"dx",catName:"Diagnóstico",
    q:"Adulto joven con lesión osteolítica expansiva excéntrica en la metáfisis femoral distal, con múltiples niveles líquido-líquido en la RM. ¿Cuál es el diagnóstico más probable?",
    opts:["Quiste óseo aneurismático (QOA)","Quiste óseo simple","Tumor de células gigantes","Fibroma no osificante"],
    ans:0,
    exp:"El quiste óseo aneurismático (QOA) se caracteriza por espacios vasculares comunicantes llenos de sangre, con niveles líquido-líquido en la RM (signo patognomónico). Es una lesión expansiva, excéntrica, con tabiques internos. Puede ser primario (20%) o secundario a otro tumor (80%: TCG, condromixoide, osteoblastoma). Predomina en la metáfisis de huesos largos y columna vertebral en pacientes de 10-30 años.",
    tip:"<strong>Niveles líquido-líquido en RM = QOA.</strong> Los niveles ocurren por estratificación de la sangre (glóbulos rojos sedimentan). El QOA primario tiene translocación TRE17/USP6. El secundario = siempre buscar el tumor subyacente (50% TCG). Tratamiento: curetaje + injerto óseo ± embolización arterial preoperatoria.",
    ref:"GPC: Diagnóstico y Tratamiento de Tumores Óseos Benignos. SSA. 2010."
  },
  {
    cat:"lab",catName:"Imagen y Diagnóstico",
    q:"En la evaluación de un tumor óseo, ¿cuál es el hallazgo radiológico que mejor indica benignidad?",
    opts:["Márgenes bien definidos con halo esclerótico (zona de transición estrecha)","Reacción perióstica en 'sol naciente' o 'capas de cebolla'","Extensión a partes blandas con masa de tejidos blandos","Patrón lítico permeativo o apolillado"],
    ans:0,
    exp:"Los márgenes bien definidos con halo esclerótico (zona de transición estrecha) indican que el hueso tiene tiempo de reaccionar al crecimiento tumoral lento = tumor benigno o de bajo grado. Por el contrario: zona de transición ancha (permeativo/apolillado) = crecimiento rápido agresivo = maligno. La reacción perióstica en 'sol naciente' (osteosarcoma) y 'capas de cebolla' (Ewing) son indicadores de malignidad.",
    tip:"<strong>Criterios de Lodwick (agresividad):</strong> IA = geográfico con esclerosis (benigno) · IB = geográfico sin esclerosis · IC = geográfico con margen mal definido · II = apolillado · III = permeativo (III = maligno). Reacción perióstica: sólida = reactiva/benigna · interrumpida (triángulo de Codman, sol naciente) = maligna.",
    ref:"GPC: Diagnóstico y Tratamiento de Tumores Óseos Benignos. SSA. 2010."
  },
  {
    cat:"dx",catName:"Diagnóstico",
    q:"Niño de 12 años con hallazgo incidental en Rx de rodilla: lesión osteolítica metafisaria excéntrica, bien delimitada, con esclerosis marginal, cortical intacta, asintomática. ¿Cuál es el diagnóstico?",
    opts:["Osteosarcoma telangectásico","Fibroma no osificante (defecto fibroso cortical)","Condrosarcoma de bajo grado","Displasia fibrosa"],
    ans:1,
    exp:"El fibroma no osificante (defecto fibroso cortical) es el tumor óseo benigno más frecuente en niños (30-40% de los niños tienen uno en algún momento). Es asintomático, hallazgo incidental, en la metáfisis de huesos largos (fémur distal, tibia). Características Rx: lesión lítica excéntrica, lobulada, con esclerosis marginal bien definida ('festoneada'), sin reacción perióstica. Involucionan espontáneamente. No requieren tratamiento.",
    tip:"<strong>Fibroma no osificante:</strong> Hallazgo incidental en niño en Rx de rodilla = clásico. Excéntrico + metáfisis + esclerosis marginal + festoneado = patognomónico. NO biopsia, NO cirugía (involucionan solos). Excepción: lesión >50% del diámetro transverso → riesgo de fractura patológica → considerar injerto.",
    ref:"GPC: Diagnóstico y Tratamiento de Tumores Óseos Benignos. SSA. 2010."
  },
  {
    cat:"tx",catName:"Tratamiento",
    q:"Paciente con osteocondroma solitario asintomático del fémur distal, de 2 cm, en un adolescente de 14 años. ¿Cuál es la conducta adecuada?",
    opts:["Resección quirúrgica inmediata preventiva","Biopsia incisional para confirmar benignidad","Observación clínica y radiológica; cirugía solo si hay síntomas o crecimiento post-cierre fisario","Radioterapia profiláctica"],
    ans:2,
    exp:"La mayoría de los osteocondromas solitarios asintomáticos en pacientes esqueléticamente inmaduros se manejan con observación. El crecimiento es esperado hasta el cierre fisario. Indicaciones de resección: dolor o limitación funcional, compromiso neurovascular, bursa dolorosa, o crecimiento post-cierre fisario (sugiere transformación maligna). El capuchón cartilaginoso >2 cm en adulto también es indicación de cirugía.",
    tip:"<strong>Osteocondroma - indicaciones de cirugía:</strong> Síntomas (dolor, limitación, compresión vascular/nerviosa) + Crecimiento post-cierre fisario + Capuchón >2cm en adulto + Exostosis hereditaria múltiple con cambio en lesión. Asintomático en niño = observar. La tasa de malignización del osteocondroma solitario es <1%; en EHM es 3-5%.",
    ref:"GPC: Diagnóstico y Tratamiento de Tumores Óseos Benignos. SSA. 2010."
  },
  {
    cat:"dx",catName:"Diagnóstico",
    q:"Adulto de 35 años con dolor crónico sordo en la cadera. La Rx muestra lesión osteolítica de la cabeza femoral con matriz condroide ('palomitas de maíz'). La RM muestra lesión intramedular con áreas de alta señal en T2. ¿Cuál es el diagnóstico?",
    opts:["Necrosis avascular de la cabeza femoral","Condrosarcoma de alto grado","Encondroma (condroma intraóseo)","Tumor de células gigantes de la cabeza femoral"],
    ans:2,
    exp:"El encondroma es un tumor benigno formado por cartílago hialino maduro dentro del hueso (intramedular). Es la segunda neoplasia ósea benigna más frecuente. La matriz condroide calcificada con patrón 'en palomitas de maíz' o 'arcos y anillos' es característica en Rx. Predilección por huesos tubulares de las manos/pies (50%) y huesos largos. Alta señal en T2 en RM (por contenido acuoso del cartílago).",
    tip:"<strong>Encondroma vs Condrosarcoma:</strong> Encondroma: asintomático + palomitas de maíz + sin erosión endóstica. Condrosarcoma: dolor + erosión de cortical endóstica >2/3 + masa de partes blandas. El encondroma de huesos tubulares pequeños (manos) NO maligniza. El de pelvis y fémur proximal tiene mayor riesgo. Síndrome de Ollier = encondromatosis múltiple.",
    ref:"GPC: Diagnóstico y Tratamiento de Tumores Óseos Benignos. SSA. 2010."
  },
  {
    cat:"cx",catName:"Complicaciones",
    q:"Paciente con exostosis hereditaria múltiple (EHM) que nota rápido crecimiento de una de sus lesiones en la pelvis en la edad adulta, con dolor persistente. ¿Cuál es la complicación más temida?",
    opts:["Transformación maligna a condrosarcoma secundario","Fractura patológica de la pelvis","Infección de la exostosis (osteomielitis)","Compresión del nervio ciático"],
    ans:0,
    exp:"La transformación maligna a condrosarcoma periférico es la complicación más grave de la EHM, ocurriendo en 3-5% de los casos (vs <1% en osteocondroma solitario). Signos de alerta de malignización: crecimiento post-puberal, capuchón cartilaginoso >2 cm en adulto, dolor persistente, nueva masa de partes blandas adyacente. Las lesiones pélvicas y escapulares tienen mayor riesgo de malignización.",
    tip:"<strong>Señales de alarma de malignización en osteocondroma:</strong> 1) Crecimiento después del cierre fisario. 2) Capuchón cartilaginoso >2cm. 3) Dolor nuevo o persistente en adulto. 4) Masa de partes blandas. 5) Calcificaciones irregulares. Si alguna presente → RM + biopsia + resección. EHM pelvis/escápula = vigilancia estrecha.",
    ref:"GPC: Diagnóstico y Tratamiento de Tumores Óseos Benignos. SSA. 2010."
  },
  {
    cat:"lab",catName:"Imagen y Diagnóstico",
    q:"¿Cuál es el estudio de imagen más útil para evaluar la extensión intramedular y la afección de partes blandas en un tumor óseo antes de la cirugía?",
    opts:["Tomografía computarizada sin contraste","Resonancia magnética con y sin contraste","Gammagrafía ósea con Tc-99m","Ultrasonido de alta resolución"],
    ans:1,
    exp:"La RM es el estudio de elección para planeación quirúrgica de tumores óseos: define con precisión la extensión intramedular (longitud del tumor dentro del hueso), la relación con estructuras neurovasculares, el compromiso articular y la extensión a partes blandas. Esta información es esencial para determinar los márgenes de resección en cirugías de preservación de extremidades. La TC es superior para evaluar la matriz mineral y la cortical.",
    tip:"<strong>RM en tumor óseo - planeación quirúrgica:</strong> Extensión intramedular en T1 (médula grasa = alta señal, tumor = baja señal). Partes blandas en T2 supresión grasa. Realce con gadolinio = componente vascularizado viable. La RM define el 'salto de resección' para margen libre de tumor.",
    ref:"GPC: Diagnóstico y Tratamiento de Tumores Óseos Benignos. SSA. 2010."
  },
  {
    cat:"tx",catName:"Tratamiento",
    q:"¿Cuál es el tratamiento estándar para el tumor de células gigantes (TCG) localizado en la epífisis distal del radio?",
    opts:["Amputación como tratamiento de elección","Radioterapia de haz externo exclusiva","Curetaje intralesional + cemento óseo o injerto + reconstrucción","Quimioterapia sistémica con metotrexato"],
    ans:2,
    exp:"El tratamiento estándar del TCG es el curetaje intralesional ampliado (con alta velocidad y fenolización o nitrógeno líquido como adyuvante local) seguido de relleno con cemento óseo (polimetilmetacrilato) o injerto óseo. En el radio distal, frecuentemente se requiere resección en bloque con reconstrucción (injerto libre de peroné o artrodesis de muñeca) por la alta tasa de recidiva con curetaje solo en esta localización. Denosumab es opción para casos irresecables.",
    tip:"<strong>TCG - tratamiento según localización:</strong> Mayoría = curetaje + cemento (tasa recidiva 15-30%). Radio distal = resección en bloque + reconstrucción (mejor control oncológico). Columna/sacro irresecable = denosumab (anti-RANK-L, reduce células gigantes). Alta tasa recidiva local = seguimiento con RM cada 6 meses.",
    ref:"GPC: Diagnóstico y Tratamiento de Tumores Óseos Benignos. SSA. 2010."
  },
  {
    cat:"cx",catName:"Complicaciones",
    q:"Paciente pediátrico con displasia fibrosa monostótica del fémur proximal que desarrolla deformidad progresiva en 'cayado de pastor' (coxa vara). ¿Cuál es la razón fisiopatológica de esta deformidad?",
    opts:["El tumor invade el cartílago de crecimiento y lo destruye","La lesión comprime la arteria femoral causando isquemia","La displasia fibrosa produce osteoporosis generalizada","El hueso displásico (woven bone sin laminar) es estructuralmente débil y se deforma por carga"],
    ans:3,
    exp:"La displasia fibrosa es un trastorno del desarrollo en el que el hueso normal es reemplazado por tejido fibroso con islotes de hueso inmaduro (woven bone) no mineralizado correctamente. Este hueso displásico es estructuralmente inferior al hueso laminar normal, y bajo las fuerzas de carga axial, el fémur proximal se deforma progresivamente adoptando la forma de 'cayado de pastor'. El gen GNAS1 está mutado (Gsα activante).",
    tip:"<strong>Displasia fibrosa:</strong> GNAS1 mutado → Gsα activa constantemente → ↑ cAMP → diferenciación osteoblástica anormal → woven bone débil. Monostótica (85%): fémur proximal más afectado. Poliostótica (15%): síndrome de McCune-Albright (manchas café con leche + pubertad precoz + displasia). 'Cayado de pastor' = deformidad clásica por carga sobre hueso débil.",
    ref:"GPC: Diagnóstico y Tratamiento de Tumores Óseos Benignos. SSA. 2010."
  }
];

let currentQ=0,score=0,answers=[];
let catStats={dx:{c:0,t:0},tx:{c:0,t:0},cx:{c:0,t:0},lab:{c:0,t:0}};

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function init(){shuffle(questions);currentQ=0;score=0;answers=[];catStats={dx:{c:0,t:0},tx:{c:0,t:0},cx:{c:0,t:0},lab:{c:0,t:0}};const r=document.getElementById('resultsArea');r.classList.remove('show');r.innerHTML='';document.getElementById('nextBtn').classList.remove('show');renderQuestion();}
function renderQuestion(){const qa=questions[currentQ];const total=questions.length;document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;document.getElementById('nextBtn').classList.remove('show');const letters=['A','B','C','D'];let html=`<div class="question-card"><div class="q-category cat-${qa.cat}">${qa.catName}</div><div class="q-number">Pregunta ${currentQ+1} de ${total}</div><div class="q-text">${qa.q}</div><div class="options">`;qa.opts.forEach((opt,i)=>{html+=`<button class="option-btn" onclick="selectAnswer(${i})" data-idx="${i}"><span class="option-letter">${letters[i]}</span><span>${opt}</span></button>`;});html+=`</div><div class="feedback" id="feedback"></div></div>`;document.getElementById('quizArea').innerHTML=html;}
function selectAnswer(idx){const qa=questions[currentQ];const btns=document.querySelectorAll('.option-btn');const fb=document.getElementById('feedback');const isCorrect=idx===qa.ans;btns.forEach((btn,i)=>{btn.classList.add('disabled');btn.onclick=null;if(i===qa.ans)btn.classList.add('correct-answer');if(i===idx&&!isCorrect)btn.classList.add('wrong-answer');});if(!catStats[qa.cat])catStats[qa.cat]={c:0,t:0};catStats[qa.cat].t++;if(isCorrect){score++;catStats[qa.cat].c++;}if(!examMode){if(isCorrect){fb.className='feedback correct-fb show';fb.innerHTML=`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;}else{fb.className='feedback wrong-fb show';fb.innerHTML=`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;}}answers.push({q:qa.q,correct:isCorrect,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,tip:qa.tip,ref:qa.ref});document.getElementById('nextBtn').classList.add('show');}
function nextQuestion(){currentQ++;if(currentQ>=questions.length)showResults();else renderQuestion();}
function showResults(){document.getElementById('quizArea').innerHTML='';document.getElementById('nextBtn').classList.remove('show');document.getElementById('progressBar').style.width='100%';document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;const pct=Math.round((score/questions.length)*100);let msg=pct>=90?'🏆 ¡Excelente dominio del tema! Listo para el ENARM.':pct>=70?'👏 ¡Muy bien! Repasa las áreas con menor puntaje.':pct>=50?'📚 Aceptable, pero hay áreas de oportunidad importantes.':'⚠️ Necesitas reforzar este tema. Revisa las GPC correspondientes.';const cats=[{name:'Diagnóstico',key:'dx',color:'#38bdf8'},{name:'Imagen/Lab',key:'lab',color:'#34d399'},{name:'Tratamiento',key:'tx',color:'#a78bfa'},{name:'Complicaciones',key:'cx',color:'#f472b6'}];let html=`<div class="results-header"><div class="score-big">${pct}%</div><div class="score-label">${score} de ${questions.length} correctas</div><div class="score-msg">${msg}</div></div><div class="chart-section"><div class="chart-title"><span>📊</span> Rendimiento por Categoría</div><div class="bar-chart">`;cats.forEach(cat=>{const s=catStats[cat.key]||{c:0,t:0};const p=s.t>0?Math.round((s.c/s.t)*100):0;html+=`<div class="bar-row"><div class="bar-label">${cat.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${cat.color};">${p}% (${s.c}/${s.t})</div></div></div>`;});html+=`</div></div><div class="chart-section"><div class="chart-title"><span>🎯</span> Resumen General</div><div class="donut-wrap"><svg class="donut-svg" viewBox="0 0 42 42"><circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/><circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/><circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/><text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text></svg><div class="donut-legend"><div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div><div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div><div class="legend-item"><div class="legend-dot" style="background:#38bdf8;"></div>Total: ${questions.length}</div></div></div></div><div class="chart-section"><div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;answers.forEach((a,i)=>{html+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}"><div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div><div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div><div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div><div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div></div>`;});html+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;const res=document.getElementById('resultsArea');res.innerHTML=html;res.classList.add('show');res.scrollIntoView({behavior:'smooth'});}
function toggleSpec(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
init();
</script>
