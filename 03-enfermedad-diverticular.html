<script>
let examMode = false;
function setMode(mode){
  examMode=(mode==='examen');
  document.getElementById('btnRepaso').classList.toggle('active',!examMode);
  document.getElementById('btnExamen').classList.toggle('active',examMode);

}

const questions = [
  {
    cat:"div", catName:"Diverticulosis",
    q:"¿Cuál es la localización más frecuente de los divertículos del colon en la población occidental?",
    opts:["Colon sigmoides","Colon derecho (ciego y ascendente)","Colon transverso","Recto"],
    ans:0,
    exp:"En la población occidental, el 90-95% de los divertículos colónicos se localizan en el colon sigmoides. Esto se debe a la alta presión intraluminal generada en este segmento por la dieta baja en fibra. En contraste, en Asia los divertículos del colon derecho son más frecuentes. La GPC de Enfermedad Diverticular del Colon 2014 establece esta distribución como base para el manejo.",
    tip:"<strong>Occidente vs Oriente:</strong> En México y países occidentales → sigmoides. En Japón y países asiáticos → colon derecho. Esta diferencia tiene implicación clínica: diverticulitis de colon derecho puede confundirse con apendicitis. Si el paciente asiático tiene 'apendicitis' y el apéndice está normal → busca divertículo de colon derecho.",
    ref:"GPC: Enfermedad diverticular del colon. CENETEC. 2014."
  },
  {
    cat:"div", catName:"Diverticulosis",
    q:"¿Cuál es el principal factor de riesgo modificable para el desarrollo de diverticulosis del colon?",
    opts:["Consumo elevado de carne roja","Sedentarismo","Dieta baja en fibra","Infección por H. pylori"],
    ans:2,
    exp:"La dieta baja en fibra es el principal factor de riesgo modificable para diverticulosis. La fibra dietética aumenta el bolo fecal, reduce la presión intraluminal y acelera el tránsito intestinal, previniendo la herniación de la mucosa. La GPC recomienda una ingesta de fibra de 25-30g/día como medida preventiva y de control de síntomas en diverticulosis.",
    tip:"<strong>Fisiopatología en 3 pasos:</strong> Poca fibra → heces duras y escasas → alta presión en sigmoides → herniación de mucosa por puntos débiles (donde vasos penetrantes atraviesan la pared muscular). Los divertículos son en realidad pseudodivertículos: solo hernia mucosa y submucosa, no pared muscular completa.",
    ref:"GPC: Enfermedad diverticular del colon. CENETEC. 2014."
  },
  {
    cat:"div2", catName:"Diverticulitis Aguda",
    q:"Paciente masculino de 58 años con dolor en fosa ilíaca izquierda de 3 días de evolución, fiebre de 38.1°C, cambio en el hábito intestinal y leucocitosis. ¿Cuál es el diagnóstico más probable?",
    opts:["Diverticulitis aguda","Síndrome de intestino irritable","Cáncer de colon sigmoides","Colitis ulcerativa"],
    ans:0,
    exp:"La diverticulitis aguda se presenta clásicamente con dolor en fosa ilíaca izquierda (el 'lado derecho' de la patología abdominal izquierda), fiebre y leucocitosis. Se considera la 'apendicitis izquierda'. La GPC establece que la combinación de dolor en FII + fiebre + cambios en el hábito intestinal en un paciente mayor de 50 años orienta fuertemente a diverticulitis aguda.",
    tip:"<strong>Regla de los lados:</strong> Apendicitis = FID, Diverticulitis = FII. Edad típica: apendicitis en jóvenes, diverticulitis en mayores de 40-50 años. El cambio en el hábito intestinal (estreñimiento o diarrea) distingue diverticulitis del cólico renal que tiene irradiación a genitales sin cambios en hábito.",
    ref:"GPC: Enfermedad diverticular del colon. CENETEC. 2014."
  },
  {
    cat:"dx", catName:"Diagnóstico",
    q:"¿Cuál es el estudio de imagen de elección para confirmar el diagnóstico y clasificar la severidad de la diverticulitis aguda?",
    opts:["Radiografía simple de abdomen","Ultrasonido abdominal","Tomografía computarizada de abdomen y pelvis con contraste","Colonoscopia urgente"],
    ans:2,
    exp:"La TC de abdomen y pelvis con contraste IV es el estudio de elección para diverticulitis aguda. Tiene sensibilidad del 94% y especificidad del 99%. Permite confirmar el diagnóstico, identificar complicaciones (absceso, perforación libre, fístula, obstrucción) y clasificar la severidad (Hinchey). La colonoscopia está contraindicada en fase aguda por riesgo de perforación.",
    tip:"<strong>Colonoscopia = Contraindicada en agudo:</strong> La colonoscopia se realiza 6-8 semanas DESPUÉS de la resolución del episodio agudo para descartar neoplasia (el cáncer de colon puede presentarse igual que la diverticulitis). La TC es el estándar de oro en agudo. El USG puede usarse en embarazadas o cuando no hay TC disponible.",
    ref:"GPC: Enfermedad diverticular del colon. CENETEC. 2014."
  },
  {
    cat:"dx", catName:"Diagnóstico",
    q:"La clasificación de Hinchey se utiliza para estadificar las complicaciones de la diverticulitis aguda. ¿Qué describe el estadio IV de Hinchey?",
    opts:["Flemón pericólico sin absceso","Absceso pericólico o mesocólico","Absceso pélvico lejano","Peritonitis fecaloidea generalizada"],
    ans:3,
    exp:"La clasificación de Hinchey: I = flemón/absceso pericólico, II = absceso pélvico o distante, III = peritonitis purulenta generalizada, IV = peritonitis fecaloidea generalizada. El estadio IV representa la complicación más grave con perforación libre y contaminación fecal de la cavidad peritoneal, con la mayor mortalidad.",
    tip:"<strong>Hinchey resumido:</strong> I-II = Absceso (manejable con drenaje ± antibióticos). III = Peritonitis purulenta (cirugía, posible lavado laparoscópico). IV = Peritonitis fecal (cirugía de Hartmann urgente, mortalidad alta). A mayor Hinchey, mayor agresividad del tratamiento.",
    ref:"GPC: Enfermedad diverticular del colon. CENETEC. 2014."
  },
  {
    cat:"tx", catName:"Tratamiento",
    q:"Paciente con diverticulitis aguda no complicada (Hinchey I leve), sin datos de sepsis, tolerando vía oral. ¿Cuál es el manejo recomendado por la GPC?",
    opts:["Hospitalización obligatoria con antibióticos IV","Tratamiento ambulatorio con antibióticos orales, dieta líquida y seguimiento en 48-72h","Cirugía electiva programada inmediata","Colonoscopia diagnóstica urgente"],
    ans:1,
    exp:"La diverticulitis aguda no complicada leve puede manejarse de forma ambulatoria con antibióticos orales (ciprofloxacino + metronidazol o amoxicilina/clavulanato), dieta líquida y seguimiento estrecho. La GPC establece que pacientes seleccionados sin comorbilidades, con buen apoyo familiar y tolerancia oral pueden evitar la hospitalización, con reevaluación en 48-72 horas.",
    tip:"<strong>Criterios para manejo ambulatorio:</strong> Sin fiebre alta, sin datos de sepsis, tolera líquidos, sin inmunosupresión, sin comorbilidades graves, buen apoyo social y posibilidad de reevaluación rápida. Si no cumple TODOS estos criterios → hospitalización. La diverticulitis 'moderada' siempre se hospitaliza.",
    ref:"GPC: Enfermedad diverticular del colon. CENETEC. 2014."
  },
  {
    cat:"tx", catName:"Tratamiento",
    q:"¿Cuál es el esquema antibiótico oral de elección para diverticulitis aguda no complicada en manejo ambulatorio?",
    opts:["Ciprofloxacino 500mg c/12h + Metronidazol 500mg c/8h por 7-10 días","Amoxicilina oral monoterapia 500mg c/8h","Doxiciclina 100mg c/12h","Azitromicina 500mg/día por 5 días"],
    ans:0,
    exp:"La combinación de ciprofloxacino + metronidazol proporciona cobertura para la flora colónica mixta: gramnegativos aerobios (ciprofloxacino) y anaerobios (metronidazol). La GPC recomienda este esquema por 7-10 días en diverticulitis no complicada ambulatoria. Como alternativa: amoxicilina/clavulanato que cubre ambos espectros en un solo fármaco.",
    tip:"<strong>Cobertura dual obligatoria:</strong> La flora del colon incluye E. coli, Klebsiella, Bacteroides fragilis. Siempre necesitas cobertura Gram negativa + anaeróbica. Ciprofloxacino cubre Gram negativos; metronidazol cubre anaerobios. Alternativa práctica: Augmentin (amoxicilina/clavulanato) = cubre ambos en un solo medicamento.",
    ref:"GPC: Enfermedad diverticular del colon. CENETEC. 2014."

  {

    tip:"<strong>Regla del tamaño:</strong> Absceso &lt;3cm → antibióticos IV solos. Absceso ≥3-4cm → drenaje percutáneo + antibióticos. Absceso no accesible o peritonitis → cirugía. El drenaje percutáneo exitoso permite cirugía electiva posterior (Hartmann o resección primaria con anastomosis) en 6-8 semanas con menor morbimortalidad.",

  {

    q:"Paciente masculino de 62 años con historia de diverticulitis a repetición que ahora presenta neumaturia (gas en orina) y fecaluria. ¿Cuál es la complicación más probable?",

    ref:"GPC: Enfermedad diverticular del colon. CENETEC. 2014."
  },
  {
    cat:"tx", catName:"Tratamiento Quirúrgico",
    q:"¿Cuántos episodios de diverticulitis aguda no complicada son indicación para considerar cirugía electiva según la GPC?",
    opts:["Después del primer episodio siempre","La indicación es individualizada; no hay número fijo de episodios","Después de 2 episodios en cualquier paciente","Después de 5 episodios documentados"],
    ans:1,
    exp:"La GPC y las guías internacionales actuales han abandonado la regla rígida de 'cirugía electiva después de 2 episodios'. Actualmente la indicación quirúrgica electiva es individualizada, considerando: frecuencia e intensidad de episodios, calidad de vida, comorbilidades, edad, complicaciones asociadas y preferencias del paciente. Pacientes con episodios frecuentes o complicados se benefician de cirugía electiva.",

    ref:"GPC: Enfermedad diverticular del colon. CENETEC. 2014."
  },
  {

    q:"¿Cuál es la complicación más frecuente de la diverticulosis del colon (sin infección)?",
    opts:["Hemorragia diverticular","Perforación espontánea","Vólvulo sigmoideo","Obstrucción intestinal crónica"],
    ans:0,
    exp:"La hemorragia diverticular es la complicación más frecuente de la diverticulosis, representando el 30-40% de las hemorragias digestivas bajas graves. Ocurre por erosión de los vasa recta (arterias penetrantes) en el cuello del divertículo. Es típicamente indolora, masiva y autolimitada en el 70-80% de los casos. La GPC señala que el colon derecho es el sitio más frecuente de sangrado aunque los divertículos predominen en sigmoides.",
    tip:"<strong>Hemorragia diverticular:</strong> Indolora + masiva + autolimitada (70-80%). Si no cede → colonoscopia terapéutica (primera línea), angiografía con embolización (segunda línea), cirugía (última opción). Diagnóstico: angiografía-TC o colonoscopia. No confundir con diverticulitis (que tiene dolor e infección).",
    ref:"GPC: Enfermedad diverticular del colon. CENETEC. 2014."
  },
  {
    cat:"dx", catName:"Diagnóstico",
    q:"¿Por qué está contraindicada la colonoscopia en la fase aguda de la diverticulitis?",
    opts:["Porque no modifica el manejo en ningún caso","Porque el preparado intestinal es tóxico en infección","Por riesgo de perforación del segmento inflamado","Por riesgo de bacteriemia fatal"],
    ans:2,
    exp:"La colonoscopia está contraindicada en diverticulitis aguda porque la insuflación de aire y la manipulación del endoscopio sobre el segmento inflamado aumentan significativamente el riesgo de perforación. La GPC establece que la colonoscopia se realiza 6-8 semanas después de la resolución del episodio agudo, principalmente para descartar neoplasia de colon que puede simular diverticulitis.",

    opts:["No cambia el manejo, se trata igual que paciente sano","Contraindicación absoluta para cirugía","Solo requiere doblar la dosis de antibióticos orales","Requiere hospitalización, antibióticos IV y umbral quirúrgico más bajo"],

  },
  {
    cat:"tx", catName:"Tratamiento",
    q:"¿Cuál es la recomendación dietética a largo plazo para pacientes con diverticulosis para prevenir episodios de diverticulitis?",
    opts:["Dieta alta en carne roja y baja en vegetales","Dieta alta en fibra (25-30g/día) con adecuada hidratación","Dieta líquida permanente","Ayuno intermitente 16/8"],
    ans:1,
    exp:"La dieta alta en fibra (25-30g/día) con adecuada hidratación es la recomendación preventiva principal para pacientes con diverticulosis. La fibra aumenta el bolo fecal, reduce la presión intraluminal y facilita el tránsito intestinal, reduciendo el riesgo de inflamación diverticular. La GPC también recomienda actividad física regular y evitar el estreñimiento.",
    tip:"<strong>Desmitificando la dieta:</strong> Antes se decía 'evitar semillas, nueces y palomitas' para prevenir diverticulitis. Estudios actuales muestran que NO hay evidencia de que estos alimentos precipiten diverticulitis. La GPC 2014 ya no restringe semillas ni nueces. Lo que sí funciona: fibra + hidratación + ejercicio.",

let currentQ=0, score=0, answers=[];
let catStats={div:{c:0,t:0},div2:{c:0,t:0},dx:{c:0,t:0},tx:{c:0,t:0},cx:{c:0,t:0}};

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

function init(){
  shuffle(questions);
  currentQ=0;score=0;answers=[];
  catStats={div:{c:0,t:0},div2:{c:0,t:0},dx:{c:0,t:0},tx:{c:0,t:0},cx:{c:0,t:0}};
  const r=document.getElementById('resultsArea');
  r.classList.remove('show');r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion(){
  const qa=questions[currentQ],total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const letters=['A','B','C','D'];
  let html=`<div class="question-card">
    <div class="q-category cat-${qa.cat}">${qa.catName}</div>
    <div class="q-number">Pregunta ${currentQ+1} de ${total}</div>
    <div class="q-text">${qa.q}</div>
    <div class="options">`;
  qa.opts.forEach((opt,i)=>{
    html+=`<button class="option-btn" onclick="selectAnswer(${i})"><span class="option-letter">${letters[i]}</span><span>${opt}</span></button>`;
  });
  html+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=html;
}

function selectAnswer(idx){
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const isCorrect=idx===qa.ans;
  btns.forEach((btn,i)=>{btn.classList.add('disabled');btn.onclick=null;if(i===qa.ans)btn.classList.add('correct-answer');if(i===idx&&!isCorrect)btn.classList.add('wrong-answer');});
  if(!catStats[qa.cat])catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(isCorrect){score++;catStats[qa.cat].c++;}
  if(!examMode){
    fb.className=isCorrect?'feedback correct-fb show':'feedback wrong-fb show';
    fb.innerHTML=isCorrect
      ?`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`
      :`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;
  }
  answers.push({q:qa.q,correct:isCorrect,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion(){currentQ++;if(currentQ>=questions.length)showResults();else renderQuestion();}

function showResults(){
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'🏆 ¡Excelente! Dominas la enfermedad diverticular.':pct>=70?'👏 ¡Muy bien! Refuerza las áreas con menor puntaje.':pct>=50?'📚 Aceptable, repasa la GPC de enfermedad diverticular.':'⚠️ Necesitas repasar clasificación de Hinchey y manejo quirúrgico.';
  const cats=[
    {name:'Diverticulosis',key:'div',color:'#fb923c'},
    {name:'Diverticulitis Aguda',key:'div2',color:'#f472b6'},
    {name:'Diagnóstico',key:'dx',color:'#38bdf8'},
    {name:'Tratamiento',key:'tx',color:'#a78bfa'},
    {name:'Complicaciones',key:'cx',color:'#f87171'},
  ];
  let html=`<div class="results-header">
    <div class="score-big">${pct}%</div>
    <div class="score-label">${score} de ${questions.length} correctas</div>
    <div class="score-msg">${msg}</div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📊</span> Rendimiento por Categoría</div>
    <div class="bar-chart">`;
  cats.forEach(cat=>{
    const s=catStats[cat.key]||{c:0,t:0};
    const p=s.t>0?Math.round((s.c/s.t)*100):0;
    html+=`<div class="bar-row"><div class="bar-label">${cat.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${cat.color};">${p}% (${s.c}/${s.t})</div></div></div>`;
  });
  html+=`</div></div>
  <div class="chart-section">
    <div class="chart-title"><span>🎯</span> Resumen General</div>
    <div class="donut-wrap">
      <svg class="donut-svg" viewBox="0 0 42 42">
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
        <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
      </svg>
      <div class="donut-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#38bdf8;"></div>Total: ${questions.length}</div>
      </div>
    </div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{
    html+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
      <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
      <div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div>
      <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
      <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
    </div>`;
  });
  html+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const res=document.getElementById('resultsArea');
  res.innerHTML=html;res.classList.add('show');
  res.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
init();
</script>
</body>
</html>
