<script>
let examMode = false;

function setMode(mode) {
  examMode = (mode === 'examen');
  document.getElementById('btnRepaso').classList.toggle('active', !examMode);
  document.getElementById('btnExamen').classList.toggle('active', examMode);
  init();
}

const questions = [
  {
    cat:"obs", catName:"Obstrucción Intestinal",
    q:"Hombre de 58 años con antecedente de apendicectomía hace 10 años, se presenta con dolor abdominal cólico difuso de 24 horas, náuseas, vómito, incapacidad para eliminar gases y distensión abdominal. Rx de abdomen muestra niveles hidroaéreos en escala de piano en fosa iliaca izquierda y fosa iliaca derecha. ¿Cuál es la causa más frecuente de oclusión intestinal mecánica en adultos?",
    opts:["Neoplasia de colon","Hernia inguinal incarcerada","Adherencias y bridas postquirúrgicas","Vólvulo de sigmoides"],
    ans:2,
    exp:"Las adherencias y bridas postquirúrgicas son la causa número uno de oclusión intestinal mecánica en adultos, representando el 60-70% de los casos de obstrucción de intestino delgado. La GPC de oclusión intestinal por adherencias postquirúrgicas (2012) establece que todo paciente con cirugía abdominal previa que presenta cuadro obstructivo debe considerarse bridas como primera etiología. En contraste, en niños la causa más frecuente es la hernia inguinal incarcerada.",
    tip:"<strong>Nemotecnia por frecuencia en adultos:</strong> 1° Bridas/adherencias (60-70%), 2° Hernias (15-20%), 3° Neoplasias (10-15%). En niños: 1° Hernias, 2° Intususcepción. El antecedente quirúrgico es la clave clínica más importante para sospechar bridas.",
    ref:"GPC: Tratamiento quirúrgico de la oclusión intestinal por adherencias postquirúrgicas. IMSS-2012."
  },
  {
    cat:"obs", catName:"Obstrucción Intestinal",
    q:"Paciente con obstrucción de intestino delgado por bridas es manejado inicialmente de forma conservadora. ¿Cuál de los siguientes hallazgos radiológicos en Rx simple de abdomen es característico de la obstrucción mecánica de intestino delgado?",
    opts:["Neumoperitoneo subdiafragmático","Niveles hidroaéreos en escala de piano con asas centrales dilatadas y válvulas conniventes visibles","Patrón en miga de pan en colon derecho","Imagen en grano de café en hemiabdomen izquierdo"],
    ans:1,
    exp:"La obstrucción mecánica de intestino delgado se caracteriza radiológicamente por niveles hidroaéreos dispuestos en escala de piano (múltiples niveles a diferentes alturas), asas de intestino delgado dilatadas (>3 cm) localizadas centralmente, con visualización de válvulas conniventes (pliegues que cruzan todo el diámetro del asa). La ausencia de gas en colon indica obstrucción completa. La GPC recomienda la Rx simple como primera línea diagnóstica.",
    tip:"<strong>Diferencia Rx intestino delgado vs colon:</strong> Intestino delgado: central, válvulas conniventes (líneas completas), diámetro ≤3cm normal. Colon: periférico, haustras (líneas incompletas), diámetro ≤6cm normal (ciego ≤9cm). Imagen en grano de café = vólvulo sigmoides. Neumoperitoneo = perforación.",
    ref:"GPC: Tratamiento quirúrgico de la oclusión intestinal por adherencias postquirúrgicas. IMSS-2012."
  },
  {
    cat:"obs", catName:"Obstrucción Intestinal",
    q:"Paciente con obstrucción de intestino delgado por bridas tiene 48 horas de manejo conservador (sonda nasogástrica, NPO, hidratación IV) sin mejoría. ¿Cuál es el signo clínico que indica necesidad urgente de intervención quirúrgica por sospecha de estrangulación?",
    opts:["Distensión abdominal progresiva sin fiebre","Dolor abdominal que cambia de cólico a continuo, fiebre, taquicardia y leucocitosis","Náuseas y vómito persistentes","Ausencia de ruidos peristálticos en los cuatro cuadrantes"],
    ans:1,
    exp:"La estrangulación intestinal es la complicación más grave de la obstrucción mecánica e implica compromiso vascular del asa obstruida. Los signos de alarma son: cambio del dolor de cólico (obstrucción simple) a continuo e intenso (isquemia/necrosis), fiebre, taquicardia, leucocitosis, irritación peritoneal y acidosis metabólica. La GPC establece que estos hallazgos requieren cirugía de urgencia inmediata, pues la mortalidad aumenta exponencialmente con el retraso.",
    tip:"<strong>Obstrucción simple vs estrangulada:</strong> Simple: dolor cólico, sin fiebre, sin peritonismo, sin acidosis → manejo conservador 24-48h. Estrangulada: dolor continuo + fiebre + taquicardia + leucocitosis + peritonismo → cirugía urgente. La estrangulación ocurre en 20-40% de las obstrucciones no tratadas a tiempo.",
    ref:"GPC: Tratamiento quirúrgico de la oclusión intestinal por adherencias postquirúrgicas. IMSS-2012."
  },
  {
    cat:"obs", catName:"Obstrucción Intestinal",
    q:"En el contexto de obstrucción intestinal, el término 'asa cerrada' (closed loop) hace referencia a una situación de alto riesgo. ¿Qué característica define a este tipo de obstrucción?",
    opts:["Obstrucción del colon con válvula ileocecal competente","Oclusión del intestino en dos puntos contiguos que atrapan un segmento sin salida proximal ni distal","Obstrucción por neoplasia sin posibilidad de derivación","Íleo adinámico posterior a cirugía abdominal mayor"],
    ans:1,
    exp:"El asa cerrada (closed loop obstruction) se produce cuando un segmento intestinal queda obstruido simultáneamente en dos puntos, sin vía de escape ni proximal ni distal (p. ej., vólvulo, brida que atrapa un asa en U). Esto provoca distensión rápida, isquemia precoz y riesgo elevado de perforación por aumento brusco de la presión intraluminal. La TC es el estudio de elección para diagnosticarla. Requiere cirugía urgente.",
    tip:"<strong>Asa cerrada = doble punto de obstrucción:</strong> Imagen en TC: asa en U o en C con edema de la pared, ausencia de realce con contraste (isquemia) o gas en pared (necrosis). El vólvulo es el prototipo de asa cerrada. Alta mortalidad si no se interviene antes de 6 horas de instaurada la isquemia.",
    ref:"GPC: Tratamiento quirúrgico de la oclusión intestinal por adherencias postquirúrgicas. IMSS-2012."
  },
  {
    cat:"vol", catName:"Vólvulo",
    q:"Anciano de 78 años, institucionalizado, con estreñimiento crónico, se presenta con distensión abdominal masiva de inicio súbito, dolor abdominal leve y ausencia de deposiciones hace 3 días. La Rx simple de abdomen muestra una imagen en 'grano de café' que ocupa el hemiabdomen izquierdo y se extiende hasta el hipocondrio derecho. ¿Cuál es el diagnóstico?",
    opts:["Megacolon tóxico por colitis ulcerosa","Vólvulo de sigmoides","Obstrucción del colon por carcinoma","Pseudoobstrucción colónica aguda (Síndrome de Ogilvie)"],
    ans:1,
    exp:"La imagen en 'grano de café' o 'omega' en la Rx de abdomen es el signo radiológico clásico del vólvulo de sigmoides. Corresponde al asa sigmoide enormemente dilatada que se tuerce sobre su eje mesentérico. El patrón epidemiológico (anciano, institucionalizado, estreñimiento crónico, colon redundante) es característico. La GPC de vólvulo en adultos (2015) establece que esta imagen tiene alta sensibilidad y especificidad diagnóstica.",
    tip:"<strong>Imagen en grano de café / grano de frijol:</strong> El asa sigmoide dilatada forma dos columnas de gas separadas por una línea densa central (el mesenterio torcido). Se extiende desde la pelvis hacia el hipocondrio derecho (sentido contrario a las agujas del reloj). Recuerda: vólvulo sigmoides = anciano + estreñimiento + imagen en grano de café.",
    ref:"GPC: Diagnóstico y tratamiento médico y quirúrgico del vólvulo en el adulto. SSA-2015."
  },

    tip:"<strong>Íleo paralítico vs obstrucción mecánica en Rx:</strong> Íleo: gas en todo el intestino incluyendo colon, sin punto de corte, niveles mínimos. Obstrucción mecánica: gas proximal al punto de obstrucción, colon sin gas (obstrucción completa), niveles en escala de piano. Manejo del íleo: deambulación precoz, metoclopramida, goma de mascar (estimula reflejo gastrocólico), NPO hasta resolución.",

    tip:"<strong>Hartmann = resección + colostomía + cierre muñón:</strong> Ventaja: evita anastomosis de alto riesgo. Desventaja: colostomía temporal y segunda cirugía para reconexión. La anastomosis primaria solo es válida en vólvulo de sigmoides sin isquemia, colon preparado, paciente estable y cirujano con experiencia. En urgencias, Hartmann es la opción más segura.",

let currentQ = 0, score = 0, answers = [];
let catStats = { obs:{c:0,t:0}, vol:{c:0,t:0}, isq:{c:0,t:0}, par:{c:0,t:0}, tx:{c:0,t:0} };

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function init() {
  shuffle(questions);
  currentQ=0; score=0; answers=[];
  catStats = { obs:{c:0,t:0}, vol:{c:0,t:0}, isq:{c:0,t:0}, par:{c:0,t:0}, tx:{c:0,t:0} };
  const r=document.getElementById('resultsArea');
  r.classList.remove('show'); r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion() {
  const qa=questions[currentQ], total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const letters=['A','B','C','D'];
  let html=`<div class="question-card">
    <div class="q-category cat-${qa.cat}">${qa.catName}</div>
    <div class="q-number">Pregunta ${currentQ+1} de ${total}</div>
    <div class="q-text">${qa.q}</div>
    <div class="options">`;
  qa.opts.forEach((opt,i)=>{
    html+=`<button class="option-btn" onclick="selectAnswer(${i})" data-idx="${i}">
      <span class="option-letter">${letters[i]}</span><span>${opt}</span></button>`;
  });
  html+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=html;
}

function selectAnswer(idx) {
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const isCorrect=idx===qa.ans;
  btns.forEach((btn,i)=>{
    btn.classList.add('disabled'); btn.onclick=null;
    if(i===qa.ans) btn.classList.add('correct-answer');
    if(i===idx&&!isCorrect) btn.classList.add('wrong-answer');
  });
  if(!catStats[qa.cat]) catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(isCorrect){score++;catStats[qa.cat].c++;}
  if(!examMode){
    fb.className=isCorrect?'feedback correct-fb show':'feedback wrong-fb show';
    fb.innerHTML=isCorrect
      ?`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`
      :`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;
  }
  answers.push({q:qa.q,correct:isCorrect,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if(currentQ>=questions.length) showResults();
  else renderQuestion();
}

function showResults() {
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'🏆 ¡Dominio excelente de oclusión e isquemia intestinal!':pct>=70?'👏 ¡Muy bien! Repasa los temas con menor puntaje.':pct>=50?'📚 Aceptable, refuerza las áreas débiles.':'⚠️ Revisa las GPC de oclusión intestinal, vólvulo e isquemia mesentérica.';
  const cats=[
    {name:'Obstrucción Intestinal',key:'obs',color:'#fbbf24'},
    {name:'Vólvulo',key:'vol',color:'#38bdf8'},
    {name:'Isquemia Mesentérica',key:'isq',color:'#a78bfa'},
    {name:'Íleo Paralítico',key:'par',color:'#f472b6'},
    {name:'Tratamiento Qx',key:'tx',color:'#34d399'},
  ];
  let html=`<div class="results-header">
    <div class="score-big">${pct}%</div>
    <div class="score-label">${score} de ${questions.length} correctas</div>
    <div class="score-msg">${msg}</div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📊</span> Rendimiento por Categoría</div>
    <div class="bar-chart">`;
  cats.forEach(cat=>{
    const s=catStats[cat.key]||{c:0,t:0};
    const p=s.t>0?Math.round((s.c/s.t)*100):0;
    html+=`<div class="bar-row"><div class="bar-label">${cat.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${cat.color};">${p}% (${s.c}/${s.t})</div></div></div>`;
  });
  html+=`</div></div>
  <div class="chart-section">
    <div class="chart-title"><span>🎯</span> Resumen General</div>
    <div class="donut-wrap">
      <svg class="donut-svg" viewBox="0 0 42 42">
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
        <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
      </svg>
      <div class="donut-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#38bdf8;"></div>Total: ${questions.length}</div>
      </div>
    </div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{
    html+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
      <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
      <div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div>
      <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
      <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
    </div>`;
  });
  html+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const res=document.getElementById('resultsArea');
  res.innerHTML=html; res.classList.add('show');
  res.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(header){header.classList.toggle('open');header.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}

init();
</script>
</body>
</html>
