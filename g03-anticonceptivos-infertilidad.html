    ans:1,
    exp:"El espermatograma es la prueba inicial indispensable en el estudio del factor masculino. Es accesible, no invasiva y aporta información sobre concentración, motilidad y morfología espermática. El factor masculino está implicado en 30-40% de los casos de infertilidad.",
    tip:"<strong>Factor masculino → primer estudio = espermatograma.</strong> Siempre incluir al varón desde el inicio.",

  },

    opts:["Gonadotropinas exógenas (FSH recombinante)","Metformina sola sin inductores de ovulación","Letrozol 5 mg del día 3 al 7 del ciclo","Citrato de clomifeno 50 mg del día 3 al 7 del ciclo"],

    exp:"El citrato de clomifeno es el inductor de ovulación de primera línea en la GPC mexicana para pacientes con SOP. Es antiestrogénico hipotalámico que incrementa la secreción de GnRH. El letrozol se ha posicionado como alternativa (mayor tasa ovulación en SOP) pero la GPC nacional mantiene clomifeno como primera línea.",

  /* ── ESTERILIDAD / TÉCNICAS ── */
  {
    cat:"esteril", catName:"Esterilidad / Técnicas",
    q:"Pareja con infertilidad por obstrucción tubárica bilateral documentada en HSG. Espermatograma con parámetros normales. ¿Cuál es la técnica de reproducción asistida indicada?",
    opts:["Inseminación intrauterina (IIU) con estimulación ovárica","Inducción de ovulación con clomifeno sola","Fertilización in vitro (FIV) con transferencia embrionaria","Transferencia intratubárica de gametos (GIFT)"],
    ans:2,
    exp:"La obstrucción tubárica bilateral es indicación absoluta de FIV, ya que la trompa no es funcional para el transporte del gameto ni del embrión. La IIU requiere al menos una trompa permeable. El GIFT está en desuso.",
    tip:"<strong>Obstrucción tubárica bilateral = indicación absoluta de FIV.</strong> No hay trompa = no hay IIU.",
    ref:"GPC Diagnóstico de la pareja infértil y tratamiento con técnicas de baja complejidad"
  },
  {

    q:"¿Cuál es la principal indicación de la inseminación intrauterina (IIU) como técnica de reproducción asistida de baja complejidad?",
    opts:["Factor masculino leve-moderado y factor cervical hostil","Obstrucción tubárica bilateral","Factor masculino severo (oligozoospermia grave <1 millón/mL)","Insuficiencia ovárica primaria"],

    exp:"La IIU está indicada en factor masculino leve-moderado (donde la capacitación espermática mejora los parámetros), factor cervical hostil (moco cervical espeso), y anovulación respondedora a inducción. Para factor masculino severo se requiere FIV con ICSI.",
    tip:"<strong>IIU: factor leve, cérvico-uterino, anovulación.</strong> Factor severo → FIV/ICSI.",

  },
  {
    cat:"esteril", catName:"Esterilidad / Técnicas",
    q:"Mujer de 30 años en protocolo de estimulación ovárica con gonadotropinas para IIU. A los 8 días desarrolla distensión abdominal progresiva, náuseas y disnea. USG muestra ovarios de 9 cm con múltiples folículos y ascitis. ¿Cuál es el diagnóstico?",

    exp:"El SHO es la complicación más importante de la estimulación ovárica controlada. Se caracteriza por ovarios aumentados (>8-10 cm en forma grave), ascitis por aumento de permeabilidad vascular, y manifestaciones sistémicas. Factores de riesgo: SOP, niveles altos de estradiol, edad joven, IMC bajo.",

    opts:["Inducción de ovulación con altas dosis de gonadotropinas","FIV con óvulos propios y protocolo de alta estimulación","Ovodonación (FIV con óvulos de donante)","Inseminación intrauterina con estimulación leve"],
    ans:2,
    exp:"En la insuficiencia ovárica primaria no hay respuesta folicular propia. La ovodonación con útero receptor (que sí funciona con TRH) tiene tasas de embarazo del 40-60% por transferencia, siendo la mejor opción. FIV con óvulos propios tiene tasas <5% en IOP.",

    ref:"GPC Diagnóstico de la pareja infértil y tratamiento con técnicas de baja complejidad"
  },
  {

    opts:["Salpingoclasia (ligadura, sección y electrocoagulación tubaria)","Oclusión histeroscópica (método Essure)","Histerectomía total abdominal","Ooforectomía bilateral"],
    ans:0,
    exp:"La salpingoclasia (OTB: oclusión tubárica bilateral) por vía laparoscópica o minilaparotomía posoperatoria es el método de esterilización femenina más utilizado en México. Actúa occluyendo la trompa, impidiendo la fecundación. Es un método permanente con tasa de fallo <1%.",

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function init(){
  shuffle(questions);
  currentQ=0;score=0;answers=[];
  catStats={anticon:{c:0,t:0},infert:{c:0,t:0},esteril:{c:0,t:0}};
  const r=document.getElementById('resultsArea');
  r.classList.remove('show');r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion(){
  const qa=questions[currentQ],total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const L=['A','B','C','D'];
  let h=`<div class="question-card">
    <div class="q-category cat-${qa.cat}">${qa.catName}</div>
    <div class="q-number">Pregunta ${currentQ+1} de ${total}</div>
    <div class="q-text">${qa.q}</div>
    <div class="options">`;
  qa.opts.forEach((o,i)=>h+=`<button class="option-btn" onclick="selectAnswer(${i})">
    <span class="option-letter">${L[i]}</span><span>${o}</span></button>`);
  h+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=h;
}

function selectAnswer(idx){
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const ok=idx===qa.ans;
  btns.forEach((b,i)=>{b.classList.add('disabled');b.onclick=null;
    if(i===qa.ans)b.classList.add('correct-answer');
    if(i===idx&&!ok)b.classList.add('wrong-answer');});
  if(!catStats[qa.cat])catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(ok){score++;catStats[qa.cat].c++;}
  if(!examMode){
    fb.className=ok?'feedback correct-fb show':'feedback wrong-fb show';
    fb.innerHTML=ok
      ?`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`
      :`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;
  }
  answers.push({q:qa.q,correct:ok,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,tip:qa.tip,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion(){currentQ++;if(currentQ>=questions.length)showResults();else renderQuestion();}

function showResults(){
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'🏆 ¡Excelente dominio! Listo para el ENARM.':pct>=70?'👏 ¡Muy bien! Repasa las áreas con menor puntaje.':pct>=50?'📚 Aceptable, hay áreas de oportunidad.':'⚠️ Refuerza este tema. Revisa las GPC correspondientes.';
  const cats=[{name:'Anticonceptivos',key:'anticon',color:'#38bdf8'},{name:'Infertilidad',key:'infert',color:'#a78bfa'},{name:'Esterilidad / Técnicas',key:'esteril',color:'#34d399'}];
  let h=`<div class="results-header"><div class="score-big">${pct}%</div><div class="score-label">${score} de ${questions.length} correctas</div><div class="score-msg">${msg}</div></div>
  <div class="chart-section"><div class="chart-title"><span>📊</span> Rendimiento por Categoría</div><div class="bar-chart">`;
  cats.forEach(c=>{const s=catStats[c.key]||{c:0,t:0};const p=s.t>0?Math.round((s.c/s.t)*100):0;if(s.t>0)h+=`<div class="bar-row"><div class="bar-label">${c.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${c.color};">${p}% (${s.c}/${s.t})</div></div></div>`;});
  h+=`</div></div><div class="chart-section"><div class="chart-title"><span>🎯</span> Resumen General</div><div class="donut-wrap">
    <svg class="donut-svg" viewBox="0 0 42 42">
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
      <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
    </svg>
    <div class="donut-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#38bdf8;"></div>Total: ${questions.length}</div>
    </div></div></div>
  <div class="chart-section"><div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{h+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
    <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
    <div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div>
    <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
    <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
  </div>`;});
  h+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const r=document.getElementById('resultsArea');r.innerHTML=h;r.classList.add('show');r.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
init();
</script>
