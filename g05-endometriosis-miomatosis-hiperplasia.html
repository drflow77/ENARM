let examMode=false, currentQ=0, score=0, answers=[], catStats={};

function setMode(m){

const questions = [
  /* ── HIPERPLASIA ENDOMETRIAL ── */
  {
    cat:"hiper", catName:"Hiperplasia Endometrial",
    q:"Mujer de 55 años posmenopáusica con sangrado vaginal. Biopsia endometrial reporta: hiperplasia endometrial compleja CON atipia. ¿Cuál es el riesgo aproximado de progresión a carcinoma endometrial?",
    opts:["1-3%","29%","8-12%","60-80%"],
    ans:1,
    exp:"La hiperplasia endometrial con atipia (ahora clasificada como neoplasia intraepitelial endometrial) tiene un riesgo del ~29% de progresión a carcinoma de endometrio. La hiperplasia sin atipia tiene riesgo de solo 1-3%. Esta distinción es crítica para definir el tratamiento (conservador vs. quirúrgico).",
    tip:"<strong>Hiperplasia CON atipia → 29% riesgo Ca endometrio. Sin atipia → 1-3%. Atipia = cirugía.</strong>",
    ref:"GPC Diagnóstico y tratamiento de la hiperplasia endometrial en mujeres posmenopáusicas 2012"
  },
  {
    cat:"hiper", catName:"Hiperplasia Endometrial",
    q:"¿Cuál es la causa más común de hiperplasia endometrial en mujeres posmenopáusicas?",
    opts:["Hipoestrogenismo relativo posmenopáusico","Hiperprolactinemia crónica","Hiperestrogenismo sin oposición de progesterona","Infección crónica por VPH de alto riesgo"],
    ans:2,
    exp:"La hiperplasia endometrial resulta del hiperestrogenismo sin oposición de progesterona. En posmenopausia las fuentes de estrógenos no opuestos incluyen: obesidad (aromatización periférica de andrógenos suprarrenales), TRH con estrógenos solos en mujer con útero, tumores ováricos productores de estrógenos, y ciertos medicamentos (tamoxifeno).",
    tip:"<strong>Hiperestrogenismo sin progesterona = proliferación endometrial. Obesa + posmenopausia = riesgo alto.</strong>",
    ref:"GPC Diagnóstico y tratamiento de la hiperplasia endometrial en mujeres posmenopáusicas 2012"
  },
  {
    cat:"hiper", catName:"Hiperplasia Endometrial",
    q:"Mujer de 53 años con hiperplasia endometrial SIN atipia, asintomática, posmenopáusica, sin deseo genésico. ¿Cuál es el tratamiento de elección?",
    opts:["Histerectomía total abdominal","Agonistas de GnRH por 6 meses","Progestágenos (acetato de medroxiprogesterona o DIU de levonorgestrel)","Observación con biopsia anual sin tratamiento"],
    ans:2,
    exp:"La hiperplasia sin atipia responde bien a progestágenos que se oponen al efecto estrogénico, inducen diferenciación y reducen la proliferación endometrial. El DIU de levonorgestrel es especialmente efectivo al actuar localmente. Se realizan biopsias de seguimiento a los 3-6 meses. La histerectomía se reserva para resistencia al tratamiento médico.",
    tip:"<strong>Hiperplasia sin atipia = progestágenos (AMP oral o DIU-LNG). Histerectomía si falla o con atipia.</strong>",
    ref:"GPC Diagnóstico y tratamiento de la hiperplasia endometrial en mujeres posmenopáusicas 2012"
  },
  {
    cat:"hiper", catName:"Hiperplasia Endometrial",
    q:"Mujer de 37 años con diagnóstico de hiperplasia endometrial CON atipia que desea conservar su fertilidad. ¿Cuál es el manejo más adecuado según las guías?",
    opts:["Progestágenos en altas dosis con control histeroscópico cada 3-6 meses","Histerectomía inmediata independientemente del deseo genésico","Quimioterapia con tamoxifeno","Radioterapia pélvica conformacional"],
    ans:0,
    exp:"En casos seleccionados (estadio IA grado 1, confinado al endometrio, sin contraindicaciones) con deseo genésico, se puede ofrecer tratamiento conservador con progestágenos en altas dosis (AMP 160-200 mg/día o DIU-LNG) con histeroscopia y biopsia de control. Tras lograr el embarazo se recomienda histerectomía diferida.",
    tip:"<strong>Hiperplasia con atipia + deseo genésico = progestágenos altas dosis + control estricto. TEMPORAL.</strong>",
    ref:"GPC Diagnóstico y tratamiento de la hiperplasia endometrial en mujeres posmenopáusicas 2012"
  },
  {
    cat:"hiper", catName:"Hiperplasia Endometrial",
    q:"¿Cuál de las siguientes NO es una causa de hiperestrogenismo sin oposición que predisponga a hiperplasia endometrial?",
    opts:["TRH combinada con estrógenos + progestágeno en mujer posmenopáusica con útero","SOP con anovulación crónica","Obesidad con IMC >30 (aromatización periférica)","Tamoxifeno en tratamiento de cáncer de mama"],
    ans:0,
    exp:"La TRH combinada (estrógenos + progestágeno) tiene el progestágeno precisamente para PROTEGER el endometrio del efecto proliferativo de los estrógenos. Por eso, la TRH solo con estrógenos (sin progestágeno) en mujer con útero SÍ es factor de riesgo, pero la TRH combinada no. El tamoxifeno actúa como agonista estrogénico en el endometrio.",
    tip:"<strong>TRH combinada (E+P) PROTEGE el endometrio. TRH solo estrógenos en útero intacto = riesgo.</strong>",
    ref:"GPC Diagnóstico y tratamiento de la hiperplasia endometrial en mujeres posmenopáusicas 2012"
  },
  /* ── MIOMATOSIS UTERINA ── */
  {

    q:"Mujer de 34 años con menorragia progresiva y anemia ferropénica (Hb 9.2 g/dL). Ultrasonido transvaginal muestra un nódulo hipoecoico de 3.5 cm que distorsiona la cavidad uterina. ¿Cuál es el diagnóstico?",
    opts:["Adenomiosis difusa","Pólipo endometrial sésil","Leiomioma submucoso (FIGO tipo 0-2)","Cáncer de endometrio precoz"],
    ans:2,
    exp:"El leiomioma submucoso se define por su localización intracavitaria (0: intracavitario pediculado, 1: <50% intramural, 2: ≥50% intramural). Es el tipo más sintomático con mayor tendencia a producir sangrado uterino abundante por interferir con la hemostasia endometrial y la contracción miometrial.",
    tip:"<strong>Nódulo que distorsiona cavidad + menorragia = leiomioma submucoso. El más sintomático.</strong>",

  },
  {
    cat:"mioma", catName:"Miomatosis Uterina",
    q:"Los leiomiomas uterinos son el tumor benigno más frecuente del útero. ¿Cuál de los siguientes enunciados es CORRECTO respecto a su epidemiología?",
    opts:["Son sintomáticos en el 90% de los casos","Los estrógenos y la progesterona estimulan su crecimiento; regresan en la menopausia","La menarquia tardía y la menopausia precoz son factores de riesgo","El tabaquismo es el principal factor de riesgo"],
    ans:1,
    exp:"Los leiomiomas son tumores hormonodependientes que crecen bajo estímulo de estrógenos y progesterona. Son asintomáticos en el 50-80% de los casos. Factores de riesgo: nuliparidad, menarquia temprana, obesidad, raza afroamericana, historia familiar. Regresan espontáneamente en la menopausia al disminuir los estrógenos.",
    tip:"<strong>Miomas = hormonodependientes. Crecen con estrógenos + progesterona. Regresan en menopausia.</strong>",
    ref:"GPC Diagnóstico y tratamiento de miomatosis uterina 2018"
  },
  {

    exp:"La miomectomía es el tratamiento quirúrgico de elección cuando se desea preservar la fertilidad. Puede realizarse por vía histeroscópica (submucosos), laparoscópica o laparotómica según tamaño, número y localización. La EAU está contraindicada en deseo genésico. La ablación endometrial también contraindica el embarazo.",
    tip:"<strong>Deseo genésico + mioma = miomectomía. EAU y ablación = solo en mujeres sin deseo genésico.</strong>",
    ref:"GPC Diagnóstico y tratamiento de miomatosis uterina 2018"
  },
  {
    cat:"mioma", catName:"Miomatosis Uterina",
    q:"¿Cuál es el objetivo del tratamiento con agonistas de GnRH (leuprolide) en la miomatosis uterina previa a cirugía?",
    opts:["Eliminar definitivamente los miomas sin necesidad de cirugía","Inducir la menopausia quirúrgica permanente","Reducir el volumen tumoral (40-60%) y controlar el sangrado para facilitar la cirugía","Tratar la infertilidad asociada a los miomas"],
    ans:2,
    exp:"Los agonistas de GnRH inducen un hipoestrogenismo reversible que reduce el volumen de los miomas hasta 40-60% en 3-6 meses y controla el sangrado (permite recuperar la hemoglobina preoperatoria). Se usan como tratamiento preoperatorio de corto plazo (<6 meses) por sus efectos secundarios (bochornos, pérdida ósea). No curan los miomas.",
    tip:"<strong>Agonistas GnRH = preoperatorio para reducir tamaño y sangrado. No son tratamiento definitivo.</strong>",
    ref:"GPC Diagnóstico y tratamiento de miomatosis uterina 2018"
  },
  {
    cat:"mioma", catName:"Miomatosis Uterina",
    q:"Mujer de 45 años con mioma subseroso de 8 cm en cara anterior del útero, sin sangrado uterino anormal pero con polaquiuria y urgencia miccional. ¿Cuál es la causa de sus síntomas urinarios?",
    opts:["Compresión extrínseca de la vejiga por el mioma subseroso","Infección urinaria por desplazamiento del pH vaginal","Invasión del músculo detrusor por el tejido miomatoso","Efecto hormonal directo del mioma sobre la vejiga"],
    ans:0,
    exp:"Los miomas subserosos (extrauterinos) no producen menorragia (no están en la cavidad), pero su efecto de masa puede comprimir estructuras vecinas. El mioma anterior grande comprime la vejiga → polaquiuria y urgencia. Posteriormente puede comprimir uréteres → hidronefrosis. Los miomas posteriores comprimen el recto.",
    tip:"<strong>Mioma subseroso anterior grande = síntomas vesicales por compresión. No produce menorragia.</strong>",
    ref:"GPC Diagnóstico y tratamiento de miomatosis uterina 2018"
  },
  /* ── ENDOMETRIOSIS ── */
  {
    cat:"endo", catName:"Endometriosis",
    q:"Mujer de 27 años con dismenorrea progresiva severa desde hace 4 años, dispareunia profunda e infertilidad de 18 meses. La exploración bimanual revela útero en retroversión fija y nódulos dolorosos en fondo de saco de Douglas. ¿Cuál es el diagnóstico más probable?",
    opts:["Adenomiosis difusa sin componente externo","EPI crónica con adherencias peritoneales","Síndrome de ovario poliquístico con dismenorrea funcional","Endometriosis pélvica"],
    ans:3,
    exp:"La tríada clásica de endometriosis es: dismenorrea progresiva (empeora con los años, no mejora con AINEs), dispareunia profunda y subfertilidad/infertilidad. Los nódulos en fondo de saco y el útero en retroversión fija (por adherencias) son hallazgos exploratorios típicos de endometriosis profunda infiltrante.",
    tip:"<strong>Tríada endometriosis: dismenorrea progresiva + dispareunia profunda + infertilidad.</strong>",
    ref:"GPC Clínica, diagnóstico y tratamiento de la endometriosis 2023"
  },
  {
    cat:"endo", catName:"Endometriosis",
    q:"¿Cuál es el estándar de oro (gold standard) para el diagnóstico DEFINITIVO de endometriosis?",
    opts:["Resonancia magnética pélvica con contraste","Laparoscopia diagnóstica con biopsia e histopatología","Determinación de CA-125 sérico","Ultrasonido transvaginal de alta resolución"],
    ans:1,
    exp:"La laparoscopia con visualización directa de los implantes y confirmación histopatológica es el gold standard. La RM y el ultrasonido (especialmente para endometriomas y endometriosis profunda) son útiles para el diagnóstico no invasivo, pero no sustituyen la confirmación histológica. El CA-125 es inespecífico.",
    tip:"<strong>Gold standard endometriosis = laparoscopia + biopsia. RM útil pero no definitiva.</strong>",
    ref:"GPC Clínica, diagnóstico y tratamiento de la endometriosis 2023"
  },
  {
    cat:"endo", catName:"Endometriosis",
    q:"¿Cuál es la localización más frecuente de los implantes de endometriosis?",
    opts:["Peritoneo pélvico anterior (vejiga y repliegue vesicouterino)","Ovario (endometrioma o \"quiste de chocolate\")","Rectosigmoides y tabique rectovaginal","Vejiga urinaria y uréteres distales"],
    ans:1,
    exp:"El ovario es la localización más frecuente de endometriosis (25-40% de los casos), donde forma los característicos endometriomas o \"quistes de chocolate\" (contenido hemorrágico oscuro por sangre degradada). La localización peritoneal es la más común en general, pero el ovario es el órgano más frecuentemente afectado.",
    tip:"<strong>Endometriosis: ovario es el órgano más afectado → endometrioma = \"quiste de chocolate\".</strong>",

  },
  {
    cat:"endo", catName:"Endometriosis",
    q:"Mujer de 29 años con endometriosis estadio I-II (mínima-leve) diagnosticada por laparoscopia, sintomática, sin deseo genésico en los próximos 2 años. ¿Cuál es el tratamiento médico de primera línea?",
    opts:["Agonistas de GnRH (leuprolide depot mensual)","Danazol 200 mg oral cada 8 horas","Inhibidores de aromatasa (letrozol)","Anticonceptivos orales combinados continuos o progestágenos"],
    ans:3,
    exp:"Los AOC continuos (sin semana libre para suprimir la menstruación) o los progestágenos (dienogest, AMP, DIU-LNG) son el tratamiento médico de primera línea para endometriosis leve-moderada. Los agonistas de GnRH son segunda línea por sus efectos adversos (pérdida ósea, menopausia química). Danazol está en desuso por androgenicidad.",
    tip:"<strong>Endometriosis leve + sin embarazo = AOC continuos o progestágenos primera línea.</strong>",
    ref:"GPC Clínica, diagnóstico y tratamiento de la endometriosis 2023"
  },
  {
    cat:"endo", catName:"Endometriosis",
    q:"La teoría más aceptada para explicar el origen de la endometriosis es la menstruación retrógrada de Sampson. Sin embargo, ¿qué hallazgo pone en duda que sea la única causa?",
    opts:["La endometriosis solo afecta a mujeres con menstruaciones abundantes","La endometriosis puede encontrarse en pulmón, cicatrices quirúrgicas y incluso en hombres bajo terapia estrogénica","El tejido endometriósico no responde al estímulo hormonal","La endometriosis nunca se asocia con infertilidad"],
    ans:1,
    exp:"La teoría de Sampson (reflujo menstrual retrógrado con implantación peritoneal) explica la mayoría de los casos pélvicos, pero no justifica la endometriosis en sitios distantes como pulmón, cicatrices umbilicales o casos rarísimos en hombres. Para estos se invocan la metaplasia celómica y la diseminación hematógena/linfática como mecanismos complementarios.",

];

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function init(){
  shuffle(questions);
  currentQ=0;score=0;answers=[];
  catStats={hiper:{c:0,t:0},mioma:{c:0,t:0},endo:{c:0,t:0}};
  const r=document.getElementById('resultsArea');
  r.classList.remove('show');r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion(){
  const qa=questions[currentQ],total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const L=['A','B','C','D'];
  let h=`<div class="question-card">
    <div class="q-category cat-${qa.cat}">${qa.catName}</div>
    <div class="q-number">Pregunta ${currentQ+1} de ${total}</div>
    <div class="q-text">${qa.q}</div>
    <div class="options">`;
  qa.opts.forEach((o,i)=>h+=`<button class="option-btn" onclick="selectAnswer(${i})">
    <span class="option-letter">${L[i]}</span><span>${o}</span></button>`);
  h+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=h;
}

function selectAnswer(idx){
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const ok=idx===qa.ans;
  btns.forEach((b,i)=>{b.classList.add('disabled');b.onclick=null;
    if(i===qa.ans)b.classList.add('correct-answer');
    if(i===idx&&!ok)b.classList.add('wrong-answer');});
  if(!catStats[qa.cat])catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(ok){score++;catStats[qa.cat].c++;}
  if(!examMode){
    fb.className=ok?'feedback correct-fb show':'feedback wrong-fb show';
    fb.innerHTML=ok
      ?`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`
      :`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;
  }
  answers.push({q:qa.q,correct:ok,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,tip:qa.tip,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion(){currentQ++;if(currentQ>=questions.length)showResults();else renderQuestion();}

function showResults(){
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'🏆 ¡Excelente dominio! Listo para el ENARM.':pct>=70?'👏 ¡Muy bien! Repasa las áreas con menor puntaje.':pct>=50?'📚 Aceptable, hay áreas de oportunidad.':'⚠️ Refuerza este tema. Revisa las GPC correspondientes.';
  const cats=[{name:'Hiperplasia Endometrial',key:'hiper',color:'#f472b6'},{name:'Miomatosis Uterina',key:'mioma',color:'#fbbf24'},{name:'Endometriosis',key:'endo',color:'#a78bfa'}];
  let h=`<div class="results-header"><div class="score-big">${pct}%</div><div class="score-label">${score} de ${questions.length} correctas</div><div class="score-msg">${msg}</div></div>
  <div class="chart-section"><div class="chart-title"><span>📊</span> Rendimiento por Categoría</div><div class="bar-chart">`;
  cats.forEach(c=>{const s=catStats[c.key]||{c:0,t:0};const p=s.t>0?Math.round((s.c/s.t)*100):0;if(s.t>0)h+=`<div class="bar-row"><div class="bar-label">${c.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${c.color};">${p}% (${s.c}/${s.t})</div></div></div>`;});
  h+=`</div></div><div class="chart-section"><div class="chart-title"><span>🎯</span> Resumen General</div><div class="donut-wrap">
    <svg class="donut-svg" viewBox="0 0 42 42">
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
      <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
    </svg>
    <div class="donut-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#a78bfa;"></div>Total: ${questions.length}</div>
    </div></div></div>
  <div class="chart-section"><div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{h+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
    <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
    <div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div>
    <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
    <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
  </div>`;});
  h+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const r=document.getElementById('resultsArea');r.innerHTML=h;r.classList.add('show');r.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
init();
</script>
