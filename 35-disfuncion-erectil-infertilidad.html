<script>
let examMode = false;
function setMode(mode) {
  examMode = (mode==='examen');
  document.getElementById('btnRepaso').classList.toggle('active',!examMode);
  document.getElementById('btnExamen').classList.toggle('active',examMode);
  init();
}

const questions = [
  {
    cat:"de", catName:"Disfunción Eréctil",
    q:"Hombre de 55 años con DM tipo 2 de 10 años de evolución, HTA y tabaquismo activo, refiere incapacidad para mantener erecciones suficientes para la relación sexual en los últimos 8 meses. ¿Cuál es la causa más probable de su disfunción eréctil?",
    opts:["Psicógena por estrés laboral","Orgánica vasculogénica por daño endotelial","Neurógena por neuropatía autonómica aislada","Hormonal por hipogonadismo primario"],
    ans:1,
    exp:"La disfunción eréctil (DE) orgánica vasculogénica es la causa más frecuente en pacientes con factores de riesgo cardiovascular. La DM, HTA y tabaco dañan el endotelio vascular y reducen la producción de óxido nítrico (NO), que es el principal mediador de la relajación del músculo liso cavernoso. La DM además causa neuropatía autonómica que afecta la inervación parasimpática del pene. La presencia de erecciones matutinas preservadas orienta a etiología psicógena; su ausencia sugiere causa orgánica.",
    tip:"<strong>DE orgánica vs psicógena:</strong> Orgánica: inicio gradual, afecta todas las situaciones (masturbación, matutinas, coito), factores de riesgo CV presentes. Psicógena: inicio súbito, situacional (falla con pareja pero erecciones espontáneas presentes), asociada a ansiedad o evento precipitante. La prueba de tumescencia peneana nocturna (RigiScan) diferencia ambas.",
    ref:"GPC: Diagnóstico y tratamiento de disfunción eréctil. CENETEC."
  },
  {
    cat:"dx_de", catName:"Diagnóstico/FR",
    q:"¿Cuál de los siguientes fármacos es causa reconocida de disfunción eréctil que debe investigarse antes de iniciar tratamiento específico?",
    opts:["Metformina","Tiazidas / beta-bloqueadores / antidepresivos ISRS","Estatinas","Inhibidores de la ECA"],
    ans:1,
    exp:"Varios fármacos de uso frecuente causan DE: diuréticos tiazídicos (espironolactona es el más asociado), beta-bloqueadores no selectivos (disminuyen flujo cavernoso y libido), antidepresivos ISRS (retrasan/inhiben orgasmo y erección), antipsicóticos (hiperprolactinemia), antiandrógenos y finasterida. Antes de iniciar inhibidores de PDE-5, la GPC recomienda revisar la medicación y considerar cambiar fármacos causantes si es posible.",
    tip:"<strong>Fármacos que causan DE — top ENARM:</strong> Espironolactona (antiandrogénico), ISRS (fluoxetina, sertralina), antipsicóticos (risperidona → hiperprolactinemia), beta-bloqueadores (propranolol > cardioselectivos), tiazidas. Los IECA, estatinas y metformina NO causan DE — de hecho mejorar el control metabólico puede mejorar la función eréctil.",
    ref:"GPC: Diagnóstico y tratamiento de disfunción eréctil. CENETEC."
  },
  {
    cat:"dx_de", catName:"Diagnóstico/FR",
    q:"Hombre de 48 años con DE consulta. Niega factores de riesgo cardiovascular. ¿Qué estudios básicos solicita la GPC en la evaluación inicial?",
    opts:["Solo testosterona total sérica","Glucosa, perfil lipídico, testosterona total y PSA en >40 años","Biopsia testicular y cariotipo de entrada","Arteriografía peneana como primer estudio"],
    ans:1,
    exp:"La evaluación inicial de la DE según la GPC incluye: glucosa (descartar DM no diagnosticada), perfil lipídico (dislipidemia), testosterona total matutina (hipogonadismo), y en mayores de 40 años PSA antes de iniciar terapia con testosterona. Si la testosterona total es baja (<300 ng/dL), se confirma con segunda determinación y se agregan LH y FSH para clasificar el hipogonadismo. La arteriografía es estudio de tercera línea para casos quirúrgicos.",
    tip:"<strong>Testosterona en DE:</strong> El hipogonadismo causa DE por reducción del deseo y alteración de la síntesis de NO cavernoso. Solicitar testosterona matutina (pico entre 8-10am). Si baja: repetir + LH/FSH. LH/FSH bajas → hipogonadismo hipogonadotrópico (hipofisario). LH/FSH altas → falla testicular primaria (hipergonadotrópico). Prolactina si LH/FSH bajas para descartar prolactinoma.",
    ref:"GPC: Diagnóstico y tratamiento de disfunción eréctil. CENETEC."
  },
  {
    cat:"tx_de", catName:"Tratamiento DE",
    q:"¿Cuál es el tratamiento farmacológico de primera línea para la disfunción eréctil según la GPC?",
    opts:["Alprostadil intracavernoso","Inhibidores de fosfodiesterasa tipo 5 (sildenafil, tadalafil, vardenafil)","Testosterona exógena en todos los pacientes","Yohimbina oral"],
    ans:1,
    exp:"Los inhibidores de PDE-5 (iPDE-5) son la primera línea de tratamiento para la DE de cualquier etiología. Actúan inhibiendo la degradación del GMPc en el músculo liso cavernoso, potenciando el efecto del NO liberado durante la estimulación sexual. Requieren estimulación sexual para funcionar (no producen erección espontánea). Sildenafil (inicio 30-60 min, duración 4-6h), tadalafil (inicio 30 min, duración hasta 36h — 'fin de semana'), vardenafil y avanafil son las opciones disponibles.",
    tip:"<strong>iPDE-5: contraindicación ABSOLUTA con nitratos.</strong> La combinación produce hipotensión severa potencialmente fatal. Contraindicados también con guanilato ciclasa estimuladores (riociguat). Precaución con alfa-bloqueadores (hipotensión aditiva). El tadalafil diario (5 mg) es útil también para síntomas del tracto urinario inferior por HPB — doble beneficio en el paciente con HPB + DE.",
    ref:"GPC: Diagnóstico y tratamiento de disfunción eréctil. CENETEC."
  },
  {
    cat:"tx_de", catName:"Tratamiento DE",
    q:"Paciente con DE severa no responde a dosis máxima de sildenafil. ¿Cuál es el siguiente escalón terapéutico según la GPC?",
    opts:["Cambiar a tadalafil y esperar 6 meses más","Alprostadil intrauretral (MUSE) o inyección intracavernosa","Prótesis peneana inmediata","Psicoterapia exclusiva"],
    ans:1,
    exp:"El manejo escalonado de la DE es: 1ª línea: iPDE-5 + modificación de factores de riesgo + psicosexología. 2ª línea: alprostadil intrauretral (MUSE: 125-1000 mcg) o inyección intracavernosa de alprostadil (prostaglandina E1) o combinaciones (bimix/trimix). 3ª línea: prótesis peneana inflable o malleable (cuando falla la terapia médica). El alprostadil intracavernoso tiene eficacia de 70-80% incluso en pacientes que no responden a iPDE-5.",
    tip:"<strong>Prótesis peneana: última opción pero alta satisfacción.</strong> La prótesis inflable de 3 piezas tiene 90-95% de satisfacción a largo plazo. Indicación: falla de segunda línea O elección del paciente. Contraindicada en infección activa, coagulopatía no controlada. Una vez implantada, el tejido eréctil se fibrosa — no hay retorno a erección natural.",
    ref:"GPC: Diagnóstico y tratamiento de disfunción eréctil. CENETEC."
  },
  {
    cat:"tx_de", catName:"Tratamiento DE",
    q:"Hombre de 35 años llega a urgencias con erección dolorosa de 5 horas sin estimulación sexual. ¿Cuál es el diagnóstico y el manejo inmediato?",

    ans:1,
    exp:"En la azoospermia, la FSH es la clave diagnóstica. FSH normal o baja con azoospermia sugiere obstrucción del tracto seminal (espermatogénesis conservada pero espermatozoides no llegan al eyaculado) o hipogonadismo hipogonadotrópico. FSH elevada (>2x normal) indica daño testicular primario (azoospermia no obstructiva). Con FSH de 1.2 (normal-baja) se sospecha obstrucción; el USG escrotal busca dilatación epididimaria y el transrectal evalúa vesículas seminales y conductos eyaculadores.",
    tip:"<strong>Azoospermia: algoritmo por FSH.</strong> FSH alta (>10-15 UI/L) → no obstructiva (Sertoli only, Klinefelter, criptorquidia). FSH normal/baja → obstructiva (vasectomía previa, infección, agenesia de conductos deferentes) O hipogonadismo hipogonadotrópico (tratable con gonadotrofinas). La biopsia testicular diferencia definitivamente entre ambas cuando la FSH es ambigua.",

  },
  {
    cat:"esp", catName:"Espermograma/Causas",
    q:"Hombre de 32 años con azoospermia y agenesia bilateral de conductos deferentes (CBAVD). ¿Qué condición sistémica debe descartarse obligatoriamente?",
    opts:["Diabetes mellitus tipo 1","Fibrosis quística (mutaciones CFTR)","Hipertiroidismo","Enfermedad de Crohn"],
    ans:1,
    exp:"La agenesia congénita bilateral de conductos deferentes (CBAVD) es la presentación genitourinaria de la fibrosis quística (FQ). Hasta el 98% de los hombres con FQ tienen CBAVD. Además, 60-70% de hombres con CBAVD aislada (sin FQ clínica) tienen al menos una mutación del gen CFTR. Por esto, todo paciente con CBAVD debe realizarse estudio genético de mutaciones CFTR y evaluación pulmonar. La pareja también debe estudiarse genéticamente antes de técnicas de reproducción asistida.",
    tip:"<strong>CBAVD + CFTR = siempre buscar FQ.</strong> Si el paciente tiene CBAVD y la pareja es portadora de CFTR, el riesgo de FQ en el hijo es 25-50%. En CBAVD: testículos normales, epidididmos palpables, FSH normal, pero ausencia de conductos deferentes al tacto. Los espermatozoides pueden recuperarse del epidídimo (PESA/MESA) para ICSI — tienen función normal.",
    ref:"GPC: Diagnóstico y tratamiento de infertilidad masculina. CENETEC."
  },
  {
    cat:"de", catName:"Disfunción Eréctil",
    q:"¿Cuál es la fisiopatología correcta de la erección normal y el mecanismo de acción de los iPDE-5?",
    opts:["La erección depende de la liberación de acetilcolina que activa canales de Ca²⁺; los iPDE-5 bloquean estos canales","La estimulación libera NO → activa guanilato ciclasa → GMPc → relajación músculo liso cavernoso; iPDE-5 inhiben la degradación del GMPc","La testosterona activa directamente los canales iónicos del músculo liso; iPDE-5 potencian este efecto","La erección es un reflejo simpático puro; los iPDE-5 bloquean los receptores adrenérgicos"],
    ans:1,
    exp:"La erección es un proceso neurovascular mediado por el sistema nervioso parasimpático. La estimulación sexual activa neuronas no adrenérgicas no colinérgicas (NANC) que liberan óxido nítrico (NO) en el tejido cavernoso. El NO activa la guanilato ciclasa soluble → produce GMPc → activa PKG → fosforila canales de K⁺ y Ca²⁺ → relajación del músculo liso → aumento del flujo arterial cavernoso → erección. La PDE-5 degrada el GMPc; los iPDE-5 al inhibirla mantienen niveles altos de GMPc prolongando la erección.",
    tip:"<strong>Eje NO-GMPc-PDE5: el más importante en urología funcional.</strong> Por eso los nitratos (que también elevan GMPc/GMP) están absolutamente contraindicados con iPDE-5 — el GMPc se acumula masivamente causando vasodilatación sistémica severa e hipotensión potencialmente letal. Este mecanismo también explica por qué los iPDE-5 requieren estimulación sexual previa — sin NO no hay GMPc que proteger.",
    ref:"GPC: Diagnóstico y tratamiento de disfunción eréctil. CENETEC."
  },
  {
    cat:"inf", catName:"Infertilidad Masculina",
    q:"Hombre de 25 años con anosmia desde la infancia, testículos pequeños y azoospermia. LH=0.5 UI/L, FSH=0.8 UI/L, testosterona=85 ng/dL. ¿Cuál es el diagnóstico y el tratamiento para lograr fertilidad?",
    opts:["Klinefelter: TESE + ICSI","Síndrome de Kallmann: gonadotrofinas exógenas (hCG + FSH recombinante)","Obstrucción bilateral: vasoepididimostomía","Criptorquidia: orquidopexia tardía"],
    ans:1,
    exp:"El síndrome de Kallmann es un hipogonadismo hipogonadotrópico congénito causado por déficit de GnRH con anosmia asociada (falla en la migración neuronal olfatoria y gonadotrópica). Se presenta con: hipogonadismo (LH y FSH bajas), testosterona baja, azoospermia y anosmia (diagnóstico diferencial clave). A diferencia de otros hipogonadismos, la espermatogénesis puede inducirse con gonadotrofinas exógenas: hCG (estimula LH → testosterona) + FSH recombinante (estimula espermatogénesis), logrando espermatozoides y embarazos en 70-80%.",
    tip:"<strong>Kallmann vs Klinefelter — diferencias clave ENARM:</strong> Kallmann: anosmia + LH/FSH bajas + tratable con gonadotrofinas (espermatogénesis inducible). Klinefelter: ginecomastia + LH/FSH MUY altas + cariotipo 47,XXY + no tratable médicamente (TESE si hay focos de espermatogénesis). La anosmia en un hombre joven con hipogonadismo = Kallmann hasta demostrar lo contrario.",
    ref:"GPC: Diagnóstico y tratamiento de infertilidad masculina. CENETEC."
  },
  {
    cat:"esp", catName:"Espermograma/Causas",
    q:"Pareja con infertilidad de 18 meses. Espermograma: volumen 0.5 mL, pH 6.5, azoospermia. ¿Cuál es la causa más probable?",
    opts:["Azoospermia no obstructiva por falla testicular primaria","Obstrucción/agenesia de vesículas seminales o conductos eyaculadores","Varicocele bilateral severo","Hipogonadismo hipogonadotrópico"],
    ans:1,
    exp:"El patrón de volumen bajo (<1.5 mL) + pH ácido (<7.2) + azoospermia es clásico de obstrucción o agenesia de las vesículas seminales y/o conductos eyaculadores. Las vesículas seminales contribuyen al 70% del volumen seminal y al pH alcalino (fructosa, prostaglandinas). Si están ausentes/bloqueadas: volumen bajo, pH ácido, ausencia de fructosa en análisis seminal. La agenesia de conductos deferentes (CBAVD) da un patrón similar. USG transrectal confirma la anomalía.",
    tip:"<strong>Volumen seminal bajo: diagnóstico diferencial.</strong> <1.5 mL + pH ácido + azoospermia → problema de vesículas seminales/conductos eyaculadores (congénito o infeccioso). <1.5 mL + pH normal + azoospermia → eyaculación retrógrada (analizar orina post-orgasmo) o hipoandrogenismo. Eyaculación retrógrada: antecedente de RTU-P, DM avanzada, simpaticolíticos — se diagnostica con espermatozoides en orina postorgasmo.",

];

let currentQ = 0, score = 0, answers = [];
let catStats = { de:{c:0,t:0}, dx_de:{c:0,t:0}, tx_de:{c:0,t:0}, inf:{c:0,t:0}, esp:{c:0,t:0} };

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function init() {
  shuffle(questions);
  currentQ=0; score=0; answers=[];
  catStats = { de:{c:0,t:0}, dx_de:{c:0,t:0}, tx_de:{c:0,t:0}, inf:{c:0,t:0}, esp:{c:0,t:0} };
  const r=document.getElementById('resultsArea');
  r.classList.remove('show'); r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion() {
  const qa=questions[currentQ], total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const letters=['A','B','C','D'];
  let html=`<div class="question-card"><div class="q-category cat-${qa.cat}">${qa.catName}</div><div class="q-number">Pregunta ${currentQ+1} de ${total}</div><div class="q-text">${qa.q}</div><div class="options">`;
  qa.opts.forEach((opt,i)=>{html+=`<button class="option-btn" onclick="selectAnswer(${i})" data-idx="${i}"><span class="option-letter">${letters[i]}</span><span>${opt}</span></button>`;});
  html+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=html;
}

function selectAnswer(idx) {
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const isCorrect=idx===qa.ans;
  btns.forEach((btn,i)=>{
    btn.classList.add('disabled'); btn.onclick=null;
    if(i===qa.ans) btn.classList.add('correct-answer');
    if(i===idx&&!isCorrect) btn.classList.add('wrong-answer');
  });
  if(!catStats[qa.cat]) catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(isCorrect){score++;catStats[qa.cat].c++;}
  if(!examMode){
    fb.className=isCorrect?'feedback correct-fb show':'feedback wrong-fb show';
    fb.innerHTML=isCorrect
      ?`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`
      :`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;
  }
  answers.push({q:qa.q,correct:isCorrect,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if(currentQ>=questions.length) showResults();
  else renderQuestion();
}

function showResults() {
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'🏆 ¡Excelente dominio de urología funcional!':pct>=70?'👏 ¡Muy bien! Repasa los temas con menor puntaje.':pct>=50?'📚 Aceptable, refuerza las áreas débiles.':'⚠️ Revisa las GPC de DE e infertilidad masculina.';
  const cats=[
    {name:'Disfunción Eréctil',key:'de',color:'#38bdf8'},
    {name:'Diagnóstico/FR',key:'dx_de',color:'#fbbf24'},
    {name:'Tratamiento DE',key:'tx_de',color:'#f472b6'},
    {name:'Infertilidad Masculina',key:'inf',color:'#a78bfa'},
    {name:'Espermograma/Causas',key:'esp',color:'#34d399'},
  ];
  let html=`<div class="results-header"><div class="score-big">${pct}%</div><div class="score-label">${score} de ${questions.length} correctas</div><div class="score-msg">${msg}</div></div>
  <div class="chart-section"><div class="chart-title"><span>📊</span> Rendimiento por Categoría</div><div class="bar-chart">`;
  cats.forEach(cat=>{
    const s=catStats[cat.key]||{c:0,t:0};
    const p=s.t>0?Math.round((s.c/s.t)*100):0;
    html+=`<div class="bar-row"><div class="bar-label">${cat.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${cat.color};">${p}% (${s.c}/${s.t})</div></div></div>`;
  });
  html+=`</div></div><div class="chart-section"><div class="chart-title"><span>🎯</span> Resumen General</div><div class="donut-wrap">
    <svg class="donut-svg" viewBox="0 0 42 42">
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
      <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
    </svg>
    <div class="donut-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#38bdf8;"></div>Total: ${questions.length}</div>
    </div></div></div>
  <div class="chart-section"><div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{
    html+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
      <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
      <div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div>
      <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
      <div style="margin-top:6px;font-size:0.72rem;color:var(--text-dim);opacity:0.6;font-style:italic;">📖 ${a.ref}</div>
    </div>`;
  });
  html+=`</div><button class="retry-btn" onclick="init()">🔄 Repetir Tema</button>`;
  const ra=document.getElementById('resultsArea');
  ra.innerHTML=html; ra.classList.add('show');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function toggleSpec(header) {
  header.classList.toggle('open');
  const list=header.nextElementSibling;
  list.classList.toggle('open');
}

init();
</script>
</body>
</html>
