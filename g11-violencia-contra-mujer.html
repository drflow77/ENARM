<script>
let examMode=false, currentQ=0, score=0, answers=[], catStats={};

function setMode(m){
  examMode=(m==='examen');
  document.getElementById('btnRepaso').classList.toggle('active',!examMode);
  document.getElementById('btnExamen').classList.toggle('active',examMode);
  init();

const questions = [
  /* ── DETECCIÓN Y ATENCIÓN GENERAL ── */
  {
    cat:"det", catName:"Detección y Atención General",
    q:"¿Cuál es la definición de violencia contra la mujer según la GPC 2018 y la NOM-046-SSA2-2005?",
    opts:[
      "Solo la violencia física con lesiones documentables que requieren atención médica de urgencia",
      "Cualquier acción u omisión, basada en el género, que cause daño físico, psicológico, sexual o económico; puede ser perpetrada por el Estado, la comunidad o personas en la vida privada",
      "Exclusivamente la violencia doméstica cometida por la pareja íntima dentro del hogar",
      "Solo la violencia sexual cometida por desconocidos fuera del ámbito familiar"
    ],
    ans:1,
    exp:"La violencia contra la mujer (VCM) es definida por la OMS, la Declaración de Beijing y la NOM-046-SSA2-2005 como cualquier acción u omisión basada en género que cause daño o sufrimiento físico, sexual, psicológico, económico o patrimonial. Puede ser perpetrada en el ámbito público o privado, por la pareja, la familia, la comunidad o el Estado. El médico del primer nivel tiene el deber ético y legal de detectarla, registrarla y atenderla.",
    tip:"VCM = daño físico + psicológico + sexual + económico. Perpetrador: pareja, familia, comunidad o Estado. La VCM no es solo física ni solo doméstica.",
    ref:"GPC Prevención, detección y atención de la violencia contra las mujeres de 12 a 59 años de edad con énfasis en la violencia sexual 2018"
  },
  {
    cat:"det", catName:"Detección y Atención General",
    q:"¿Cuáles son los tipos de violencia reconocidos por la GPC y la NOM-046 que el médico debe saber identificar?",
    opts:[
      "Solo física y sexual; la psicológica no tiene relevancia clínica ni legal",
      "Física, psicológica/emocional, sexual, económica/patrimonial y violencia obstétrica",
      "Física grave (fracturas, quemaduras) y sexual con penetración; los demás tipos no requieren registro médico",
      "Únicamente las formas de violencia que ocurren dentro del matrimonio formal"
    ],
    ans:1,
    exp:"La GPC clasifica la violencia contra la mujer en: (1) Física: golpes, empujones, quemaduras, etc. (2) Psicológica/emocional: insultos, humillaciones, amenazas, control. (3) Sexual: cualquier acto sexual sin consentimiento, incluyendo dentro del matrimonio. (4) Económica/patrimonial: control del dinero, destrucción de bienes. (5) Violencia obstétrica: trato deshumanizante durante embarazo/parto. Todas tienen consecuencias en salud física y mental y deben ser detectadas y registradas.",
    tip:"Tipos de VCM: física, psicológica, sexual, económica, obstétrica. La sexual dentro del matrimonio ES violencia. Todas deben registrarse en el expediente.",
    ref:"GPC Prevención, detección y atención de la violencia contra las mujeres de 12 a 59 años de edad con énfasis en la violencia sexual 2018"
  },
  {
    cat:"det", catName:"Detección y Atención General",
    q:"¿Cuál es el instrumento de tamizaje recomendado por la GPC para detectar violencia de pareja íntima (VPI) en el primer nivel de atención?",
    opts:[
      "Escala de Hamilton para ansiedad aplicada en mujeres con síntomas somáticos inexplicables",
      "AUDIT-C para detección de consumo de alcohol asociado a violencia doméstica",
      "Preguntas directas de tamizaje (WAST, AAS o preguntas del HITS): 'En el último año, ¿su pareja la ha golpeado, pateado, amenazado o asustado?'",
      "Radiografía de tórax y extremidades en busca de fracturas antiguas como único tamizaje objetivo"
    ],
    ans:2,
    exp:"La GPC recomienda el tamizaje universal o dirigido de violencia de pareja íntima usando preguntas directas validadas. Entre los instrumentos más usados: WAST (Woman Abuse Screening Tool), AAS (Abuse Assessment Screen) y HITS ('Hurt, Insult, Threaten, Scream'). La pregunta mínima aceptable es preguntar directamente sobre maltrato. El tamizaje debe realizarse en privacidad, sin el acompañante presente, en idioma comprensible, sin juicios de valor y con garantía de confidencialidad.",
    tip:"Tamizaje VPI: preguntas directas en privado, sin el acompañante. Instrumentos: WAST, AAS, HITS. Universal en primer nivel. No esperar que la paciente lo refiera espontáneamente.",
    ref:"GPC Prevención, detección y atención de la violencia contra las mujeres de 12 a 59 años de edad con énfasis en la violencia sexual 2018"
  },
  {
    cat:"det", catName:"Detección y Atención General",
    q:"¿Cuáles son las manifestaciones clínicas de 'alerta' que deben hacer sospechar violencia de pareja íntima en una consulta médica?",
    opts:[
      "Solo las lesiones físicas visibles como equimosis, laceraciones o fracturas con mecanismo incongruente",
      "Lesiones con explicación incongruente, consultas frecuentes por síntomas somáticos inexplicables, ansiedad/depresión, aislamiento social, cefalea crónica, dolor pélvico crónico, embarazos no deseados o ITS de repetición",
      "Hipertensión arterial de difícil control como único marcador validado de violencia doméstica",
      "Obesidad mórbida y diabetes tipo 2 como indicadores indirectos de violencia crónica"
    ],
    ans:1,
    exp:"Las señales de alerta de violencia de pareja íntima incluyen: lesiones físicas con historia incongruente (patrón en guante/calcetín, afectando zonas cubiertas por ropa); síntomas somáticos inexplicables (cefalea, fibromialgia, síndrome de intestino irritable, dolor pélvico crónico); trastornos del estado de ánimo (depresión, ansiedad, TEPT); ITS de repetición o embarazos no deseados frecuentes; aislamiento social; pareja controladora o que no deja hablar a la mujer en consulta; consultas frecuentes o tardías sin seguimiento.",
    tip:"Alertas VPI: historia incongruente, síntomas somáticos crónicos, depresión/ansiedad, ITS repetición, pareja controladora. El médico debe preguntar activamente, no esperar.",
    ref:"GPC Prevención, detección y atención de la violencia contra las mujeres de 12 a 59 años de edad con énfasis en la violencia sexual 2018"
  },
  {
    cat:"det", catName:"Detección y Atención General",
    q:"¿Cuáles son las obligaciones del médico ante la detección de violencia contra la mujer según la GPC y la NOM-046?",
    opts:[
      "Solamente registrar en el expediente y esperar a que la paciente decida qué hacer, sin intervención activa",
      "Atención médica inmediata de lesiones; registro detallado en expediente; informar sobre derechos y recursos disponibles; elaborar parte médico; referir a servicios de apoyo; notificación a autoridades si hay riesgo de vida o menores involucrados",
      "Contactar a la pareja o familiares del agresor para mediar en el conflicto familiar",
      "Internar de forma obligatoria a toda mujer que reporte violencia doméstica para su protección"
    ],
    ans:1,
    exp:"El médico ante VCM debe: (1) Brindar atención médica inmediata; (2) Documentar detalladamente en expediente (descripción de lesiones, declaración de la paciente entre comillas, fotografías si aplica); (3) Elaborar parte médico para las autoridades; (4) Informar a la mujer sobre sus derechos, opciones y recursos disponibles (líneas de crisis, albergues, ministerio público); (5) Referir a trabajo social, psicología y servicios legales; (6) En casos de riesgo de vida o víctimas menores de edad, la notificación a autoridades es obligatoria.",
    tip:"Médico ante VCM: atender + documentar + parte médico + informar derechos + referir. Notificación obligatoria si riesgo de vida o menores involucrados. No mediar con el agresor.",
    ref:"GPC Prevención, detección y atención de la violencia contra las mujeres de 12 a 59 años de edad con énfasis en la violencia sexual 2018"

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function init(){
  shuffle(questions);
  currentQ=0;score=0;answers=[];
  catStats={det:{c:0,t:0},sex:{c:0,t:0},leg:{c:0,t:0}};
  const r=document.getElementById('resultsArea');
  r.classList.remove('show');r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion(){
  const qa=questions[currentQ],total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const L=['A','B','C','D'];
  let h=`<div class="question-card">
    <div class="q-category cat-${qa.cat}">${qa.catName}</div>
    <div class="q-number">Pregunta ${currentQ+1} de ${total}</div>
    <div class="q-text">${qa.q}</div>
    <div class="options">`;
  qa.opts.forEach((o,i)=>h+=`<button class="option-btn" onclick="selectAnswer(${i})">
    <span class="option-letter">${L[i]}</span><span>${o}</span></button>`);
  h+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=h;
}

function selectAnswer(idx){
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const ok=idx===qa.ans;
  btns.forEach((b,i)=>{b.classList.add('disabled');b.onclick=null;
    if(i===qa.ans)b.classList.add('correct-answer');
    if(i===idx&&!ok)b.classList.add('wrong-answer');});
  if(!catStats[qa.cat])catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(ok){score++;catStats[qa.cat].c++;}
  if(!examMode){
    fb.className=ok?'feedback correct-fb show':'feedback wrong-fb show';
    fb.innerHTML=ok
      ?`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`
      :`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;
  }
  answers.push({q:qa.q,correct:ok,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,tip:qa.tip,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion(){currentQ++;if(currentQ>=questions.length)showResults();else renderQuestion();}

function showResults(){
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'🏆 ¡Excelente dominio! Listo para el ENARM.':pct>=70?'👏 ¡Muy bien! Repasa las áreas con menor puntaje.':pct>=50?'📚 Aceptable, hay áreas de oportunidad.':'⚠️ Refuerza este tema. Revisa las GPC correspondientes.';
  const cats=[
    {name:'Detección y Atención General',key:'det',color:'#fb923c'},
    {name:'Violencia Sexual',key:'sex',color:'#f87171'},
    {name:'Marco Legal y Situaciones Especiales',key:'leg',color:'#a78bfa'}
  ];
  let h=`<div class="results-header"><div class="score-big">${pct}%</div><div class="score-label">${score} de ${questions.length} correctas</div><div class="score-msg">${msg}</div></div>
  <div class="chart-section"><div class="chart-title"><span>📊</span> Rendimiento por Categoría</div><div class="bar-chart">`;
  cats.forEach(c=>{const s=catStats[c.key]||{c:0,t:0};const p=s.t>0?Math.round((s.c/s.t)*100):0;if(s.t>0)h+=`<div class="bar-row"><div class="bar-label">${c.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${c.color};">${p}% (${s.c}/${s.t})</div></div></div>`;});
  h+=`</div></div><div class="chart-section"><div class="chart-title"><span>🎯</span> Resumen General</div><div class="donut-wrap">
    <svg class="donut-svg" viewBox="0 0 42 42">
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#fb923c" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
      <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
    </svg>
    <div class="donut-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#fb923c;"></div>Correctas: ${score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#8896b3;"></div>Total: ${questions.length}</div>
    </div></div></div>
  <div class="chart-section"><div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{h+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
    <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
    <div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div>
    <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
    <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
  </div>`;});
  h+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const r=document.getElementById('resultsArea');r.innerHTML=h;r.classList.add('show');r.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
init();
</script>
