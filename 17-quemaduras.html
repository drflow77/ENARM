<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quemaduras — ENARM · MediCode Solutions</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0e1a; --surface: #111827; --surface2: #1a2235; --surface3: #212d45;
    --border: #2a3a5c; --text: #e8ecf4; --text-dim: #8896b3;
    --accent: #38bdf8; --accent-glow: rgba(56,189,248,0.15);
    --correct: #34d399; --correct-bg: rgba(52,211,153,0.1); --correct-border: rgba(52,211,153,0.4);
    --wrong: #f87171; --wrong-bg: rgba(248,113,113,0.1); --wrong-border: rgba(248,113,113,0.4);
    --gold: #fbbf24; --purple: #a78bfa; --pink: #f472b6; --teal: #2dd4bf;
    --sidebar-w: 280px; --radius: 14px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; }

  .sidebar {
    width:var(--sidebar-w); min-height:100vh; background:var(--surface);
    border-right:1px solid var(--border); display:flex; flex-direction:column;
    position:fixed; left:0; top:0; bottom:0; overflow-y:auto; z-index:100; transition:transform 0.3s;
  }
  .sidebar-logo { padding:24px 20px 16px; border-bottom:1px solid var(--border); }
  .logo-badge { display:inline-flex; align-items:center; gap:8px; background:linear-gradient(135deg,var(--accent),var(--purple)); padding:6px 14px; border-radius:100px; font-size:0.75rem; font-weight:800; color:var(--bg); letter-spacing:0.5px; text-transform:uppercase; margin-bottom:10px; }
  .sidebar-logo h2 { font-size:1.1rem; font-weight:800; background:linear-gradient(135deg,var(--text),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .sidebar-logo p { font-size:0.72rem; color:var(--text-dim); margin-top:2px; }
  .back-btn { display:flex; align-items:center; gap:8px; padding:14px 20px; color:var(--text-dim); font-size:0.8rem; text-decoration:none; border-bottom:1px solid var(--border); transition:color 0.2s; }
  .back-btn:hover { color:var(--accent); }
  .sidebar-nav { flex:1; padding:12px 0 24px; }
  .specialty-header { display:flex; align-items:center; justify-content:space-between; padding:10px 16px 10px 20px; cursor:pointer; transition:background 0.2s; user-select:none; }
  .specialty-header:hover { background:var(--surface2); }
  .specialty-name { display:flex; align-items:center; gap:10px; font-size:0.78rem; font-weight:700; text-transform:uppercase; letter-spacing:0.6px; }
  .specialty-icon { width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:0.9rem; flex-shrink:0; }
  .chevron { font-size:0.65rem; color:var(--text-dim); transition:transform 0.3s; }
  .specialty-header.open .chevron { transform:rotate(90deg); }
  .topics-list { display:none; padding:4px 0 8px; }
  .topics-list.open { display:block; }
  .topic-link { display:flex; align-items:center; gap:10px; padding:8px 16px 8px 56px; font-size:0.78rem; color:var(--text-dim); text-decoration:none; transition:all 0.2s; border-left:2px solid transparent; line-height:1.4; }
  .topic-link:hover { color:var(--text); background:var(--surface3); }
  .topic-link.active { color:var(--accent); border-left-color:var(--accent); background:var(--accent-glow); font-weight:600; }
  .topic-link.coming-soon { opacity:0.4; cursor:not-allowed; pointer-events:none; }
  .topic-num { font-family:'JetBrains Mono',monospace; font-size:0.68rem; color:var(--text-dim); min-width:20px; }
  .badge-soon { margin-left:auto; background:rgba(136,150,179,0.1); color:var(--text-dim); font-size:0.62rem; font-weight:600; padding:2px 7px; border-radius:100px; }
  .star-tag { margin-left:auto; font-size:0.7rem; }

  .main { margin-left:var(--sidebar-w); flex:1; display:flex; flex-direction:column; }
  .container { max-width:760px; margin:0 auto; padding:20px 16px 40px; width:100%; }

  .mode-bar { display:flex; align-items:center; gap:10px; margin:24px 0 20px; background:var(--surface); border:1px solid var(--border); border-radius:100px; padding:6px; width:fit-content; }
  .mode-btn { padding:8px 20px; border-radius:100px; border:none; cursor:pointer; font-family:inherit; font-size:0.82rem; font-weight:600; transition:all 0.2s; color:var(--text-dim); background:transparent; }
  .mode-btn.active { background:linear-gradient(135deg,var(--accent),var(--purple)); color:var(--bg); }

  .header { text-align:center; padding:40px 20px 24px; position:relative; overflow:hidden; }
  .header::before { content:''; position:absolute; top:-60%; left:50%; transform:translateX(-50%); width:600px; height:600px; background:radial-gradient(circle,rgba(56,189,248,0.08) 0%,transparent 70%); pointer-events:none; }
  .header-badge { display:inline-flex; align-items:center; gap:8px; background:var(--surface2); border:1px solid var(--border); padding:6px 16px; border-radius:100px; font-size:0.78rem; color:var(--accent); font-weight:600; letter-spacing:0.5px; text-transform:uppercase; margin-bottom:16px; }
  .header h1 { font-size:clamp(1.6rem,5vw,2.2rem); font-weight:800; background:linear-gradient(135deg,var(--text) 0%,var(--accent) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; }
  .header p { color:var(--text-dim); font-size:0.95rem; max-width:500px; margin:0 auto; }

  .progress-wrap { background:var(--surface); border:1px solid var(--border); border-radius:100px; padding:12px 20px; margin:20px 0 28px; display:flex; align-items:center; gap:14px; }
  .progress-bar-bg { flex:1; height:8px; background:var(--surface3); border-radius:100px; overflow:hidden; }
  .progress-bar-fill { height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--purple)); border-radius:100px; transition:width 0.5s ease; }
  .progress-text { font-size:0.82rem; font-weight:600; color:var(--text-dim); white-space:nowrap; font-family:'JetBrains Mono',monospace; }

  .question-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:28px 24px; margin-bottom:20px; animation:slideIn 0.4s ease; position:relative; overflow:hidden; }
  .question-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--gold),var(--accent),var(--purple)); }
  @keyframes slideIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  .q-category { display:inline-flex; align-items:center; gap:6px; font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; padding:4px 12px; border-radius:100px; margin-bottom:14px; }
  .cat-clas { background:rgba(251,191,36,0.12); color:var(--gold); }
  .cat-ext  { background:rgba(56,189,248,0.12); color:var(--accent); }
  .cat-man  { background:rgba(167,139,250,0.12); color:var(--purple); }
  .cat-liq  { background:rgba(244,114,182,0.12); color:var(--pink); }
  .cat-comp { background:rgba(52,211,153,0.12);  color:var(--correct); }

  .q-number { font-family:'JetBrains Mono',monospace; font-size:0.78rem; color:var(--text-dim); margin-bottom:10px; }
  .q-text { font-size:1.05rem; font-weight:600; line-height:1.55; margin-bottom:20px; color:var(--text); }

  .options { display:flex; flex-direction:column; gap:10px; }
  .option-btn { display:flex; align-items:flex-start; gap:12px; padding:14px 16px; background:var(--surface2); border:1.5px solid var(--border); border-radius:12px; cursor:pointer; transition:all 0.2s; text-align:left; font-size:0.92rem; color:var(--text); font-family:inherit; line-height:1.5; width:100%; }
  .option-btn:hover:not(.disabled) { border-color:var(--accent); background:var(--accent-glow); transform:translateX(4px); }
  .option-letter { display:flex; align-items:center; justify-content:center; min-width:30px; height:30px; border-radius:8px; background:var(--surface3); font-weight:700; font-size:0.82rem; color:var(--accent); flex-shrink:0; }
  .option-btn.correct-answer { border-color:var(--correct-border); background:var(--correct-bg); }
  .option-btn.correct-answer .option-letter { background:var(--correct); color:var(--bg); }
  .option-btn.wrong-answer { border-color:var(--wrong-border); background:var(--wrong-bg); }
  .option-btn.wrong-answer .option-letter { background:var(--wrong); color:var(--bg); }
  .option-btn.disabled { cursor:default; }
  .option-btn.disabled:hover { transform:none; }

  .feedback { margin-top:18px; padding:18px; border-radius:12px; font-size:0.88rem; line-height:1.65; animation:fadeIn 0.3s ease; display:none; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .feedback.show { display:block; }
  .feedback.correct-fb { background:var(--correct-bg); border:1px solid var(--correct-border); color:var(--correct); }
  .feedback.wrong-fb { background:var(--wrong-bg); border:1px solid var(--wrong-border); color:#fca5a5; }
  .feedback-title { font-weight:700; font-size:0.95rem; margin-bottom:6px; display:flex; align-items:center; gap:8px; }
  .feedback .tip { margin-top:10px; padding-top:10px; border-top:1px solid rgba(255,255,255,0.08); color:var(--text-dim); font-size:0.82rem; }
  .feedback .tip strong { color:var(--gold); }
  .feedback .ref { margin-top:8px; font-size:0.75rem; color:var(--text-dim); opacity:0.7; font-style:italic; }

  .next-btn { display:none; margin:20px auto 0; padding:12px 32px; background:linear-gradient(135deg,var(--accent),var(--purple)); color:var(--bg); border:none; border-radius:100px; font-family:inherit; font-size:0.92rem; font-weight:700; cursor:pointer; transition:all 0.2s; }
  .next-btn:hover { transform:scale(1.05); box-shadow:0 4px 24px var(--accent-glow); }
  .next-btn.show { display:block; }

  .results { display:none; animation:slideIn 0.5s ease; }
  .results.show { display:block; }
  .results-header { text-align:center; padding:30px 20px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:20px; position:relative; overflow:hidden; }
  .results-header::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,var(--correct),var(--accent),var(--purple),var(--pink)); }
  .score-big { font-size:3.5rem; font-weight:800; background:linear-gradient(135deg,var(--correct),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .score-label { font-size:1.1rem; color:var(--text-dim); margin-top:4px; }
  .score-msg { margin-top:12px; font-size:0.95rem; color:var(--text); font-weight:500; }
  .chart-section { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px 20px; margin-bottom:20px; }
  .chart-title { font-size:0.95rem; font-weight:700; margin-bottom:18px; display:flex; align-items:center; gap:8px; }
  .bar-chart { display:flex; flex-direction:column; gap:14px; }
  .bar-row { display:flex; align-items:center; gap:12px; }
  .bar-label { width:130px; font-size:0.78rem; font-weight:600; text-align:right; color:var(--text-dim); flex-shrink:0; }
  .bar-track { flex:1; height:28px; background:var(--surface3); border-radius:8px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:8px; transition:width 1s ease; display:flex; align-items:center; padding-left:10px; font-size:0.75rem; font-weight:700; color:var(--bg); min-width:fit-content; }
  .donut-wrap { display:flex; align-items:center; justify-content:center; gap:30px; flex-wrap:wrap; }
  .donut-svg { width:160px; height:160px; }
  .donut-legend { display:flex; flex-direction:column; gap:10px; }
  .legend-item { display:flex; align-items:center; gap:10px; font-size:0.84rem; }
  .legend-dot { width:12px; height:12px; border-radius:4px; flex-shrink:0; }
  .review-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:12px; }
  .review-card.review-correct { border-left:4px solid var(--correct); }
  .review-card.review-wrong { border-left:4px solid var(--wrong); }
  .review-q { font-size:0.88rem; font-weight:600; margin-bottom:8px; }
  .review-answer { font-size:0.82rem; color:var(--text-dim); line-height:1.5; }
  .review-answer strong { color:var(--correct); }
  .review-answer em { color:var(--wrong); font-style:normal; }
  .retry-btn { display:block; margin:28px auto; padding:14px 40px; background:linear-gradient(135deg,var(--accent),var(--purple)); color:var(--bg); border:none; border-radius:100px; font-family:inherit; font-size:1rem; font-weight:700; cursor:pointer; transition:all 0.2s; }
  .retry-btn:hover { transform:scale(1.05); }
  .hamburger { display:none; position:fixed; top:16px; left:16px; z-index:200; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px; cursor:pointer; font-size:1.2rem; }
  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:90; }
  .footer { text-align:center; padding:20px; color:var(--text-dim); font-size:0.72rem; opacity:0.5; }

  @media(max-width:768px) {
    .sidebar { transform:translateX(-100%); }
    .sidebar.open { transform:translateX(0); }
    .main { margin-left:0; }
    .hamburger { display:flex; align-items:center; justify-content:center; }
    .overlay.show { display:block; }
    .container { padding:12px 10px 30px; }
    .question-card { padding:20px 16px; }
    .bar-label { width:90px; font-size:0.72rem; }
    .mode-bar { margin:16px auto; }
  }
</style>
  <script src="sidebar.js"></script>
</head>
<body>

<button class="hamburger" onclick="toggleSidebar()">☰</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar"></aside>

<main class="main">
<div class="container">

  <div class="header">
    <div class="header-badge"><span>🔪</span> ENARM · Cirugía General · Tema 17</div>
    <h1>Quemaduras</h1>
    <p>Clasificación · Regla de los 9 · Fórmula de Parkland · Gran quemado</p>
  </div>

  <div style="display:flex;justify-content:center;">
    <div class="mode-bar">
      <button class="mode-btn active" id="btnRepaso" onclick="setMode('repaso')">📖 Modo Repaso</button>
      <button class="mode-btn" id="btnExamen" onclick="setMode('examen')">⏱️ Modo Examen</button>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>
    <div class="progress-text" id="progressText">0 / 15</div>
  </div>

  <div id="quizArea"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Siguiente →</button>
  <div class="results" id="resultsArea"></div>

</div>
<div class="footer">MediCode Solutions · Dr. David Flores Carrasco · ENARM 2025–2026 · ⚠️ Fines exclusivamente educativos</div>
</main>

<script>
let examMode = false;

function setMode(mode) {
  examMode = (mode === 'examen');
  document.getElementById('btnRepaso').classList.toggle('active', !examMode);
  document.getElementById('btnExamen').classList.toggle('active', examMode);
  init();
}

const questions = [
  {
    cat:"clas", catName:"Clasificación/Profundidad",
    q:"Paciente que sufrió quemadura por exposición solar presenta eritema difuso en espalda y brazos, sin formación de ampollas ni pérdida de piel, con dolor intenso al tacto. ¿Cuál es la clasificación correcta de esta quemadura y cómo se considera en el cálculo de la superficie corporal quemada (SCQ)?",
    opts:["Quemadura de 2° grado superficial; se incluye en el cálculo de SCQ","Quemadura de 1er grado/epidérmica; NO se incluye en el cálculo de SCQ","Quemadura de 2° grado profundo; se incluye en el cálculo de SCQ","Quemadura de 3er grado; siempre se incluye en el cálculo de SCQ"],
    ans:1,
    exp:"La quemadura de 1er grado (epidérmica) afecta únicamente la epidermis, se presenta con eritema sin ampollas y es dolorosa. Un ejemplo clásico es la quemadura solar. La GPC establece de forma explícita que las quemaduras de 1er grado NO se incluyen en el cálculo de la SCQ porque no representan pérdida de barrera cutánea significativa ni requieren reposición de líquidos. Solo se suman al cálculo las quemaduras de 2° y 3er grado.",
    tip:"<strong>Regla clave:</strong> 1er grado = eritema sin ampollas = NO cuenta en SCQ. Para el ENARM, si el caso menciona eritema simple (como quemadura solar), descarta esa área del cálculo. Recuerda: la fórmula de Parkland y los criterios de gran quemado usan únicamente la SCQ de 2° y 3er grado.",
    ref:"GPC: Diagnóstico y tratamiento del paciente gran quemado. SSA-046-08. 2009."
  },
  {
    cat:"clas", catName:"Clasificación/Profundidad",
    q:"Un mecánico de 35 años presenta una quemadura en el antebrazo derecho con base rosada brillante, ampollas íntegras, muy dolorosa al tacto y que blanquea a la presión. Cura espontáneamente en 14 a 21 días sin necesidad de injerto. ¿Cuál es la clasificación de esta quemadura?",
    opts:["Quemadura de 1er grado / epidérmica","Quemadura de 2° grado superficial / dérmica superficial","Quemadura de 2° grado profundo / dérmica profunda","Quemadura de 3er grado / subdérmica"],
    ans:1,
    exp:"La quemadura de 2° grado superficial (dérmica superficial) afecta epidermis y dermis papilar. Sus características son: formación de ampollas, base rosada brillante, dolorosa (terminaciones nerviosas intactas), blanquea a la presión y cura espontáneamente en 14 a 21 días sin requerir injerto. Esto la diferencia de la dérmica profunda, que tiene base pálida, es poco dolorosa y generalmente requiere injerto.",
    tip:"<strong>Diferencia clave 2° superficial vs profundo:</strong> Superficial = rosada + dolorosa + cura sola (14-21 días). Profundo = base pálida + poco dolorosa + requiere injerto. El color de la base y el dolor son los dos parámetros más importantes para diferenciarlas en el ENARM.",
    ref:"GPC: Diagnóstico y tratamiento del paciente gran quemado. SSA-046-08. 2009."
  },
  {
    cat:"clas", catName:"Clasificación/Profundidad",
    q:"Paciente con quemadura que muestra piel blanca/gris de aspecto acartonado, indolora al pinchazo con aguja, sin sangrado al lesionarla. ¿Cuál es el grado de esta quemadura y cuál es su manejo quirúrgico obligado?",
    opts:["2° grado profundo; puede curar sin injerto con curaciones avanzadas","3er grado / subdérmica; siempre requiere injerto de piel","1er grado; no requiere ningún manejo quirúrgico","2° grado superficial; cura espontáneamente en 21 días"],
    ans:1,
    exp:"La quemadura de 3er grado (subdérmica) destruye toda la dermis. Sus hallazgos característicos son: aspecto blanco/gris/negro acartonado (escara), INDOLORA (destrucción de terminaciones nerviosas), no sangra al pinchazo y no blanquea a la presión. La GPC establece que SIEMPRE requiere injerto de piel porque no existe tejido dérmico viable para la reepitelización espontánea.",
    tip:"<strong>Trío diagnóstico de 3er grado:</strong> Acartonada + Indolora + No sangra al pinchazo. La anestesia (ausencia de dolor) es el signo más confiable: el paciente no siente nada porque no hay terminaciones nerviosas. Si el paciente dice que no le duele una quemadura de aspecto grave, sospechar 3er grado. Siempre injerto.",
    ref:"GPC: Diagnóstico y tratamiento del paciente gran quemado. SSA-046-08. 2009."
  },
  {
    cat:"clas", catName:"Clasificación/Profundidad",
    q:"¿Cuál de las siguientes quemaduras corresponde a una quemadura de 4° grado?",
    opts:["Quemadura que afecta epidermis y dermis con ampollas dolorosas","Quemadura con escara blanca indolora que destruye toda la dermis","Quemadura que carboniza la piel con exposición de músculo, tendón o hueso","Quemadura epidérmica con eritema sin ampollas"],
    ans:2,
    exp:"La quemadura de 4° grado implica carbonización de la piel con exposición de estructuras profundas: músculo, tendón, periostio o hueso. Es la forma más grave de quemadura y siempre requiere manejo quirúrgico complejo, que puede incluir amputación. Representan el extremo de las quemaduras subdérmicas.",
    tip:"<strong>Progresión por grados:</strong> 1° = epidermis (eritema), 2° superficial = dermis papilar (ampollas rosadas), 2° profundo = dermis reticular (base pálida), 3° = toda la dermis (escara), 4° = estructuras profundas (carbonización + músculo/hueso expuesto). Para el ENARM, recuerda que 3° y 4° siempre requieren injerto.",
    ref:"GPC: Diagnóstico y tratamiento del paciente gran quemado. SSA-046-08. 2009."
  },
  {
    cat:"ext", catName:"Extensión/Cálculo SCQ",
    q:"Adulto de 70 kg que sufrió quemaduras de 2° grado en todo el tronco anterior y en ambos brazos completos. Usando la Regla de los 9 de Wallace, ¿cuál es el porcentaje de SCQ para calcular la reposición de líquidos?",
    opts:["27% de SCQ","36% de SCQ","45% de SCQ","18% de SCQ"],
    ans:1,
    exp:"Según la Regla de los 9 de Wallace en adultos: tronco anterior = 18%, cada brazo completo = 9% (total dos brazos = 18%). Sumando: 18% (tronco anterior) + 18% (dos brazos) = 36% de SCQ. Esta regla asigna: cabeza y cuello = 9%, cada brazo = 9%, tronco anterior = 18%, tronco posterior = 18%, cada pierna = 18%, genitales = 1% (total = 100%).",
    tip:"<strong>Regla de los 9 en adultos — memorización:</strong> 9% = cabeza, cada brazo. 18% = tronco anterior, tronco posterior, cada pierna. 1% = genitales. Total = 100%. Truco: los brazos y cabeza son 9%, las piernas y tronco son 18% (el doble). En quemaduras irregulares usa la palma del paciente = 1% SCQ.",
    ref:"GPC: Diagnóstico y tratamiento del paciente gran quemado. SSA-046-08. 2009."
  },
  {
    cat:"ext", catName:"Extensión/Cálculo SCQ",
    q:"Al evaluar a un lactante de 8 meses con quemaduras extensas, ¿por qué NO se utiliza la Regla de los 9 de Wallace y qué herramienta es más adecuada?",

  },
  {
    cat:"man", catName:"Manejo Inicial",
    q:"Paciente con quemadura circunferencial de 3er grado en el antebrazo derecho presenta ausencia de pulso distal, parestesias y dolor intenso con la extensión pasiva de los dedos. ¿Cuál es el procedimiento de urgencia indicado?",
    opts:["Fasciotomía de urgencia del compartimento anterior del antebrazo","Escarotomía inmediata para liberar la constricción circunferencial","Elevación del miembro y anticoagulación sistémica con heparina","Amputación de urgencia del antebrazo"],
    ans:1,
    exp:"La escarotomía está indicada en quemaduras circunferenciales de extremidades cuando existe compromiso circulatorio distal: ausencia de pulso, palidez, parestesias y dolor con movimiento pasivo (datos de síndrome compartimental incipiente). La escara de 3er grado es rígida y no se expande con el edema, comprimiendo los vasos y nervios. La escarotomía libera la constricción. Se diferencia de la fasciotomía en que corta solo la escara, no la fascia (aunque a veces se requieren ambas). También aplica para quemaduras circunferenciales de tórax con restricción ventilatoria.",

    tip:"<strong>Infección en quemados:</strong> Primeras 48h → S. aureus predomina. Después de 48-72h → Pseudomonas aeruginosa es el más frecuente. Tratamiento tópico estándar: sulfadiazina de plata 1%. Contraindicada en neonatos y embarazadas (kerníctero). Alternativa: nitrofurazona, mafenida. La infección es la principal causa de muerte tardía en quemados.",
    ref:"GPC: Diagnóstico y tratamiento del paciente gran quemado. SSA-046-08. 2009."
  },

    opts:["Índice de Baux = Peso (kg) + %SCQ; valor >100 indica mortalidad >90%","Índice de Baux = Edad (años) + %SCQ; valor >120 indica mortalidad >90%","Índice de Baux = Frecuencia cardiaca + %SCQ de 3er grado; valor >150 indica mortalidad >90%","Índice de Baux = Temperatura + %SCQ; valor >140 indica mortalidad >90%"],

    exp:"El Índice de Baux = Edad (en años) + %SCQ (suma de 2° y 3er grado). Es una herramienta pronóstica simple y rápida. Un índice de Baux >120 se asocia con mortalidad superior al 90%. La GPC lo menciona como parámetro de pronóstico. Ejemplo: paciente de 80 años con 50% de SCQ → Baux = 130, pronóstico muy grave. Paciente de 30 años con 60% SCQ → Baux = 90, pronóstico grave pero con mayor posibilidad de supervivencia.",

  },
  {
    cat:"comp", catName:"Complicaciones/Gran quemado",

    opts:["El porcentaje del 15% supera el umbral de 10% en niños para ser gran quemado","Solo la quemadura de cara y manos, independientemente del porcentaje, son criterio de gran quemado en niños","El hecho de ser menor de 5 años con cualquier quemadura de 2° grado es criterio de gran quemado","Solo la SCQ >20% en cualquier niño define gran quemado pediátrico"],
    ans:1,
    exp:"En este caso existen DOS criterios de gran quemado presentes simultáneamente: 1) SCQ >10% en niños (este paciente tiene 15%), y 2) Quemaduras en zonas especiales (cara y manos). Las quemaduras de cara, manos, pies, genitales, periné y articulaciones mayores son criterio de gran quemado independientemente del porcentaje, por el impacto funcional y estético que generan. La GPC pediátrica es explícita en que cualquiera de estos criterios por sí solo justifica referencia a unidad de quemados.",
    tip:"<strong>Gran quemado pediátrico — criterios clave:</strong> SCQ >10% (vs >20% en adultos), >10% de 3er grado, zonas especiales (cara/manos/pies/genitales/periné/articulaciones), circunferencial, eléctrica, química, inhalación. Recuerda: el umbral de SCQ en niños es LA MITAD que en adultos. Cara y manos siempre = gran quemado sin importar el porcentaje.",

];

let currentQ = 0, score = 0, answers = [];
let catStats = { clas:{c:0,t:0}, ext:{c:0,t:0}, man:{c:0,t:0}, liq:{c:0,t:0}, comp:{c:0,t:0} };

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function init() {
  shuffle(questions);
  currentQ=0; score=0; answers=[];
  catStats = { clas:{c:0,t:0}, ext:{c:0,t:0}, man:{c:0,t:0}, liq:{c:0,t:0}, comp:{c:0,t:0} };
  const r=document.getElementById('resultsArea');
  r.classList.remove('show'); r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion() {
  const qa=questions[currentQ], total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const letters=['A','B','C','D'];
  let html=`<div class="question-card">
    <div class="q-category cat-${qa.cat}">${qa.catName}</div>
    <div class="q-number">Pregunta ${currentQ+1} de ${total}</div>
    <div class="q-text">${qa.q}</div>
    <div class="options">`;
  qa.opts.forEach((opt,i)=>{
    html+=`<button class="option-btn" onclick="selectAnswer(${i})" data-idx="${i}">
      <span class="option-letter">${letters[i]}</span><span>${opt}</span></button>`;
  });
  html+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=html;
}

function selectAnswer(idx) {
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const isCorrect=idx===qa.ans;
  btns.forEach((btn,i)=>{
    btn.classList.add('disabled'); btn.onclick=null;
    if(i===qa.ans) btn.classList.add('correct-answer');
    if(i===idx&&!isCorrect) btn.classList.add('wrong-answer');
  });
  if(!catStats[qa.cat]) catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(isCorrect){score++;catStats[qa.cat].c++;}
  if(!examMode){
    fb.className=isCorrect?'feedback correct-fb show':'feedback wrong-fb show';
    fb.innerHTML=isCorrect
      ?`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`
      :`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;
  }
  answers.push({q:qa.q,correct:isCorrect,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if(currentQ>=questions.length) showResults();
  else renderQuestion();
}

function showResults() {
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'🏆 ¡Dominio excelente de Quemaduras!':pct>=70?'👏 ¡Muy bien! Repasa los temas con menor puntaje.':pct>=50?'📚 Aceptable, refuerza las áreas débiles.':'⚠️ Revisa las GPC de gran quemado y quemado pediátrico.';
  const cats=[
    {name:'Clasificación',key:'clas',color:'#fbbf24'},
    {name:'Extensión/SCQ',key:'ext',color:'#38bdf8'},
    {name:'Manejo Inicial',key:'man',color:'#a78bfa'},
    {name:'Reposición Líq.',key:'liq',color:'#f472b6'},
    {name:'Complicaciones',key:'comp',color:'#34d399'},
  ];
  let html=`<div class="results-header">
    <div class="score-big">${pct}%</div>
    <div class="score-label">${score} de ${questions.length} correctas</div>
    <div class="score-msg">${msg}</div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📊</span> Rendimiento por Categoría</div>
    <div class="bar-chart">`;
  cats.forEach(cat=>{
    const s=catStats[cat.key]||{c:0,t:0};
    const p=s.t>0?Math.round((s.c/s.t)*100):0;
    html+=`<div class="bar-row"><div class="bar-label">${cat.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${cat.color};">${p}% (${s.c}/${s.t})</div></div></div>`;
  });
  html+=`</div></div>
  <div class="chart-section">
    <div class="chart-title"><span>🎯</span> Resumen General</div>
    <div class="donut-wrap">
      <svg class="donut-svg" viewBox="0 0 42 42">
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
        <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
      </svg>
      <div class="donut-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#38bdf8;"></div>Total: ${questions.length}</div>
      </div>
    </div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{
    html+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
      <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
      <div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div>
      <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
      <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
    </div>`;
  });
  html+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const res=document.getElementById('resultsArea');
  res.innerHTML=html; res.classList.add('show');
  res.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(header){header.classList.toggle('open');header.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}

init();
</script>
</body>
</html>
