  .option-btn.wrong-answer{border-color:var(--wrong-border);background:var(--wrong-bg);}

  .next-btn{display:none;margin:20px auto 0;padding:12px 32px;background:linear-gradient(135deg,#34d399,#f87171);color:var(--bg);border:none;border-radius:100px;font-family:inherit;font-size:0.92rem;font-weight:700;cursor:pointer;transition:all 0.2s;}

  .chart-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;}

  .bar-chart{display:flex;flex-direction:column;gap:12px;}

  .donut-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
  .donut-svg{width:100px;height:100px;flex-shrink:0;}
  .donut-legend{display:flex;flex-direction:column;gap:8px;}
  .legend-item{display:flex;align-items:center;gap:8px;font-size:0.82rem;color:var(--text-dim);}
  .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .review-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;}
  .review-card.review-correct{border-color:var(--correct-border);}

  .retry-btn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#34d399,#f87171);border:none;border-radius:12px;color:var(--bg);font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;margin-top:20px;transition:all 0.2s;}
  .retry-btn:hover{filter:brightness(1.1);}

  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:90;}
  .overlay.show{display:block;}
  .hamburger{display:none;position:fixed;top:14px;left:14px;z-index:200;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 10px;cursor:pointer;font-size:1.1rem;}
  .footer{text-align:center;padding:16px;font-size:0.72rem;color:var(--text-dim);border-top:1px solid var(--border);opacity:0.6;}

  @media(max-width:900px){
    .sidebar{transform:translateX(-100%);}
    .sidebar.open{transform:translateX(0);}

  }
</style>

<script>
let examMode=false, currentQ=0, score=0, answers=[], catStats={};

function setMode(m){
  examMode=(m==='examen');
  document.getElementById('btnRepaso').classList.toggle('active',!examMode);
  document.getElementById('btnExamen').classList.toggle('active',examMode);
  init();
}

const questions = [
  /* ── ENTIDADES BENIGNAS ── */
  {
    cat:"ben", catName:"Entidades Benignas",
    q:"¿Cuál es la patología mamaria benigna más frecuente en mujeres en edad reproductiva?",
    opts:["Fibroadenoma","Papiloma intraductal","Enfermedad fibroquística (mastopatía fibroquística)","Lipoma mamario"],
    ans:2,
    exp:"La enfermedad fibroquística (mastopatía fibroquística) es la patología mamaria benigna más frecuente en mujeres en edad reproductiva, afectando hasta el 50% de las mujeres entre 20 y 50 años. Se caracteriza por la presencia de quistes, fibrosis y adenosis. El fibroadenoma es la neoplasia benigna más frecuente, pero la enfermedad fibroquística es la patología benigna en general más común.",
    tip:"Más frecuente en general: enfermedad fibroquística. Neoplasia benigna más frecuente: fibroadenoma. Diferencia clave ENARM.",
    ref:"GPC Patología mamaria benigna en primer y segundo nivel de atención 2009"
  },
  {
    cat:"ben", catName:"Entidades Benignas",
    q:"Mujer de 22 años consulta por nódulo mamario único, bien delimitado, móvil, de consistencia elástica, no doloroso, de 2 cm, sin cambios con el ciclo menstrual. ¿Cuál es el diagnóstico más probable?",
    opts:["Quiste mamario simple","Carcinoma medular de mama","Absceso mamario crónico","Fibroadenoma"],
    ans:3,
    exp:"El fibroadenoma es la neoplasia benigna más frecuente de la mama, típica de mujeres jóvenes (15-35 años). Sus características clásicas son: nódulo único, bien delimitado, móvil ('ratón mamario'), consistencia elástica o gomosa, indoloro y que no cambia con el ciclo menstrual. Histológicamente tiene componentes epitelial y estromal. El diagnóstico se confirma con ultrasonido y biopsia.",
    tip:"Fibroadenoma = nódulo móvil + bien delimitado + mujer joven + indoloro = 'ratón mamario'. Biopsia confirma. No maligniza significativamente.",
    ref:"GPC Patología mamaria benigna en primer y segundo nivel de atención 2009"
  },
  {
    cat:"ben", catName:"Entidades Benignas",
    q:"¿Cuál es la causa más frecuente de descarga unilateral por pezón de tipo serosa o hemática en mujeres no embarazadas?",
    opts:["Carcinoma ductal in situ","Papiloma intraductal","Enfermedad fibroquística con ectasia ductal","Prolactinoma hipofisario"],
    ans:1,
    exp:"El papiloma intraductal es la causa más frecuente de descarga serosa o hemática unilateral por pezón en mujeres no embarazadas, especialmente entre los 35-55 años. Se localiza en los conductos galactóforos principales (retroareolares). La descarga es espontánea, unilateral y uniorificial. El diagnóstico se apoya con ductografía o galactografía. Requiere escisión quirúrgica para descartar malignidad asociada.",
    tip:"Descarga unilateral hemática/serosa por pezón = papiloma intraductal hasta demostrar lo contrario. Galactografía + escisión.",
    ref:"GPC Patología mamaria benigna en primer y segundo nivel de atención 2009"
  },
  {
    cat:"ben", catName:"Entidades Benignas",
    q:"Mujer de 28 años, lactando, presenta eritema, calor, edema y dolor en cuadrante superoexterno de mama derecha con fiebre de 38.5°C. El cultivo de leche materna reporta Staphylococcus aureus. ¿Cuál es el manejo inicial correcto?",
    opts:["Suspender la lactancia materna inmediatamente y aplicar vendaje compresivo","Drenaje quirúrgico inmediato sin antibióticos previos","Antibiótico (dicloxacilina oral) + continuar lactancia materna + aplicación de calor local","Solo analgésicos y AINES; la mastitis puerperal es autolimitada"],
    ans:2,
    exp:"La mastitis puerperal infecciosa se trata con antibiótico anti-estafilocócico (dicloxacilina 500 mg c/6h por 10-14 días en México) o cefalexina. Es fundamental NO suspender la lactancia materna: el vaciamiento frecuente previene la progresión a absceso. Aplicar calor local favorece el drenaje. Si no hay mejoría en 48-72 horas, sospechar absceso y realizar ultrasonido. S. aureus es el agente más frecuente.",
    tip:"Mastitis puerperal: dicloxacilina + NO suspender lactancia. Suspender lactancia aumenta riesgo de absceso. S. aureus = agente más frecuente.",
    ref:"GPC Patología mamaria benigna en primer y segundo nivel de atención 2009"
  },
  {
    cat:"ben", catName:"Entidades Benignas",
    q:"¿Cuál es el manejo del absceso mamario puerperal confirmado por ultrasonido?",
    opts:["Solo antibióticos IV por 7 días sin drenaje","Drenaje (aspiración con aguja gruesa guiada por ultrasonido o incisión quirúrgica) + antibióticos","Mastectomía simple para eliminar el foco infeccioso","Suspender lactancia + radioterapia paliativa"],
    ans:1,
    exp:"El absceso mamario establecido requiere drenaje obligatorio además de antibióticos. El método preferido actualmente es la aspiración percutánea con aguja gruesa (14-16 G) guiada por ultrasonido, que puede repetirse si reaparece el líquido; es menos deformante que la incisión. La incisión y drenaje quirúrgico se reserva para abscesos grandes o con mala respuesta. Los antibióticos solos son insuficientes.",

    ref:"GPC Patología mamaria benigna en primer y segundo nivel de atención 2009"
  },
  /* ── DIAGNÓSTICO ── */

    q:"¿Cuál es el sistema de clasificación estándar para reportar hallazgos de imagen mamaria y guiar el manejo clínico?",
    opts:["Sistema TNM oncológico de la AJCC","Sistema BI-CAD de estadificación ecográfica","Clasificación de Nottingham modificada","BIRADS (Breast Imaging Reporting and Data System) del ACR"],
    ans:3,
    exp:"El sistema BIRADS (ACR) clasifica los hallazgos mamarios del 0 al 6: BIRADS 0 = estudio incompleto (requiere imágenes adicionales); BIRADS 1 = negativo; BIRADS 2 = hallazgo benigno; BIRADS 3 = probablemente benigno (seguimiento a 6 meses, <2% malignidad); BIRADS 4 = sospechoso (biopsia, 2-95%); BIRADS 5 = altamente sugestivo de malignidad (>95%); BIRADS 6 = malignidad confirmada por biopsia.",

  },

    ans:0,
    exp:"En mujeres menores de 35 años, el ultrasonido mamario es el método de imagen de primera elección debido a que el tejido mamario es denso en este grupo etario, lo que reduce la sensibilidad de la mastografía. El ultrasonido distingue perfectamente lesiones sólidas de quísticas y no emite radiación. La mastografía es de elección en mujeres ≥40 años o como tamizaje. En menores de 35 años con alta sospecha de malignidad, ambos métodos son complementarios.",

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function init(){
  shuffle(questions);
  currentQ=0;score=0;answers=[];
  catStats={ben:{c:0,t:0},diag:{c:0,t:0},trat:{c:0,t:0}};
  const r=document.getElementById('resultsArea');
  r.classList.remove('show');r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion(){
  const qa=questions[currentQ],total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const L=['A','B','C','D'];
  let h=`<div class="question-card">
    <div class="q-category cat-${qa.cat}">${qa.catName}</div>
    <div class="q-number">Pregunta ${currentQ+1} de ${total}</div>
    <div class="q-text">${qa.q}</div>
    <div class="options">`;
  qa.opts.forEach((o,i)=>h+=`<button class="option-btn" onclick="selectAnswer(${i})">
    <span class="option-letter">${L[i]}</span><span>${o}</span></button>`);
  h+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=h;
}

function selectAnswer(idx){
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const ok=idx===qa.ans;
  btns.forEach((b,i)=>{b.classList.add('disabled');b.onclick=null;
    if(i===qa.ans)b.classList.add('correct-answer');
    if(i===idx&&!ok)b.classList.add('wrong-answer');});
  if(!catStats[qa.cat])catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(ok){score++;catStats[qa.cat].c++;}
  if(!examMode){
    fb.className=ok?'feedback correct-fb show':'feedback wrong-fb show';
    fb.innerHTML=ok
      ?`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`
      :`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;
  }
  answers.push({q:qa.q,correct:ok,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,tip:qa.tip,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion(){currentQ++;if(currentQ>=questions.length)showResults();else renderQuestion();}

function showResults(){
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'🏆 ¡Excelente dominio! Listo para el ENARM.':pct>=70?'👏 ¡Muy bien! Repasa las áreas con menor puntaje.':pct>=50?'📚 Aceptable, hay áreas de oportunidad.':'⚠️ Refuerza este tema. Revisa las GPC correspondientes.';
  const cats=[
    {name:'Entidades Benignas',key:'ben',color:'#34d399'},
    {name:'Diagnóstico y Clasificación',key:'diag',color:'#a78bfa'},
    {name:'Tratamiento y Seguimiento',key:'trat',color:'#f87171'}
  ];
  let h=`<div class="results-header"><div class="score-big">${pct}%</div><div class="score-label">${score} de ${questions.length} correctas</div><div class="score-msg">${msg}</div></div>
  <div class="chart-section"><div class="chart-title"><span>📊</span> Rendimiento por Categoría</div><div class="bar-chart">`;
  cats.forEach(c=>{const s=catStats[c.key]||{c:0,t:0};const p=s.t>0?Math.round((s.c/s.t)*100):0;if(s.t>0)h+=`<div class="bar-row"><div class="bar-label">${c.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${c.color};">${p}% (${s.c}/${s.t})</div></div></div>`;});
  h+=`</div></div><div class="chart-section"><div class="chart-title"><span>🎯</span> Resumen General</div><div class="donut-wrap">
    <svg class="donut-svg" viewBox="0 0 42 42">
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
      <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
    </svg>
    <div class="donut-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Total: ${questions.length}</div>
    </div></div></div>
  <div class="chart-section"><div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{h+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
    <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
    <div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div>
    <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
    <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
  </div>`;});
  h+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const r=document.getElementById('resultsArea');r.innerHTML=h;r.classList.add('show');r.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
init();
</script>
