<!DOCTYPE html>

<head>

<title>ATLS 2 — ENARM · MediCode Solutions</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0e1a; --surface: #111827; --surface2: #1a2235; --surface3: #212d45;
    --border: #2a3a5c; --text: #e8ecf4; --text-dim: #8896b3;

    --correct: #34d399; --correct-bg: rgba(52,211,153,0.1); --correct-border: rgba(52,211,153,0.4);
    --wrong: #f87171; --wrong-bg: rgba(248,113,113,0.1); --wrong-border: rgba(248,113,113,0.4);
    --gold: #fbbf24; --purple: #a78bfa; --pink: #f472b6; --teal: #2dd4bf;
    --sidebar-w: 280px; --radius: 14px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; }

  .sidebar {
    width:var(--sidebar-w); min-height:100vh; background:var(--surface);
    border-right:1px solid var(--border); display:flex; flex-direction:column;
    position:fixed; left:0; top:0; bottom:0; overflow-y:auto; z-index:100; transition:transform 0.3s;
  }
  .sidebar-logo { padding:24px 20px 16px; border-bottom:1px solid var(--border); }
  .logo-badge { display:inline-flex; align-items:center; gap:8px; background:linear-gradient(135deg,var(--accent),var(--purple)); padding:6px 14px; border-radius:100px; font-size:0.75rem; font-weight:800; color:var(--bg); letter-spacing:0.5px; text-transform:uppercase; margin-bottom:10px; }
  .sidebar-logo h2 { font-size:1.1rem; font-weight:800; background:linear-gradient(135deg,var(--text),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .sidebar-logo p { font-size:0.72rem; color:var(--text-dim); margin-top:2px; }
  .back-btn { display:flex; align-items:center; gap:8px; padding:14px 20px; color:var(--text-dim); font-size:0.8rem; text-decoration:none; border-bottom:1px solid var(--border); transition:color 0.2s; }
  .back-btn:hover { color:var(--accent); }
  .sidebar-nav { flex:1; padding:12px 0 24px; }
  .specialty-header { display:flex; align-items:center; justify-content:space-between; padding:10px 16px 10px 20px; cursor:pointer; transition:background 0.2s; user-select:none; }
  .specialty-header:hover { background:var(--surface2); }
  .specialty-name { display:flex; align-items:center; gap:10px; font-size:0.78rem; font-weight:700; text-transform:uppercase; letter-spacing:0.6px; }
  .specialty-icon { width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:0.9rem; flex-shrink:0; }
  .chevron { font-size:0.65rem; color:var(--text-dim); transition:transform 0.3s; }
  .specialty-header.open .chevron { transform:rotate(90deg); }
  .topics-list { display:none; padding:4px 0 8px; }
  .topics-list.open { display:block; }
  .topic-link { display:flex; align-items:center; gap:10px; padding:8px 16px 8px 56px; font-size:0.78rem; color:var(--text-dim); text-decoration:none; transition:all 0.2s; border-left:2px solid transparent; line-height:1.4; }
  .topic-link:hover { color:var(--text); background:var(--surface3); }
  .topic-link.active { color:var(--accent); border-left-color:var(--accent); background:var(--accent-glow); font-weight:600; }
  .topic-link.coming-soon { opacity:0.4; cursor:not-allowed; pointer-events:none; }
  .topic-num { font-family:'JetBrains Mono',monospace; font-size:0.68rem; color:var(--text-dim); min-width:20px; }
  .badge-soon { margin-left:auto; background:rgba(136,150,179,0.1); color:var(--text-dim); font-size:0.62rem; font-weight:600; padding:2px 7px; border-radius:100px; }
  .star-tag { margin-left:auto; font-size:0.7rem; }

  .main { margin-left:var(--sidebar-w); flex:1; display:flex; flex-direction:column; }
  .container { max-width:760px; margin:0 auto; padding:20px 16px 40px; width:100%; }

  .mode-bar { display:flex; align-items:center; gap:10px; margin:24px 0 20px; background:var(--surface); border:1px solid var(--border); border-radius:100px; padding:6px; width:fit-content; }
  .mode-btn { padding:8px 20px; border-radius:100px; border:none; cursor:pointer; font-family:inherit; font-size:0.82rem; font-weight:600; transition:all 0.2s; color:var(--text-dim); background:transparent; }
  .mode-btn.active { background:linear-gradient(135deg,var(--accent),var(--purple)); color:var(--bg); }

  .header { text-align:center; padding:40px 20px 24px; position:relative; overflow:hidden; }
  .header::before { content:''; position:absolute; top:-60%; left:50%; transform:translateX(-50%); width:600px; height:600px; background:radial-gradient(circle,rgba(56,189,248,0.08) 0%,transparent 70%); pointer-events:none; }
  .header-badge { display:inline-flex; align-items:center; gap:8px; background:var(--surface2); border:1px solid var(--border); padding:6px 16px; border-radius:100px; font-size:0.78rem; color:var(--accent); font-weight:600; letter-spacing:0.5px; text-transform:uppercase; margin-bottom:16px; }
  .header h1 { font-size:clamp(1.6rem,5vw,2.2rem); font-weight:800; background:linear-gradient(135deg,var(--text) 0%,var(--accent) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; }
  .header p { color:var(--text-dim); font-size:0.95rem; max-width:500px; margin:0 auto; }

  .progress-wrap { background:var(--surface); border:1px solid var(--border); border-radius:100px; padding:12px 20px; margin:20px 0 28px; display:flex; align-items:center; gap:14px; }
  .progress-bar-bg { flex:1; height:8px; background:var(--surface3); border-radius:100px; overflow:hidden; }
  .progress-bar-fill { height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--purple)); border-radius:100px; transition:width 0.5s ease; }
  .progress-text { font-size:0.82rem; font-weight:600; color:var(--text-dim); white-space:nowrap; font-family:'JetBrains Mono',monospace; }

  .question-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:28px 24px; margin-bottom:20px; animation:slideIn 0.4s ease; position:relative; overflow:hidden; }
  .question-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--gold),var(--accent),var(--purple)); }
  @keyframes slideIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  .q-category { display:inline-flex; align-items:center; gap:6px; font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; padding:4px 12px; border-radius:100px; margin-bottom:14px; }
  .cat-abd  { background:rgba(251,191,36,0.12); color:var(--gold); }
  .cat-tce  { background:rgba(56,189,248,0.12); color:var(--accent); }
  .cat-col  { background:rgba(167,139,250,0.12); color:var(--purple); }
  .cat-pel  { background:rgba(244,114,182,0.12); color:var(--pink); }
  .cat-eval { background:rgba(52,211,153,0.12); color:var(--correct); }

  .q-number { font-family:'JetBrains Mono',monospace; font-size:0.78rem; color:var(--text-dim); margin-bottom:10px; }
  .q-text { font-size:1.05rem; font-weight:600; line-height:1.55; margin-bottom:20px; color:var(--text); }

  .options { display:flex; flex-direction:column; gap:10px; }
  .option-btn { display:flex; align-items:flex-start; gap:12px; padding:14px 16px; background:var(--surface2); border:1.5px solid var(--border); border-radius:12px; cursor:pointer; transition:all 0.2s; text-align:left; font-size:0.92rem; color:var(--text); font-family:inherit; line-height:1.5; width:100%; }
  .option-btn:hover:not(.disabled) { border-color:var(--accent); background:var(--accent-glow); transform:translateX(4px); }
  .option-letter { display:flex; align-items:center; justify-content:center; min-width:30px; height:30px; border-radius:8px; background:var(--surface3); font-weight:700; font-size:0.82rem; color:var(--accent); flex-shrink:0; }
  .option-btn.correct-answer { border-color:var(--correct-border); background:var(--correct-bg); }
  .option-btn.correct-answer .option-letter { background:var(--correct); color:var(--bg); }
  .option-btn.wrong-answer { border-color:var(--wrong-border); background:var(--wrong-bg); }
  .option-btn.wrong-answer .option-letter { background:var(--wrong); color:var(--bg); }
  .option-btn.disabled { cursor:default; }
  .option-btn.disabled:hover { transform:none; }

  .feedback { margin-top:18px; padding:18px; border-radius:12px; font-size:0.88rem; line-height:1.65; animation:fadeIn 0.3s ease; display:none; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .feedback.show { display:block; }
  .feedback.correct-fb { background:var(--correct-bg); border:1px solid var(--correct-border); color:var(--correct); }
  .feedback.wrong-fb { background:var(--wrong-bg); border:1px solid var(--wrong-border); color:#fca5a5; }
  .feedback-title { font-weight:700; font-size:0.95rem; margin-bottom:6px; display:flex; align-items:center; gap:8px; }
  .feedback .tip { margin-top:10px; padding-top:10px; border-top:1px solid rgba(255,255,255,0.08); color:var(--text-dim); font-size:0.82rem; }
  .feedback .tip strong { color:var(--gold); }
  .feedback .ref { margin-top:8px; font-size:0.75rem; color:var(--text-dim); opacity:0.7; font-style:italic; }

  .next-btn { display:none; margin:20px auto 0; padding:12px 32px; background:linear-gradient(135deg,var(--accent),var(--purple)); color:var(--bg); border:none; border-radius:100px; font-family:inherit; font-size:0.92rem; font-weight:700; cursor:pointer; transition:all 0.2s; }
  .next-btn:hover { transform:scale(1.05); box-shadow:0 4px 24px var(--accent-glow); }
  .next-btn.show { display:block; }

  .results { display:none; animation:slideIn 0.5s ease; }
  .results.show { display:block; }
  .results-header { text-align:center; padding:30px 20px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:20px; position:relative; overflow:hidden; }
  .results-header::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,var(--correct),var(--accent),var(--purple),var(--pink)); }
  .score-big { font-size:3.5rem; font-weight:800; background:linear-gradient(135deg,var(--correct),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .score-label { font-size:1.1rem; color:var(--text-dim); margin-top:4px; }
  .score-msg { margin-top:12px; font-size:0.95rem; color:var(--text); font-weight:500; }
  .chart-section { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px 20px; margin-bottom:20px; }
  .chart-title { font-size:0.95rem; font-weight:700; margin-bottom:18px; display:flex; align-items:center; gap:8px; }
  .bar-chart { display:flex; flex-direction:column; gap:14px; }
  .bar-row { display:flex; align-items:center; gap:12px; }
  .bar-label { width:130px; font-size:0.78rem; font-weight:600; text-align:right; color:var(--text-dim); flex-shrink:0; }
  .bar-track { flex:1; height:28px; background:var(--surface3); border-radius:8px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:8px; transition:width 1s ease; display:flex; align-items:center; padding-left:10px; font-size:0.75rem; font-weight:700; color:var(--bg); min-width:fit-content; }
  .donut-wrap { display:flex; align-items:center; justify-content:center; gap:30px; flex-wrap:wrap; }
  .donut-svg { width:160px; height:160px; }
  .donut-legend { display:flex; flex-direction:column; gap:10px; }
  .legend-item { display:flex; align-items:center; gap:10px; font-size:0.84rem; }
  .legend-dot { width:12px; height:12px; border-radius:4px; flex-shrink:0; }
  .review-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:12px; }
  .review-card.review-correct { border-left:4px solid var(--correct); }
  .review-card.review-wrong { border-left:4px solid var(--wrong); }
  .review-q { font-size:0.88rem; font-weight:600; margin-bottom:8px; }
  .review-answer { font-size:0.82rem; color:var(--text-dim); line-height:1.5; }
  .review-answer strong { color:var(--correct); }
  .review-answer em { color:var(--wrong); font-style:normal; }
  .retry-btn { display:block; margin:28px auto; padding:14px 40px; background:linear-gradient(135deg,var(--accent),var(--purple)); color:var(--bg); border:none; border-radius:100px; font-family:inherit; font-size:1rem; font-weight:700; cursor:pointer; transition:all 0.2s; }
  .retry-btn:hover { transform:scale(1.05); }
  .hamburger { display:none; position:fixed; top:16px; left:16px; z-index:200; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px; cursor:pointer; font-size:1.2rem; }
  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:90; }
  .footer { text-align:center; padding:20px; color:var(--text-dim); font-size:0.72rem; opacity:0.5; }

  @media(max-width:768px) {
    .sidebar { transform:translateX(-100%); }
    .sidebar.open { transform:translateX(0); }
    .main { margin-left:0; }
    .hamburger { display:flex; align-items:center; justify-content:center; }
    .overlay.show { display:block; }
    .container { padding:12px 10px 30px; }
    .question-card { padding:20px 16px; }
    .bar-label { width:90px; font-size:0.72rem; }
    .mode-bar { margin:16px auto; }
  }
</style>

<body>

<button class="hamburger" onclick="toggleSidebar()">☰</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar"></aside>

<main class="main">
<div class="container">

  <div class="header">
    <div class="header-badge"><span>🔪</span> ENARM · Cirugía General · Tema 19</div>
    <h1>ATLS 2 — Soporte Vital Avanzado en Trauma</h1>
    <p>Trauma abdominal · TCE · Trauma de columna · Trauma pélvico</p>
  </div>

  <div style="display:flex;justify-content:center;">
    <div class="mode-bar">
      <button class="mode-btn active" id="btnRepaso" onclick="setMode('repaso')">📖 Modo Repaso</button>
      <button class="mode-btn" id="btnExamen" onclick="setMode('examen')">⏱️ Modo Examen</button>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>
    <div class="progress-text" id="progressText">0 / 15</div>
  </div>

  <div id="quizArea"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Siguiente →</button>
  <div class="results" id="resultsArea"></div>

</div>
<div class="footer">MediCode Solutions · Dr. David Flores Carrasco · ENARM 2025–2026 · ⚠️ Fines exclusivamente educativos</div>

<script>
let examMode = false;

function setMode(mode) {
  examMode = (mode === 'examen');
  document.getElementById('btnRepaso').classList.toggle('active', !examMode);
  document.getElementById('btnExamen').classList.toggle('active', examMode);
  init();
}

const questions = [
  {
    cat:"abd", catName:"Trauma Abdominal",
    q:"Paciente masculino de 28 años llega al servicio de urgencias tras accidente vehicular de alta energía. TA 80/50 mmHg, FC 128 lpm, FR 24 rpm. Se realiza FAST que muestra líquido libre en espacio de Morrison y pelvis. ¿Cuál es la conducta inmediata más adecuada?",
    opts:["Tomografía computarizada de abdomen y pelvis con contraste","Lavado peritoneal diagnóstico","Laparotomía exploratoria de urgencia","Reanimación con cristaloides y repetir FAST en 30 minutos"],
    ans:2,
    exp:"En un paciente hemodinámicamente inestable (TA <90 mmHg, FC >120 lpm) con FAST positivo (líquido libre intraabdominal), la indicación es laparotomía exploratoria de urgencia inmediata. La TC está contraindicada en inestabilidad hemodinámica porque demora el tratamiento definitivo. El ATLS 10ma edición establece que FAST positivo + inestabilidad hemodinámica = laparotomía sin necesidad de estudios adicionales.",
    tip:"<strong>Regla de oro en trauma abdominal:</strong> FAST (+) + inestabilidad hemodinámica = Laparotomía. FAST (+) + estabilidad hemodinámica = TC de abdomen/pelvis. FAST (-) + inestabilidad = buscar otra fuente de sangrado (pelvis, tórax, retroperitoneo). La TC es para pacientes ESTABLES.",
    ref:"ATLS 10ma edición. American College of Surgeons. 2018. Capítulo 5: Trauma Abdominal."
  },
  {
    cat:"abd", catName:"Trauma Abdominal",
    q:"¿Cuáles son las 4 ventanas ecográficas que evalúa el examen FAST (Focused Assessment with Sonography for Trauma)?",
    opts:["Hepática, esplénica, renal bilateral","Pericárdica, perihepática, perisplécnica y pélvica","Pericárdica, aórtica, mesentérica y pélvica","Pleural bilateral, pericárdica y hepática"],
    ans:1,
    exp:"El examen FAST evalúa 4 ventanas: (1) Pericárdica — subxifoidea o paraesternal, detecta hemopericardio; (2) Perihepática/espacio de Morrison — entre hígado y riñón derecho, el espacio más declive en decúbito supino; (3) Perisplécnica — entre bazo y riñón izquierdo (espacio esplenorrenal); (4) Pélvica/espacio de Douglas — detrás de vejiga y útero. El FAST extendido (eFAST) añade la evaluación pleural bilateral para neumotórax.",
    tip:"<strong>Mnemotecnia FAST:</strong> Pericardio → Morrison → Esplenorrenal → Douglas. El espacio de Morrison (hepatorrenal) es el más sensible para detectar sangrado intraabdominal en decúbito supino — acumula líquido primero. FAST positivo = líquido libre visible en cualquier ventana.",
    ref:"ATLS 10ma edición. American College of Surgeons. 2018. Capítulo 5: Trauma Abdominal."
  },
  {
    cat:"abd", catName:"Trauma Abdominal",
    q:"En el lavado peritoneal diagnóstico (LPD), ¿cuáles son los valores que definen un resultado positivo para hemorragia intraabdominal?",
    opts:[">50,000 eritrocitos/mm³ o >250 leucocitos/mm³","&gt;10,000 eritrocitos/mm³ o >100 leucocitos/mm³","&gt;100,000 eritrocitos/mm³ o >500 leucocitos/mm³","&gt;500,000 eritrocitos/mm³ o >1,000 leucocitos/mm³"],
    ans:2,
    exp:"El LPD se considera positivo con: eritrocitos >100,000/mm³ (indica hemorragia activa significativa), leucocitos >500/mm³ (sugiere perforación visceral con reacción inflamatoria), presencia de bilis, fibras vegetales, bacterias o amilasa elevada en el líquido de lavado. Aunque el LPD ha sido desplazado por el FAST y la TC, sigue siendo útil en centros sin ultrasonido disponible.",
    tip:"<strong>Valores clave LPD:</strong> GR >100,000/mm³ = hemorragia. GB >500/mm³ = perforación visceral. Regla práctica: si el efluente de lavado tiene sangre que impide leer texto a través del tubo, el resultado es positivo (>100,000 GR). LPD es invasivo, el FAST lo ha reemplazado en la mayoría de los centros.",
    ref:"ATLS 10ma edición. American College of Surgeons. 2018. Capítulo 5: Trauma Abdominal."
  },
  {
    cat:"abd", catName:"Trauma Abdominal",
    q:"Paciente con trauma abdominal cerrado presenta lesión esplénica grado III por TC (laceración >3 cm de profundidad sin afección vascular). TA 118/76 mmHg, FC 88 lpm, sin peritonismo. ¿Cuál es el manejo más adecuado?",
    opts:["Esplenectomía de urgencia","Manejo no operatorio con monitorización en UCI","Esplenorrafia laparoscópica inmediata","Embolización esplénica de urgencia sin observación previa"],
    ans:1,
    exp:"El manejo no operatorio (MNO) es el estándar de oro para lesiones esplénicas grades I-IV en pacientes hemodinámicamente estables, sin otras lesiones que requieran cirugía y sin peritonismo. El MNO incluye: monitorización en UCI, ayuno, analgesia, repetición de TC a las 48-72h, y hemograma seriado. Tasas de éxito del MNO: Grado I-II >95%, Grado III 80-85%, Grado IV-V 70-75%.",
    tip:"<strong>Escala AAST esplénica:</strong> I=hematoma subcapsular &lt;10% o laceración &lt;1cm; II=hematoma 10-50% o laceración 1-3cm; III=hematoma >50% o laceración >3cm; IV=laceración con vasculatura segmentaria; V=estallido o avulsión hilar. MNO requiere: estabilidad HD + TC disponible + UCI + cirugía de respaldo disponible.",
    ref:"ATLS 10ma edición. American College of Surgeons. 2018. Capítulo 5: Trauma Abdominal."
  },
  {
    cat:"abd", catName:"Trauma Abdominal",
    q:"¿Cuál de los siguientes NO es una indicación absoluta de laparotomía exploratoria de urgencia en trauma abdominal?",
    opts:["FAST positivo con paciente estable hemodinámicamente","Evisceración de asas intestinales","Trauma penetrante con inestabilidad hemodinámica","Peritonitis franca a la exploración física"],
    ans:0,
    exp:"FAST positivo con estabilidad hemodinámica NO es indicación absoluta de laparotomía inmediata — requiere TC de abdomen/pelvis para caracterizar la lesión y planear el abordaje. Las indicaciones absolutas de laparotomía en trauma son: trauma penetrante con inestabilidad hemodinámica, evisceración, peritonitis franca, sangrado evidente de herida abdominal, FAST positivo + inestabilidad, y trauma penetrante con evisceración de omento o vísceras.",
    tip:"<strong>Laparotomía inmediata SÍ:</strong> Penetrante inestable, evisceración, peritonitis, FAST(+) inestable. <strong>TC primero:</strong> FAST(+) estable, mecanismo de alta energía estable. La TC permite planear cirugía o decidir MNO. No se opera un hígado grado II estable solo porque el FAST fue positivo.",
    ref:"ATLS 10ma edición. American College of Surgeons. 2018. Capítulo 5: Trauma Abdominal."
  },
  {
    cat:"tce", catName:"Trauma Craneoencefálico",
    q:"Paciente de 35 años con TCE por accidente de motocicleta. A la valoración: abre ojos al estímulo doloroso, emite palabras inapropiadas, y retira ante el dolor. ¿Cuál es su Escala de Coma de Glasgow (GCS) y clasificación del TCE?",
    opts:["GCS 9 — TCE moderado","GCS 10 — TCE moderado","GCS 11 — TCE moderado","GCS 8 — TCE grave"],
    ans:1,
    exp:"GCS: Ocular = 2 (abre a dolor), Verbal = 3 (palabras inapropiadas), Motor = 4 (retira al dolor). Total = 2+3+4 = 9. Clasificación: TCE leve GCS 13-15, TCE moderado GCS 9-12, TCE grave GCS ≤8. Este paciente tiene GCS 9, correspondiente a TCE moderado. Con GCS ≤8 se indica intubación orotraqueal para protección de vía aérea.",
    tip:"<strong>GCS — recordatorio:</strong> Ocular (O): 4=espontánea, 3=voz, 2=dolor, 1=ninguna. Verbal (V): 5=orientado, 4=confuso, 3=palabras, 2=sonidos, 1=ninguno. Motor (M): 6=obedece, 5=localiza, 4=retira, 3=flexión anormal, 2=extensión anormal, 1=ninguno. Mínimo=3, Máximo=15. Intubación si GCS ≤8.",
    ref:"ATLS 10ma edición. American College of Surgeons. 2018. Capítulo 6: Trauma Craneoencefálico."
  },
  {
    cat:"tce", catName:"Trauma Craneoencefálico",
    q:"Paciente de 22 años recibe golpe en región temporal derecha. Pierde conciencia brevemente, luego se recupera y habla con normalidad por 45 minutos. Después presenta deterioro neurológico brusco, midriasis derecha fija y hemiparesia izquierda. TC craneal: imagen hiperdensa biconvexa (lente) temporal derecha. ¿Cuál es el diagnóstico y el tratamiento?",
    opts:["Hematoma subdural agudo — craneotomía electiva","Contusión cerebral — manejo conservador","Hematoma epidural — evacuación quirúrgica urgente","Hematoma subdural crónico — drenaje ambulatorio"],
    ans:2,
    exp:"Hematoma epidural agudo: mecanismo golpe en región temporal (arteria meníngea media), intervalo lúcido característico (período de lucidez entre el golpe y el deterioro), imagen en lente biconvexo hiperdensa en TC por la sangre acumulada entre el hueso y la duramadre. La herniación uncal causa midriasis ipsilateral y hemiparesia contralateral. Tratamiento: evacuación quirúrgica URGENTE (craniotomía descompresiva). Sin tratamiento la mortalidad es cercana al 100%.",
    tip:"<strong>Epidural vs Subdural:</strong> Epidural = arteria meníngea media + golpe temporal + lente biconvexo + intervalo lúcido + joven. Subdural = venas puente + imagen en creciente + anciano anticoagulado + deterioro progresivo. Los dos requieren evacuación quirúrgica urgente cuando son sintomáticos.",

  },
  {
    cat:"tce", catName:"Trauma Craneoencefálico",
    q:"Paciente con TCE grave (GCS 7) en UCI presenta hipertensión intracraneal (PIC 28 mmHg). ¿Cuál es el orden correcto del tratamiento escalonado de la hipertensión intracraneal según el ATLS?",
    opts:["Manitol → cabecera 30° → hiperventilación agresiva → barbitúricos","Cabecera 30° + analgesia/sedación → PaCO2 35-40 mmHg → manitol 0.25-1 g/kg → craniectomía descompresiva","Craniectomía inmediata → luego medicamentos","Dexametasona IV → manitol → hiperventilación"],
    ans:1,
    exp:"El tratamiento escalonado de la hipertensión intracraneal según el ATLS y las guías de TCE grave es: (1) Medidas básicas: cabecera 30°, cuello alineado, analgesia y sedación; (2) Optimización ventilatoria: PaCO2 35-40 mmHg (hiperventilación moderada, NO agresiva); (3) Agentes hiperosmolares: manitol 0.25-1 g/kg IV o solución salina hipertónica; (4) Medidas de rescate: craniectomía descompresiva. La dexametasona NO está indicada en TCE (no reduce PIC y aumenta complicaciones).",
    tip:"<strong>Hipertensión intracraneal — NUNCA:</strong> Dexametasona (contraindicada en TCE), hiperventilación agresiva (PaCO2 &lt;35 causa vasoconstricción e isquemia), hipotensión (mantener PPC >60 mmHg = PAM - PIC). <strong>SÍ:</strong> Mantener Na 145-155 mEq/L, osmolaridad 300-320 mOsm/L con manitol o SS hipertónica.",
    ref:"ATLS 10ma edición. American College of Surgeons. 2018. Capítulo 6: Trauma Craneoencefálico."

  {
    cat:"col", catName:"Trauma de Columna",
    q:"Paciente de 40 años llega tras caída de altura con dolor cervical. Está alerta, sin déficit neurológico, sin dolor a la palpación de línea media cervical, sin intoxicación y con mecanismo simple. ¿Cuál es el abordaje correcto según los criterios NEXUS?",
    opts:["Retiro del collarín cervical sin necesidad de imagen radiológica","Radiografía cervical lateral obligatoria en todo trauma","TC cervical de urgencia","RM cervical para descartar lesión ligamentaria"],

    exp:"Los criterios NEXUS establecen que si un paciente cumple los 5 criterios de bajo riesgo, no necesita imagen radiológica cervical: (1) Sin dolor a la palpación de línea media cervical posterior; (2) Sin déficit neurológico focal; (3) Alerta (GCS 15); (4) Sin intoxicación por alcohol u otras sustancias; (5) Sin lesión distractora dolorosa. Este paciente cumple todos los criterios → retiro del collarín sin imagen.",
    tip:"<strong>Criterios NEXUS (los 5 'no'):</strong> No dolor en línea media, No déficit neurológico, No alteración del nivel de conciencia, No intoxicación, No lesión distractora. Si TODOS son negativos → sin imagen. Si ALGUNO es positivo → Rx cervical (AP, lateral, odontoides). Si Rx dudosa o déficit → TC cervical.",
    ref:"ATLS 10ma edición. American College of Surgeons. 2018. Capítulo 7: Trauma de Columna Vertebral."
  },
  {
    cat:"col", catName:"Trauma de Columna",
    q:"Paciente con trauma cervical presenta cuadriplejía completa por debajo de C5. En Urgencias, ¿cuál es la medida más importante para el manejo inicial de la columna cervical?",
    opts:["Administración inmediata de metilprednisolona IV en altas dosis","Cirugía descompresiva en las primeras 2 horas","Tracción craneal con Gardner-Wells de urgencia","Inmovilización estricta con collarín cervical rígido + tabla espinal hasta descartar fractura inestable"],
    ans:3,
    exp:"La inmovilización cervical es la medida prioritaria en todo paciente con sospecha de lesión de columna cervical. Se usa collarín cervical rígido + tabla espinal para el traslado. La metilprednisolona en altas dosis ya NO está recomendada en el ATLS 10ma edición para trauma medular agudo (evidencia insuficiente y efectos adversos significativos como infecciones e hiperglucemia). La cirugía descompresiva se discute según el nivel y tipo de lesión.",
    tip:"<strong>Metilprednisolona en TCM — ya NO:</strong> El ATLS 10ma edición retiró la recomendación de metilprednisolona en trauma medular. Estudios NASCIS II y III mostraron beneficio marginal con alto riesgo de complicaciones. La inmovilización, el manejo del choque neurogénico (norepinefrina + atropina) y la prevención de hipotensión son las prioridades.",
    ref:"ATLS 10ma edición. American College of Surgeons. 2018. Capítulo 7: Trauma de Columna Vertebral."
  },
  {
    cat:"pel", catName:"Trauma Pélvico/Extremidades",
    q:"Paciente politraumatizado con fractura de pelvis tipo 'libro abierto' (APC-II: rotura de sínfisis púbica + ligamentos sacroilíacos anteriores). TA 70/40 mmHg, FC 140 lpm. ¿Cuál es el primer paso específico para controlar la hemorragia pélvica?",
    opts:["Aplicación de faja pélvica o sábana enrollada para cierre de pelvis","Angiografía y embolización de urgencia inmediata","Laparotomía exploratoria inmediata","Fijador externo pélvico en quirófano"],
    ans:0,
    exp:"La fractura pélvica tipo libro abierto causa hemorragia masiva retroperitoneal (puede perderse >3 L de sangre en el espacio retroperitoneal). La primera maniobra de control de hemorragia es el cierre mecánico de la pelvis con faja pélvica comercial o sábana enrollada a nivel de trocánteres mayores, que reduce el volumen pélvico y tamponada el sangrado venoso. Posterior al cierre pélvico: angioembolización si continúa inestable.",
    tip:"<strong>Algoritmo fractura de pelvis inestable:</strong> Faja pélvica INMEDIATA → reanimación con cristaloides/sangre → si persiste inestable: angioembolización (sangrado arterial) o empaquetamiento pélvico preperitoneal (sangrado venoso). La faja pélvica NO se coloca a nivel de cresta ilíaca (no cierra la pelvis), sino a nivel de trocánteres mayores.",
    ref:"ATLS 10ma edición. American College of Surgeons. 2018. Capítulo 5: Trauma Abdominal y Capítulo 8: Trauma Musculoesquelético."
  },
  {
    cat:"pel", catName:"Trauma Pélvico/Extremidades",
    q:"Paciente con trauma de extremidad inferior presenta dolor desproporcionado al movimiento pasivo, parestesias, y tensión extrema del compartimento anterior de la pierna. Presión compartimental medida: 38 mmHg con PAD de 60 mmHg. ¿Cuál es el diagnóstico y tratamiento?",
    opts:["Trombosis venosa profunda — anticoagulación","Contusión muscular grave — elevación y hielo","Síndrome compartimental — fasciotomía urgente","Fractura de estrés — inmovilización con férula"],
    ans:2,
    exp:"Síndrome compartimental: la presión compartimental >30 mmHg O dentro de 30 mmHg de la PAD (presión arterial diastólica) es criterio diagnóstico (en este caso 38 mmHg con PAD 60 mmHg: diferencia de 22 mmHg, indica síndrome compartimental). Las 6P: Pain (dolor desproporcionado al movimiento pasivo — signo más temprano y sensible), Pressure (presión aumentada), Paresthesia, Paralysis, Pallor, Pulselessness (tardío). Tratamiento: fasciotomía urgente. Sin tratamiento: necrosis muscular, mioglobinuria, falla renal.",
    tip:"<strong>Criterio diagnóstico SC:</strong> Presión compartimental >30 mmHg o ΔP (PAD - P compartimento) &lt;30 mmHg. El dolor con movimiento pasivo es el signo más temprano y sensible. Pulso ausente es signo TARDÍO — no esperar para fasciotomía. Pierna: 4 compartimentos (anterior, lateral, posterior superficial y profundo) — todos deben abrirse.",
    ref:"ATLS 10ma edición. American College of Surgeons. 2018. Capítulo 8: Trauma Musculoesquelético."
  },
  {
    cat:"eval", catName:"Evaluación Secundaria",
    q:"En la evaluación secundaria del paciente politraumatizado, ¿qué nemotecnia se utiliza para obtener la historia clínica dirigida y cuáles son sus componentes?",
    opts:["AMPLE: Alergias, Medicamentos, Patologías previas, Last meal (última comida), Eventos relacionados","OPQRST: Onset, Paliation, Quality, Radiation, Severity, Time","ABCDE: Airway, Breathing, Circulation, Disability, Exposure","SAMPLE: Síntomas, Alergias, Medicamentos, Patologías, Last meal, Eventos"],
    ans:0,
    exp:"La nemotecnia AMPLE es la recomendada por el ATLS para la historia clínica en la evaluación secundaria: A=Alergias (especialmente medicamentos y látex); M=Medicamentos actuales (anticoagulantes, antiplaquetarios, betabloqueadores afectan respuesta al trauma); P=Patologías previas y cirugías anteriores; L=Last meal (última ingesta, relevante para anestesia); E=Eventos relacionados con el trauma (mecanismo, cinemática). Esta información guía el manejo y alerta sobre complicaciones.",
    tip:"<strong>AMPLE en trauma — puntos clave:</strong> Anticoagulantes = riesgo de sangrado mayor. Betabloqueadores = taquicardia puede estar enmascarada. Diabetes = respuesta inflamatoria alterada. Embarazo = paciente especial (dos vidas). Última comida = esperar para cirugía si es posible o protección de vía aérea. La evaluación secundaria es de cabeza a pies, sistemática.",
    ref:"ATLS 10ma edición. American College of Surgeons. 2018. Capítulo 1: Evaluación Inicial y Manejo."
  },
  {
    cat:"tce", catName:"Trauma Craneoencefálico",
    q:"Paciente de 65 años anticoagulado con warfarina presenta TCE leve (GCS 14) tras caída. TC craneal muestra imagen hiperdensa en forma de creciente sobre hemisferio izquierdo. ¿Cuál es el diagnóstico?",
    opts:["Hematoma epidural agudo","Contusión cerebral hemorrágica","Hemorragia subaracnoidea traumática","Hematoma subdural agudo"],
    ans:3,
    exp:"Hematoma subdural agudo: sangrado entre la duramadre y la aracnoides por ruptura de venas puente, imagen en creciente hiperdensa que sigue el contorno del hemisferio (no respeta suturas, a diferencia del epidural que es biconvexo y sí está limitado por suturas). Más frecuente en ancianos y anticoagulados por mayor fragilidad de las venas puente. El tratamiento depende del grosor y efecto de masa: si >10 mm o desplazamiento de línea media >5 mm → craneotomía; si menor → observación estrecha.",
    tip:"<strong>Subdural vs Epidural — diferencias clave:</strong> Subdural: venas puente, creciente, sigue contorno cerebral, NO respeta suturas, más común en ancianos/anticoagulados, deterioro progresivo o subagudo. Epidural: arteria meníngea media, lente biconvexo, SÍ respeta suturas, jóvenes, intervalo lúcido. Ambos pueden requerir cirugía urgente.",
    ref:"ATLS 10ma edición. American College of Surgeons. 2018. Capítulo 6: Trauma Craneoencefálico."
  },
  {
    cat:"eval", catName:"Evaluación Secundaria",
    q:"Durante la evaluación secundaria de un paciente politraumatizado estable se detecta sangre en el meato urinario externo, hematoma perineal y próstata 'flotante' al tacto rectal. ¿Qué lesión se debe sospechar y cuál es la conducta correcta antes de colocar sonda urinaria?",
    opts:["Ruptura vesical intraperitoneal — colocar sonda Foley de inmediato","Lesión de vejiga extraperitoneal — cistografía inmediata","Contusión renal — TC abdominal con contraste","Ruptura uretral — realizar uretrografía retrógrada antes de intentar sondaje"],
    ans:3,
    exp:"La triada de sangre en meato urinario + hematoma perineal/escrotal + próstata alta o flotante al tacto rectal es la presentación clásica de ruptura uretral (uretra posterior, asociada a fractura de pelvis). Intentar colocar sonda Foley a ciegas puede convertir una ruptura parcial en completa. La conducta correcta es uretrografía retrógrada para confirmar la lesión y definir el abordaje. Si se confirma ruptura: manejo urológico especializado (catéter suprapúbico o reparación primaria según el caso).",
    tip:"<strong>Ruptura uretral — triada clásica:</strong> Sangre en meato + hematoma perineal/escrotal + próstata flotante. NUNCA sondaje a ciegas. Uretrografía retrógrada primero. Diferencia con ruptura vesical: la ruptura vesical tiene hematuria macroscópica + imposibilidad de orinar + asociada a fractura de pelvis, diagnóstico por cistografía o TC con cistografía.",

  }
];

let currentQ = 0, score = 0, answers = [];
let catStats = { abd:{c:0,t:0}, tce:{c:0,t:0}, col:{c:0,t:0}, pel:{c:0,t:0}, eval:{c:0,t:0} };

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function init() {
  shuffle(questions);
  currentQ=0; score=0; answers=[];
  catStats = { abd:{c:0,t:0}, tce:{c:0,t:0}, col:{c:0,t:0}, pel:{c:0,t:0}, eval:{c:0,t:0} };
  const r=document.getElementById('resultsArea');
  r.classList.remove('show'); r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion() {
  const qa=questions[currentQ], total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const letters=['A','B','C','D'];
  let html=`<div class="question-card">
    <div class="q-category cat-${qa.cat}">${qa.catName}</div>
    <div class="q-number">Pregunta ${currentQ+1} de ${total}</div>
    <div class="q-text">${qa.q}</div>
    <div class="options">`;
  qa.opts.forEach((opt,i)=>{
    html+=`<button class="option-btn" onclick="selectAnswer(${i})" data-idx="${i}">
      <span class="option-letter">${letters[i]}</span><span>${opt}</span></button>`;
  });
  html+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=html;
}

function selectAnswer(idx) {
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const isCorrect=idx===qa.ans;
  btns.forEach((btn,i)=>{
    btn.classList.add('disabled'); btn.onclick=null;
    if(i===qa.ans) btn.classList.add('correct-answer');
    if(i===idx&&!isCorrect) btn.classList.add('wrong-answer');
  });
  if(!catStats[qa.cat]) catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(isCorrect){score++;catStats[qa.cat].c++;}
  if(!examMode){
    fb.className=isCorrect?'feedback correct-fb show':'feedback wrong-fb show';
    fb.innerHTML=isCorrect
      ?`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`
      :`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;
  }
  answers.push({q:qa.q,correct:isCorrect,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if(currentQ>=questions.length) showResults();
  else renderQuestion();
}

function showResults() {
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'🏆 ¡Dominio excelente de ATLS 2!':pct>=70?'👏 ¡Muy bien! Repasa los temas con menor puntaje.':pct>=50?'📚 Aceptable, refuerza las áreas débiles.':'⚠️ Revisa el Manual ATLS 10ma edición con atención.';
  const cats=[
    {name:'Trauma Abdominal',key:'abd',color:'#fbbf24'},
    {name:'TCE',key:'tce',color:'#38bdf8'},
    {name:'Trauma de Columna',key:'col',color:'#a78bfa'},
    {name:'Trauma Pélvico',key:'pel',color:'#f472b6'},
    {name:'Evaluación Secundaria',key:'eval',color:'#34d399'},
  ];
  let html=`<div class="results-header">
    <div class="score-big">${pct}%</div>
    <div class="score-label">${score} de ${questions.length} correctas</div>
    <div class="score-msg">${msg}</div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📊</span> Rendimiento por Categoría</div>
    <div class="bar-chart">`;
  cats.forEach(cat=>{
    const s=catStats[cat.key]||{c:0,t:0};
    const p=s.t>0?Math.round((s.c/s.t)*100):0;
    html+=`<div class="bar-row"><div class="bar-label">${cat.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${cat.color};">${p}% (${s.c}/${s.t})</div></div></div>`;
  });
  html+=`</div></div>
  <div class="chart-section">
    <div class="chart-title"><span>🎯</span> Resumen General</div>
    <div class="donut-wrap">
      <svg class="donut-svg" viewBox="0 0 42 42">
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
        <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
      </svg>
      <div class="donut-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#38bdf8;"></div>Total: ${questions.length}</div>
      </div>
    </div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{
    html+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
      <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
      <div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div>
      <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
      <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
    </div>`;
  });
  html+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const res=document.getElementById('resultsArea');
  res.innerHTML=html; res.classList.add('show');
  res.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(header){header.classList.toggle('open');header.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}

init();
</script>
</body>
</html>
