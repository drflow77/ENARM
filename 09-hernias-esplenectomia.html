<script>
let examMode = false;

function setMode(mode) {
  examMode = (mode === 'examen');
  document.getElementById('btnRepaso').classList.toggle('active', !examMode);
  document.getElementById('btnExamen').classList.toggle('active', examMode);
  init();
}

const questions = [
  {
    cat:"ing", catName:"Hernia Inguinal",
    q:"¿Cuáles son los límites del triángulo de Hesselbach, cuya debilidad determina la formación de hernia inguinal directa?",
    opts:["Ligamento inguinal (inf.), vasos epigástricos inferiores (lat.), ligamento de Cooper (sup.)","Ligamento inguinal (inf.), nervio ilioinguinal (lat.), línea alba (med.)","Ligamento inguinal (inf.), vasos epigástricos inferiores (lat.), borde lateral del recto anterior del abdomen (med.)","Arco del transverso (sup.), ligamento de Poupart (inf.), arteria femoral (lat.)"],
    ans:2,
    exp:"El triángulo de Hesselbach está delimitado por: inferiormente el ligamento inguinal, lateralmente los vasos epigástricos inferiores (arteria y vena epigástrica inferior), y medialmente el borde lateral del músculo recto anterior del abdomen. La hernia inguinal directa protruye a través de este triángulo, medialmente a los vasos epigástricos inferiores, a diferencia de la indirecta que protruye lateralmente a dichos vasos.",
    tip:"<strong>Mnemotecnia Hesselbach:</strong> 'LER' = Ligamento inguinal + Epigástricos inferiores + Recto del abdomen. La hernia Directa va al triángulo (medial a epigástricos). La hernia inDIRECTA pasa por el anillo inguinal profundo (lateral a epigástricos). D = Directa = Debilidad; I = Indirecta = anillo Interno.",
    ref:"GPC: Diagnóstico y tratamiento de las hernias inguinales y femorales. CENETEC 2012."
  },
  {
    cat:"ing", catName:"Hernia Inguinal",
    q:"Hombre de 35 años con abultamiento en región inguinal derecha que aparece al esfuerzo y se reduce en decúbito. A la exploración, el dedo explorador introducido en el canal inguinal percibe el impulso en la punta del dedo al toser. ¿Qué tipo de hernia inguinal se describe?",
    opts:["Hernia inguinal directa","Hernia inguinal indirecta","Hernia femoral","Hernia de Richter"],
    ans:1,
    exp:"La hernia inguinal indirecta penetra por el anillo inguinal profundo (lateral a los vasos epigástricos inferiores), sigue el trayecto del cordón espermático y el impulso se percibe en la punta del dedo explorador. Es la hernia más frecuente en ambos sexos y más en hombres jóvenes. La hernia directa protruye a través del triángulo de Hesselbach y el impulso se siente en el pulpejo del dedo.",
    tip:"<strong>Truco del dedo:</strong> Introduce el dedo por el anillo inguinal superficial y pide que tosa: impulso en la PUNTA = Indirecta (sigue el canal). Impulso en el PULPEJO (cara anterior del dedo) = Directa (empuja de frente). La hernia indirecta es más frecuente y tiene mayor riesgo de estrangulación por el cuello estrecho del saco.",
    ref:"GPC: Diagnóstico y tratamiento de las hernias inguinales y femorales. CENETEC 2012."
  },
  {
    cat:"ing", catName:"Hernia Inguinal",
    q:"Según la clasificación de Nyhus, una hernia inguinal indirecta con anillo interno dilatado pero pared posterior del canal inguinal intacta en un adulto corresponde a:",
    opts:["Tipo I","Tipo II","Tipo III A","Tipo III B"],
    ans:1,
    exp:"La clasificación de Nyhus establece: Tipo I = hernia indirecta con anillo interno normal (pediátrica). Tipo II = hernia indirecta con anillo interno dilatado pero pared posterior intacta. Tipo III A = hernia directa (defecto de pared posterior). Tipo III B = hernia indirecta con anillo muy dilatado y destrucción de pared posterior (pantalón). Tipo IV = hernias recurrentes. Esta clasificación guía la elección del tipo de reparación.",
    tip:"<strong>Nyhus simplificado:</strong> I = Indirecta pequeña (niño). II = Indirecta adulto, pared OK. IIIA = Directa. IIIB = Indirecta gigante. IV = Recurrente. Los tipos III y IV requieren reparación con malla. Los tipos I y II pueden repararse con o sin malla según el cirujano.",
    ref:"GPC: Diagnóstico y tratamiento de las hernias inguinales y femorales. CENETEC 2012."
  },
  {
    cat:"ing", catName:"Hernia Inguinal",
    q:"Mujer de 55 años presenta tumoración dolorosa en la región del triángulo de Scarpa, por debajo del ligamento inguinal y medial a la vena femoral. ¿Cuál es el diagnóstico más probable y cuál es su característica clínica más importante?",
    opts:["Hernia inguinal indirecta; más frecuente en hombres","Adenopatía inguinal; no se reduce con presión","Hernia obturatriz; se palpa en la cara interna del muslo","Hernia femoral; más frecuente en mujeres y con alta tasa de estrangulación"],
    ans:3,
    exp:"La hernia femoral (crural) protruye a través del anillo femoral, por debajo del ligamento inguinal y medial a la vena femoral (dentro del triángulo de Scarpa). Es más frecuente en mujeres (aunque la hernia inguinal sigue siendo más común en mujeres en términos absolutos, la hernia femoral tiene mayor proporción femenina). Su característica más importante es la alta tasa de encarcelación y estrangulación (hasta 40%) por el cuello estrecho del anillo femoral.",
    tip:"<strong>Femoral = Mujer + Estrangulación:</strong> El anillo femoral es pequeño y rígido (ligamento inguinal arriba, Cooper abajo, vena femoral afuera) → cuello muy estrecho → alta tasa de estrangulación (mayor que inguinal). Siempre reparar de forma electiva cuando se diagnostica. Nunca intentar reducción forzada si hay signos de estrangulación.",
    ref:"GPC: Diagnóstico y tratamiento de las hernias inguinales y femorales. CENETEC 2012."
  },
  {
    cat:"comp", catName:"Complicaciones Hernias",
    q:"Paciente con hernia inguinal de larga evolución presenta aumento súbito del dolor, el abultamiento ya no se reduce y hay eritema local. No se auscultan ruidos hidroaéreos en el saco herniario. ¿Cuál es la complicación y cuál es el tratamiento?",
    opts:["Estrangulación; cirugía de urgencia sin intento de reducción","Encarcelación; reducción manual forzada bajo sedación","Encarcelación; cirugía electiva en 48 horas","Hernia de Richter; observación y antibióticos"],
    ans:0,
    exp:"La estrangulación herniaria implica compromiso vascular del contenido del saco (isquemia, necrosis). Se distingue de la encarcelación (irreductibilidad sin isquemia) por la presencia de: dolor intenso, eritema y calor local, ausencia de ruidos en el saco, fiebre y datos de obstrucción intestinal o peritonitis. La estrangulación requiere cirugía de urgencia — nunca intentar reducción forzada porque se puede reducir intestino necrótico al abdomen.",
    tip:"<strong>Encarcelada vs Estrangulada:</strong> Encarcelada = irreductible + sin isquemia (puede tener ruidos, sin eritema, sin fiebre). Estrangulada = irreductible + ISQUEMIA (eritema, calor, sin ruidos, fiebre, leucocitosis). Regla: hernia irreductible sin signos de isquemia → intento de reducción manual suave. Con signos de isquemia → cirugía de urgencia directa.",
    ref:"GPC: Diagnóstico y tratamiento de las hernias inguinales y femorales. CENETEC 2012."
  },
  {
    cat:"comp", catName:"Complicaciones Hernias",
    q:"¿Qué es la hernia de Richter y por qué es clínicamente importante reconocerla?",

    exp:"La esplenectomía está indicada en PTI crónica (>12 meses) refractaria al tratamiento de segunda línea (incluyendo rituximab, agonistas TPO u otros agentes de segunda línea), con riesgo hemorrágico significativo (plaquetas <20,000-30,000 o sangrado activo). La GPC de esplenectomía establece que es el tratamiento con mayor tasa de remisión duradera (60-70%) en PTI refractaria. No se realiza como primer tratamiento.",

    opts:["Solo vacuna antineumocócica, aplicar el día de la cirugía","Influenza y neumocócica; pueden aplicarse hasta 1 semana después de la cirugía","Neumocócica, hepatitis B y varicela; 1 mes antes","Neumocócica polisacárida (PPSV23), anti-Haemophilus influenzae tipo b y antimeningocócica; al menos 2 semanas antes de la cirugía"],
    ans:3,
    exp:"Los pacientes sometidos a esplenectomía pierden la inmunidad frente a bacterias encapsuladas. La GPC establece que deben administrarse al menos 2 semanas antes de la cirugía: 1) Vacuna antineumocócica polisacárida 23-valente (PPSV23) o conjugada (PCV13), 2) Vacuna anti-Haemophilus influenzae tipo b (Hib), 3) Vacuna antimeningocócica (conjugada tetravalente ACYW135). Si la cirugía es de urgencia, aplicar las vacunas 2 semanas después del procedimiento.",
    tip:"<strong>Las 3 vacunas del asplenia:</strong> Neumococo + Haemophilus + Meningococo. Estas bacterias encapsuladas son las más peligrosas en asplénicos porque el bazo normalmente las opsoniza. La vacuna antineumocócica es la más importante. Revacunación: PPSV23 cada 5 años. Algunos centros también recomiendan profilaxis antibiótica con penicilina V oral por 2-5 años postesplenectomía.",

  },

    tip:"<strong>OPSS = Urgencia absoluta:</strong> El paciente asplénco con fiebre alta de inicio brusco debe recibir antibióticos empíricos de inmediato (amoxicilina-clavulanato o cefotaxima IV) sin esperar resultados de laboratorio. Riesgo de por vida: mayor en los primeros 2 años postesplenectomía pero no desaparece. Educar al paciente: 'tarjeta de asplenia' y consulta inmediata con cualquier fiebre.",
    ref:"GPC: Esplenectomía en el adulto. CENETEC 2015."
  },
  {
    cat:"esp", catName:"Esplenectomía",

    ans:3,
    exp:"La esferocitosis hereditaria severa con hemólisis significativa, crisis aplásicas frecuentes o complicaciones es indicación de esplenectomía, ya que el bazo es el sitio principal de destrucción de los eritrocitos esferocíticos. La GPC recomienda la esplenectomía laparoscópica por sus ventajas sobre la cirugía abierta. Si hay colelitiasis (muy frecuente en hemólisis crónica por bilirrubina elevada), se realiza colecistectomía simultánea. La esplenectomía no cura la enfermedad pero elimina la hemólisis.",

    ref:"GPC: Esplenectomía en el adulto. CENETEC 2015."
  },
  {
    cat:"comp", catName:"Complicaciones Hernias",
    q:"¿Qué es la hernia de Littre y en cuál ubicación herniaria es más frecuente?",
    opts:["Hernia que contiene el apéndice cecal; más frecuente en hernia inguinal derecha","Hernia cuyo saco contiene un divertículo de Meckel; más frecuente en hernia inguinal (especialmente derecha) y femoral","Hernia en la que el ovario constituye el contenido del saco; exclusiva de mujeres","Hernia que contiene la vejiga urinaria; más frecuente en hernia inguinal directa"],
    ans:1,
    exp:"La hernia de Littre es aquella en cuyo saco herniario se encuentra un divertículo de Meckel. Es más frecuente en la hernia inguinal (especialmente la derecha, por proximidad anatómica con el íleon distal donde se localiza el divertículo de Meckel) y también en la hernia femoral. Su importancia clínica radica en que puede inflamarse (diverticulitis de Meckel), sangrar o perforarse dentro del saco herniario, presentándose como una hernia dolorosa e irreductible sin signos de obstrucción completa.",
    tip:"<strong>Hernias con nombres especiales:</strong> Littre = Meckel en el saco. Richter = solo una pared intestinal. Amyand = apéndice en saco inguinal. De Garengeot = apéndice en saco femoral. Hernia de Spiegel = entre recto y semilunar. Hernia obturatriz = signo de Howship-Romberg (dolor cara interna muslo). El divertículo de Meckel está a 60 cm de la válvula ileocecal, en el borde antimesentérico.",

];

let currentQ = 0, score = 0, answers = [];
let catStats = { ing:{c:0,t:0}, umb:{c:0,t:0}, comp:{c:0,t:0}, esp:{c:0,t:0}, tx:{c:0,t:0} };

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function init() {
  shuffle(questions);
  currentQ=0; score=0; answers=[];
  catStats = { ing:{c:0,t:0}, umb:{c:0,t:0}, comp:{c:0,t:0}, esp:{c:0,t:0}, tx:{c:0,t:0} };
  const r=document.getElementById('resultsArea');
  r.classList.remove('show'); r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion() {
  const qa=questions[currentQ], total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const letters=['A','B','C','D'];
  let html=`<div class="question-card">
    <div class="q-category cat-${qa.cat}">${qa.catName}</div>
    <div class="q-number">Pregunta ${currentQ+1} de ${total}</div>
    <div class="q-text">${qa.q}</div>
    <div class="options">`;
  qa.opts.forEach((opt,i)=>{
    html+=`<button class="option-btn" onclick="selectAnswer(${i})" data-idx="${i}">
      <span class="option-letter">${letters[i]}</span><span>${opt}</span></button>`;
  });
  html+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=html;
}

function selectAnswer(idx) {
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const isCorrect=idx===qa.ans;
  btns.forEach((btn,i)=>{
    btn.classList.add('disabled'); btn.onclick=null;
    if(i===qa.ans) btn.classList.add('correct-answer');
    if(i===idx&&!isCorrect) btn.classList.add('wrong-answer');
  });
  if(!catStats[qa.cat]) catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(isCorrect){score++;catStats[qa.cat].c++;}
  if(!examMode){
    fb.className=isCorrect?'feedback correct-fb show':'feedback wrong-fb show';
    fb.innerHTML=isCorrect
      ?`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`
      :`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;
  }
  answers.push({q:qa.q,correct:isCorrect,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if(currentQ>=questions.length) showResults();
  else renderQuestion();
}

function showResults() {
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'🏆 ¡Dominio excelente de hernias y esplenectomía!':pct>=70?'👏 ¡Muy bien! Repasa los temas con menor puntaje.':pct>=50?'📚 Aceptable, refuerza las áreas débiles.':'⚠️ Revisa las GPC de hernias inguinales y esplenectomía.';
  const cats=[
    {name:'Hernia Inguinal',key:'ing',color:'#fbbf24'},
    {name:'H. Umbilical/Ventral',key:'umb',color:'#38bdf8'},
    {name:'Complicaciones',key:'comp',color:'#f472b6'},
    {name:'Esplenectomía',key:'esp',color:'#a78bfa'},
    {name:'Técnicas Qx',key:'tx',color:'#34d399'},
  ];
  let html=`<div class="results-header">
    <div class="score-big">${pct}%</div>
    <div class="score-label">${score} de ${questions.length} correctas</div>
    <div class="score-msg">${msg}</div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📊</span> Rendimiento por Categoría</div>
    <div class="bar-chart">`;
  cats.forEach(cat=>{
    const s=catStats[cat.key]||{c:0,t:0};
    const p=s.t>0?Math.round((s.c/s.t)*100):0;
    html+=`<div class="bar-row"><div class="bar-label">${cat.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${cat.color};">${p}% (${s.c}/${s.t})</div></div></div>`;
  });
  html+=`</div></div>
  <div class="chart-section">
    <div class="chart-title"><span>🎯</span> Resumen General</div>
    <div class="donut-wrap">
      <svg class="donut-svg" viewBox="0 0 42 42">
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
        <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
      </svg>
      <div class="donut-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#38bdf8;"></div>Total: ${questions.length}</div>
      </div>
    </div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{
    html+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
      <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
      <div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div>
      <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
      <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
    </div>`;
  });
  html+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const res=document.getElementById('resultsArea');
  res.innerHTML=html; res.classList.add('show');
  res.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(header){header.classList.toggle('open');header.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}

init();
</script>
</body>
</html>
