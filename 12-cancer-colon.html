  .retry-btn { display:block; margin:28px auto; padding:14px 40px; background:linear-gradient(135deg,var(--accent),var(--purple)); color:var(--bg); border:none; border-radius:100px; font-family:inherit; font-size:1rem; font-weight:700; cursor:pointer; transition:all 0.2s; }
  .retry-btn:hover { transform:scale(1.05); }

<script>
let examMode = false;

function setMode(mode) {
  examMode = (mode === 'examen');
  document.getElementById('btnRepaso').classList.toggle('active', !examMode);
  document.getElementById('btnExamen').classList.toggle('active', examMode);
  init();
}

const questions = [
  {
    cat:"epi", catName:"Epidemiología / Factores de Riesgo",
    q:"Hombre de 58 años, fumador de 20 años, con ingesta habitual de carne roja (≥5 veces/semana), obesidad y antecedente de colitis ulcerosa de 10 años de evolución. ¿Cuál de los siguientes factores de riesgo confiere el MAYOR riesgo relativo para desarrollar cáncer colorrectal?",
    opts:["Tabaquismo de 20 años","Colitis ulcerosa de 10 años de evolución","Dieta alta en carne roja","Obesidad mórbida"],
    ans:1,
    exp:"La enfermedad inflamatoria intestinal (EII), particularmente la colitis ulcerosa de larga evolución (>8-10 años), es uno de los factores de riesgo más importantes para cáncer colorrectal, con un riesgo relativo de 5-10 veces mayor que la población general. La GPC de Detección Oportuna establece que pacientes con pancolitis de >8 años requieren colonoscopia de vigilancia cada 1-2 años. La dieta alta en carne roja, tabaco y obesidad también aumentan el riesgo, pero en menor magnitud.",
    tip:"<strong>Riesgo en EII:</strong> Pancolitis &gt;8 años → colonoscopia de vigilancia anual o bianual. Colitis izquierda &gt;15 años → misma vigilancia. El riesgo acumulado a 30 años de pancolitis es de ~18%. La displasia en biopsias de vigilancia es indicación de colectomía total.",
    ref:"GPC: Detección oportuna y diagnóstico de cáncer de colon y recto no hereditario. SSA-IMSS-ISSSTE. 2008."
  },
  {
    cat:"epi", catName:"Epidemiología / Factores de Riesgo",
    q:"La secuencia adenoma-carcinoma es el principal mecanismo de desarrollo del cáncer colorrectal esporádico. ¿Cuál es el tiempo estimado de progresión desde un pólipo adenomatoso hasta un carcinoma invasor?",
    opts:["1-2 años","5-10 años","15-20 años","Mayor de 25 años"],
    ans:1,
    exp:"La secuencia adenoma-carcinoma tarda en promedio 5-10 años en completarse. Este periodo prolongado es precisamente el que justifica los programas de tamizaje con colonoscopia: detectar y resecar adenomas antes de que progresen a carcinoma. La GPC establece que los adenomas son las lesiones precursoras del 80-90% de los cánceres colorrectales esporádicos, a través de acumulación de mutaciones en APC, KRAS, SMAD4 y TP53.",
    tip:"<strong>Vía clásica del CCR:</strong> Mucosa normal → pólipo hiperplásico (sin riesgo) → adenoma tubular → adenoma tubulovelloso → adenoma velloso → carcinoma in situ → carcinoma invasor. Los adenomas vellosesenciales (&gt;1cm, histología vellosa, displasia de alto grado) tienen mayor riesgo de malignización.",
    ref:"GPC: Detección oportuna y diagnóstico de cáncer de colon y recto no hereditario. SSA-IMSS-ISSSTE. 2008."
  },
  {
    cat:"epi", catName:"Epidemiología / Factores de Riesgo",
    q:"¿Cuál de los siguientes tipos de pólipo colorrectal tiene el MAYOR potencial de malignización?",
    opts:["Pólipo hiperplásico sésil de 3 mm en recto","Adenoma tubular de 5 mm con displasia de bajo grado","Adenoma velloso de 3 cm con displasia de alto grado","Pólipo inflamatorio en paciente con enfermedad de Crohn"],
    ans:2,
    exp:"Los adenomas velloseos de gran tamaño con displasia de alto grado tienen el mayor riesgo de malignización. Los pólipos hiperplásicos NO tienen potencial maligno. Los adenomas se clasifican por histología (tubular, tubulovelloso, velloso), tamaño y grado de displasia. La GPC establece que son de alto riesgo: adenoma velloso, diámetro >1 cm, displasia de alto grado o adenoma con foco de carcinoma (pólipo maligno).",
    tip:"<strong>Características de alto riesgo en adenomas:</strong> Histología vellosa (riesgo 3-4x mayor que tubular), tamaño &gt;1 cm, displasia de alto grado, multiplicidad ≥3. Un adenoma tubular pequeño sin displasia de alto grado tiene &lt;1% de riesgo de malignización. Adenoma velloso &gt;2 cm: riesgo de 35-40%.",
    ref:"GPC: Detección oportuna y diagnóstico de cáncer de colon y recto no hereditario. SSA-IMSS-ISSSTE. 2008."
  },
  {
    cat:"tam", catName:"Tamizaje",
    q:"Mujer de 51 años, sin antecedentes familiares de cáncer colorrectal ni factores de riesgo personales. ¿Cuál es el esquema de tamizaje recomendado por la GPC para población de riesgo promedio?",
    opts:["Colonoscopia cada 10 años a partir de los 50 años O sangre oculta en heces anual","Sangre oculta en heces cada 3 años a partir de los 40 años","Sigmoidoscopia flexible cada 5 años a partir de los 45 años","Enema de bario de doble contraste cada 5 años"],
    ans:0,
    exp:"Para población de riesgo promedio, la GPC recomienda iniciar tamizaje a los 50 años con alguna de las siguientes estrategias: colonoscopia cada 10 años (estándar de oro), sangre oculta en heces (SOH) anual con prueba guayaco o FIT (test inmunoquímico fecal), o sigmoidoscopia flexible cada 5 años. La colonoscopia permite detección y resección simultánea de pólipos, siendo el método más completo. Un resultado positivo de SOH obliga a colonoscopia diagnóstica.",
    tip:"<strong>Algoritmo de tamizaje:</strong> Riesgo promedio (sin historia familiar ni EII): colonoscopia c/10 años desde 50 años, o SOH anual. Riesgo alto (1 familiar 1° &gt;60 años o 2 familiares 1°): colonoscopia desde 40 años c/5 años. Riesgo muy alto (FAP, Lynch): inicio más temprano con esquemas específicos.",
    ref:"GPC: Detección oportuna y diagnóstico de cáncer de colon y recto no hereditario. SSA-IMSS-ISSSTE. 2008."
  },
  {
    cat:"tam", catName:"Tamizaje",
    q:"Un paciente de 45 años refiere que su padre fue diagnosticado con cáncer de colon a los 58 años. No tiene otros antecedentes familiares ni síntomas. ¿Cuál es la recomendación de tamizaje para este paciente?",
    opts:["Iniciar tamizaje a los 50 años igual que la población general","Colonoscopia inmediata por alto riesgo hereditario","Iniciar colonoscopia a los 40 años y repetir cada 5 años","Sangre oculta en heces anual desde los 40 años sin necesidad de colonoscopia"],
    ans:2,
    exp:"Con un familiar de primer grado diagnosticado con CCR, el paciente tiene riesgo moderadamente elevado. La GPC recomienda iniciar colonoscopia a los 40 años (o 10 años antes de la edad de diagnóstico del familiar, lo que ocurra primero) y repetirla cada 5 años si es normal. En este caso, el padre fue diagnosticado a los 58 años, por lo que el tamizaje inicia a los 40 años del paciente (que ya tiene 45 → debe realizarse colonoscopia ahora).",
    tip:"<strong>Regla práctica:</strong> 1 familiar 1° con CCR &gt;60 años: colonoscopia desde 40 años c/5 años. 1 familiar 1° con CCR &lt;60 años o 2 familiares 1°: colonoscopia desde 40 años (o 10 años antes del dx del familiar) c/5 años. Estos pacientes NO son HNPCC hasta demostrar lo contrario.",
    ref:"GPC: Detección oportuna y diagnóstico de cáncer de colon y recto no hereditario. SSA-IMSS-ISSSTE. 2008."
  },
  {
    cat:"diag", catName:"Diagnóstico / Estadificación",

  {

    opts:["FOLFIRI (5-FU + leucovorín + irinotecán) por 6 meses","Capecitabina oral sin oxaliplatino solo en pacientes ancianos","Bevacizumab en monoterapia","FOLFOX (5-FU + leucovorín + oxaliplatino) por 6 meses"],
    ans:3,
    exp:"Para cáncer de colon estadio III operado (R0), el estándar de quimioterapia adyuvante es FOLFOX (5-fluorouracilo en infusión continua + leucovorín + oxaliplatino) por 6 meses, o su equivalente oral CAPOX (capecitabina + oxaliplatino). Los estudios MOSAIC y XELOXA demostraron que la adición de oxaliplatino al 5-FU/leucovorín mejora significativamente la supervivencia libre de enfermedad y global en estadio III.",
    tip:"<strong>Quimioterapia adyuvante en CCR:</strong> Estadio I: no requiere. Estadio II bajo riesgo: observación. Estadio II alto riesgo (T4, perforación, obstrucción, &lt;12 ganglios analizados): considerar quimioterapia. Estadio III: FOLFOX o CAPOX obligatorio. Estadio IV (metastásico): FOLFOX o FOLFIRI ± bevacizumab o cetuximab (según mutación RAS/BRAF).",

  },
  {
    cat:"diag", catName:"Diagnóstico / Estadificación",

    opts:["Evaluación por equipo multidisciplinario para resección de metástasis hepáticas si son técnicamente resecables","Quimioterapia paliativa exclusiva con FOLFIRI sin intentar resección","Hepatectomía de urgencia sin quimioterapia previa","Radioembolización con itrio-90 como primera opción sin cirugía"],
    ans:0,

    tip:"<strong>Criterios de resecabilidad hepática en CCR:</strong> Margen oncológico posible (R0), remanente hepático funcional ≥20-30% (o ≥40% en hígado esteatósico/cirrótico), ausencia de enfermedad extrahepática no controlable, paciente con condición física adecuada. El número de metástasis no es contraindicación absoluta — la resecabilidad técnica y biológica es lo que importa.",
    ref:"Recomendaciones para diagnóstico y tratamiento del cáncer de colon y recto en México. AMC-AMCE. 2019."
  },
  {
    cat:"epi", catName:"Epidemiología / Factores de Riesgo",
    q:"¿Cuál de los siguientes patrones clínicos debe alertar al médico sobre la posibilidad de un cáncer de colon derecho vs. colon izquierdo?",
    opts:["Colon derecho: anemia ferropénica crónica sin sangrado visible y masa palpable en FID; colon izquierdo: hematoquecia, cambio en calibre de heces y síntomas obstructivos","Colon derecho: hematoquecia franca y cambio en calibre de heces; colon izquierdo: anemia ferropénica asintomática","Ambos lados se presentan igual: siempre con hematoquecia y dolor cólico","Colon derecho: ictericia obstructiva; colon izquierdo: ascitis maligna"],
    ans:0,
    exp:"Los tumores del colon derecho tienden a ser lesiones exofíticas en un segmento de gran calibre, por lo que frecuentemente se presentan como anemia ferropénica crónica (sangrado oculto) sin síntomas obstructivos, y en ocasiones como masa palpable en fosa ilíaca derecha. Los tumores del colon izquierdo ocurren en un segmento de menor calibre con heces ya formadas, provocando obstrucción, cambio en el calibre (heces en 'lápiz'), hematoquecia macroscópica y tenesmo. Esta diferencia clínica es crucial para el ENARM.",
    tip:"<strong>Mnemotecnia colon D vs I:</strong> Derecho = 'Dentro' (sangrado oculto, anemia, asintomático hasta tarde). Izquierdo = 'Afuera' (sangre visible, obstrucción, cambio hábito). Anemia ferropénica inexplicable en adulto mayor sin causa evidente = colonoscopia obligatoria para descartar neoplasia de colon derecho.",
    ref:"GPC: Detección oportuna y diagnóstico de cáncer de colon y recto no hereditario. SSA-IMSS-ISSSTE. 2008."

  {
    cat:"tam", catName:"Tamizaje",
    q:"Se realiza colonoscopia de tamizaje a una mujer de 53 años asintomática. Se encuentran y resecan 3 adenomas tubulares, el mayor de 8 mm, sin displasia de alto grado. ¿Cuándo debe realizarse la próxima colonoscopia de vigilancia?",
    opts:["En 10 años (igual que tamizaje de riesgo promedio)","En 1-3 años (adenomas de alto riesgo)","En 5 años (adenomas de riesgo intermedio: 3-4 adenomas o adenoma 6-9 mm)","En 6 meses (resección incompleta probable)"],
    ans:2,
    exp:"Según las guías de vigilancia post-polipectomía, pacientes con 3-4 adenomas o con un adenoma de 6-9 mm son considerados de riesgo intermedio y deben repetir la colonoscopia en 3-5 años (el intervalo exacto varía según guía, con tendencia actual a 3 años). Alto riesgo (vigilancia en 1-3 años): ≥5 adenomas, o adenoma ≥10 mm, o adenoma velloso/displasia alto grado. Este caso con 3 adenomas y el mayor de 8 mm corresponde a riesgo intermedio → siguiente colonoscopia en 3 años según las recomendaciones más recientes.",
    tip:"<strong>Intervalos de vigilancia post-polipectomía:</strong> Sin pólipos o solo hiperplásicos: repetir en 10 años. 1-2 adenomas tubulares &lt;10 mm bajo grado: 5-10 años. 3-4 adenomas o adenoma 6-9 mm: 3 años. ≥5 adenomas, adenoma ≥10 mm, velloso o alto grado: 1-3 años. Resección fragmentada de adenoma grande: 6 meses para confirmar resección completa.",
    ref:"GPC: Detección oportuna y diagnóstico de cáncer de colon y recto no hereditario. SSA-IMSS-ISSSTE. 2008."
  }
];

let currentQ = 0, score = 0, answers = [];
let catStats = { epi:{c:0,t:0}, diag:{c:0,t:0}, tam:{c:0,t:0}, her:{c:0,t:0}, tx:{c:0,t:0} };

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function init() {
  shuffle(questions);
  currentQ=0; score=0; answers=[];
  catStats = { epi:{c:0,t:0}, diag:{c:0,t:0}, tam:{c:0,t:0}, her:{c:0,t:0}, tx:{c:0,t:0} };
  const r=document.getElementById('resultsArea');
  r.classList.remove('show'); r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion() {
  const qa=questions[currentQ], total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const letters=['A','B','C','D'];
  let html=`<div class="question-card">
    <div class="q-category cat-${qa.cat}">${qa.catName}</div>
    <div class="q-number">Pregunta ${currentQ+1} de ${total}</div>
    <div class="q-text">${qa.q}</div>
    <div class="options">`;
  qa.opts.forEach((opt,i)=>{
    html+=`<button class="option-btn" onclick="selectAnswer(${i})" data-idx="${i}">
      <span class="option-letter">${letters[i]}</span><span>${opt}</span></button>`;
  });
  html+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=html;
}

function selectAnswer(idx) {
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const isCorrect=idx===qa.ans;
  btns.forEach((btn,i)=>{
    btn.classList.add('disabled'); btn.onclick=null;
    if(i===qa.ans) btn.classList.add('correct-answer');
    if(i===idx&&!isCorrect) btn.classList.add('wrong-answer');
  });
  if(!catStats[qa.cat]) catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(isCorrect){score++;catStats[qa.cat].c++;}
  if(!examMode){
    fb.className=isCorrect?'feedback correct-fb show':'feedback wrong-fb show';
    fb.innerHTML=isCorrect
      ?`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`
      :`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;
  }
  answers.push({q:qa.q,correct:isCorrect,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if(currentQ>=questions.length) showResults();
  else renderQuestion();
}

function showResults() {
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'🏆 ¡Dominio excelente de cáncer colorrectal!':pct>=70?'👏 ¡Muy bien! Repasa los temas con menor puntaje.':pct>=50?'📚 Aceptable, refuerza las áreas débiles.':'⚠️ Revisa las GPC de detección y tratamiento de cáncer colorrectal.';
  const cats=[
    {name:'Epidemiología/FR',key:'epi',color:'#fbbf24'},
    {name:'Diagnóstico/Estadif.',key:'diag',color:'#38bdf8'},
    {name:'Tamizaje',key:'tam',color:'#34d399'},
    {name:'Síndromes Hereditarios',key:'her',color:'#f472b6'},
    {name:'Tratamiento',key:'tx',color:'#a78bfa'},
  ];
  let html=`<div class="results-header">
    <div class="score-big">${pct}%</div>
    <div class="score-label">${score} de ${questions.length} correctas</div>
    <div class="score-msg">${msg}</div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📊</span> Rendimiento por Categoría</div>
    <div class="bar-chart">`;
  cats.forEach(cat=>{
    const s=catStats[cat.key]||{c:0,t:0};
    const p=s.t>0?Math.round((s.c/s.t)*100):0;
    html+=`<div class="bar-row"><div class="bar-label">${cat.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${cat.color};">${p}% (${s.c}/${s.t})</div></div></div>`;
  });
  html+=`</div></div>
  <div class="chart-section">
    <div class="chart-title"><span>🎯</span> Resumen General</div>
    <div class="donut-wrap">
      <svg class="donut-svg" viewBox="0 0 42 42">
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
        <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
      </svg>
      <div class="donut-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#38bdf8;"></div>Total: ${questions.length}</div>
      </div>
    </div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{
    html+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
      <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
      <div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div>
      <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
      <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
    </div>`;
  });
  html+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const res=document.getElementById('resultsArea');
  res.innerHTML=html; res.classList.add('show');
  res.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(header){header.classList.toggle('open');header.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}

init();
</script>
</body>
</html>
