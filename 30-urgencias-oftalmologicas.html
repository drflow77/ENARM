<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Superficie Ocular y Urgencias — ENARM · Oftalmología · Tema 30</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0e1a; --surface: #111827; --surface2: #1a2235; --surface3: #212d45;
    --border: #2a3a5c; --text: #e8ecf4; --text-dim: #8896b3;
    --accent: #34d399; --accent-glow: rgba(52,211,153,0.15);
    --correct: #34d399; --correct-bg: rgba(52,211,153,0.1); --correct-border: rgba(52,211,153,0.4);
    --wrong: #f87171; --wrong-bg: rgba(248,113,113,0.1); --wrong-border: rgba(248,113,113,0.4);
    --gold: #fbbf24; --purple: #a78bfa; --pink: #f472b6; --teal: #2dd4bf; --blue: #38bdf8;
    --sidebar-w: 280px; --radius: 14px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; }

  /* ── Sidebar ── */
  .sidebar {
    width:var(--sidebar-w); min-height:100vh; background:var(--surface);
    border-right:1px solid var(--border); display:flex; flex-direction:column;
    position:fixed; left:0; top:0; bottom:0; overflow-y:auto; z-index:100; transition:transform 0.3s;
  }
  .sidebar-logo { padding:24px 20px 16px; border-bottom:1px solid var(--border); }
  .logo-badge { display:inline-flex; align-items:center; gap:8px; background:linear-gradient(135deg,var(--blue),var(--purple)); padding:6px 14px; border-radius:100px; font-size:0.75rem; font-weight:800; color:var(--bg); letter-spacing:0.5px; text-transform:uppercase; margin-bottom:10px; }
  .sidebar-logo h2 { font-size:1.1rem; font-weight:800; background:linear-gradient(135deg,var(--text),var(--blue)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .sidebar-logo p { font-size:0.72rem; color:var(--text-dim); margin-top:2px; }
  .back-btn { display:flex; align-items:center; gap:8px; padding:14px 20px; color:var(--text-dim); font-size:0.8rem; text-decoration:none; border-bottom:1px solid var(--border); transition:color 0.2s; }
  .back-btn:hover { color:var(--blue); }
  .sidebar-nav { flex:1; padding:12px 0 24px; }
  .specialty-header { display:flex; align-items:center; justify-content:space-between; padding:10px 16px 10px 20px; cursor:pointer; transition:background 0.2s; user-select:none; }
  .specialty-header:hover { background:var(--surface2); }
  .specialty-name { display:flex; align-items:center; gap:10px; font-size:0.78rem; font-weight:700; text-transform:uppercase; letter-spacing:0.6px; }
  .specialty-icon { width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:0.9rem; flex-shrink:0; }
  .chevron { font-size:0.65rem; color:var(--text-dim); transition:transform 0.3s; }
  .specialty-header.open .chevron { transform:rotate(90deg); }
  .topics-list { display:none; padding:4px 0 8px; }
  .topics-list.open { display:block; }
  .topic-link { display:flex; align-items:center; gap:10px; padding:8px 16px 8px 56px; font-size:0.78rem; color:var(--text-dim); text-decoration:none; transition:all 0.2s; border-left:2px solid transparent; line-height:1.4; }
  .topic-link:hover { color:var(--text); background:var(--surface3); }
  .topic-link.active { color:var(--accent); border-left-color:var(--accent); background:rgba(52,211,153,0.12); font-weight:600; }
  .topic-link.coming-soon { opacity:0.4; cursor:not-allowed; pointer-events:none; }
  .topic-num { font-family:'JetBrains Mono',monospace; font-size:0.68rem; color:var(--text-dim); min-width:20px; }
  .badge-soon { margin-left:auto; background:rgba(136,150,179,0.1); color:var(--text-dim); font-size:0.62rem; font-weight:600; padding:2px 7px; border-radius:100px; }
  .badge-ready { margin-left:auto; background:rgba(52,211,153,0.12); color:#34d399; font-size:0.62rem; font-weight:600; padding:2px 7px; border-radius:100px; }

  /* ── Main ── */
  .main-wrap { margin-left:var(--sidebar-w); flex:1; display:flex; flex-direction:column; min-height:100vh; }
  .top-bar { padding:20px 32px 0; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
  .topic-badge { display:inline-flex; align-items:center; gap:8px; background:rgba(52,211,153,0.12); color:var(--accent); font-size:0.72rem; font-weight:700; padding:5px 12px; border-radius:100px; border:1px solid rgba(52,211,153,0.2); }
  .mode-toggle { display:flex; gap:8px; }
  .mode-btn { padding:7px 18px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--text-dim); font-family:inherit; font-size:0.78rem; font-weight:600; cursor:pointer; transition:all 0.2s; }
  .mode-btn.active { background:var(--accent); color:var(--bg); border-color:transparent; }

  .hero { padding:24px 32px 20px; }
  .hero h1 { font-size:1.55rem; font-weight:800; background:linear-gradient(135deg,var(--text) 60%,var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:4px; }
  .hero p { font-size:0.82rem; color:var(--text-dim); }
  .progress-row { display:flex; align-items:center; gap:12px; margin-top:14px; }
  .progress-track { flex:1; height:5px; background:var(--surface3); border-radius:3px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--teal)); border-radius:3px; transition:width 0.4s ease; }
  .progress-label { font-family:'JetBrains Mono',monospace; font-size:0.72rem; color:var(--text-dim); white-space:nowrap; }

  /* ── Category badge colors ── */
  .cat-conj { background:rgba(45,212,191,0.12);  color:#2dd4bf; }
  .cat-alrg { background:rgba(244,114,182,0.12); color:#f472b6; }
  .cat-seco { background:rgba(56,189,248,0.12);  color:#38bdf8; }
  .cat-qrat { background:rgba(251,191,36,0.12);  color:#fbbf24; }
  .cat-pter { background:rgba(52,211,153,0.12);  color:#34d399; }
  .cat-trau { background:rgba(251,146,60,0.12);  color:#fb923c; }
  .cat-endo { background:rgba(248,113,113,0.12); color:#f87171; }
  .cat-rop  { background:rgba(167,139,250,0.12); color:#a78bfa; }
  .cat-celo { background:rgba(129,140,248,0.12); color:#818cf8; }

  /* ── Card ── */
  .quiz-area { padding:0 32px 32px; flex:1; }
  .q-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:28px; margin-bottom:16px; position:relative; }
  .q-card-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:8px; }
  .cat-badge { font-size:0.7rem; font-weight:700; padding:4px 11px; border-radius:100px; }
  .q-num { font-family:'JetBrains Mono',monospace; font-size:0.72rem; color:var(--text-dim); }
  .q-text { font-size:1rem; font-weight:600; line-height:1.55; color:var(--text); margin-bottom:20px; }
  .options { display:flex; flex-direction:column; gap:9px; }
  .opt-btn {
    display:flex; align-items:center; gap:14px; padding:13px 16px;
    background:var(--surface2); border:1px solid var(--border); border-radius:10px;
    color:var(--text-dim); font-family:inherit; font-size:0.88rem; font-weight:500;
    cursor:pointer; transition:all 0.2s; text-align:left;
  }
  .opt-btn:hover:not(:disabled) { border-color:var(--accent); color:var(--text); background:var(--surface3); }
  .opt-btn.correct { background:var(--correct-bg); border-color:var(--correct-border); color:var(--correct); }
  .opt-btn.wrong   { background:var(--wrong-bg);   border-color:var(--wrong-border);   color:var(--wrong); }
  .opt-btn.reveal  { background:var(--correct-bg); border-color:var(--correct-border); color:var(--correct); opacity:0.7; }
  .opt-btn:disabled { cursor:default; }
  .opt-letter { font-family:'JetBrains Mono',monospace; font-size:0.75rem; font-weight:700; min-width:26px; height:26px; border-radius:6px; background:var(--surface3); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background 0.2s,color 0.2s; }
  .opt-btn.correct .opt-letter { background:var(--correct); color:var(--bg); }
  .opt-btn.wrong   .opt-letter { background:var(--wrong);   color:var(--bg); }
  .opt-btn.reveal  .opt-letter { background:var(--correct); color:var(--bg); }

  /* ── Feedback ── */
  .feedback { margin-top:18px; padding:16px 18px; background:var(--surface2); border-left:3px solid var(--accent); border-radius:0 10px 10px 0; display:none; }
  .feedback.show { display:block; animation:fadeIn 0.3s ease; }
  .feedback-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .feedback-icon { font-size:1rem; }
  .feedback-label { font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--accent); }
  .feedback p { font-size:0.84rem; line-height:1.6; color:var(--text-dim); }
  .feedback strong { color:var(--text); }
  .tip-row { margin-top:8px; display:flex; gap:6px; flex-wrap:wrap; }
  .tip-tag { font-size:0.72rem; background:rgba(56,189,248,0.1); color:var(--blue); padding:3px 9px; border-radius:100px; font-weight:600; }

  /* ── Nav buttons ── */
  .nav-row { display:flex; justify-content:flex-end; gap:10px; margin-top:16px; }
  .btn-next { padding:10px 24px; background:var(--accent); border:none; border-radius:9px; color:var(--bg); font-family:inherit; font-size:0.85rem; font-weight:700; cursor:pointer; transition:all 0.2s; }
  .btn-next:hover { filter:brightness(1.1); }
  .btn-next:disabled { opacity:0.35; cursor:not-allowed; }

  /* ── Results ── */
  .results-panel { display:none; padding:32px; }
  .results-panel.show { display:block; }
  .result-hero { text-align:center; margin-bottom:32px; }
  .score-circle { width:120px; height:120px; border-radius:50%; border:4px solid var(--accent); display:flex; flex-direction:column; align-items:center; justify-content:center; margin:0 auto 16px; background:var(--correct-bg); }
  .score-number { font-family:'JetBrains Mono',monospace; font-size:2rem; font-weight:800; color:var(--accent); line-height:1; }
  .score-denom { font-family:'JetBrains Mono',monospace; font-size:0.85rem; color:var(--text-dim); }
  .result-msg { font-size:1.1rem; font-weight:700; color:var(--text); margin-bottom:4px; }
  .result-sub { font-size:0.82rem; color:var(--text-dim); }
  .stats-grid { display:grid; gap:10px; margin-bottom:28px; }
  .stat-row { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 16px; }
  .stat-label { font-size:0.78rem; font-weight:600; margin-bottom:7px; display:flex; justify-content:space-between; }
  .stat-label span:last-child { font-family:'JetBrains Mono',monospace; font-size:0.72rem; color:var(--text-dim); }
  .stat-bar-track { height:6px; background:var(--surface3); border-radius:3px; overflow:hidden; }
  .stat-bar-fill { height:100%; border-radius:3px; transition:width 0.6s ease; }
  .btn-restart { display:block; width:100%; padding:14px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:inherit; font-size:0.9rem; font-weight:700; cursor:pointer; transition:all 0.2s; margin-top:8px; }
  .btn-restart:hover { border-color:var(--accent); color:var(--accent); }

  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  @media (max-width:768px) {
    .sidebar { transform:translateX(-100%); }
    .main-wrap { margin-left:0; }
    .hero, .top-bar, .quiz-area, .results-panel { padding-left:16px; padding-right:16px; }
  }
</style>
</head>
<body>

<aside id="sidebar"></aside>

<div class="main-wrap">
  <div class="top-bar">
    <span class="topic-badge">👁️ Oftalmología · Tema 30</span>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-repaso" onclick="setMode('repaso')">📖 Repaso</button>
      <button class="mode-btn" id="btn-examen" onclick="setMode('examen')">📝 Examen</button>
    </div>
  </div>

  <div class="hero">
    <h1>Superficie Ocular y Urgencias</h1>
    <p>9 Guías de Práctica Clínica · 27 preguntas · Conjuntivitis, Ojo Seco, Queratocono, Pterigión, Trauma, Endoftalmitis, ROP y Celulitis Orbitaria</p>
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <span class="progress-label" id="progressLabel">0 / 27</span>
    </div>
  </div>

  <div class="quiz-area" id="quizArea">
    <div class="q-card" id="qCard">
      <div class="q-card-top">
        <span class="cat-badge" id="catBadge"></span>
        <span class="q-num" id="qNum"></span>
      </div>
      <p class="q-text" id="qText"></p>
      <div class="options" id="optionsDiv"></div>
      <div class="feedback" id="feedback">
        <div class="feedback-header">
          <span class="feedback-icon">💡</span>
          <span class="feedback-label">Explicación</span>
        </div>
        <p id="feedbackText"></p>
        <div class="tip-row" id="tipRow"></div>
      </div>
      <div class="nav-row">
        <button class="btn-next" id="btnNext" onclick="nextQ()" disabled>Siguiente →</button>
      </div>
    </div>
  </div>

  <div class="results-panel" id="resultsPanel">
    <div class="result-hero">
      <div class="score-circle">
        <span class="score-number" id="scoreNum">—</span>
        <span class="score-denom" id="scoreDenom">/ 27</span>
      </div>
      <div class="result-msg" id="resultMsg"></div>
      <div class="result-sub" id="resultSub"></div>
    </div>
    <div class="stats-grid" id="statsGrid"></div>
    <button class="btn-restart" onclick="restart()">↺ Volver a intentar</button>
  </div>
</div>

<script>
function toggleSpec(h) {
  const l = h.nextElementSibling;
  const open = l.classList.contains('open');
  document.querySelectorAll('.topics-list.open').forEach(x => { x.classList.remove('open'); x.previousElementSibling.classList.remove('open'); });
  if (!open) { l.classList.add('open'); h.classList.add('open'); }
}

// ── QUESTIONS ────────────────────────────────────────────────────────────────
const QS = [
  // ── 1. Conjuntivitis Bacteriana (GPC IMSS 2009 / SSA 2010) ───────────────
  { cat:'conj', catName:'Conjuntivitis Bacteriana',
    q:'¿Cuál es el agente etiológico más frecuente de conjuntivitis bacteriana aguda en adultos?',
    opts:['Haemophilus influenzae','Staphylococcus aureus / Staphylococcus epidermidis','Neisseria gonorrhoeae','Pseudomonas aeruginosa'],
    ans:1,
    exp:'En adultos el S. aureus y S. epidermidis son los gérmenes más comunes. En niños predomina H. influenzae. N. gonorrhoeae produce la forma hiperaguda (pus franca, riesgo de perforación corneal).',
    tip:'Recuerda: en neonatos → N. gonorrhoeae (1-5 días) y Chlamydia (5-14 días).' },

  { cat:'conj', catName:'Conjuntivitis Bacteriana',
    q:'¿Cuál es la característica clínica que distingue la conjuntivitis bacteriana de la viral?',
    opts:['Hiperemia conjuntival intensa','Secreción mucopurulenta (no acuosa)','Quémosis bilateral','Fotofobia severa'],
    ans:1,
    exp:'La secreción mucopurulenta es típica de la conjuntivitis bacteriana. La viral produce secreción acuosa o serosa. Ambas pueden causar hiperemia y quémosis, pero la secreción es el rasgo diferenciador clave.',
    tip:'Bilateral desde inicio + secreción acuosa + adenopatía preauricular = viral (adenovirus).' },

  { cat:'conj', catName:'Conjuntivitis Bacteriana',
    q:'Primera línea de tratamiento para conjuntivitis bacteriana aguda no complicada:',
    opts:['Corticosteroides tópicos (dexametasona)','Antibiótico tópico (ciprofloxacino o tobramicina colirio)','Antivirales sistémicos (aciclovir)','Antihistamínicos orales'],
    ans:1,
    exp:'Los antibióticos tópicos de amplio espectro (fluoroquinolonas, aminoglucósidos, ácido fusídico) acortan el curso. Los corticosteroides están contraindicados sin diagnóstico preciso, ya que pueden agravar infecciones virales o fúngicas.',
    tip:'Contraindicados esteroides tópicos sin certeza diagnóstica: riesgo de úlcera herpética.' },

  // ── 2. Conjuntivitis Alérgica (GPC IMSS 2011) ────────────────────────────
  { cat:'alrg', catName:'Conjuntivitis Alérgica',
    q:'Síntoma cardinal de la conjuntivitis alérgica que la distingue de otras formas:',
    opts:['Dolor ocular agudo','Prurito intenso bilateral','Secreción purulenta','Visión borrosa progresiva'],
    ans:1,
    exp:'El prurito bilateral intenso es el síntoma patognomónico de la conjuntivitis alérgica. También produce epifora, quémosis y papilas en tarso superior. La secreción es acuosa o mucosa (no purulenta).',
    tip:'Sin prurito → pensar en diagnóstico diferente (infecciosa, seca, etc.).' },

  { cat:'alrg', catName:'Conjuntivitis Alérgica',
    q:'Tipo más grave de conjuntivitis alérgica, asociado a daño corneal y visión comprometida:',
    opts:['Conjuntivitis alérgica estacional','Queratoconjuntivitis vernal','Conjuntivitis papilar gigante','Queratoconjuntivitis atópica'],
    ans:1,
    exp:'La queratoconjuntivitis vernal (QCV) afecta predominantemente a niños y adultos jóvenes, con papilas gigantes en tarso superior ("empedrado"), puntos de Horner-Trantas y placas escudiformes corneales que amenazan la visión.',
    tip:'QCV: papilas gigantes + puntos de Horner-Trantas en limbo + placa escudiforme corneal.' },

  { cat:'alrg', catName:'Conjuntivitis Alérgica',
    q:'Primera línea de tratamiento farmacológico para la conjuntivitis alérgica estacional leve:',
    opts:['Corticosteroides tópicos','Antihistamínicos tópicos con efecto estabilizador de mastocitos (ketotifeno, olopatadina)','Ciclosporina tópica','Antibióticos tópicos'],
    ans:1,
    exp:'Los antagonistas H1 de doble acción (antihistamínico + estabilizador mastocitario) como ketotifeno u olopatadina son primera línea. Los corticosteroides se reservan para formas graves (QCV, QCA) por riesgo de hipertensión ocular, catarata y úlcera herpética.',
    tip:'Corticosteroides tópicos: riesgo de glaucoma, catarata subcapsular posterior y sobreinfección herpética.' },

  // ── 3. Síndrome de Ojo Seco (GPC SSA 2014) ───────────────────────────────
  { cat:'seco', catName:'Síndrome de Ojo Seco',
    q:'Clasificación del ojo seco según el mecanismo fisiopatológico principal:',
    opts:['Inflamatorio vs. no inflamatorio','Deficiencia acuosa (ej. Sjögren) vs. evaporativo (ej. disfunción glándulas de Meibomio)','Agudo vs. crónico','Unilateral vs. bilateral'],
    ans:1,
    exp:'La clasificación del DEWS (Dry Eye Workshop) divide el ojo seco en: 1) Deficiencia acuosa: fallo de la glándula lagrimal (Sjögren, postirradiación); 2) Evaporativo: disfunción de las glándulas de Meibomio (MGD) es la causa más frecuente. Ambos comparten inflamación crónica de la superficie ocular.',
    tip:'La disfunción de glándulas de Meibomio (MGD) es la causa más común de ojo seco evaporativo.' },

  { cat:'seco', catName:'Síndrome de Ojo Seco',
    q:'¿Qué mide el Test de Schirmer I y cuál es el valor límite de normalidad?',
    opts:['Estabilidad de la película lagrimal; TFBUT < 10 segundos = patológico','Volumen de producción lagrimal basal + refleja; < 10 mm en 5 min = hiposecreción','Osmolaridad lagrimal; > 308 mOsm/L = ojo seco','Tinción corneal con fluoresceína; > 3 puntos = patológico'],
    ans:1,
    exp:'El Test de Schirmer I (sin anestesia) mide la producción lagrimal total. Valores ≤10 mm a los 5 minutos indican hiposecreción. El TFBUT (tiempo de ruptura de la película lagrimal) evalúa estabilidad: normal >10 seg.',
    tip:'Schirmer I < 5 mm = ojo seco severo; 5-10 mm = moderado.' },

  { cat:'seco', catName:'Síndrome de Ojo Seco',
    q:'Tratamiento de segunda línea para ojo seco moderado-severo con componente inflamatorio refractario a lágrimas artificiales:',
    opts:['Antibióticos tópicos profilácticos','Ciclosporina A tópica al 0.05-0.1% (Restasis®)','Corticosteroides tópicos a largo plazo','Antivirales orales'],
    ans:1,
    exp:'La ciclosporina tópica es inmunomoduladora: inhibe la activación de linfocitos T que perpetúan la inflamación en la superficie ocular y glándula lagrimal. Es la única molécula aprobada por la FDA para ojo seco con componente inflamatorio. Lágrimas artificiales siguen siendo la base.',
    tip:'Ciclosporina tópica: inicio de efecto a las 3-6 semanas; uso a largo plazo, no inmunosupresor sistémico.' },

  // ── 4. Queratocono (GPC IMSS 2010) ───────────────────────────────────────
  { cat:'qrat', catName:'Queratocono',
    q:'El queratocono se define como:',
    opts:['Inflamación estromal de la córnea por herpes zóster','Ectasia corneal progresiva no inflamatoria que produce adelgazamiento y protrusión cónica de la córnea','Depósito de proteoglicanos en el estroma corneal','Calcificación subepitelial de la membrana de Bowman'],
    ans:1,
    exp:'El queratocono es una ectasia corneal progresiva (no inflamatoria) caracterizada por adelgazamiento y protrusión apical de la córnea. Produce astigmatismo irregular miópico progresivo. Onset: adolescencia-adulto joven. Bilateral (asimétrico).',
    tip:'Signo de Munson: protrusión del párpado inferior al mirar hacia abajo. Anillos de Fleischer en la membrana de Bowman.' },

  { cat:'qrat', catName:'Queratocono',
    q:'Prueba diagnóstica gold standard para detectar queratocono en estadios tempranos (forme fruste):',
    opts:['Agudeza visual con corrección','Microscopía especular del endotelio','Topografía corneal (curvatura anterior + posterior)','Biomicroscopía de lámpara de hendidura'],
    ans:2,

// ── STATE ─────────────────────────────────────────────────────────────────────
let mode = 'repaso';
let idx = 0;
let score = 0;
let answered = false;
let catStats = { conj:0, alrg:0, seco:0, qrat:0, pter:0, trau:0, endo:0, rop:0, celo:0 };
let catTotals = { conj:3, alrg:3, seco:3, qrat:3, pter:3, trau:3, endo:3, rop:3, celo:3 };
const catColors = {
  conj:'#2dd4bf', alrg:'#f472b6', seco:'#38bdf8',
  qrat:'#fbbf24', pter:'#34d399', trau:'#fb923c',
  endo:'#f87171', rop:'#a78bfa', celo:'#818cf8'
};

function setMode(m) {
  mode = m;
  document.getElementById('btn-repaso').classList.toggle('active', m === 'repaso');
  document.getElementById('btn-examen').classList.toggle('active', m === 'examen');
  restart();
}

function restart() {
  idx = 0; score = 0; answered = false;
  catStats = { conj:0, alrg:0, seco:0, qrat:0, pter:0, trau:0, endo:0, rop:0, celo:0 };
  document.getElementById('resultsPanel').classList.remove('show');
  document.getElementById('quizArea').style.display = '';
  renderQ();
}

function renderQ() {
  if (idx >= QS.length) { showResults(); return; }
  const q = QS[idx];
  answered = false;

  document.getElementById('progressFill').style.width = (idx / QS.length * 100) + '%';
  document.getElementById('progressLabel').textContent = `${idx} / ${QS.length}`;

  const badge = document.getElementById('catBadge');
  badge.textContent = q.catName;
  badge.className = `cat-badge cat-${q.cat}`;

  document.getElementById('qNum').textContent = `Pregunta ${idx + 1}`;
  document.getElementById('qText').textContent = q.q;

  const opts = document.getElementById('optionsDiv');
  opts.innerHTML = '';
  ['A','B','C','D'].forEach((l, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-letter">${l}</span><span>${q.opts[i]}</span>`;
    btn.onclick = () => pick(i);
    opts.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  fb.classList.remove('show');
  document.getElementById('btnNext').disabled = true;
}

function pick(i) {
  if (answered) return;
  answered = true;
  const q = QS[idx];
  const btns = document.querySelectorAll('.opt-btn');

  if (i === q.ans) {
    btns[i].classList.add('correct');
    score++;
    catStats[q.cat]++;
  } else {
    btns[i].classList.add('wrong');
    btns[q.ans].classList.add('reveal');
  }
  btns.forEach(b => b.disabled = true);

  if (mode === 'repaso') {
    const fb = document.getElementById('feedback');
    document.getElementById('feedbackText').innerHTML = q.exp;
    const tipRow = document.getElementById('tipRow');
    tipRow.innerHTML = q.tip ? `<span class="tip-tag">💡 ${q.tip}</span>` : '';
    fb.classList.add('show');
  }

  document.getElementById('btnNext').disabled = false;
}

function nextQ() {
  idx++;
  renderQ();
}

function showResults() {
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = `${QS.length} / ${QS.length}`;
  document.getElementById('quizArea').style.display = 'none';

  const panel = document.getElementById('resultsPanel');
  panel.classList.add('show');
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('scoreDenom').textContent = `/ ${QS.length}`;

  const pct = Math.round(score / QS.length * 100);
  document.getElementById('resultMsg').textContent =
    pct >= 80 ? '¡Excelente dominio clínico!' :
    pct >= 60 ? 'Buen trabajo — sigue repasando.' :
    'Repasa los temas con menor puntaje.';
  document.getElementById('resultSub').textContent = `${pct}% de respuestas correctas · ${score}/${QS.length}`;

  const grid = document.getElementById('statsGrid');
  const catNames = {
    conj:'Conjuntivitis Bacteriana', alrg:'Conjuntivitis Alérgica',
    seco:'Ojo Seco', qrat:'Queratocono', pter:'Pterigión',
    trau:'Trauma y Quemaduras', endo:'Endoftalmitis',
    rop:'Retinopatía del Prematuro', celo:'Celulitis Orbitaria'
  };
  grid.innerHTML = Object.keys(catStats).map(k => {
    const val = catStats[k], tot = catTotals[k];
    const p = Math.round(val / tot * 100);
    return `<div class="stat-row">
      <div class="stat-label">
        <span style="color:${catColors[k]}">${catNames[k]}</span>
        <span>${val}/${tot}</span>
      </div>
      <div class="stat-bar-track">
        <div class="stat-bar-fill" style="width:${p}%;background:${catColors[k]}"></div>
      </div>
    </div>`;
  }).join('');
}

renderQ();
</script>
