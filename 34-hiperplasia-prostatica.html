<script>
let examMode = false;
function setMode(mode) {
  examMode = (mode==='examen');
  document.getElementById('btnRepaso').classList.toggle('active',!examMode);
  document.getElementById('btnExamen').classList.toggle('active',examMode);
  init();
}

const questions = [
  {
    cat:"dx", catName:"Diagnóstico/Síntomas",
    q:"¿En qué zona anatómica de la próstata se origina la hiperplasia prostática benigna (HPB)?",
    opts:["Zona periférica posterior","Zona central periductal","Zona de transición (periuretral)","Zona fibromuscular anterior"],
    ans:2,
    exp:"La HPB se origina exclusivamente en la zona de transición (zona periuretral), que rodea la uretra proximal. Esta zona representa ~5% del volumen prostático en adultos jóvenes pero puede crecer hasta constituir el 80% en hombres mayores con HPB severa. En contraste, el adenocarcinoma prostático se origina en la zona periférica (70-80% de los casos). Esta distinción anatómica explica por qué HPB y cáncer son patologías independientes.",
    tip:"<strong>Zonas de la próstata en el ENARM:</strong> Zona periférica → cáncer. Zona de transición → HPB. El crecimiento de la zona transicional comprime la uretra (síntomas obstructivos) y eleva el cuello vesical (síntomas irritativos por hiperactividad del detrusor). El tacto rectal en HPB muestra próstata aumentada de tamaño, lisa, elástica y sin nódulos.",
    ref:"GPC: Diagnóstico y tratamiento de hiperplasia prostática benigna. CENETEC."
  },
  {
    cat:"dx", catName:"Diagnóstico/Síntomas",
    q:"Hombre de 67 años refiere dificultad para iniciar la micción, chorro urinario débil, sensación de vaciamiento incompleto y nicturia 3 veces. ¿Cómo se clasifican estos síntomas?",
    opts:["Síntomas del tracto urinario inferior (STUI): obstructivos e irritativos mixtos","Síntomas obstructivos exclusivamente","Síntomas irritativos exclusivamente","Crisis de retención urinaria aguda"],
    ans:0,
    exp:"Los síntomas del tracto urinario inferior (STUI) asociados a HPB se clasifican en obstructivos (dificultad para iniciar la micción, chorro débil, intermitencia, pujo, goteo terminal, vaciamiento incompleto) e irritativos (urgencia, frecuencia aumentada, nicturia, urgencia-incontinencia). El paciente presenta ambos tipos: dificultad de inicio y chorro débil (obstructivos) + nicturia (irritativo). La evaluación objetiva se hace con la escala IPSS.",
    tip:"<strong>Regla mnemotécnica STUI:</strong> Obstructivos = problemas con el CHORRO (Chorro débil, Hesitancia, Intermitencia, Goteo terminal). Irritativos = problemas con las GANAS (Ganas urgentes, Aumento de frecuencia, Nocturia frecuente, Asistencia tardía). La nicturia ≥2 veces por noche es clínicamente significativa en HPB.",
    ref:"GPC: Diagnóstico y tratamiento de hiperplasia prostática benigna. CENETEC."
  },
  {
    cat:"dx", catName:"Diagnóstico/Síntomas",
    q:"¿Cuál es el estudio de imagen de primera línea para evaluar el tracto urinario en HPB y estimar el volumen prostático?",
    opts:["Tomografía computada de abdomen y pelvis","Ultrasonido transabdominal/transrectal de próstata","Resonancia magnética multiparamétrica de próstata","Urografía excretora"],
    ans:1,
    exp:"El ultrasonido (USG) es el estudio de imagen de elección en HPB. El USG transabdominal permite estimar el volumen prostático (normal <30 mL), medir el residuo postmiccional y evaluar el tracto urinario superior (dilatación ureteral, hidronefrosis). El USG transrectal (USTR) proporciona mayor precisión en la medición del volumen. La fórmula del volumen prostático es: largo × ancho × altura × 0.52. La TC y RMN no son estudios de primera línea en HPB.",
    tip:"<strong>Residuo postmiccional (RPM) por USG:</strong> Normal <50 mL. 50-300 mL: zona gris, considerar tratamiento. >300 mL: indicación de cirugía (uno de los criterios absolutos). El RPM elevado predispone a ITU recurrente, cálculos vesicales e insuficiencia renal obstructiva.",
    ref:"GPC: Diagnóstico y tratamiento de hiperplasia prostática benigna. CENETEC."
  },
  {
    cat:"ipss", catName:"Escala IPSS",
    q:"Un paciente con HPB llena el cuestionario IPSS y obtiene una puntuación de 14. ¿Cómo se interpreta y qué manejo inicial corresponde?",
    opts:["IPSS leve (0-7): observación expectante","IPSS severo (20-35): cirugía de urgencia","IPSS moderado (8-19): tratamiento médico o conducta expectante","IPSS moderado (8-19): cirugía de inmediata"],
    ans:2,
    exp:"La escala IPSS (International Prostate Symptom Score) clasifica la severidad de los STUI: leve 0-7 (observación), moderado 8-19 (tratamiento médico, vigilancia), severo 20-35 (tratamiento médico intensificado, considerar cirugía). Un IPSS de 14 cae en el rango moderado. La GPC recomienda iniciar con monoterapia médica (alfa-bloqueadores o inhibidores de 5-alfa-reductasa según tamaño prostático) y reevaluar. La cirugía no está indicada solo por puntaje IPSS moderado sin otras complicaciones.",
    tip:"<strong>IPSS: 7 preguntas + 1 de calidad de vida.</strong> Cada pregunta puntúa 0-5 (frecuencia del síntoma). La pregunta de calidad de vida (0=excelente, 6=terrible) no suma al puntaje pero orienta la tolerancia del paciente al tratamiento. Un IPSS de 20+ con calidad de vida 5-6 refuerza la indicación quirúrgica.",
    ref:"GPC: Diagnóstico y tratamiento de hiperplasia prostática benigna. CENETEC."
  },
  {
    cat:"ipss", catName:"Escala IPSS",
    q:"¿Cuál es la utilidad principal de la flujometría (uroflujometría) en la evaluación de HPB?",
    opts:["Medir el volumen prostático con mayor precisión que el USG","Descartar cáncer de próstata","Determinar la indicación quirúrgica de forma absoluta","Evaluar objetivamente la obstrucción infravesical midiendo el flujo máximo (Q máx)"],
    ans:3,
    exp:"La uroflujometría mide el patrón y velocidad del chorro urinario. El parámetro clave es el flujo máximo (Q máx): normal >15 mL/s, zona indeterminada 10-15 mL/s, sugestivo de obstrucción <10 mL/s. Junto con el residuo postmiccional, proporciona evidencia objetiva de obstrucción infravesical. La GPC recomienda uroflujometría antes de decidir tratamiento quirúrgico. No determina por sí sola la indicación quirúrgica ni diferencia entre obstrucción prostática y vejiga hipoactiva.",
    tip:"<strong>Q máx <10 mL/s + RPM >150 mL = perfil obstructivo claro.</strong> La uroflujometría debe hacerse con volumen vesical adecuado (>150 mL) para ser válida. La curva obstructiva tiene forma de meseta (plateau) en lugar de la curva en campana normal. El estudio urodinámico completo se reserva para casos dudosos antes de cirugía.",
    ref:"GPC: Diagnóstico y tratamiento de hiperplasia prostática benigna. CENETEC."
  },
  {
    cat:"ipss", catName:"Escala IPSS",
    q:"Hombre de 70 años con HPB e IPSS de 22. Decide no operarse. ¿Qué otros factores deben evaluarse para definir la urgencia de intervención?",

    ans:0,
    exp:"La retención urinaria aguda (RUA) es una urgencia urológica que requiere drenaje vesical inmediato para aliviar el dolor y prevenir daño renal. El cateterismo uretral (sonda Foley 16-18 Fr) es el primer paso. Si falla por estenosis o no puede introducirse, se realiza cistostomía suprapúbica. Tras resolver la RUA se inicia alfa-bloqueador (tamsulosina) y se programa valoración urológica para definir cirugía definitiva. El 60% de los pacientes puede intentar retiro del catéter a las 48-72 horas bajo alfa-bloqueador.",

    exp:"La hidronefrosis bilateral (o unilateral) secundaria a HPB con insuficiencia renal obstructiva es una indicación absoluta de cirugía. Las 5 indicaciones absolutas clásicas son: 1) Retención urinaria aguda recurrente, 2) ITU recurrente secundaria a HPB, 3) Hematuria macroscópica recurrente refractaria, 4) Litiasis vesical secundaria a HPB, 5) Insuficiencia renal obstructiva (hidronefrosis). En estas situaciones el tratamiento médico es insuficiente y la demora quirúrgica puede producir daño renal irreversible.",

    tip:"<strong>Hematuria + HPB: protocolo diagnóstico.</strong> Siempre descartar cáncer vesical con cistoscopia antes de atribuir la hematuria a HPB. Además: citología urinaria, USG renal, uretrocistoscopia. Solo después de descartar neoplasia se puede manejar como hematuria por HPB. Finasterida reduce PSA y vascularización: puede usarse como puente hasta cirugía.",

let currentQ = 0, score = 0, answers = [];
let catStats = { dx:{c:0,t:0}, ipss:{c:0,t:0}, tx_med:{c:0,t:0}, tx_cx:{c:0,t:0}, comp:{c:0,t:0} };

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function init() {
  shuffle(questions);
  currentQ=0; score=0; answers=[];
  catStats = { dx:{c:0,t:0}, ipss:{c:0,t:0}, tx_med:{c:0,t:0}, tx_cx:{c:0,t:0}, comp:{c:0,t:0} };
  const r=document.getElementById('resultsArea');
  r.classList.remove('show'); r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion() {
  const qa=questions[currentQ], total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const letters=['A','B','C','D'];
  let html=`<div class="question-card"><div class="q-category cat-${qa.cat}">${qa.catName}</div><div class="q-number">Pregunta ${currentQ+1} de ${total}</div><div class="q-text">${qa.q}</div><div class="options">`;
  qa.opts.forEach((opt,i)=>{html+=`<button class="option-btn" onclick="selectAnswer(${i})" data-idx="${i}"><span class="option-letter">${letters[i]}</span><span>${opt}</span></button>`;});
  html+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=html;
}

function selectAnswer(idx) {
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const isCorrect=idx===qa.ans;
  btns.forEach((btn,i)=>{
    btn.classList.add('disabled'); btn.onclick=null;
    if(i===qa.ans) btn.classList.add('correct-answer');
    if(i===idx&&!isCorrect) btn.classList.add('wrong-answer');
  });
  if(!catStats[qa.cat]) catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(isCorrect){score++;catStats[qa.cat].c++;}
  if(!examMode){
    fb.className=isCorrect?'feedback correct-fb show':'feedback wrong-fb show';
    fb.innerHTML=isCorrect
      ?`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`
      :`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;
  }
  answers.push({q:qa.q,correct:isCorrect,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if(currentQ>=questions.length) showResults();
  else renderQuestion();
}

function showResults() {
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'🏆 ¡Excelente dominio de HPB!':pct>=70?'👏 ¡Muy bien! Repasa los temas con menor puntaje.':pct>=50?'📚 Aceptable, refuerza las áreas débiles.':'⚠️ Revisa la GPC de hiperplasia prostática benigna.';
  const cats=[
    {name:'Diagnóstico/Síntomas',key:'dx',color:'#38bdf8'},
    {name:'Escala IPSS',key:'ipss',color:'#fbbf24'},
    {name:'Tratamiento Médico',key:'tx_med',color:'#f472b6'},
    {name:'Tratamiento Quirúrgico',key:'tx_cx',color:'#a78bfa'},
    {name:'Complicaciones',key:'comp',color:'#34d399'},
  ];
  let html=`<div class="results-header"><div class="score-big">${pct}%</div><div class="score-label">${score} de ${questions.length} correctas</div><div class="score-msg">${msg}</div></div>
  <div class="chart-section"><div class="chart-title"><span>📊</span> Rendimiento por Categoría</div><div class="bar-chart">`;
  cats.forEach(cat=>{
    const s=catStats[cat.key]||{c:0,t:0};
    const p=s.t>0?Math.round((s.c/s.t)*100):0;
    html+=`<div class="bar-row"><div class="bar-label">${cat.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${cat.color};">${p}% (${s.c}/${s.t})</div></div></div>`;
  });
  html+=`</div></div><div class="chart-section"><div class="chart-title"><span>🎯</span> Resumen General</div><div class="donut-wrap">
    <svg class="donut-svg" viewBox="0 0 42 42">
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
      <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
    </svg>
    <div class="donut-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#38bdf8;"></div>Total: ${questions.length}</div>
    </div></div></div>
  <div class="chart-section"><div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{
    html+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
      <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
      <div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div>
      <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
      <div style="margin-top:6px;font-size:0.72rem;color:var(--text-dim);opacity:0.6;font-style:italic;">📖 ${a.ref}</div>
    </div>`;
  });
  html+=`</div><button class="retry-btn" onclick="init()">🔄 Repetir Tema</button>`;
  const ra=document.getElementById('resultsArea');
  ra.innerHTML=html; ra.classList.add('show');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function toggleSpec(header) {
  header.classList.toggle('open');
  const list=header.nextElementSibling;
  list.classList.toggle('open');
}

init();
</script>
</body>
</html>
