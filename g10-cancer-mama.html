<script>
let examMode=false, currentQ=0, score=0, answers=[], catStats={};

function setMode(m){
  examMode=(m==='examen');
  document.getElementById('btnRepaso').classList.toggle('active',!examMode);
  document.getElementById('btnExamen').classList.toggle('active',examMode);
  init();
}

const questions = [
  /* ══════════════════════════════════════════════
     GPC 1 — TAMIZAJE Y REFERENCIA OPORTUNA
     Prevención, tamizaje y referencia oportuna de
     casos sospechosos de cáncer de mama en el
     primer nivel de atención 2017
  ══════════════════════════════════════════════ */
  {
    cat:"tam", catName:"Tamizaje y Referencia (1er Nivel)",
    q:"¿Cuál es el factor de riesgo más importante para desarrollar cáncer de mama según la GPC de tamizaje 2017?",
    opts:[
      "Tabaquismo activo mayor de 10 cigarrillos al día por más de 5 años",
      "Sexo femenino y edad avanzada (la edad es el factor de riesgo más importante después del sexo)",
      "Uso de anticonceptivos orales combinados por más de 5 años",
      "Ingesta de alcohol menor a 1 copa diaria"
    ],
    ans:1,
    exp:"El sexo femenino y la edad son los principales factores de riesgo no modificables para cáncer de mama. El riesgo aumenta progresivamente con la edad: el 80% de los casos ocurren después de los 50 años. Otros factores de riesgo relevantes incluyen: antecedente familiar de primer grado (madre/hermana), mutaciones BRCA1/BRCA2, menarquia temprana (<12 años), menopausia tardía (>55 años), nuliparidad, primer embarazo >30 años, y uso prolongado de TRH combinada.",
    tip:"Cáncer de mama: factores NO modificables principales = sexo femenino + edad. 80% de casos >50 años. BRCA1/2 = riesgo acumulado 50-85% de vida.",
    ref:"GPC Prevención, tamizaje y referencia oportuna de casos sospechosos de cáncer de mama en el primer nivel de atención 2017"
  },
  {
    cat:"tam", catName:"Tamizaje y Referencia (1er Nivel)",
    q:"¿Cuál es la estrategia de tamizaje para cáncer de mama recomendada en mujeres de riesgo promedio según la GPC mexicana 2017?",
    opts:[
      "Autoexploración mensual como único método de tamizaje en mujeres de 20-40 años",
      "Mastografía bilateral anual en toda mujer a partir de los 40 años sin límite de edad superior",
      "Mastografía bilateral cada 1-2 años en mujeres de 40-69 años; exploración clínica anual en primer nivel",
      "Solo resonancia magnética contrastada de mama a partir de los 30 años"
    ],
    ans:2,
    exp:"La GPC 2017 recomienda: (1) Mastografía de tamizaje cada 1-2 años en mujeres de 40 a 69 años de riesgo promedio; (2) Exploración clínica mamaria anual realizada por personal de salud capacitado en el primer nivel de atención; (3) La autoexploración mamaria se enseña como método complementario de conocimiento corporal, pero no reduce la mortalidad de forma independiente. En mujeres >70 años, la decisión debe individualizarse.",
    tip:"Tamizaje Ca mama: mastografía c/1-2a en 40-69 años. Exploración clínica anual en 1er nivel. Autoexploración = complementaria, no tamizaje suficiente.",
    ref:"GPC Prevención, tamizaje y referencia oportuna de casos sospechosos de cáncer de mama en el primer nivel de atención 2017"
  },
  {
    cat:"tam", catName:"Tamizaje y Referencia (1er Nivel)",
    q:"Mujer de 35 años con madre y hermana con cáncer de mama, sin prueba genética previa. ¿Cuál es la conducta correcta en primer nivel?",
    opts:[
      "Iniciar mastografía de tamizaje anual a los 40 años como a cualquier mujer de riesgo promedio",
      "Referir a oncología/clínica de alto riesgo para asesoramiento genético y considerar mastografía + RMM desde los 25-30 años",
      "Solicitar mastografía bilateral inmediata y si es normal, no se requiere seguimiento adicional",
      "Solo recomendar autoexploración mensual y exploración clínica semestral hasta los 40 años"
    ],
    ans:1,
    exp:"La presencia de dos familiares de primer grado con cáncer de mama eleva significativamente el riesgo y califica a esta mujer como 'alto riesgo'. En este escenario, la GPC recomienda: referir a unidad de segundo nivel u oncología para asesoramiento genético (prueba BRCA1/BRCA2 si aplica criterios), inicio de tamizaje con mastografía y/o resonancia magnética de mama antes de los 40 años (generalmente desde los 25-30 años o 10 años antes del diagnóstico del familiar más joven), e intervenciones de reducción de riesgo.",
    tip:"Alto riesgo Ca mama (2 familiares 1er grado): referir a clínica de alto riesgo + asesoría genética. Inicio tamizaje adelantado (25-30 años). No manejar igual que riesgo promedio.",
    ref:"GPC Prevención, tamizaje y referencia oportuna de casos sospechosos de cáncer de mama en el primer nivel de atención 2017"
  },
  {
    cat:"tam", catName:"Tamizaje y Referencia (1er Nivel)",
    q:"¿Cuáles son los criterios de referencia URGENTE desde el primer nivel de atención por sospecha de cáncer de mama?",
    opts:[
      "Mastalgia bilateral cíclica en mujer premenopáusica sin nódulo palpable",
      "Nódulo mamario duro, irregular, fijo, de reciente aparición; piel en cáscara de naranja; retracción del pezón; o descarga hemática unilateral espontánea",
      "Quiste mamario simple confirmado por ultrasonido en mujer de 45 años asintomática",
      "Mastografía con hallazgo BIRADS 2 (benigno) en mujer de tamizaje"
    ],
    ans:1,
    exp:"Los criterios de referencia URGENTE (sospecha de malignidad) desde el primer nivel incluyen: nódulo mamario duro, irregular o fijo a planos profundos; cambios en piel (piel de naranja/edema dérmico, eritema, úlcera); retracción o inversión del pezón de reciente aparición; descarga hemática unilateral espontánea por el pezón sin compresión; adenopatía axilar dura o supraclavicular ipsilateral; y mastografía BIRADS 4-5. La referencia debe ser dentro de las 2 semanas siguientes.",
    tip:"Referencia URGENTE Ca mama: nódulo duro-fijo-irregular, piel naranja, retracción pezón, descarga hemática, BIRADS 4-5. Plazo: <2 semanas.",
    ref:"GPC Prevención, tamizaje y referencia oportuna de casos sospechosos de cáncer de mama en el primer nivel de atención 2017"
  },
  {
    cat:"tam", catName:"Tamizaje y Referencia (1er Nivel)",
    q:"¿Qué es la 'triple exploración' o 'triple prueba diagnóstica' en la evaluación de un nódulo mamario y cuál es su importancia?",
    opts:[
      "Consiste en autoexploración, exploración clínica y mastografía; si alguna es positiva = referencia urgente",
      "Consiste en exploración clínica + imagen (mastografía/ultrasonido) + biopsia/citología; si las tres son benignas, la malignidad es <1%",
      "Consiste en análisis de CA 15-3, CEA y HER2 en sangre como tamizaje inicial",
      "Consiste en tres mastografías en intervalos de 6 meses para valorar cambios dinámicos"
    ],
    ans:1,
    exp:"La triple prueba diagnóstica es el estándar para evaluar nódulos mamarios: (1) Exploración clínica mamaria, (2) Imagen (mastografía en >35 años, ultrasonido en <35 años o para caracterizar quistes), y (3) Biopsia/citología por aspiración con aguja fina (BAAF) o biopsia con aguja gruesa (BAG) en lesiones sospechosas. Si las tres son concordantemente benignas, el valor predictivo negativo es >99%. Si hay discordancia, se procede a biopsia quirúrgica.",
    tip:"Triple prueba = clínica + imagen + biopsia/citología. Si las 3 son benignas: riesgo Ca <1%. Discordancia = biopsia quirúrgica obligatoria.",
    ref:"GPC Prevención, tamizaje y referencia oportuna de casos sospechosos de cáncer de mama en el primer nivel de atención 2017"
  },
  {
    cat:"tam", catName:"Tamizaje y Referencia (1er Nivel)",
    q:"¿Cuál es la correcta clasificación BIRADS y su conducta en mastografía de tamizaje?",
    opts:[

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function init(){
  shuffle(questions);
  currentQ=0;score=0;answers=[];
  catStats={tam:{c:0,t:0},tto:{c:0,t:0}};
  const r=document.getElementById('resultsArea');
  r.classList.remove('show');r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion(){
  const qa=questions[currentQ],total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const L=['A','B','C','D'];
  let h=`<div class="question-card">
    <div class="q-category cat-${qa.cat}">${qa.catName}</div>
    <div class="q-number">Pregunta ${currentQ+1} de ${total}</div>
    <div class="q-text">${qa.q}</div>
    <div class="options">`;
  qa.opts.forEach((o,i)=>h+=`<button class="option-btn" onclick="selectAnswer(${i})">
    <span class="option-letter">${L[i]}</span><span>${o}</span></button>`);
  h+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=h;
}

function selectAnswer(idx){
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const ok=idx===qa.ans;
  btns.forEach((b,i)=>{b.classList.add('disabled');b.onclick=null;
    if(i===qa.ans)b.classList.add('correct-answer');
    if(i===idx&&!ok)b.classList.add('wrong-answer');});
  if(!catStats[qa.cat])catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(ok){score++;catStats[qa.cat].c++;}
  if(!examMode){
    fb.className=ok?'feedback correct-fb show':'feedback wrong-fb show';
    fb.innerHTML=ok
      ?`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`
      :`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;
  }
  answers.push({q:qa.q,correct:ok,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,tip:qa.tip,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion(){currentQ++;if(currentQ>=questions.length)showResults();else renderQuestion();}

function showResults(){
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'🏆 ¡Excelente dominio! Listo para el ENARM.':pct>=70?'👏 ¡Muy bien! Repasa las áreas con menor puntaje.':pct>=50?'📚 Aceptable, hay áreas de oportunidad.':'⚠️ Refuerza este tema. Revisa las GPC correspondientes.';
  const cats=[
    {name:'Tamizaje y Referencia (1er Nivel)',key:'tam',color:'#f472b6'},
    {name:'Diagnóstico y Tratamiento (2°-3er Nivel)',key:'tto',color:'#a78bfa'}
  ];
  let h=`<div class="results-header"><div class="score-big">${pct}%</div><div class="score-label">${score} de ${questions.length} correctas</div><div class="score-msg">${msg}</div></div>
  <div class="chart-section"><div class="chart-title"><span>📊</span> Rendimiento por GPC</div><div class="bar-chart">`;
  cats.forEach(c=>{const s=catStats[c.key]||{c:0,t:0};const p=s.t>0?Math.round((s.c/s.t)*100):0;if(s.t>0)h+=`<div class="bar-row"><div class="bar-label">${c.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${c.color};">${p}% (${s.c}/${s.t})</div></div></div>`;});
  h+=`</div></div><div class="chart-section"><div class="chart-title"><span>🎯</span> Resumen General</div><div class="donut-wrap">
    <svg class="donut-svg" viewBox="0 0 42 42">
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f472b6" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
      <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
    </svg>
    <div class="donut-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#f472b6;"></div>Correctas: ${score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#8896b3;"></div>Total: ${questions.length}</div>
    </div></div></div>
  <div class="chart-section"><div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{h+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
    <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
    <div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div>
    <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
    <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
  </div>`;});
  h+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const r=document.getElementById('resultsArea');r.innerHTML=h;r.classList.add('show');r.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
init();
</script>
