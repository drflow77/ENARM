<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neurocirugía / Tema 36 — ENARM · MediCode Solutions</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0e1a; --surface: #111827; --surface2: #1a2235; --surface3: #212d45;
    --border: #2a3a5c; --text: #e8ecf4; --text-dim: #8896b3;
    --accent: #38bdf8; --accent-glow: rgba(56,189,248,0.15);
    --correct: #34d399; --correct-bg: rgba(52,211,153,0.1); --correct-border: rgba(52,211,153,0.4);
    --wrong: #f87171; --wrong-bg: rgba(248,113,113,0.1); --wrong-border: rgba(248,113,113,0.4);
    --gold: #fbbf24; --purple: #a78bfa; --pink: #f472b6; --teal: #2dd4bf;
    --sidebar-w: 280px; --radius: 14px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; }

  /* SIDEBAR */
  .sidebar {
    width:var(--sidebar-w); min-height:100vh; background:var(--surface);
    border-right:1px solid var(--border); display:flex; flex-direction:column;
    position:fixed; left:0; top:0; bottom:0; overflow-y:auto; z-index:100; transition:transform 0.3s;
  }
  .sidebar-logo { padding:24px 20px 16px; border-bottom:1px solid var(--border); }
  .logo-badge {
    display:inline-flex; align-items:center; gap:8px;
    background:linear-gradient(135deg,var(--accent),var(--purple));
    padding:6px 14px; border-radius:100px; font-size:0.75rem; font-weight:800;
    color:var(--bg); letter-spacing:0.5px; text-transform:uppercase; margin-bottom:10px;
  }
  .sidebar-logo h2 { font-size:1.1rem; font-weight:800; background:linear-gradient(135deg,var(--text),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .sidebar-logo p { font-size:0.72rem; color:var(--text-dim); margin-top:2px; }
  .back-btn {
    display:flex; align-items:center; gap:8px; padding:14px 20px;
    color:var(--text-dim); font-size:0.8rem; text-decoration:none;
    border-bottom:1px solid var(--border); transition:color 0.2s;
  }
  .back-btn:hover { color:var(--accent); }
  .sidebar-nav { flex:1; padding:12px 0 24px; }
  .specialty-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 16px 10px 20px; cursor:pointer; transition:background 0.2s; user-select:none;
  }
  .specialty-header:hover { background:var(--surface2); }
  .specialty-name { display:flex; align-items:center; gap:10px; font-size:0.78rem; font-weight:700; text-transform:uppercase; letter-spacing:0.6px; }
  .specialty-icon { width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:0.9rem; flex-shrink:0; }
  .chevron { font-size:0.65rem; color:var(--text-dim); transition:transform 0.3s; }
  .specialty-header.open .chevron { transform:rotate(90deg); }
  .topics-list { display:none; padding:4px 0 8px; }
  .topics-list.open { display:block; }
  .topic-link {
    display:flex; align-items:center; gap:10px; padding:8px 16px 8px 56px;
    font-size:0.78rem; color:var(--text-dim); text-decoration:none;
    transition:all 0.2s; border-left:2px solid transparent; line-height:1.4;
  }
  .topic-link:hover { color:var(--text); background:var(--surface3); }
  .topic-link.active { color:var(--accent); border-left-color:var(--accent); background:var(--accent-glow); font-weight:600; }
  .topic-link.coming-soon { opacity:0.4; cursor:not-allowed; pointer-events:none; }
  .topic-num { font-family:'JetBrains Mono',monospace; font-size:0.68rem; color:var(--text-dim); min-width:20px; }
  .badge-soon { margin-left:auto; background:rgba(136,150,179,0.1); color:var(--text-dim); font-size:0.62rem; font-weight:600; padding:2px 7px; border-radius:100px; }
  .badge-ready { margin-left:auto; background:rgba(52,211,153,0.15); color:var(--correct); font-size:0.62rem; font-weight:600; padding:2px 7px; border-radius:100px; }
  .star-tag { margin-left:auto; font-size:0.7rem; }

  /* MAIN */
  .main { margin-left:var(--sidebar-w); flex:1; display:flex; flex-direction:column; }
  .container { max-width:760px; margin:0 auto; padding:20px 16px 40px; width:100%; }

  /* MODE SELECTOR */
  .mode-bar {
    display:flex; align-items:center; gap:10px; margin:24px 0 20px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:100px; padding:6px; width:fit-content;
  }
  .mode-btn {
    padding:8px 20px; border-radius:100px; border:none; cursor:pointer;
    font-family:inherit; font-size:0.82rem; font-weight:600;
    transition:all 0.2s; color:var(--text-dim); background:transparent;
  }
  .mode-btn.active { background:linear-gradient(135deg,var(--accent),var(--purple)); color:var(--bg); }

  /* HEADER */
  .header { text-align:center; padding:40px 20px 24px; position:relative; overflow:hidden; }
  .header::before {
    content:''; position:absolute; top:-60%; left:50%; transform:translateX(-50%);
    width:600px; height:600px;
    background:radial-gradient(circle,rgba(56,189,248,0.08) 0%,transparent 70%); pointer-events:none;
  }
  .header-badge {
    display:inline-flex; align-items:center; gap:8px; background:var(--surface2);
    border:1px solid var(--border); padding:6px 16px; border-radius:100px;
    font-size:0.78rem; color:var(--accent); font-weight:600;
    letter-spacing:0.5px; text-transform:uppercase; margin-bottom:16px;
  }
  .header h1 {
    font-size:clamp(1.4rem,4.5vw,2.2rem); font-weight:800;
    background:linear-gradient(135deg,var(--text) 0%,var(--accent) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; line-height: 1.2;
  }
  .header p { color:var(--text-dim); font-size:0.95rem; max-width:600px; margin:0 auto; line-height:1.4;}

  /* PROGRESS */
  .progress-wrap {
    background:var(--surface); border:1px solid var(--border); border-radius:100px;
    padding:12px 20px; margin:20px 0 28px; display:flex; align-items:center; gap:14px;
  }
  .progress-bar-bg { flex:1; height:8px; background:var(--surface3); border-radius:100px; overflow:hidden; }
  .progress-bar-fill { height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--purple)); border-radius:100px; transition:width 0.5s ease; }
  .progress-text { font-size:0.82rem; font-weight:600; color:var(--text-dim); white-space:nowrap; font-family:'JetBrains Mono',monospace; }

  /* QUESTION */
  .question-card {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:28px 24px; margin-bottom:20px; animation:slideIn 0.4s ease; position:relative; overflow:hidden;
  }
  .question-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background:linear-gradient(90deg,var(--accent),var(--purple),var(--pink));
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  .q-category {
    display:inline-flex; align-items:center; gap:6px; font-size:0.72rem; font-weight:700;
    text-transform:uppercase; letter-spacing:0.8px; padding:4px 12px; border-radius:100px; margin-bottom:14px;
  }
  .cat-dx { background:rgba(56,189,248,0.12); color:var(--accent); }
  .cat-tx { background:rgba(167,139,250,0.12); color:var(--purple); }
  .cat-cx { background:rgba(244,114,182,0.12); color:var(--pink); }
  .cat-comp { background:rgba(251,191,36,0.12); color:var(--gold); }
  .cat-lab { background:rgba(52,211,153,0.12); color:var(--correct); }

  .q-number { font-family:'JetBrains Mono',monospace; font-size:0.78rem; color:var(--text-dim); margin-bottom:10px; }
  .q-text { font-size:1.05rem; font-weight:600; line-height:1.55; margin-bottom:20px; color:var(--text); }

  .options { display:flex; flex-direction:column; gap:10px; }
  .option-btn {
    display:flex; align-items:flex-start; gap:12px; padding:14px 16px;
    background:var(--surface2); border:1.5px solid var(--border); border-radius:12px;
    cursor:pointer; transition:all 0.2s; text-align:left; font-size:0.92rem;
    color:var(--text); font-family:inherit; line-height:1.5; width:100%;
  }
  .option-btn:hover:not(.disabled) { border-color:var(--accent); background:var(--accent-glow); transform:translateX(4px); }
  .option-letter {
    display:flex; align-items:center; justify-content:center; min-width:30px; height:30px;
    border-radius:8px; background:var(--surface3); font-weight:700; font-size:0.82rem; color:var(--accent); flex-shrink:0;
  }
  .option-btn.correct-answer { border-color:var(--correct-border); background:var(--correct-bg); }
  .option-btn.correct-answer .option-letter { background:var(--correct); color:var(--bg); }
  .option-btn.wrong-answer { border-color:var(--wrong-border); background:var(--wrong-bg); }
  .option-btn.wrong-answer .option-letter { background:var(--wrong); color:var(--bg); }
  .option-btn.disabled { cursor:default; }
  .option-btn.disabled:hover { transform:none; }

  /* FEEDBACK */
  .feedback { margin-top:18px; padding:18px; border-radius:12px; font-size:0.88rem; line-height:1.65; animation:fadeIn 0.3s ease; display:none; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .feedback.show { display:block; }
  .feedback.correct-fb { background:var(--correct-bg); border:1px solid var(--correct-border); color:var(--correct); }
  .feedback.wrong-fb { background:var(--wrong-bg); border:1px solid var(--wrong-border); color:#fca5a5; }
  .feedback-title { font-weight:700; font-size:0.95rem; margin-bottom:6px; display:flex; align-items:center; gap:8px; }
  .feedback .tip { margin-top:10px; padding-top:10px; border-top:1px solid rgba(255,255,255,0.08); color:var(--text-dim); font-size:0.82rem; }
  .feedback .tip strong { color:var(--gold); }
  .feedback .ref { margin-top:8px; font-size:0.75rem; color:var(--text-dim); opacity:0.7; font-style:italic; }

  /* EXAM MODE - hidden feedback marker */
  .exam-hidden { display:none !important; }

  /* BUTTONS */
  .next-btn {
    display:none; margin:20px auto 0; padding:12px 32px;
    background:linear-gradient(135deg,var(--accent),var(--purple));
    color:var(--bg); border:none; border-radius:100px; font-family:inherit;
    font-size:0.92rem; font-weight:700; cursor:pointer; transition:all 0.2s;
  }
  .next-btn:hover { transform:scale(1.05); box-shadow:0 4px 24px var(--accent-glow); }
  .next-btn.show { display:block; }

  /* RESULTS */
  .results { display:none; animation:slideIn 0.5s ease; }
  .results.show { display:block; }
  .results-header {
    text-align:center; padding:30px 20px; background:var(--surface);
    border:1px solid var(--border); border-radius:var(--radius); margin-bottom:20px;
    position:relative; overflow:hidden;
  }
  .results-header::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,var(--correct),var(--accent),var(--purple),var(--pink)); }
  .score-big { font-size:3.5rem; font-weight:800; background:linear-gradient(135deg,var(--correct),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .score-label { font-size:1.1rem; color:var(--text-dim); margin-top:4px; }
  .score-msg { margin-top:12px; font-size:0.95rem; color:var(--text); font-weight:500; }
  .chart-section { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px 20px; margin-bottom:20px; }
  .chart-title { font-size:0.95rem; font-weight:700; margin-bottom:18px; display:flex; align-items:center; gap:8px; }
  .bar-chart { display:flex; flex-direction:column; gap:14px; }
  .bar-row { display:flex; align-items:center; gap:12px; }
  .bar-label { width:110px; font-size:0.78rem; font-weight:600; text-align:right; color:var(--text-dim); flex-shrink:0; }
  .bar-track { flex:1; height:28px; background:var(--surface3); border-radius:8px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:8px; transition:width 1s ease; display:flex; align-items:center; padding-left:10px; font-size:0.75rem; font-weight:700; color:var(--bg); min-width:fit-content; }
  .donut-wrap { display:flex; align-items:center; justify-content:center; gap:30px; flex-wrap:wrap; }
  .donut-svg { width:160px; height:160px; }
  .donut-legend { display:flex; flex-direction:column; gap:10px; }
  .legend-item { display:flex; align-items:center; gap:10px; font-size:0.84rem; }
  .legend-dot { width:12px; height:12px; border-radius:4px; flex-shrink:0; }
  .review-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:12px; }
  .review-card.review-correct { border-left:4px solid var(--correct); }
  .review-card.review-wrong { border-left:4px solid var(--wrong); }
  .review-q { font-size:0.88rem; font-weight:600; margin-bottom:8px; }
  .review-answer { font-size:0.82rem; color:var(--text-dim); line-height:1.5; }
  .review-answer strong { color:var(--correct); }
  .review-answer em { color:var(--wrong); font-style:normal; }
  .retry-btn {
    display:block; margin:28px auto; padding:14px 40px;
    background:linear-gradient(135deg,var(--accent),var(--purple));
    color:var(--bg); border:none; border-radius:100px; font-family:inherit;
    font-size:1rem; font-weight:700; cursor:pointer; transition:all 0.2s;
  }
  .retry-btn:hover { transform:scale(1.05); }
  .hamburger { display:none; position:fixed; top:16px; left:16px; z-index:200; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px; cursor:pointer; font-size:1.2rem; }
  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:90; }
  .footer { text-align:center; padding:20px; color:var(--text-dim); font-size:0.72rem; opacity:0.5; }

  @media(max-width:768px) {
    .sidebar { transform:translateX(-100%); }
    .sidebar.open { transform:translateX(0); }
    .main { margin-left:0; }
    .hamburger { display:flex; align-items:center; justify-content:center; }
    .overlay.show { display:block; }
    .container { padding:12px 10px 30px; }
    .question-card { padding:20px 16px; }
    .bar-label { width:80px; font-size:0.72rem; }
    .mode-bar { margin:16px auto; }
  }
</style>
  <script src="sidebar.js"></script>
</head>
<body>

<button class="hamburger" onclick="toggleSidebar()">☰</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar"></aside>

<!-- MAIN -->
<main class="main">
<div class="container">

  <div class="header">
    <div class="header-badge"><span>🧠</span> ENARM · Neurocirugía · Tema 36</div>
    <h1>Neuralgia del Trigémino / HIC / Hidrocefalia</h1>
    <p>Diagnóstico · Tratamiento farmacológico · Manejo pediátrico · Complicaciones</p>
  </div>

  <!-- MODE SELECTOR -->
  <div style="display:flex;justify-content:center;">
    <div class="mode-bar">
      <button class="mode-btn active" id="btnRepaso" onclick="setMode('repaso')">📖 Modo Repaso</button>
      <button class="mode-btn" id="btnExamen" onclick="setMode('examen')">⏱️ Modo Examen</button>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>
    <div class="progress-text" id="progressText">0 / 15</div>
  </div>

  <div id="quizArea"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Siguiente →</button>
  <div class="results" id="resultsArea"></div>

</div>
<div class="footer">MediCode Solutions · Dr. David Flores Carrasco · ENARM 2025–2026 · ⚠️ Fines exclusivamente educativos</div>
</main>

<script>
let examMode = false;

function setMode(mode) {
  examMode = (mode === 'examen');
  document.getElementById('btnRepaso').classList.toggle('active', !examMode);
  document.getElementById('btnExamen').classList.toggle('active', examMode);
  init();
}

const questions = [
  {
    cat:"dx", catName:"Diagnóstico",
    q:"Mujer de 55 años que presenta dolor facial intenso y paroxístico ('como toques eléctricos') en la mejilla derecha que dura unos segundos. Los episodios se desencadenan sistemáticamente al lavarse los dientes o masticar. Su exploración neurológica muestra reflejos corneales y sensibilidad facial conservados. ¿Cuál es el diagnóstico clínico más preciso?",
    opts:["Neuralgia del trigémino","Cefalea en racimos (Cluster)","Migraña con aura cerebral","Arteritis de la temporal"],
    ans:0,
    exp:"La neuralgia del trigémino clásica se manifiesta por episodios de dolor facial unilateral intenso, punzante (lancinante o neuropático), de corta duración (fracciones de segundo a minutos), distribuido en ramas del V par. Se desencadena fácilmente al tocar 'zonas gatillo' durante actividades cotidianas (masticar, hablar, aseo bucal). Típicamente no presenta déficit neurológico objetivo a la exploración.",
    tip:"<strong>Perla clínica:</strong> Dolor tipo choque eléctrico unilateral + duración fugaz + Zonas gatillo positivas + Examen neurológico normal = Neuralgia del trigémino inconfundible.",
    ref:"GPC: Tratamiento farmacológico del dolor neuropático en pacientes mayores de 18 años. SS-061-08."
  },
  {
    cat:"tx", catName:"Tratamiento",
    q:"Basándose en la GPC para el tratamiento del dolor neuropático, ¿cuál es el agente neuromodulador de primera línea de elección establecido expresamente por su alta eficacia para la neuralgia del trigémino?",
    opts:["Gabapentina","Pregabalina","Carbamazepina","Amitriptilina"],
    ans:2,
    exp:"La GPC destaca a la carbamazepina (dosis sugerida 200 a 1200 mg/día) y la oxcarbazepina como los fármacos de primera línea y de mayor efectividad para la neuralgia del trigémino genuina debido al control dramático que logran en los paroxismos de dolor en más del 70% de los casos.",
    tip:"<strong>Manejo:</strong> A diferencia de la neuropatía diabética o postherpética (donde gabapentina o pregabalina son reyes), en Neuralgia del Trigémino el estándar de oro absoluto sigue siendo la Carbamazepina.",
    ref:"GPC: Tratamiento farmacológico del dolor neuropático en pacientes mayores de 18 años. SS-061-08."
  },
  {
    cat:"cx", catName:"Complicaciones",
    q:"Usted inicia tratamiento con altas dosis de carbamazepina a un paciente anciano con neuralgia del trigémino severa. En el seguimiento refiere cuadro súbito de letargo intenso y confusión mental, ¿qué efecto secundario metabólico/electrolítico debe sospechar y solicitar en el panel básico urgentemente?",
    opts:["Hipopotasemia","Hipocalcemia refractaria","Hiponatremia por SIADH","Hipernatremia central"],
    ans:2,
    exp:"La carbamazepina es un fármaco que bien documentado puede inducir un Síndrome de Secreción Inadecuada de Hormona Antidiurética (SIADH), produciendo hiponatremia dilucional transitoria o grave, especialmente en el anciano, manifestándose con letargia, confusión e incluso estatus epiléptico si no se advierte la caída sérica de Sodio.",
    tip:"<strong>Vigilancia Farmacológica:</strong> Carbamazepina = SIADH / Hiponatremia en ancianos. También se deben monitorear citopenias graves raras (Agranulocitosis o anemia aplásica).",
    ref:"GPC: Tratamiento farmacológico del dolor neuropático en pacientes mayores de 18 años. SS-061-08."
  },
  {
    cat:"tx", catName:"Tratamiento",
    q:"Paciente con neuralgia del trigémino refractaria médicamente a múltiples anticonvulsivantes, apto para cirugía craneal, con RM que demuestra la compresión de la raíz protuberancial por la arteria cerebelosa superior. ¿Qué procedimiento neuroquirúrgico definitivo ha demostrado la principal tasa de eficacia curativa libre de dolor a largo plazo con menores secuelas sensitivas faciales?",
    opts:["Ablación por radiofrecuencia percutánea","Descompresión microvascular radicular (técnica de Jannetta)","Radiocirugía estereotáctica focal con Gamma-Knife","Rizotomía con inyección retrogasseriana de Glicerol"],
    ans:1,
    exp:"La Descompresión microvascular de Jannetta actúa etiológicamente al separar y aislar el contacto del vaso aberrante con el nervio a la entrada protuberancial, evitando recurrir a la destrucción ablativa de fibras y manteniendo intacta la sensibilidad facial. Es la opción curativa principal en pacientes que toleran intervenciones de fosa posterior y demuestran el conflicto neuro-vascular (asa de vasos).",
    tip:"<strong>Elección Quirúrgica:</strong> Joven y con buen estado cardiorrespiratorio y neurológico = Descompresión Microvascular (Jannetta). Paciente añoso con alto riesgo anestésico y pluripatologías = Procedimientos ablativos dolorosos mínimamente invasivos.",
    ref:"Bases del tratamiento de Neuralgia del trigémino. Neurocirugía Clínica."
  },
  {
    cat:"dx", catName:"Diagnóstico",
    q:"Acude al servicio de urgencias un traumatizado grave por accidente automovilístico. En la reevaluación se percata de la aparición de respuesta vasomotora central que presagia el compromiso y herniación incipiente del tronco encefálico. Este signo (Tríada de Cushing) consiste en:",
    opts:["Hipotensión arterial rápida, taquicardia refleja y disrritmias respiratorias","Hipertensión arterial paradójica, bradicardia relativa y alteración respiratoria irregular","Hipertermia difusa abrupta, diaforesis y midriasis paralítica bilateral","Normotensión, midriasis unilateral fija al estímulo luminoso izquierdo"],
    ans:1,
    exp:"La triada de Cushing se caracteriza imperativamente por una hipertensión sistémica masiva con amplia presión de pulso de tipo reflejo para intentar perfundir un cerebro edematizado, lo cual paradójicamente dispara mecanorreceptores y vagotonicamente desencadena una respuesta bradicardizante grave y progresivo compromiso de centros cardiorrespiratorios bulbares manifestando respiración atáxica. Es aviso pre-mortem sin acción pronta.",
    tip:"<strong>Tríada del miedo (Cushing):</strong> Si lo ves, el paciente se está herniando o muriendo activamente. \nHIT \nBRAD \nRESP.",
    ref:"ATLS: Manejo de Trauma Craneoencefálico y Evaluación."

let currentQ = 0, score = 0, answers = [];
let catStats = { dx:{c:0,t:0}, tx:{c:0,t:0}, cx:{c:0,t:0}, lab:{c:0,t:0}, comp:{c:0,t:0} };

function shuffle(arr) {
  for (let i = arr.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function init() {
  shuffle(questions);
  currentQ=0; score=0; answers=[];
  catStats = { dx:{c:0,t:0}, tx:{c:0,t:0}, cx:{c:0,t:0}, lab:{c:0,t:0}, comp:{c:0,t:0} };
  const r = document.getElementById('resultsArea');
  r.classList.remove('show'); r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion() {
  const qa = questions[currentQ];
  const total = questions.length;
  document.getElementById('progressBar').style.width = (currentQ/total*100)+'%';
  document.getElementById('progressText').textContent = `${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const letters = ['A','B','C','D'];
  let html = `<div class="question-card">
    <div class="q-category cat-${qa.cat}">${qa.catName}</div>
    <div class="q-number">Pregunta ${currentQ+1} de ${total}</div>
    <div class="q-text">${qa.q}</div>
    <div class="options">`;
  qa.opts.forEach((opt,i) => {
    html += `<button class="option-btn" onclick="selectAnswer(${i})" data-idx="${i}">
      <span class="option-letter">${letters[i]}</span><span>${opt}</span></button>`;
  });
  html += `</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML = html;
}

function selectAnswer(idx) {
  const qa = questions[currentQ];
  const btns = document.querySelectorAll('.option-btn');
  const fb = document.getElementById('feedback');
  const isCorrect = idx === qa.ans;

  btns.forEach((btn,i) => {
    btn.classList.add('disabled'); btn.onclick=null;
    if (i===qa.ans) btn.classList.add('correct-answer');
    if (i===idx && !isCorrect) btn.classList.add('wrong-answer');
  });

  if (!catStats[qa.cat]) catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if (isCorrect) { score++; catStats[qa.cat].c++; }

  if (!examMode) {
    if (isCorrect) {
      fb.className='feedback correct-fb show';
      fb.innerHTML=`<div class="feedback-title">✅ ¡Correcto!</div>
        <div>${qa.exp}</div>
        <div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div>
        <div class="ref">📖 ${qa.ref}</div>`;
    } else {
      fb.className='feedback wrong-fb show';
      fb.innerHTML=`<div class="feedback-title">❌ Incorrecto</div>
        <div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div>
        <div style="margin-top:8px;">${qa.exp}</div>
        <div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div>
        <div class="ref">📖 ${qa.ref}</div>`;
    }
  }

  answers.push({ q:qa.q, correct:isCorrect, userAns:qa.opts[idx], correctAns:qa.opts[qa.ans], cat:qa.catName, exp:qa.exp, tip:qa.tip, ref:qa.ref });
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) showResults();
  else renderQuestion();
}

function showResults() {
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;

  const pct = Math.round((score/questions.length)*100);
  let msg = pct>=90 ? '🏆 ¡Excelente dominio del tema! Listo para el ENARM.' :
            pct>=70 ? '👏 ¡Muy bien! Repasa las áreas con menor puntaje.' :
            pct>=50 ? '📚 Aceptable, pero hay áreas de oportunidad importantes.' :
                      '⚠️ Necesitas reforzar este tema. Revisa las GPC correspondientes.';

  const cats = [
    {name:'Diagnóstico',key:'dx',color:'#38bdf8'},
    {name:'Laboratorio/Imagen',key:'lab',color:'#34d399'},
    {name:'Tratamiento',key:'tx',color:'#a78bfa'},
    {name:'Complicaciones',key:'cx',color:'#f472b6'},
  ];

  let html = `<div class="results-header">
    <div class="score-big">${pct}%</div>
    <div class="score-label">${score} de ${questions.length} correctas</div>
    <div class="score-msg">${msg}</div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📊</span> Rendimiento por Categoría</div>
    <div class="bar-chart">`;
  cats.forEach(cat => {
    const s = catStats[cat.key] || {c:0,t:0};
    const p = s.t>0 ? Math.round((s.c/s.t)*100) : 0;
    if (s.t>0) {
      html += `<div class="bar-row">
        <div class="bar-label">${cat.name}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${cat.color};">${p}% (${s.c}/${s.t})</div></div>
      </div>`;
    }
  });
  html += `</div></div>
  <div class="chart-section">
    <div class="chart-title"><span>🎯</span> Resumen General</div>
    <div class="donut-wrap">
      <svg class="donut-svg" viewBox="0 0 42 42">
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4"
          stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4"
          stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
        <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
      </svg>
      <div class="donut-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#38bdf8;"></div>Total: ${questions.length}</div>
      </div>
    </div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;

  answers.forEach((a,i) => {
    html += `<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
      <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
      <div class="review-answer">${a.correct
        ? `<strong>✅ ${a.correctAns}</strong>`
        : `<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`
      }</div>
      <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
      <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
    </div>`;
  });

  html += `</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const res = document.getElementById('resultsArea');
  res.innerHTML=html; res.classList.add('show');
  res.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(header) {
  header.classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
}
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

init();
</script>
</body>
</html>
