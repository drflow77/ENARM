<script>
let examMode = false;

function setMode(mode) {
  examMode = (mode === 'examen');
  document.getElementById('btnRepaso').classList.toggle('active', !examMode);
  document.getElementById('btnExamen').classList.toggle('active', examMode);

}

const questions = [
  {
    cat:"ser", catName:"Mordedura de Serpiente",
    q:"Paciente masculino de 32 años que labora en el campo, acude a urgencias por mordedura en pie derecho por víbora de cascabel (Crotalus sp.) hace 2 horas. Presenta edema que avanza hasta rodilla, equimosis local y dolor intenso. ¿Cuál es el efecto tóxico predominante de las víboras de foseta en México?",
    opts:["Efecto neurotóxico con paresia ascendente","Efecto hemotóxico/proteolítico con edema progresivo, necrosis y coagulopatía","Efecto cardiotóxico con arritmias ventriculares","Efecto miotóxico exclusivo sin alteraciones de coagulación"],
    ans:1,
    exp:"Las víboras de foseta (familia Viperidae) que incluyen los géneros Crotalus (cascabel) y Bothrops en México producen fundamentalmente efecto hemotóxico y proteolítico. El veneno contiene metaloproteasas, fosfolipasas y serina-proteasas que causan: edema progresivo por aumento de permeabilidad vascular, necrosis local por efecto proteolítico, y coagulopatía por consumo (similar a CID) con prolongación de tiempos de coagulación. La GPC distingue claramente este efecto del coralillo (Micrurus), que es principalmente neurotóxico.",
    tip:"<strong>Regla nemotécnica Crotalus vs Micrurus:</strong> Crotalus (cascabel) = HEMO: Hemotóxico, Edema, Mordida obvia (colmillos). Micrurus (coralillo) = NEURO: Neurotóxico, Escasa reacción local, Ubica por rayas de colores. El edema que avanza + coagulopatía = víbora de foseta. La ausencia de reacción local + paresia = coralillo.",
    ref:"GPC: Diagnóstico y tratamiento de las mordeduras de serpientes venenosas. IMSS-457-10. 2010."
  },
  {
    cat:"ser", catName:"Mordedura de Serpiente",
    q:"Un médico de urgencias rural atiende a un paciente con mordedura de serpiente en antebrazo. Un familiar sugiere hacer un torniquete, succionar el veneno con la boca y hacer una incisión en el sitio de mordida. ¿Cuál es la conducta correcta según las guías de primeros auxilios?",
    opts:["Aplicar torniquete, succionar y hacer incisión como indica el familiar","Inmovilizar la extremidad a nivel del corazón, NO aplicar torniquete, NO incidir, NO succionar, trasladar urgentemente","Aplicar hielo local, lavar con agua oxigenada y esperar evolución ambulatoria","Aplicar torniquete y trasladar sin otra maniobra"],
    ans:1,
    exp:"La GPC es muy clara respecto a los primeros auxilios en mordedura de serpiente: 1) Inmovilizar la extremidad afectada manteniéndola al nivel del corazón (no elevar ni bajar). 2) NO aplicar torniquete — incrementa necrosis local y no detiene la absorción del veneno. 3) NO hacer incisiones — no eliminan veneno y aumentan riesgo de infección y daño tisular. 4) NO succionar con boca o dispositivos — ineficaz e introduce gérmenes. 5) Trasladar al hospital de inmediato para valorar antiviperino.",
    tip:"<strong>Las 3 NO y 1 SÍ en mordedura de serpiente:</strong> NO torniquete, NO incisión, NO succión. SÍ inmovilizar y trasladar. El torniquete es especialmente peligroso: concentra el veneno proteolítico y aumenta necrosis distal. Quitar anillos y pulseras antes de que el edema los comprima.",
    ref:"GPC: Diagnóstico y tratamiento de las mordeduras de serpientes venenosas. IMSS-457-10. 2010."
  },
  {
    cat:"ser", catName:"Mordedura de Serpiente",
    q:"Paciente con mordedura de cascabel presenta edema que abarca toda la extremidad superior, equimosis extensa, ampollas hemorrágicas, hipotensión, TP prolongado y plaquetas de 60,000. Sin falla orgánica. ¿A qué grado de envenenamiento corresponde según la clasificación de gravedad?",
    opts:["Grado 0 (sin envenenamiento)","Grado I (leve: edema local)","Grado II (moderado: edema moderado ± afección sistémica)","Grado III (severo: edema severo + sistémico con coagulopatía)"],
    ans:3,
    exp:"La clasificación de gravedad del envenenamiento por víbora de foseta según la GPC: Grado 0 — Mordida seca, sin signos de envenenamiento. Grado I — Leve: edema y dolor local confinados al sitio, sin sistémico. Grado II — Moderado: edema que avanza más allá del sitio, puede haber náusea, manifestaciones sistémicas leves. Grado III — Severo: edema marcado de toda extremidad, ampollas hemorrágicas, coagulopatía (TP prolongado, trombocitopenia), hipotensión, sin falla orgánica establecida. Grado IV — Falla multiorgánica.",
    tip:"<strong>Grados 0-IV para dosificar antiviperino:</strong> Grado 0: observación. Grado I: 3-5 viales. Grado II: 5-10 viales. Grado III: 10-15 viales. Grado IV: >15 viales según respuesta. La coagulopatía (TP prolongado + trombocitopenia) con edema de toda la extremidad = Grado III mínimo.",
    ref:"GPC: Diagnóstico y tratamiento de las mordeduras de serpientes venenosas. IMSS-457-10. 2010."
  },
  {
    cat:"tx", catName:"Tratamiento/Antiveneno",
    q:"Paciente con mordedura de víbora de cascabel grado III es trasladado al hospital. ¿Cuál es el tratamiento específico de elección y la vía de administración correcta?",
    opts:["Suero antiviperino intramuscular en dosis única","Faboterápico antiviperino (Fab2) intravenoso, dosis según grado de envenenamiento","Corticoides IV como primer línea para reducir inflamación","Antitetánica IM como único tratamiento urgente"],
    ans:1,
    exp:"El tratamiento específico es el faboterápico antiviperino (fragmentos Fab2 purificados de anticuerpos equinos), administrado exclusivamente por vía intravenosa. La GPC establece que la vía IM es incorrecta por absorción errática. La dosis depende del grado: Grado I 3-5 viales, Grado II 5-10, Grado III 10-15, Grado IV >15 viales. Se diluye en 250 mL de solución salina y se pasa en 30-60 minutos. Se puede repetir si no hay respuesta clínica (disminución del edema, mejoría de coagulación).",
    tip:"<strong>Faboterápico IV, nunca IM:</strong> El antiviperino mexicano (Instituto Bioclon) es Fab2, más seguro que el antiveneno equino clásico. Antes de aplicar: prueba de hipersensibilidad cutánea. Tener adrenalina lista. El objetivo es neutralizar el veneno circulante, no el ya fijado en tejidos — la necrosis ya establecida no revierte.",
    ref:"GPC: Diagnóstico y tratamiento de las mordeduras de serpientes venenosas. IMSS-457-10. 2010."
  },
  {
    cat:"ser", catName:"Mordedura de Serpiente",
    q:"Campesino de 28 años mordido en el dorso de la mano por serpiente de colores rojo, amarillo y negro (patrón anillo-anillo). No hay edema significativo en la mano, pero 4 horas después presenta ptosis palpebral bilateral, disfagia y dificultad respiratoria progresiva. ¿Cuál es el diagnóstico y el mecanismo de toxicidad?",

let currentQ = 0, score = 0, answers = [];
let catStats = { ser:{c:0,t:0}, ara:{c:0,t:0}, alac:{c:0,t:0}, rab:{c:0,t:0}, tx:{c:0,t:0} };

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function init() {
  shuffle(questions);
  currentQ=0; score=0; answers=[];
  catStats = { ser:{c:0,t:0}, ara:{c:0,t:0}, alac:{c:0,t:0}, rab:{c:0,t:0}, tx:{c:0,t:0} };
  const r=document.getElementById('resultsArea');
  r.classList.remove('show'); r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion() {
  const qa=questions[currentQ], total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const letters=['A','B','C','D'];
  let html=`<div class="question-card">
    <div class="q-category cat-${qa.cat}">${qa.catName}</div>
    <div class="q-number">Pregunta ${currentQ+1} de ${total}</div>
    <div class="q-text">${qa.q}</div>
    <div class="options">`;
  qa.opts.forEach((opt,i)=>{
    html+=`<button class="option-btn" onclick="selectAnswer(${i})" data-idx="${i}">
      <span class="option-letter">${letters[i]}</span><span>${opt}</span></button>`;
  });
  html+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=html;
}

function selectAnswer(idx) {
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const isCorrect=idx===qa.ans;
  btns.forEach((btn,i)=>{
    btn.classList.add('disabled'); btn.onclick=null;
    if(i===qa.ans) btn.classList.add('correct-answer');
    if(i===idx&&!isCorrect) btn.classList.add('wrong-answer');
  });
  if(!catStats[qa.cat]) catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(isCorrect){score++;catStats[qa.cat].c++;}
  if(!examMode){
    fb.className=isCorrect?'feedback correct-fb show':'feedback wrong-fb show';
    fb.innerHTML=isCorrect
      ?`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`
      :`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;
  }
  answers.push({q:qa.q,correct:isCorrect,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if(currentQ>=questions.length) showResults();
  else renderQuestion();
}

function showResults() {
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'🏆 ¡Dominio excelente de mordeduras y picaduras!':pct>=70?'👏 ¡Muy bien! Repasa los temas con menor puntaje.':pct>=50?'📚 Aceptable, refuerza las áreas débiles.':'⚠️ Revisa las GPC de serpientes, arañas y alacrán.';
  const cats=[
    {name:'Serpiente',key:'ser',color:'#fbbf24'},
    {name:'Araña',key:'ara',color:'#38bdf8'},
    {name:'Alacrán',key:'alac',color:'#a78bfa'},
    {name:'Rabia/Animal',key:'rab',color:'#f472b6'},
    {name:'Tratamiento',key:'tx',color:'#34d399'},
  ];
  let html=`<div class="results-header">
    <div class="score-big">${pct}%</div>
    <div class="score-label">${score} de ${questions.length} correctas</div>
    <div class="score-msg">${msg}</div>
  </div>

    <div class="chart-title"><span>📊</span> Rendimiento por Categoría</div>
    <div class="bar-chart">`;

  html+=`</div></div>
  <div class="chart-section">
    <div class="chart-title"><span>🎯</span> Resumen General</div>
    <div class="donut-wrap">
      <svg class="donut-svg" viewBox="0 0 42 42">
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
        <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
      </svg>
      <div class="donut-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#38bdf8;"></div>Total: ${questions.length}</div>
      </div>
    </div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{
    html+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
      <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
      <div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div>
      <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
      <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
    </div>`;
  });
  html+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const res=document.getElementById('resultsArea');
  res.innerHTML=html; res.classList.add('show');
  res.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(header){header.classList.toggle('open');header.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}

init();
</script>
</body>
</html>
