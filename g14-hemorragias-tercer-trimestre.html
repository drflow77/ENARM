<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Hemorragias de Tercer Trimestre — ENARM · Obstetricia</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
  :root {
    --bg:#0a0e1a; --surface:#111827; --surface2:#1a2235; --surface3:#212d45;
    --border:#2a3a5c; --text:#e8ecf4; --text-dim:#8896b3;
    --accent:#34d399; --accent-glow:rgba(52,211,153,0.15);
    --correct:#34d399; --correct-bg:rgba(52,211,153,0.1); --correct-border:rgba(52,211,153,0.4);
    --wrong:#f87171; --wrong-bg:rgba(248,113,113,0.1); --wrong-border:rgba(248,113,113,0.4);
    --gold:#fbbf24; --purple:#a78bfa; --pink:#f472b6; --teal:#2dd4bf; --blue:#38bdf8;
    --fire1:#ff6b35; --fire2:#fbbf24;
    --sidebar-w:280px; --radius:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;}

  .sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;overflow-y:auto;z-index:100;transition:transform 0.3s;}
  .sidebar-logo{padding:24px 20px 16px;border-bottom:1px solid var(--border);}
  .logo-badge{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#34d399,#f87171);padding:6px 14px;border-radius:100px;font-size:0.75rem;font-weight:800;color:var(--bg);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:10px;}
  .sidebar-logo h2{font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,var(--text),#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .sidebar-logo p{font-size:0.72rem;color:var(--text-dim);margin-top:2px;}
  .back-btn{display:flex;align-items:center;gap:8px;padding:14px 20px;color:var(--text-dim);font-size:0.8rem;text-decoration:none;border-bottom:1px solid var(--border);transition:color 0.2s;}
  .back-btn:hover{color:#34d399;}
  .sidebar-nav{flex:1;padding:12px 0 24px;}
  .specialty-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 10px 20px;cursor:pointer;transition:background 0.2s;user-select:none;}
  .specialty-header:hover{background:var(--surface2);}
  .specialty-name{display:flex;align-items:center;gap:10px;font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;}
  .specialty-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.9rem;flex-shrink:0;}
  .chevron{font-size:0.65rem;color:var(--text-dim);transition:transform 0.3s;}
  .specialty-header.open .chevron{transform:rotate(90deg);}
  .topics-list{display:none;padding:4px 0 8px;}
  .topics-list.open{display:block;}
  .topic-link{display:flex;align-items:center;gap:10px;padding:8px 16px 8px 56px;font-size:0.78rem;color:var(--text-dim);text-decoration:none;transition:all 0.2s;border-left:2px solid transparent;line-height:1.4;}
  .topic-link:hover{color:var(--text);background:var(--surface3);}
  .topic-link.active{color:#34d399;border-left-color:#34d399;background:var(--accent-glow);font-weight:600;}
  .topic-link.coming-soon{opacity:0.4;cursor:not-allowed;pointer-events:none;}
  .topic-num{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--text-dim);min-width:20px;}
  .badge-soon{margin-left:auto;background:rgba(136,150,179,0.1);color:var(--text-dim);font-size:0.62rem;font-weight:600;padding:2px 7px;border-radius:100px;}
  .badge-ready{margin-left:auto;background:rgba(52,211,153,0.15);color:#34d399;font-size:0.62rem;font-weight:600;padding:2px 7px;border-radius:100px;}

  .main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;}
  .container{max-width:760px;margin:0 auto;padding:20px 16px 40px;width:100%;}

  .mode-bar{display:flex;align-items:center;gap:10px;margin:24px 0 20px;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:6px;width:fit-content;}
  .mode-btn{padding:8px 20px;border-radius:100px;border:none;cursor:pointer;font-family:inherit;font-size:0.82rem;font-weight:600;transition:all 0.2s;color:var(--text-dim);background:transparent;}
  .mode-btn.active{background:linear-gradient(135deg,var(--fire1),var(--fire2));color:var(--bg);}

  .header{text-align:center;padding:40px 20px 24px;position:relative;overflow:hidden;}
  .header::before{content:'';position:absolute;top:-60%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(255,107,53,0.1) 0%,transparent 70%);pointer-events:none;}
  .header-badge{display:inline-flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid rgba(255,107,53,0.3);padding:6px 16px;border-radius:100px;font-size:0.78rem;color:var(--fire1);font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:16px;}
  .header h1{font-size:clamp(1.3rem,4vw,2rem);font-weight:800;background:linear-gradient(135deg,var(--text) 0%,var(--fire1) 60%,var(--fire2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;line-height:1.2;}
  .header p{color:var(--text-dim);font-size:0.95rem;max-width:600px;margin:0 auto;line-height:1.4;}

  .fire-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,rgba(255,107,53,0.15),rgba(251,191,36,0.15));border:1px solid rgba(255,107,53,0.4);padding:5px 14px;border-radius:100px;font-size:0.75rem;font-weight:700;color:var(--fire2);letter-spacing:0.5px;margin-left:10px;vertical-align:middle;animation:fireGlow 2s ease-in-out infinite alternate;}
  @keyframes fireGlow{from{box-shadow:0 0 6px rgba(255,107,53,0.3);}to{box-shadow:0 0 18px rgba(255,107,53,0.75),0 0 32px rgba(251,191,36,0.35);}}
  .fire-icon{font-size:1rem;animation:flicker 1.5s ease-in-out infinite alternate;}
  @keyframes flicker{0%{transform:scale(1) rotate(-2deg);}50%{transform:scale(1.12) rotate(2deg);}100%{transform:scale(0.95) rotate(-1deg);}}

  .progress-wrap{background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:12px 20px;margin:20px 0 28px;display:flex;align-items:center;gap:14px;}
  .progress-bar-bg{flex:1;height:8px;background:var(--surface3);border-radius:100px;overflow:hidden;}
  .progress-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--fire1),var(--fire2));border-radius:100px;transition:width 0.5s ease;}
  .progress-text{font-size:0.82rem;font-weight:600;color:var(--text-dim);white-space:nowrap;font-family:'JetBrains Mono',monospace;}

  .question-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;margin-bottom:20px;animation:slideIn 0.4s ease;position:relative;overflow:hidden;}
  .question-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--fire1),var(--fire2),var(--purple));}
  @keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

  .q-category{display:inline-flex;align-items:center;gap:6px;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;padding:4px 12px;border-radius:100px;margin-bottom:14px;}
  .cat-pla{background:rgba(255,107,53,0.12);color:var(--fire1);}
  .cat-rup{background:rgba(251,191,36,0.12);color:var(--fire2);}
  .cat-eme{background:rgba(167,139,250,0.12);color:#a78bfa;}
  .cat-cho{background:rgba(248,113,113,0.12);color:#f87171;}

  .q-number{font-family:'JetBrains Mono',monospace;font-size:0.78rem;color:var(--text-dim);margin-bottom:10px;}
  .q-text{font-size:1.05rem;font-weight:600;line-height:1.55;margin-bottom:20px;color:var(--text);}
  .options{display:flex;flex-direction:column;gap:10px;}
  .option-btn{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:all 0.2s;text-align:left;font-size:0.92rem;color:var(--text);font-family:inherit;line-height:1.5;width:100%;}
  .option-btn:hover:not(.disabled){border-color:var(--fire1);background:rgba(255,107,53,0.08);transform:translateX(4px);}
  .option-letter{display:flex;align-items:center;justify-content:center;min-width:30px;height:30px;border-radius:8px;background:var(--surface3);font-weight:700;font-size:0.82rem;color:var(--fire1);flex-shrink:0;}
  .option-btn.correct-answer{border-color:var(--correct-border);background:var(--correct-bg);}
  .option-btn.correct-answer .option-letter{background:var(--correct);color:var(--bg);}
  .option-btn.wrong-answer{border-color:var(--wrong-border);background:var(--wrong-bg);}
  .option-btn.wrong-answer .option-letter{background:var(--wrong);color:var(--bg);}
  .option-btn.disabled{cursor:default;}
  .option-btn.disabled:hover{transform:none;}

  .feedback{margin-top:18px;padding:18px;border-radius:12px;font-size:0.88rem;line-height:1.65;animation:fadeIn 0.3s ease;display:none;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .feedback.show{display:block;}
  .feedback.correct-fb{background:var(--correct-bg);border:1px solid var(--correct-border);color:var(--correct);}
  .feedback.wrong-fb{background:var(--wrong-bg);border:1px solid var(--wrong-border);color:#fca5a5;}
  .feedback-title{font-weight:700;font-size:0.95rem;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
  .feedback .tip{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.08);color:var(--text-dim);font-size:0.82rem;}
  .feedback .tip strong{color:var(--gold);}
  .feedback .ref{margin-top:8px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;}

  .next-btn{display:none;margin:20px auto 0;padding:12px 32px;background:linear-gradient(135deg,var(--fire1),var(--fire2));color:var(--bg);border:none;border-radius:100px;font-family:inherit;font-size:0.92rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
  .next-btn:hover{transform:scale(1.05);}
  .next-btn.show{display:block;}

  .results{display:none;animation:slideIn 0.5s ease;}
  .results.show{display:block;}
  .results-header{text-align:center;padding:30px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px;position:relative;overflow:hidden;}
  .results-header::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--fire1),var(--fire2),var(--purple));}
  .score-big{font-family:'JetBrains Mono',monospace;font-size:3.5rem;font-weight:800;color:var(--fire1);line-height:1;}
  .score-label{font-size:1rem;color:var(--text-dim);margin:8px 0;}
  .score-msg{font-size:1.05rem;font-weight:600;color:var(--text);}
  .chart-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
  .chart-title{font-size:0.9rem;font-weight:700;color:var(--text-dim);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
  .bar-chart{display:flex;flex-direction:column;gap:12px;}
  .bar-row{display:flex;flex-direction:column;gap:6px;}
  .bar-label{font-size:0.82rem;font-weight:600;color:var(--text);}
  .bar-track{height:28px;background:var(--surface3);border-radius:6px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:10px;font-size:0.78rem;font-weight:700;color:var(--bg);min-width:40px;transition:width 0.8s ease;}
  .donut-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
  .donut-svg{width:100px;height:100px;flex-shrink:0;}
  .donut-legend{display:flex;flex-direction:column;gap:8px;}
  .legend-item{display:flex;align-items:center;gap:8px;font-size:0.82rem;color:var(--text-dim);}
  .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .review-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;}
  .review-card.review-correct{border-color:var(--correct-border);}
  .review-card.review-wrong{border-color:var(--wrong-border);}
  .review-q{font-size:0.85rem;font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.5;}
  .review-answer{font-size:0.82rem;line-height:1.5;}
  .retry-btn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,var(--fire1),var(--fire2));border:none;border-radius:12px;color:var(--bg);font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;margin-top:20px;transition:all 0.2s;}
  .retry-btn:hover{filter:brightness(1.1);}

  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:90;}
  .overlay.show{display:block;}
  .hamburger{display:none;position:fixed;top:14px;left:14px;z-index:200;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 10px;cursor:pointer;font-size:1.1rem;}
  .footer{text-align:center;padding:16px;font-size:0.72rem;color:var(--text-dim);border-top:1px solid var(--border);opacity:0.6;}

  @media(max-width:900px){
    .sidebar{transform:translateX(-100%);}
    .sidebar.open{transform:translateX(0);}
    .main{margin-left:0;}
    .hamburger{display:block;}
    .container{padding-top:60px;}
  }
</style>
</head>
<body>

<button class="hamburger" onclick="toggleSidebar()">☰</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
<aside class="sidebar" id="sidebar"></aside>

<main class="main">
<div class="container">
  <div class="header">
    <div class="header-badge">
      <span>🩸</span> ENARM · Obstetricia · Alta Frecuencia
      <span class="fire-badge"><span class="fire-icon">🔥</span> TOP ENARM</span>
    </div>
    <h1>🔥 Hemorragias de Tercer Trimestre</h1>
    <p>Placenta previa · Vasa previa · Ruptura uterina · Emergencias obstétricas · Choque hemorrágico</p>

  <div style="display:flex;justify-content:center;">

      <button class="mode-btn active" id="btnRepaso" onclick="setMode('repaso')">📖 Modo Repaso</button>

<script>
let examMode=false, currentQ=0, score=0, answers=[], catStats={};

function setMode(m){
  examMode=(m==='examen');
  document.getElementById('btnRepaso').classList.toggle('active',!examMode);
  document.getElementById('btnExamen').classList.toggle('active',examMode);
  init();
}

const questions = [

  /* ══════════════════════════════════════════════════
     GPC 1 — ANOMALÍAS DE INSERCIÓN PLACENTARIA Y VASA PREVIA 2019
  ══════════════════════════════════════════════════ */
  {
    cat:"pla", catName:"Placenta Previa y Vasa Previa",
    q:"¿Cuál es la clasificación actual de la placenta previa según la GPC 2019?",
    opts:[
      "Grados I-IV según distancia al OCI (marginal, parcial, completa central)",
      "Solo dos tipos: placenta previa oclusiva (cubre el OCI) y placenta de inserción baja (borde a <20 mm del OCI, sin cubrirlo)",
      "Tres tipos: anterior, posterior y lateral, según posición respecto al útero",
      "Cuatro grados: lateral, marginal, parcial y central, según el porcentaje de oclusión del OCI"
    ],
    ans:1,
    exp:"La clasificación moderna simplificada de la placenta previa distingue solo dos entidades: (1) Placenta previa: cuando el borde placentario cubre el orificio cervical interno (OCI), independientemente del grado de oclusión; (2) Placenta de inserción baja: cuando el borde placentario se encuentra a menos de 20 mm del OCI pero sin cubrirlo. La nomenclatura antigua (grados I-IV, marginal, parcial, completa) quedó en desuso por ser subjetiva y poco reproducible.",
    tip:"Placenta previa = cubre el OCI. Inserción baja = borde <20 mm del OCI sin cubrirlo. Clasificación 2 tipos, no 4.",
    ref:"GPC Diagnóstico y manejo de anomalías en la inserción placentaria y vasa previa 2019"
  },
  {
    cat:"pla", catName:"Placenta Previa y Vasa Previa",
    q:"Embarazada de 34 semanas con sangrado transvaginal rojo brillante, abundante, indoloro, sin dinámica uterina. ¿Cuál es el diagnóstico más probable y el primer paso diagnóstico?",
    opts:[
      "Desprendimiento prematuro de placenta normoinserta — tacto vaginal para evaluar dilatación",
      "Placenta previa — ultrasonido (NUNCA tacto vaginal antes de descartar placenta previa)",
      "Vasa previa rota — cardiotocografía fetal inmediata como único estudio",
      "Rotura uterina — laparotomía exploratoria sin estudios previos"
    ],
    ans:1,
    exp:"La tríada clásica de placenta previa es: sangrado transvaginal rojo brillante, indoloro (sin contractura uterina), y de inicio súbito en el tercer trimestre. El primer paso diagnóstico es el ULTRASONIDO (transabdominal y/o transvaginal). El tacto vaginal está ABSOLUTAMENTE CONTRAINDICADO antes de descartar placenta previa porque puede desencadenar hemorragia masiva al desprender el tejido placentario. La vía transvaginal tiene mayor precisión para evaluar la relación del borde con el OCI.",
    tip:"Sangrado indoloro 3er trimestre = placenta previa hasta desostrar lo contrario. NUNCA tacto vaginal antes de USG. TV = contraindicado.",
    ref:"GPC Diagnóstico y manejo de anomalías en la inserción placentaria y vasa previa 2019"
  },
  {
    cat:"pla", catName:"Placenta Previa y Vasa Previa",
    q:"¿Cuál es la forma de presentación clínica característica de la vasa previa rota?",
    opts:[
      "Sangrado vaginal materno con bradicardia materna y dolor abdominal severo",
      "Sangrado vaginal al romper membranas + bradicardia fetal súbita + sangre de origen fetal (Apt test positivo)",
      "Sangrado vaginal sin repercusión fetal, indoloro, con placenta normal al ultrasonido",
      "Contracción uterina en tabla + sangrado oscuro + muerte fetal in utero por DPPNI"
    ],
    ans:1,
    exp:"La vasa previa ocurre cuando vasos fetales atraviesan las membranas frente al OCI. Al romper membranas (espontánea o artificial), los vasos fetales se desgarran. La presentación clásica es: sangrado vaginal coincidente con la rotura de membranas + bradicardia fetal súbita y severa (la sangre perdida es fetal, de escaso volumen pero crítico para el feto). El test de Apt-Downey diferencia sangre fetal (fetal Hb resiste álcali → permanece rosada) de sangre materna (adulta → se vuelve marrón).",
    tip:"Vasa previa: sangrado al ROM + bradicardia fetal súbita. La madre no compromete. Test de Apt (+) = sangre fetal. Resolución INMEDIATA = cesárea.",
    ref:"GPC Diagnóstico y manejo de anomalías en la inserción placentaria y vasa previa 2019"
  },
  {
    cat:"pla", catName:"Placenta Previa y Vasa Previa",
    q:"Paciente con placenta previa oclusiva y antecedente de 2 cesáreas previas. El ultrasonido Doppler muestra lagunas intraplacentarias y ausencia de la interfase serosa-vesical. ¿Cuál es el diagnóstico y la conducta?",
    opts:[
      "Placenta previa simple — manejo expectante hasta semana 37, parto vaginal posible",
      "Acretismo placentario (placenta ácreta/íncreta/pércreta) — referencia a tercer nivel, cesárea programada con equipo multidisciplinario y disponibilidad de banco de sangre",
      "Inserción velamentosa del cordón — cerclaje cervical profiláctico",
      "Placenta bilobulada — solo vigilancia ultrasonográfica mensual"
    ],
    ans:1,
    exp:"El acretismo placentario (espectro placenta ácreta) se sospecha cuando coexisten: placenta previa + cesárea(s) previa(s) + hallazgos ultrasonográficos: lagunas intraplacentarias (aspecto de 'queso suizo'), adelgazamiento o pérdida de la zona retroplacentaria hipoecoica, y pérdida de la interfase serosa-vesical (signo de pércreta). Requiere referencia a tercer nivel, planificación multidisciplinaria (cirujano vascular, urología, banco de sangre), y cesárea-histerectomía electiva ~34-36 SDG. La cirugía de urgencia tiene mortalidad muy superior.",
    tip:"Placenta previa + cesárea previa + lagunas + pérdida interfase vesical = ACRETISMO. Referencia 3er nivel. Cesárea programada 34-36 SDG con equipo multidisciplinario.",
    ref:"GPC Diagnóstico y manejo de anomalías en la inserción placentaria y vasa previa 2019"
  },

  /* ══════════════════════════════════════════════════
     GPC 2 — RUPTURA UTERINA 2017
  ══════════════════════════════════════════════════ */
  {
    cat:"rup", catName:"Ruptura Uterina",
    q:"¿Cuál es el factor de riesgo MÁS importante para ruptura uterina en el embarazo actual?",
    opts:[
      "Multiparidad (≥5 partos vaginales previos) sin cicatriz uterina",
      "Cesárea previa (cicatriz uterina) — factor de riesgo más frecuente en países con alta tasa de cesáreas",
      "Diabetes gestacional con macrosomia fetal >4 kg",
      "Edad materna avanzada (>40 años) sin antecedente quirúrgico"
    ],
    ans:1,

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function init(){
  shuffle(questions);
  currentQ=0;score=0;answers=[];
  catStats={pla:{c:0,t:0},rup:{c:0,t:0},eme:{c:0,t:0},cho:{c:0,t:0}};
  const r=document.getElementById('resultsArea');
  r.classList.remove('show');r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion(){
  const qa=questions[currentQ],total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const L=['A','B','C','D'];
  let h=`<div class="question-card">
    <div class="q-category cat-${qa.cat}">${qa.catName}</div>
    <div class="q-number">Pregunta ${currentQ+1} de ${total}</div>
    <div class="q-text">${qa.q}</div>
    <div class="options">`;
  qa.opts.forEach((o,i)=>h+=`<button class="option-btn" onclick="selectAnswer(${i})">
    <span class="option-letter">${L[i]}</span><span>${o}</span></button>`);
  h+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=h;
}

function selectAnswer(idx){
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const ok=idx===qa.ans;
  btns.forEach((b,i)=>{b.classList.add('disabled');b.onclick=null;
    if(i===qa.ans)b.classList.add('correct-answer');
    if(i===idx&&!ok)b.classList.add('wrong-answer');});
  if(!catStats[qa.cat])catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(ok){score++;catStats[qa.cat].c++;}
  if(!examMode){
    fb.className=ok?'feedback correct-fb show':'feedback wrong-fb show';
    fb.innerHTML=ok
      ?`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`
      :`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;
  }
  answers.push({q:qa.q,correct:ok,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,tip:qa.tip,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion(){currentQ++;if(currentQ>=questions.length)showResults();else renderQuestion();}

function showResults(){
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'🏆 ¡Excelente dominio! Listo para el ENARM.':pct>=70?'👏 ¡Muy bien! Repasa las áreas con menor puntaje.':pct>=50?'📚 Aceptable, hay áreas de oportunidad.':'⚠️ Refuerza este tema. Revisa las 4 GPC de emergencias obstétricas.';
  const cats=[
    {name:'Placenta Previa y Vasa Previa',key:'pla',color:'#ff6b35'},
    {name:'Ruptura Uterina',key:'rup',color:'#fbbf24'},
    {name:'Emergencias Obstétricas',key:'eme',color:'#a78bfa'},
    {name:'Choque Hemorrágico Obstétrico',key:'cho',color:'#f87171'}
  ];
  let h=`<div class="results-header"><div class="score-big">${pct}%</div><div class="score-label">${score} de ${questions.length} correctas</div><div class="score-msg">${msg}</div></div>
  <div class="chart-section"><div class="chart-title"><span>📊</span> Rendimiento por GPC</div><div class="bar-chart">`;
  cats.forEach(c=>{const s=catStats[c.key]||{c:0,t:0};const p=s.t>0?Math.round((s.c/s.t)*100):0;if(s.t>0)h+=`<div class="bar-row"><div class="bar-label">${c.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${c.color};">${p}% (${s.c}/${s.t})</div></div></div>`;});
  h+=`</div></div><div class="chart-section"><div class="chart-title"><span>🎯</span> Resumen General</div><div class="donut-wrap">
    <svg class="donut-svg" viewBox="0 0 42 42">
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#ff6b35" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#fbbf24" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
      <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
    </svg>
    <div class="donut-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#ff6b35;"></div>Correctas: ${score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#fbbf24;"></div>Incorrectas: ${questions.length-score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#a78bfa;"></div>Total: ${questions.length}</div>
    </div></div></div>
  <div class="chart-section"><div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{h+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
    <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
    <div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div>
    <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
    <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
  </div>`;});
  h+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const r=document.getElementById('resultsArea');r.innerHTML=h;r.classList.add('show');r.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
init();
</script>
