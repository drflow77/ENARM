<script>
let examMode=false;
function setMode(m){examMode=(m==='examen');document.getElementById('btnRepaso').classList.toggle('active',!examMode);document.getElementById('btnExamen').classList.toggle('active',examMode);init();}

const questions=[
  // ── GPC 1: Luxaciones y Lesiones Ligamentosas ──────────────────────────
  {
    cat:"lux",catName:"Luxaciones y Ligamentos",
    q:"Paciente de 22 años cae sobre brazo extendido, llega con hombro derecho en posición de abducción y rotación externa fija, imposibilidad de aducción, hombro 'en charretera'. ¿Cuál es el diagnóstico?",
    opts:["Fractura de clavícula","Luxación glenohumeral anterior","Luxación glenohumeral posterior","Síndrome de manguito rotador"],
    ans:1,
    exp:"La luxación glenohumeral anterior es la más frecuente (95% de todas las luxaciones del hombro). Se produce por mecanismo indirecto en abducción + rotación externa. La cabeza humeral se desplaza anterior e inferiormente a la cavidad glenoidea. Clinicamente: posición de abducción y rotación externa forzada, signo de la 'charretera' (aplanamiento del hombro con prominencia del acromion), dolor intenso e impotencia funcional.",
    tip:"<strong>Luxación hombro anterior vs posterior:</strong> Anterior (95%): caída sobre brazo extendido, brazo en ABD+RE, 'charretera'. Posterior (rara, 2-4%): convulsión/electrocución, brazo en ADD+RI, diagnóstico frecuentemente tardío. El axilar AP parece normal en luxación posterior → siempre pedir proyección Y o axilar.",
    ref:"GPC: Diagnóstico y Tratamiento de Luxaciones Articulares. SSA. 2013."
  },
  {
    cat:"lux",catName:"Luxaciones y Ligamentos",
    q:"Tras reducción de luxación glenohumeral anterior, ¿cuál es la complicación neurovascular más frecuente que debe evaluarse?",
    opts:["Lesión del nervio radial","Lesión del nervio axilar (circunflejo)","Lesión de la arteria subclavia","Lesión del nervio musculocutáneo"],
    ans:1,
    exp:"El nervio axilar (circunflejo) es el nervio más frecuentemente lesionado en la luxación glenohumeral anterior, por su posición adyacente al cuello quirúrgico del húmero y la cápsula articular. Se manifiesta con hipoestesia en la cara lateral del hombro ('parche de sargento') y debilidad del músculo deltoides. Ocurre en 5-35% de los casos, especialmente en mayores de 40 años.",
    tip:"<strong>Post-reducción hombro:</strong> SIEMPRE evaluar nervio axilar = sensibilidad en 'parche de sargento' (cara lateral del deltoides) + fuerza del deltoides. Lesión axilar en 5-35% de luxaciones anteriores. También buscar lesión de Hill-Sachs (impactación cabeza humeral) y Bankart (desgarro del labrum anterior) con RM.",
    ref:"GPC: Diagnóstico y Tratamiento de Luxaciones Articulares. SSA. 2013."
  },
  {
    cat:"lux",catName:"Luxaciones y Ligamentos",
    q:"¿Cuál es la maniobra de reducción cerrada de primera elección para la luxación glenohumeral anterior?",
    opts:["Maniobra de Kocher (rotación externa + aducción)","Técnica de Stimson (tracción gravitacional) o maniobra de Milch","Reducción bajo anestesia general de urgencia","Tracción-contratracción con sábana"],
    ans:1,
    exp:"Las técnicas de Stimson (decúbito prono con peso colgante de 5-7 kg durante 15-20 min) y Milch (abducción gradual + tracción) son de primera elección por su eficacia y bajo riesgo. La maniobra de Kocher tiene mayor riesgo de fractura en mayores de 40 años. Todas requieren adecuada analgesia/sedación. Tras la reducción: inmovilización 2-3 semanas + rehabilitación.",
    tip:"<strong>Reducción de hombro:</strong> Stimson = paciente boca abajo + brazo colgante + peso 5kg = relaja músculos (15-20 min). Milch = abducción lenta + tracción axial. Kocher = riesgo de fractura en >40 años. Después de CUALQUIER reducción → Rx de control para confirmar y descartar fractura asociada.",
    ref:"GPC: Diagnóstico y Tratamiento de Luxaciones Articulares. SSA. 2013."
  },
  {
    cat:"lux",catName:"Luxaciones y Ligamentos",
    q:"Paciente con esguince de tobillo grado III (rotura completa del ligamento peroneo-astragalino anterior). A la exploración hay cajón anterior positivo e inestabilidad. ¿Cuál es el manejo?",
    opts:["Inmovilización con vendaje elástico y RICE solo","Inmovilización funcional con bota o férula por 4-6 semanas + rehabilitación","Cirugía reparadora inmediata del ligamento","Artroscopia diagnóstica de urgencia"],
    ans:1,
    exp:"El esguince de tobillo grado III (rotura ligamentaria completa) se maneja conservadoramente en la mayoría de casos: inmovilización funcional con bota ortopédica o férula por 4-6 semanas, seguida de rehabilitación progresiva (propioceptiva, fortalecimiento peroneos). La cirugía primaria no ha demostrado superioridad sobre el tratamiento conservador en la mayoría de pacientes. Solo se considera cirugía en atletas de alto rendimiento o inestabilidad crónica.",
    tip:"<strong>Esguince de tobillo - grados:</strong> I = distensión, no inestabilidad → RICE + caminar. II = rotura parcial, leve inestabilidad → inmovilización 2-3 semanas. III = rotura completa, inestabilidad importante → bota 4-6 semanas + rehabilitación. Cirugía = inestabilidad crónica refractaria a rehabilitación.",
    ref:"GPC: Diagnóstico y Tratamiento de Esguince de Tobillo. SSA/IMSS. 2013."
  },
  {
    cat:"lux",catName:"Luxaciones y Ligamentos",
    q:"Niño de 4 años con codo doloroso tras tracción del brazo extendido por el padre. El niño no mueve el brazo y lo mantiene en pronación. Rx sin fractura. ¿Cuál es el diagnóstico y tratamiento?",
    opts:["Fractura supracondílea oculta; inmovilizar y Rx en 10 días","Subluxación de la cabeza del radio (codo de niñera); reducción por supinación + flexión","Luxación del codo; sedación + reducción cerrada","Síndrome compartimental del antebrazo; fasciotomía urgente"],
    ans:1,
    exp:"La subluxación de la cabeza del radio (codo de niñera, pronatio dolorosa) ocurre en niños de 1-5 años por tracción súbita del brazo extendido. El ligamento anular se interpone en la articulación. El niño no mueve el codo y lo mantiene en pronación. Rx normal. Tratamiento: maniobra de supinación + flexión del codo (se siente/escucha 'clic'). Resolución inmediata del dolor.",
    tip:"<strong>Codo de niñera vs Fractura supracondílea:</strong> Niñera: <5 años + tracción axial + pronación + Rx normal → supinación+flexión = cura inmediata. Supracondílea: caída sobre mano extendida + deformidad + riesgo de lesión arteria braquial (pulso radial). Siempre verificar pulso radial en fracturas del codo pediátrico.",
    ref:"GPC: Diagnóstico y Tratamiento de Luxaciones Articulares. SSA. 2013."
  },
  {
    cat:"lux",catName:"Luxaciones y Ligamentos",
    q:"¿Cuál es la articulación que se luxa con mayor frecuencia en el cuerpo humano?",
    opts:["Rodilla","Cadera","Hombro (glenohumeral)","Codo"],
    ans:2,
    exp:"La articulación glenohumeral (hombro) es la que se luxa con mayor frecuencia en el organismo, representando el 50% de todas las luxaciones articulares. Esto se debe a su gran rango de movimiento a expensas de la estabilidad ósea (la cavidad glenoidea solo cubre 1/3 de la cabeza humeral). La luxación de cadera es la más grave por riesgo de necrosis avascular de la cabeza femoral.",
    tip:"<strong>Luxaciones por frecuencia:</strong> Hombro (50%) > Codo > Dedo (IFP) > Cadera > Rodilla (la más grave por riesgo de lesión vascular poplítea). La luxación de cadera requiere reducción en <6 horas para evitar necrosis avascular. La luxación de rodilla puede lesionar la arteria poplítea en 20-40% de casos.",
    ref:"GPC: Diagnóstico y Tratamiento de Luxaciones Articulares. SSA. 2013."
  },

  // ── GPC 2: Manguito Rotador ───────────────────────────────────────────
  {

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function init(){shuffle(questions);currentQ=0;score=0;answers=[];catStats={lux:{c:0,t:0},mang:{c:0,t:0},rod:{c:0,t:0},tob:{c:0,t:0}};const r=document.getElementById('resultsArea');r.classList.remove('show');r.innerHTML='';document.getElementById('nextBtn').classList.remove('show');renderQuestion();}
function renderQuestion(){const qa=questions[currentQ];const total=questions.length;document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;document.getElementById('nextBtn').classList.remove('show');const letters=['A','B','C','D'];let html=`<div class="question-card"><div class="q-category cat-${qa.cat}">${qa.catName}</div><div class="q-number">Pregunta ${currentQ+1} de ${total}</div><div class="q-text">${qa.q}</div><div class="options">`;qa.opts.forEach((opt,i)=>{html+=`<button class="option-btn" onclick="selectAnswer(${i})" data-idx="${i}"><span class="option-letter">${letters[i]}</span><span>${opt}</span></button>`;});html+=`</div><div class="feedback" id="feedback"></div></div>`;document.getElementById('quizArea').innerHTML=html;}
function selectAnswer(idx){const qa=questions[currentQ];const btns=document.querySelectorAll('.option-btn');const fb=document.getElementById('feedback');const isCorrect=idx===qa.ans;btns.forEach((btn,i)=>{btn.classList.add('disabled');btn.onclick=null;if(i===qa.ans)btn.classList.add('correct-answer');if(i===idx&&!isCorrect)btn.classList.add('wrong-answer');});if(!catStats[qa.cat])catStats[qa.cat]={c:0,t:0};catStats[qa.cat].t++;if(isCorrect){score++;catStats[qa.cat].c++;}if(!examMode){if(isCorrect){fb.className='feedback correct-fb show';fb.innerHTML=`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;}else{fb.className='feedback wrong-fb show';fb.innerHTML=`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;}}answers.push({q:qa.q,correct:isCorrect,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,tip:qa.tip,ref:qa.ref});document.getElementById('nextBtn').classList.add('show');}
function nextQuestion(){currentQ++;if(currentQ>=questions.length)showResults();else renderQuestion();}
function showResults(){document.getElementById('quizArea').innerHTML='';document.getElementById('nextBtn').classList.remove('show');document.getElementById('progressBar').style.width='100%';document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;const pct=Math.round((score/questions.length)*100);let msg=pct>=90?'🏆 ¡Excelente dominio del tema! Listo para el ENARM.':pct>=70?'👏 ¡Muy bien! Repasa las áreas con menor puntaje.':pct>=50?'📚 Aceptable, pero hay áreas de oportunidad importantes.':'⚠️ Necesitas reforzar este tema. Revisa las GPC correspondientes.';const cats=[{name:'Luxaciones/Lig.',key:'lux',color:'#38bdf8'},{name:'Manguito Rotador',key:'mang',color:'#2dd4bf'},{name:'Lesiones Rodilla',key:'rod',color:'#a78bfa'},{name:'Tobillo/Aquiles',key:'tob',color:'#fbbf24'}];let html=`<div class="results-header"><div class="score-big">${pct}%</div><div class="score-label">${score} de ${questions.length} correctas</div><div class="score-msg">${msg}</div></div><div class="chart-section"><div class="chart-title"><span>📊</span> Rendimiento por Categoría</div><div class="bar-chart">`;cats.forEach(cat=>{const s=catStats[cat.key]||{c:0,t:0};const p=s.t>0?Math.round((s.c/s.t)*100):0;html+=`<div class="bar-row"><div class="bar-label">${cat.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${cat.color};">${p}% (${s.c}/${s.t})</div></div></div>`;});html+=`</div></div><div class="chart-section"><div class="chart-title"><span>🎯</span> Resumen General</div><div class="donut-wrap"><svg class="donut-svg" viewBox="0 0 42 42"><circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/><circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/><circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/><text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text></svg><div class="donut-legend"><div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div><div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div><div class="legend-item"><div class="legend-dot" style="background:#38bdf8;"></div>Total: ${questions.length}</div></div></div></div><div class="chart-section"><div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;answers.forEach((a,i)=>{html+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}"><div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div><div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div><div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div><div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div></div>`;});html+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;const res=document.getElementById('resultsArea');res.innerHTML=html;res.classList.add('show');res.scrollIntoView({behavior:'smooth'});}
function toggleSpec(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
init();
</script>
</body>
</html>
