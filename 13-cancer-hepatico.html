  .header-badge { display:inline-flex; align-items:center; gap:8px; background:var(--surface2); border:1px solid var(--border); padding:6px 16px; border-radius:100px; font-size:0.78rem; color:var(--accent); font-weight:600; letter-spacing:0.5px; text-transform:uppercase; margin-bottom:16px; }

  .option-btn.wrong-answer { border-color:var(--wrong-border); background:var(--wrong-bg); }
  .option-btn.wrong-answer .option-letter { background:var(--wrong); color:var(--bg); }

  .feedback { margin-top:18px; padding:18px; border-radius:12px; font-size:0.88rem; line-height:1.65; animation:fadeIn 0.3s ease; display:none; }

  .feedback.correct-fb { background:var(--correct-bg); border:1px solid var(--correct-border); color:var(--correct); }
  .feedback.wrong-fb { background:var(--wrong-bg); border:1px solid var(--wrong-border); color:#fca5a5; }

  .score-big { font-size:3.5rem; font-weight:800; background:linear-gradient(135deg,var(--correct),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .score-label { font-size:1.1rem; color:var(--text-dim); margin-top:4px; }
  .score-msg { margin-top:12px; font-size:0.95rem; color:var(--text); font-weight:500; }
  .chart-section { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px 20px; margin-bottom:20px; }
  .chart-title { font-size:0.95rem; font-weight:700; margin-bottom:18px; display:flex; align-items:center; gap:8px; }

  .bar-row { display:flex; align-items:center; gap:12px; }

  .bar-track { flex:1; height:28px; background:var(--surface3); border-radius:8px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:8px; transition:width 1s ease; display:flex; align-items:center; padding-left:10px; font-size:0.75rem; font-weight:700; color:var(--bg); min-width:fit-content; }
  .donut-wrap { display:flex; align-items:center; justify-content:center; gap:30px; flex-wrap:wrap; }
  .donut-svg { width:160px; height:160px; }
  .donut-legend { display:flex; flex-direction:column; gap:10px; }
  .legend-item { display:flex; align-items:center; gap:10px; font-size:0.84rem; }

  .review-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:12px; }
  .review-card.review-correct { border-left:4px solid var(--correct); }
  .review-card.review-wrong { border-left:4px solid var(--wrong); }
  .review-q { font-size:0.88rem; font-weight:600; margin-bottom:8px; }
  .review-answer { font-size:0.82rem; color:var(--text-dim); line-height:1.5; }
  .review-answer strong { color:var(--correct); }
  .review-answer em { color:var(--wrong); font-style:normal; }
  .retry-btn { display:block; margin:28px auto; padding:14px 40px; background:linear-gradient(135deg,var(--accent),var(--purple)); color:var(--bg); border:none; border-radius:100px; font-family:inherit; font-size:1rem; font-weight:700; cursor:pointer; transition:all 0.2s; }
  .retry-btn:hover { transform:scale(1.05); }
  .hamburger { display:none; position:fixed; top:16px; left:16px; z-index:200; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px; cursor:pointer; font-size:1.2rem; }
  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:90; }

<script>
let examMode = false;

function setMode(mode) {
  examMode = (mode === 'examen');
  document.getElementById('btnRepaso').classList.toggle('active', !examMode);
  document.getElementById('btnExamen').classList.toggle('active', examMode);
  init();
}

const questions = [
  {
    cat:"hcc", catName:"Hepatocarcinoma",
    q:"Hombre de 58 años con cirrosis hepática por VHC (Child-Pugh A), en vigilancia semestral. El ultrasonido detecta un nódulo hepático de 2.2 cm. La AFP es de 650 ng/mL. ¿Cuál es la conducta diagnóstica correcta según la GPC de hepatocarcinoma?",
    opts:["Biopsia hepática inmediata para confirmar diagnóstico","El diagnóstico de HCC queda establecido sin necesidad de biopsia","RM hepática dinámica y esperar resultado antes de decidir","Repetir AFP en 3 meses para ver tendencia"],
    ans:1,
    exp:"Según la GPC de Diagnóstico y Tratamiento del Hepatocarcinoma (2019), en pacientes cirróticos con nódulo hepático ≥1 cm detectado por imagen, una AFP >400 ng/mL establece el diagnóstico de HCC sin requerir biopsia. Este caso cumple ambos criterios: cirrosis conocida, nódulo >1 cm y AFP >400 ng/mL. La biopsia se reserva para casos donde no se pueden aplicar los criterios no invasivos.",
    tip:"<strong>Diagnóstico no invasivo de HCC:</strong> En cirrótico con nódulo ≥1cm: AFP >400 ng/mL = diagnóstico establecido. Si AFP entre 20-400 ng/mL: imagen dinámica (TC o RM con realce arterial y lavado en fase portal = patrón típico de HCC). Solo se biopsia si imagen y marcadores no son concluyentes.",
    ref:"GPC: Diagnóstico y tratamiento del hepatocarcinoma. SSA. 2019."
  },
  {
    cat:"hcc", catName:"Hepatocarcinoma",
    q:"¿Cuál de los siguientes factores de riesgo para hepatocarcinoma es INDEPENDIENTE de la cirrosis hepática?",
    opts:["Cirrosis alcohólica compensada","Infección crónica por VHB activo (HBeAg positivo, carga viral alta)","Cirrosis por NASH estadio F4","Cirrosis por hemocromatosis hereditaria"],
    ans:1,
    exp:"La infección crónica por VHB es el único factor de riesgo para HCC que actúa de forma independiente a la cirrosis, ya que el virus puede integrarse directamente al genoma hepatocitario y causar transformación maligna incluso en hígado no cirrótico. La GPC enfatiza que pacientes con VHB activo (HBeAg+, carga viral >2000 UI/mL) deben incluirse en programas de vigilancia aunque no tengan cirrosis. El resto de factores (alcohol, NASH, hemocromatosis) generan HCC principalmente a través de la cirrosis.",
    tip:"<strong>VHB es especial:</strong> Todos los demás factores de riesgo (VHC, alcohol, NASH, hemocromatosis, aflatoxina) requieren cirrosis establecida para causar HCC. El VHB es oncogénico directo — puede causar HCC sin cirrosis. Por eso la vacunación contra VHB es la única prevención primaria real del HCC a nivel poblacional.",
    ref:"GPC: Diagnóstico y tratamiento del hepatocarcinoma. SSA. 2019."
  },
  {
    cat:"hcc", catName:"Hepatocarcinoma",
    q:"¿Con qué frecuencia y con qué estudios se recomienda la vigilancia para detección temprana de HCC en pacientes con cirrosis hepática, según la GPC mexicana?",
    opts:["Tomografía trifásica cada 6 meses","Ultrasonido abdominal + AFP sérica cada 6 meses","RM hepática dinámica anual","AFP sérica sola cada 3 meses"],
    ans:1,
    exp:"La GPC de hepatocarcinoma 2019 establece que el programa de vigilancia en cirróticos debe consistir en ultrasonido abdominal más AFP sérica cada 6 meses. El ultrasonido tiene sensibilidad del 60-80% para detectar HCC temprano y la AFP complementa su rendimiento diagnóstico. La periodicidad de 6 meses se basa en el tiempo de duplicación tumoral del HCC (4-12 meses), permitiendo detectar tumores en etapa resecable.",
    tip:"<strong>Regla de los 6 meses:</strong> USG + AFP cada 6 meses en todo cirrótico, independientemente de la etiología o Child-Pugh. También incluir: portadores crónicos de VHB (varones asiáticos >40 años, mujeres >50 años, africanos >20 años) aunque no tengan cirrosis. El HCC detectado en vigilancia tiene 3 veces más probabilidad de ser resecable.",
    ref:"GPC: Diagnóstico y tratamiento del hepatocarcinoma. SSA. 2019."
  },
  {
    cat:"hcc", catName:"Hepatocarcinoma",
    q:"Paciente con HCC único de 4 cm, Child-Pugh A, sin invasión vascular ni metástasis extrahepáticas. ¿En qué estadio BCLC se encuentra y cuál es el tratamiento de elección?",
    opts:["BCLC B → TACE (quimioembolización transarterial)","BCLC A → resección hepática o trasplante hepático","BCLC C → Sorafenib","BCLC 0 → ablación por radiofrecuencia exclusiva"],
    ans:1,
    exp:"El estadio BCLC A incluye: 1 nódulo de cualquier tamaño (o hasta 3 nódulos ≤3 cm cada uno), función hepática conservada (Child-Pugh A-B), PS 0. El tratamiento de primera línea es la resección hepática cuando hay reserva hepática adecuada (volumen remanente suficiente, sin hipertensión portal significativa) o trasplante hepático si cumple criterios de Milán. La GPC indica que BCLC A con función hepática conservada es potencialmente curable con resección o trasplante.",
    tip:"<strong>BCLC resumido:</strong> 0 (muy temprano, ≤2cm) → ablación. A (temprano, 1 nódulo o ≤3 nódulos ≤3cm, Child A-B) → resección/trasplante/ablación. B (intermedio, multinodular, sin invasión) → TACE. C (avanzado, invasión vascular o metástasis) → Sorafenib/Lenvatinib. D (terminal, Child-Pugh C) → Paliativo.",
    ref:"GPC: Diagnóstico y tratamiento del hepatocarcinoma. SSA. 2019."
  },
  {
    cat:"hcc", catName:"Hepatocarcinoma",
    q:"Un paciente con HCC tiene 2 nódulos: uno de 4.5 cm y otro de 2 cm, sin invasión vascular macroscópica ni metástasis. Su función hepática es Child-Pugh A. ¿Cumple los criterios de Milán para trasplante hepático?",
    opts:["Sí, cumple los criterios de Milán","No cumple, porque tiene más de 1 nódulo","No cumple, porque el nódulo mayor supera los 3 cm","Sí, si la AFP es menor de 200 ng/mL"],
    ans:0,
    exp:"Los criterios de Milán para trasplante hepático en HCC son: 1 nódulo ≤5 cm, O bien hasta 3 nódulos con ninguno >3 cm, sin invasión vascular macroscópica y sin metástasis extrahepáticas. Este paciente tiene 2 nódulos (≤3 total), el mayor de 4.5 cm (≤5 cm) y el menor de 2 cm (≤3 cm), sin invasión vascular ni metástasis. Por lo tanto SÍ cumple criterios de Milán. La GPC establece que el trasplante dentro de criterios de Milán ofrece supervivencia a 5 años del 70-80%.",
    tip:"<strong>Criterios de Milán (memorizar):</strong> 1 nódulo ≤5 cm, OR ≤3 nódulos todos ≤3 cm. SIN invasión vascular macroscópica. SIN metástasis. El error clásico es confundir: 2 nódulos no es automáticamente exclusión — se evalúa el tamaño de cada nódulo y si el total es ≤3. Los criterios de San Francisco (UCSF) son más amplios pero menos usados en México.",
    ref:"GPC: Diagnóstico y tratamiento del hepatocarcinoma. SSA. 2019."
  },
  {
    cat:"hcc", catName:"Hepatocarcinoma",
    q:"Paciente con HCC multinodular (4 nódulos, mayor de 3.5 cm), Child-Pugh B7, sin invasión vascular macroscópica y sin metástasis extrahepáticas (BCLC B). ¿Cuál es el tratamiento de primera línea?",
    opts:["Resección hepática mayor","Sorafenib oral","Quimioembolización transarterial (TACE)","Trasplante hepático urgente"],
    ans:2,
    exp:"El estadio BCLC B (intermedio) corresponde a HCC multinodular, sin invasión vascular ni metástasis, con función hepática conservada (Child-Pugh A o B). El tratamiento estándar es la TACE (quimioembolización transarterial), que combina quimioterapia intraarterial con embolización, logrando necrosis tumoral y control de la enfermedad. La GPC establece TACE como primera línea en BCLC B con beneficio en supervivencia. La resección no es factible por multifocalidad y función hepática comprometida; sorafenib es para BCLC C.",
    tip:"<strong>TACE = Quimioembolización:</strong> Se introduce catéter en arteria hepática → se inyecta quimioterapico (doxorubicina o cisplatino) mezclado con lipiodol + partículas embolizantes → doble efecto: citotóxico + isquemia. El HCC es hipervascular (nutricio arterial), por lo que la embolización arterial es muy efectiva. Contraindicaciones: trombosis portal, Child C, fístula arteriovenosa.",
    ref:"GPC: Diagnóstico y tratamiento del hepatocarcinoma. SSA. 2019."
  },
  {
    cat:"tx", catName:"Tratamiento",
    q:"¿Cuál es el tratamiento sistémico de primera línea aprobado para HCC en estadio BCLC C (avanzado: invasión vascular macroscópica o metástasis extrahepáticas)?",
    opts:["Gemcitabina + Cisplatino IV","Sorafenib oral (o Lenvatinib como alternativa)","TACE combinada con radioterapia","Interferón alfa + Ribavirina"],
    ans:1,
    exp:"Para el HCC en estadio avanzado (BCLC C: invasión vascular portal macroscópica o metástasis extrahepáticas), el tratamiento sistémico de primera línea es Sorafenib (inhibidor multikinasa: VEGFR, PDGFR, RAF), que demuestra beneficio en supervivencia global. Lenvatinib mostró no inferioridad frente a sorafenib y es una alternativa válida. La GPC de HCC 2019 recomienda sorafenib como primera opción aprobada en México para BCLC C con función hepática Child-Pugh A.",
    tip:"<strong>Sorafenib en HCC:</strong> Primer fármaco sistémico con beneficio en supervivencia en HCC (estudios SHARP y Oriental). Dosis: 400 mg VO dos veces al día. Efectos adversos frecuentes: síndrome mano-pie, diarrea, hipertensión, fatiga. Solo indicado en Child-Pugh A (en Child B la toxicidad supera el beneficio). Segunda línea: Regorafenib, Nivolumab, Cabozantinib.",
    ref:"GPC: Diagnóstico y tratamiento del hepatocarcinoma. SSA. 2019."
  },
  {
    cat:"hb", catName:"Hepatoblastoma",
    q:"Lactante de 18 meses es llevado a consulta por aumento progresivo del abdomen. A la exploración se palpa masa en hipocondrio derecho. La AFP sérica reporta 185,000 ng/mL. La TC abdominal muestra masa hepática sólida única de 8 cm en lóbulo derecho. ¿Cuál es el diagnóstico más probable?",
    opts:["Neuroblastoma con metástasis hepáticas","Hepatoblastoma","Hepatocarcinoma infantil","Hamartoma mesenquimatoso hepático"],
    ans:1,
    exp:"El hepatoblastoma es el tumor hepático maligno primario más frecuente en la infancia, especialmente en menores de 3 años (pico: 6-18 meses). La GPC de hepatoblastoma 2016 establece que la presentación clásica es: masa abdominal derecha en niño menor de 3 años + AFP extremadamente elevada (frecuentemente >100,000 ng/mL). La AFP es el marcador tumoral más sensible y específico del hepatoblastoma, y sus niveles correlacionan con la respuesta al tratamiento.",
    tip:"<strong>Hepatoblastoma vs HCC en niños:</strong> Hepatoblastoma: <3 años, AFP >100,000 ng/mL, sin cirrosis previa. HCC infantil (raro): >5 años, AFP más variable, puede haber cirrosis o VHB. En un lactante con masa hepática y AFP altísima, pensar siempre hepatoblastoma. El neuroblastoma puede dar masa abdominal pero es retroperitoneal (suprarrenal) y tiene catecolaminas elevadas.",
    ref:"GPC: Diagnóstico y tratamiento del hepatoblastoma. SSA. 2016."
  },
  {
    cat:"hb", catName:"Hepatoblastoma",
    q:"¿Cuál es la estrategia de tratamiento estándar para el hepatoblastoma de riesgo intermedio según la GPC mexicana 2016?",
    opts:["Cirugía primaria (hepatectomía) sin quimioterapia previa","Quimioterapia neoadyuvante (cisplatino + doxorubicina) seguida de resección quirúrgica o trasplante","Radioterapia hepática total + quimioterapia de consolidación","Embolización arterial hepática + observación"],
    ans:1,
    exp:"La GPC de hepatoblastoma 2016 establece que el tratamiento estándar para hepatoblastoma incluye quimioterapia neoadyuvante (preoperatoria) con cisplatino y doxorubicina (esquema PLADO o SIOPEL) seguida de resección quirúrgica. La quimioterapia neoadyuvante reduce el tamaño tumoral, permite una resección más segura (R0) y convierte tumores inicialmente irresecables en resecables. Si el tumor persiste irresecable tras la quimioterapia, se considera trasplante hepático.",
    tip:"<strong>Secuencia en hepatoblastoma:</strong> 1) Diagnóstico + estadificación (PRETEXT). 2) QT neoadyuvante: 4 ciclos de cisplatino + doxorubicina. 3) Reevaluar respuesta (AFP debe bajar significativamente). 4) Cirugía: resección R0 (margen libre) o trasplante si irresecable. 5) QT adyuvante según estadio. La AFP es el mejor marcador de respuesta — debe normalizarse tras resección completa.",
    ref:"GPC: Diagnóstico y tratamiento del hepatoblastoma. SSA. 2016."
  },
  {
    cat:"meta", catName:"Metástasis Hepáticas",
    q:"Paciente de 62 años con antecedente de adenocarcinoma de colon derecho operado hace 18 meses (pT3N1M0, estadio IIIB). En la vigilancia semestral, la TC detecta 3 lesiones hepáticas hipercaptantes en fase arterial, la mayor de 2.8 cm, sin lesiones extrahepáticas. CEA elevado. ¿Cuál es el tratamiento con intención curativa si las lesiones son resecables técnica y oncológicamente?",
    opts:["Quimioterapia paliativa con FOLFOX exclusiva","Resección hepática de las metástasis con márgenes libres","TACE de las 3 lesiones","Sorafenib por metástasis hepáticas de CCR"],
    ans:1,
    exp:"Las metástasis hepáticas de cáncer colorrectal (CCR) son las más frecuentes y las que con mayor evidencia se benefician de la resección quirúrgica con intención curativa. Los criterios de resecabilidad incluyen: posibilidad de resección R0 (margen ≥1 mm), volumen hepático remanente adecuado (≥20-30%), ausencia de enfermedad extrahepática no controlable, y preferiblemente <4 lesiones. Este paciente tiene 3 lesiones, sin compromiso extrahepático, lo que lo hace candidato a resección con intención curativa.",
    tip:"<strong>Criterios de resecabilidad de metástasis hepáticas de CCR:</strong> Técnica: margen ≥1mm, volumen remanente adecuado, preservar 2 segmentos adyacentes con flujo vascular. Oncológica: <4 lesiones (relativo), sin metástasis extrahepáticas no controlables. Quimioterapia perioperatoria (FOLFOX 6 ciclos antes + 6 después) mejora supervivencia libre de enfermedad. La resección de metástasis hepáticas de CCR tiene supervivencia a 5 años del 30-50%.",
    ref:"GPC: Diagnóstico y tratamiento del hepatocarcinoma. SSA. 2019."
  },
  {
    cat:"diag", catName:"Diagnóstico/Marcadores",
    q:"¿Cuál es el marcador tumoral más útil para el diagnóstico, seguimiento y evaluación de respuesta al tratamiento en el hepatoblastoma?",
    opts:["CA 19-9","CEA (antígeno carcinoembrionario)","AFP (alfa-fetoproteína)","LDH (lactato deshidrogenasa)"],
    ans:2,
    exp:"La alfa-fetoproteína (AFP) es el marcador tumoral de elección en hepatoblastoma. La GPC 2016 establece que la AFP está elevada en el 90% de los hepatoblastomas, frecuentemente en valores >100,000 ng/mL (e incluso millones). Su utilidad es triple: diagnóstico inicial, monitoreo de respuesta a la quimioterapia (debe descender significativamente tras cada ciclo) y detección de recurrencia en el seguimiento post-resección. Una AFP que no desciende o vuelve a subir indica enfermedad persistente o recurrente.",
    tip:"<strong>AFP en hepatoblastoma:</strong> Diagnóstico: elevada en >90% (hasta >1,000,000 ng/mL). Respuesta a QT: debe bajar >1 log por ciclo. Post-resección: debe normalizarse completamente. Recurrencia: primer signo es re-elevación de AFP, antes que los cambios de imagen. Paradoja: AFP muy baja en hepatoblastoma anaplásico de células pequeñas (variante de peor pronóstico, AFP normal = mal signo).",
    ref:"GPC: Diagnóstico y tratamiento del hepatoblastoma. SSA. 2016."
  },
  {
    cat:"diag", catName:"Diagnóstico/Marcadores",
    q:"Mujer de 45 años con ictericia progresiva, pérdida de peso y dolor en hipocondrio derecho. La TC muestra masa en confluencia de conductos hepáticos (hilio hepático) con dilatación de vías biliares intrahepáticas. CA 19-9: 850 U/mL, CEA: 12 ng/mL. ¿Cuál es el diagnóstico más probable y cómo se denomina esta variante anatómica?",
    opts:["Hepatocarcinoma con invasión biliar (HCC colangiotrópico)","Colangiocarcinoma hiliar (Tumor de Klatskin)","Metástasis hepática de adenocarcinoma páncreas","Adenoma hepático complicado"],
    ans:1,
    exp:"El colangiocarcinoma intrahepático o hiliar (tumor de Klatskin cuando afecta la confluencia de conductos hepáticos) se presenta con ictericia obstructiva progresiva, pérdida de peso y dolor. El CA 19-9 elevado (>37 U/mL es límite, valores >200 tienen alta especificidad) combinado con CEA elevado y la imagen característica de masa hiliar con dilatación intrahepática confirman el diagnóstico. El tumor de Klatskin es el colangiocarcinoma con peor pronóstico por su localización (irresecable en la mayoría de casos al diagnóstico).",
    tip:"<strong>Colangiocarcinoma — clasificación por ubicación:</strong> Intrahepático (periférico): dentro del parénquima, se comporta similar a HCC. Hiliar (Klatskin): en bifurcación de conductos hepáticos — peor pronóstico, clasificación de Bismuth-Corlette. Distal (extrahepático): en colédoco distal — mejor pronóstico, puede resecarse con Whipple. Marcadores: CA19-9 + CEA (ambos elevados = mayor especificidad que uno solo).",
    ref:"GPC: Diagnóstico y tratamiento del hepatocarcinoma. SSA. 2019."
  },
  {
    cat:"tx", catName:"Tratamiento",
    q:"Paciente con HCC único de 2.5 cm, Child-Pugh A, que NO es candidato a resección quirúrgica por hipertensión portal significativa (plaquetas 65,000, várices esofágicas grado II). ¿Cuál es la alternativa de tratamiento local con intención curativa?",
    opts:["TACE como primera línea en lugar de resección","Ablación por radiofrecuencia (ARF)","Sorafenib oral","Radioterapia hepática estereotáctica (SBRT)"],
    ans:1,
    exp:"La ablación por radiofrecuencia (ARF) es el tratamiento de elección para HCC en estadio muy temprano (BCLC 0: ≤2 cm) y como alternativa en BCLC A cuando la resección o el trasplante no son posibles. Para nódulos ≤3 cm, la ARF logra tasas de respuesta completa del 70-90% con morbilidad mínima. La GPC establece que en pacientes no candidatos a cirugía por hipertensión portal (plaquetas <100,000, várices) o función hepática comprometida, la ARF es la primera alternativa con intención curativa. Para nódulos entre 3-5 cm, la ARF tiene menor eficacia y se prefiere TACE.",
    tip:"<strong>ARF vs resección:</strong> Para nódulos ≤2 cm: resultados comparables. Para nódulos 2-5 cm: resección superior en supervivencia libre de enfermedad. ARF ventajas: mínimamente invasiva, repetible, preserva parénquima hepático. Limitaciones: no aplicable en tumores >5 cm, ni adyacentes a estructuras vasculares mayores o ductos biliares principales (riesgo de quemadura). Vías: percutánea (guiada por USG o TC), laparoscópica o intraoperatoria.",
    ref:"GPC: Diagnóstico y tratamiento del hepatocarcinoma. SSA. 2019."
  },
  {
    cat:"meta", catName:"Metástasis Hepáticas",
    q:"Mujer de 38 años, usuaria crónica de anticonceptivos orales (10 años), acude a urgencias por dolor abdominal agudo en hipocondrio derecho e hipotensión. La TC muestra masa hepática de 6 cm con hemorragia activa intraperitoneal. No hay cirrosis ni antecedentes tumorales. ¿Cuál es el diagnóstico más probable y cuál es el riesgo oncológico principal de esta lesión?",
    opts:["HCC sobre hígado sano con ruptura espontánea","Adenoma hepático con hemorragia y riesgo de malignización","Quiste hidatídico roto","Metástasis de tumor neuroendocrino roto"],
    ans:1,
    exp:"El adenoma hepático es una lesión benigna fuertemente asociada al uso de anticonceptivos orales (estrógenos). La GPC y la literatura establecen dos complicaciones principales del adenoma hepático: hemorragia (riesgo de rotura espontánea con hemoperitoneo, más frecuente en adenomas >5 cm) y malignización (transformación a HCC, especialmente en adenomas >5 cm, en hombres o en variante con mutación beta-catenina). El tratamiento es la resección quirúrgica en adenomas >5 cm o sintomáticos, y suspensión de ACO en todos los casos.",
    tip:"<strong>Adenoma hepático — regla práctica:</strong> ACO + masa hepática en mujer joven sin cirrosis = adenoma hasta demostrar lo contrario. Riesgos: 1) Hemorragia (más frecuente, especialmente >5 cm). 2) Malignización (riesgo 5-10%, mayor en hombres, >5 cm, mutación beta-catenina). Manejo: suspender ACO (pueden regresar), resección si >5 cm, sintomático, hombre (todos los adenomas en varones se resecan), o embarazo planeado.",
    ref:"GPC: Diagnóstico y tratamiento del hepatocarcinoma. SSA. 2019."
  },
  {
    cat:"hcc", catName:"Hepatocarcinoma",
    q:"Paciente con cirrosis hepática Child-Pugh C (9 puntos), HCC único de 3 cm, sin metástasis extrahepáticas ni invasión vascular macroscópica (BCLC D). ¿Cuál es el tratamiento recomendado según la estadificación BCLC?",
    opts:["Trasplante hepático urgente dado que cumple criterios de Milán","Resección hepática con margen de 1 cm","Sorafenib a dosis completa","Tratamiento paliativo sintomático exclusivo"],
    ans:3,
    exp:"El estadio BCLC D (terminal) corresponde a pacientes con función hepática muy deteriorada (Child-Pugh C) independientemente de las características tumorales, o con performance status muy bajo (PS >2). La GPC establece que en este estadio la esperanza de vida es <3 meses y el objetivo es el control de síntomas y la calidad de vida. Ningún tratamiento oncológico activo (resección, TACE, sorafenib) está indicado en Child-Pugh C dado el riesgo de descompensación hepática grave y mortalidad perioperatoria/periprocedimiento muy elevada.",
    tip:"<strong>La función hepática manda en HCC:</strong> Child-Pugh C contraindica prácticamente todo tratamiento oncológico activo. El trasplante requiere un proceso de evaluación largo (no es urgente en HCC salvo downstaging exitoso previo). Sorafenib en Child C tiene toxicidad inaceptable. La regla BCLC prioriza primero el PS, luego la función hepática, y al final las características tumorales para decidir tratamiento.",
    ref:"GPC: Diagnóstico y tratamiento del hepatocarcinoma. SSA. 2019."
  }
];

let currentQ = 0, score = 0, answers = [];
let catStats = { hcc:{c:0,t:0}, hb:{c:0,t:0}, meta:{c:0,t:0}, diag:{c:0,t:0}, tx:{c:0,t:0} };

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function init() {
  shuffle(questions);
  currentQ=0; score=0; answers=[];
  catStats = { hcc:{c:0,t:0}, hb:{c:0,t:0}, meta:{c:0,t:0}, diag:{c:0,t:0}, tx:{c:0,t:0} };
  const r=document.getElementById('resultsArea');
  r.classList.remove('show'); r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion() {
  const qa=questions[currentQ], total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const letters=['A','B','C','D'];
  let html=`<div class="question-card">
    <div class="q-category cat-${qa.cat}">${qa.catName}</div>
    <div class="q-number">Pregunta ${currentQ+1} de ${total}</div>
    <div class="q-text">${qa.q}</div>
    <div class="options">`;
  qa.opts.forEach((opt,i)=>{
    html+=`<button class="option-btn" onclick="selectAnswer(${i})" data-idx="${i}">
      <span class="option-letter">${letters[i]}</span><span>${opt}</span></button>`;
  });
  html+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=html;
}

function selectAnswer(idx) {
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const isCorrect=idx===qa.ans;
  btns.forEach((btn,i)=>{
    btn.classList.add('disabled'); btn.onclick=null;
    if(i===qa.ans) btn.classList.add('correct-answer');
    if(i===idx&&!isCorrect) btn.classList.add('wrong-answer');
  });
  if(!catStats[qa.cat]) catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(isCorrect){score++;catStats[qa.cat].c++;}
  if(!examMode){
    fb.className=isCorrect?'feedback correct-fb show':'feedback wrong-fb show';
    fb.innerHTML=isCorrect
      ?`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`
      :`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;
  }
  answers.push({q:qa.q,correct:isCorrect,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if(currentQ>=questions.length) showResults();
  else renderQuestion();
}

function showResults() {
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'🏆 ¡Dominio excelente de cáncer hepático!':pct>=70?'👏 ¡Muy bien! Repasa los temas con menor puntaje.':pct>=50?'📚 Aceptable, refuerza las áreas débiles.':'⚠️ Revisa las GPC de hepatocarcinoma y hepatoblastoma.';
  const cats=[
    {name:'Hepatocarcinoma',key:'hcc',color:'#fbbf24'},
    {name:'Hepatoblastoma',key:'hb',color:'#38bdf8'},
    {name:'Metástasis Hepáticas',key:'meta',color:'#a78bfa'},
    {name:'Diagnóstico/Marcadores',key:'diag',color:'#34d399'},
    {name:'Tratamiento',key:'tx',color:'#f472b6'},
  ];
  let html=`<div class="results-header">
    <div class="score-big">${pct}%</div>
    <div class="score-label">${score} de ${questions.length} correctas</div>
    <div class="score-msg">${msg}</div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📊</span> Rendimiento por Categoría</div>
    <div class="bar-chart">`;
  cats.forEach(cat=>{
    const s=catStats[cat.key]||{c:0,t:0};
    const p=s.t>0?Math.round((s.c/s.t)*100):0;
    html+=`<div class="bar-row"><div class="bar-label">${cat.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${cat.color};">${p}% (${s.c}/${s.t})</div></div></div>`;
  });
  html+=`</div></div>
  <div class="chart-section">
    <div class="chart-title"><span>🎯</span> Resumen General</div>
    <div class="donut-wrap">
      <svg class="donut-svg" viewBox="0 0 42 42">
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
        <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
      </svg>
      <div class="donut-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#38bdf8;"></div>Total: ${questions.length}</div>
      </div>
    </div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{
    html+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
      <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
      <div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div>
      <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
      <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
    </div>`;
  });
  html+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const res=document.getElementById('resultsArea');
  res.innerHTML=html; res.classList.add('show');
  res.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(header){header.classList.toggle('open');header.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}

init();
</script>
</body>
</html>
