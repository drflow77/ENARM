  .topics-list{display:none;padding:4px 0 8px;}

  .topic-link{display:flex;align-items:center;gap:10px;padding:8px 16px 8px 56px;font-size:0.78rem;color:var(--text-dim);text-decoration:none;transition:all 0.2s;border-left:2px solid transparent;line-height:1.4;}
  .topic-link:hover{color:var(--text);background:var(--surface3);}

  .badge-soon{margin-left:auto;background:rgba(136,150,179,0.1);color:var(--text-dim);font-size:0.62rem;font-weight:600;padding:2px 7px;border-radius:100px;}
  .badge-ready{margin-left:auto;background:rgba(56,189,248,0.15);color:#38bdf8;font-size:0.62rem;font-weight:600;padding:2px 7px;border-radius:100px;}

  .main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;}
  .container{max-width:760px;margin:0 auto;padding:20px 16px 40px;width:100%;}

  .mode-bar{display:flex;align-items:center;gap:10px;margin:24px 0 20px;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:6px;width:fit-content;}

  .header{text-align:center;padding:40px 20px 24px;position:relative;overflow:hidden;}
  .header::before{content:'';position:absolute;top:-60%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(56,189,248,0.08) 0%,transparent 70%);pointer-events:none;}
  .header-badge{display:inline-flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);padding:6px 16px;border-radius:100px;font-size:0.78rem;color:#38bdf8;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:16px;}
  .header h1{font-size:clamp(1.3rem,4vw,2rem);font-weight:800;background:linear-gradient(135deg,var(--text) 0%,#38bdf8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;line-height:1.2;}
  .header p{color:var(--text-dim);font-size:0.95rem;max-width:600px;margin:0 auto;line-height:1.4;}

  .progress-wrap{background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:12px 20px;margin:20px 0 28px;display:flex;align-items:center;gap:14px;}
  .progress-bar-bg{flex:1;height:8px;background:var(--surface3);border-radius:100px;overflow:hidden;}
  .progress-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,#38bdf8,#34d399);border-radius:100px;transition:width 0.5s ease;}
  .progress-text{font-size:0.82rem;font-weight:600;color:var(--text-dim);white-space:nowrap;font-family:'JetBrains Mono',monospace;}

  .question-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;margin-bottom:20px;animation:slideIn 0.4s ease;position:relative;overflow:hidden;}

  .q-category{display:inline-flex;align-items:center;gap:6px;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;padding:4px 12px;border-radius:100px;margin-bottom:14px;}
  .cat-pre{background:rgba(56,189,248,0.12);color:#38bdf8;}
  .cat-con{background:rgba(52,211,153,0.12);color:#34d399;}
  .cat-par{background:rgba(167,139,250,0.12);color:#a78bfa;}

  .q-number{font-family:'JetBrains Mono',monospace;font-size:0.78rem;color:var(--text-dim);margin-bottom:10px;}
  .q-text{font-size:1.05rem;font-weight:600;line-height:1.55;margin-bottom:20px;color:var(--text);}
  .options{display:flex;flex-direction:column;gap:10px;}
  .option-btn{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:all 0.2s;text-align:left;font-size:0.92rem;color:var(--text);font-family:inherit;line-height:1.5;width:100%;}
  .option-btn:hover:not(.disabled){border-color:#38bdf8;background:rgba(56,189,248,0.08);transform:translateX(4px);}
  .option-letter{display:flex;align-items:center;justify-content:center;min-width:30px;height:30px;border-radius:8px;background:var(--surface3);font-weight:700;font-size:0.82rem;color:#38bdf8;flex-shrink:0;}
  .option-btn.correct-answer{border-color:var(--correct-border);background:var(--correct-bg);}
  .option-btn.correct-answer .option-letter{background:var(--correct);color:var(--bg);}
  .option-btn.wrong-answer{border-color:var(--wrong-border);background:var(--wrong-bg);}
  .option-btn.wrong-answer .option-letter{background:var(--wrong);color:var(--bg);}
  .option-btn.disabled{cursor:default;}
  .option-btn.disabled:hover{transform:none;}

  .feedback{margin-top:18px;padding:18px;border-radius:12px;font-size:0.88rem;line-height:1.65;animation:fadeIn 0.3s ease;display:none;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .feedback.show{display:block;}
  .feedback.correct-fb{background:var(--correct-bg);border:1px solid var(--correct-border);color:var(--correct);}
  .feedback.wrong-fb{background:var(--wrong-bg);border:1px solid var(--wrong-border);color:#fca5a5;}
  .feedback-title{font-weight:700;font-size:0.95rem;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
  .feedback .tip{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.08);color:var(--text-dim);font-size:0.82rem;}
  .feedback .tip strong{color:var(--gold);}
  .feedback .ref{margin-top:8px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;}

  .next-btn{display:none;margin:20px auto 0;padding:12px 32px;background:linear-gradient(135deg,#38bdf8,#34d399);color:var(--bg);border:none;border-radius:100px;font-family:inherit;font-size:0.92rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
  .next-btn:hover{transform:scale(1.05);}
  .next-btn.show{display:block;}

  .results{display:none;animation:slideIn 0.5s ease;}
  .results.show{display:block;}
  .results-header{text-align:center;padding:30px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px;position:relative;overflow:hidden;}
  .results-header::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#38bdf8,#34d399,var(--purple));}
  .score-big{font-family:'JetBrains Mono',monospace;font-size:3.5rem;font-weight:800;color:#38bdf8;line-height:1;}
  .score-label{font-size:1rem;color:var(--text-dim);margin:8px 0;}
  .score-msg{font-size:1.05rem;font-weight:600;color:var(--text);}
  .chart-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
  .chart-title{font-size:0.9rem;font-weight:700;color:var(--text-dim);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
  .bar-chart{display:flex;flex-direction:column;gap:12px;}
  .bar-row{display:flex;flex-direction:column;gap:6px;}
  .bar-label{font-size:0.82rem;font-weight:600;color:var(--text);}
  .bar-track{height:28px;background:var(--surface3);border-radius:6px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:10px;font-size:0.78rem;font-weight:700;color:var(--bg);min-width:40px;transition:width 0.8s ease;}
  .donut-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
  .donut-svg{width:100px;height:100px;flex-shrink:0;}
  .donut-legend{display:flex;flex-direction:column;gap:8px;}
  .legend-item{display:flex;align-items:center;gap:8px;font-size:0.82rem;color:var(--text-dim);}
  .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .review-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;}
  .review-card.review-correct{border-color:var(--correct-border);}
  .review-card.review-wrong{border-color:var(--wrong-border);}
  .review-q{font-size:0.85rem;font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.5;}
  .review-answer{font-size:0.82rem;line-height:1.5;}
  .retry-btn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#38bdf8,#34d399);border:none;border-radius:12px;color:var(--bg);font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;margin-top:20px;transition:all 0.2s;}
  .retry-btn:hover{filter:brightness(1.1);}

  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:90;}
  .overlay.show{display:block;}
  .hamburger{display:none;position:fixed;top:14px;left:14px;z-index:200;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 10px;cursor:pointer;font-size:1.1rem;}
  .footer{text-align:center;padding:16px;font-size:0.72rem;color:var(--text-dim);border-top:1px solid var(--border);opacity:0.6;}

  @media(max-width:900px){
    .sidebar{transform:translateX(-100%);}
    .sidebar.open{transform:translateX(0);}
    .main{margin-left:0;}
    .hamburger{display:block;}
    .container{padding-top:60px;}
  }
</style>
</head>

<script>
let examMode=false, currentQ=0, score=0, answers=[], catStats={};

function setMode(m){
  examMode=(m==='examen');
  document.getElementById('btnRepaso').classList.toggle('active',!examMode);
  document.getElementById('btnExamen').classList.toggle('active',examMode);
  init();
}

const questions = [
  /* ── CONTROL PRENATAL ── */
  {
    cat:"pre", catName:"Control Prenatal",
    q:"¿Cuántas consultas de control prenatal mínimas recomienda la NOM-007-SSA2-2016 y la OMS para una embarazada de bajo riesgo en México?",
    opts:[
      "3 consultas: primera trimestre, segunda trimestre y parto",
      "Al menos 5 consultas: una antes de la semana 12, dos en el segundo trimestre y dos en el tercer trimestre",
      "12 consultas mensuales distribuidas a lo largo del embarazo",
      "Solo 2 consultas: una al inicio y una en la semana 36 para planear el parto"
    ],
    ans:1,
    exp:"La NOM-007-SSA2-2016 establece un mínimo de 5 consultas prenatales para embarazo de bajo riesgo: (1a) antes de la semana 12; (2a) semanas 22-24; (3a) semanas 28-30; (4a) semanas 34-36; (5a) semana 38-40. La OMS en su modelo 2016 recomienda 8 o más contactos prenatales. En embarazo de ALTO RIESGO el número de consultas se individualiza y aumenta según patología. La primera consulta es la más completa (historia clínica, determinación de edad gestacional, estudios de laboratorio basales).",
    tip:"Control prenatal mínimo NOM-007: 5 consultas. OMS 2016: 8+ contactos. Primera consulta: <12 semanas = más completa. Alto riesgo = mayor frecuencia individualizada.",
    ref:"NOM-007-SSA2-2016 para la atención de la mujer durante el embarazo, parto y puerperio, y de la persona recién nacida"
  },
  {
    cat:"pre", catName:"Control Prenatal",
    q:"¿Cuál es el suplemento más importante en el período periconcepcional y primer trimestre del embarazo para prevenir defectos del tubo neural?",
    opts:[
      "Hierro ferroso 200 mg/día iniciando en la semana 20 de gestación",
      "Ácido fólico (folato) 0.4–0.8 mg/día al menos 1 mes antes de la concepción y durante las primeras 12 semanas; 4–5 mg/día en mujeres de alto riesgo (embarazo previo con DTN, antiepilépticos)",
      "Vitamina A 50,000 UI/día durante toda la gestación para prevenir malformaciones",
      "Calcio 2,000 mg/día desde el inicio del embarazo como único suplemento necesario"
    ],
    ans:1,
    exp:"El ácido fólico (folato) es el suplemento periconcepcional más importante: reduce el riesgo de defectos del tubo neural (DTN: anencefalia, espina bífida, encefalocele) en un 50-70%. Dosis estándar: 0.4-0.8 mg/día iniciando al menos 1 mes antes de la concepción y manteniéndose hasta la semana 12. Dosis alta (4-5 mg/día): mujeres con embarazo previo con DTN, en tratamiento con ácido valproico/carbamazepina, diabetes pregestacional, o IMC >35. VIT A >10,000 UI/día es teratogénica (evitar).",
    tip:"Ácido fólico: 0.4-0.8 mg periconcepcional (≥1 mes antes + 12 sem). Alto riesgo (DTN previo, antiepilépticos): 4-5 mg. Vitamina A >10,000 UI = teratogénica.",
    ref:"NOM-007-SSA2-2016 / GPC Atención y cuidados multidisciplinarios en el embarazo 2022"
  },
  {
    cat:"pre", catName:"Control Prenatal",
    q:"¿Cuáles son los estudios de laboratorio mínimos que deben solicitarse en la primera consulta prenatal según la NOM-007?",
    opts:[
      "Solo biometría hemática y glucosa en ayuno; los demás estudios son opcionales",
      "BH, glucosa, grupo y Rh, VDRL/RPR, VIH, urocultivo, tira reactiva de orina, tipo de hepatitis B (HBsAg); considerar toxoplasmosis y Chagas según zona endémica",
      "Solo VDRL y VIH como estudios obligatorios de tamizaje en primer nivel",
      "Panel TORCH completo (toxoplasma, rubéola, CMV, herpes) como único estudio de primer trimestre"
    ],
    ans:1,
    exp:"Los estudios mínimos de la primera consulta prenatal (NOM-007) incluyen: Biometría hemática (detectar anemia), Glucosa en ayuno (tamizaje DM), Grupo sanguíneo y Rh (identificar isoinmunización), VDRL o RPR (sífilis congénita), VIH (tratamiento antirretroviral si positivo), Urocultivo o EMO (bacteriuria asintomática), HBsAg (hepatitis B: vacunar al RN en <12h si positivo). El tamizaje de sífilis y VIH es OBLIGATORIO. Se añaden estudios específicos según zona endémica (Chagas, malaria) o factores de riesgo.",
    tip:"1ª consulta prenatal: BH + glucosa + grupo/Rh + VDRL + VIH + urocultivo + HBsAg. VDRL y VIH = OBLIGATORIOS. HBsAg positivo → vacunar RN < 12h.",
    ref:"NOM-007-SSA2-2016 para la atención de la mujer durante el embarazo, parto y puerperio, y de la persona recién nacida"
  },
  {
    cat:"pre", catName:"Control Prenatal",
    q:"¿Cuándo y cómo se realiza el tamizaje para diabetes gestacional (DG) según la GPC 2022?",
    opts:[
      "Glicemia en ayuno en cada consulta, sin necesidad de curva de tolerancia a la glucosa",
      "Tamizaje universal con curva de tolerancia oral a la glucosa (CTOG) 75g (ayuno, 1h, 2h) entre las semanas 24-28; el tamizaje en <14 semanas aplica en mujeres de alto riesgo (DM2 previa, obesidad, macrosomía previa)",
      "CTOG 100g con 3 determinaciones en todas las embarazadas en la semana 32 como tamizaje único",
      "Solo se tamiza DG si la glucosa casual >200 mg/dL en cualquier consulta prenatal"
    ],
    ans:1,
    exp:"El tamizaje de diabetes gestacional (CTOG 75g: ayuno/1h/2h) se realiza entre las semanas 24-28 de gestación en todas las embarazadas (tamizaje universal). Diagnóstico DG (criterios IADPSG/ADA): glucosa en ayuno ≥92 mg/dL, a 1h ≥180 mg/dL, o a 2h ≥153 mg/dL (con un solo valor alterado). En mujeres de ALTO RIESGO (obesidad, DM2, macrosomía previa, intolerancia previa a glucosa) se hace tamizaje adicional en el primer trimestre (<14 semanas). DG pregestacional: glucosa ayuno ≥126 mg/dL.",
    tip:"DG tamizaje: CTOG 75g a las 24-28 semanas. Diagnóstico: 1 valor alterado (ayuno ≥92, 1h ≥180, 2h ≥153 mg/dL). Alto riesgo: tamizar también en 1er trimestre.",
    ref:"GPC Atención y cuidados multidisciplinarios en el embarazo 2022"
  },
  {
    cat:"pre", catName:"Control Prenatal",
    q:"¿Cuál es la suplementación de hierro recomendada durante el embarazo para prevenir anemia ferropénica, según la NOM-007 y GPC?",
    opts:[
      "Hierro 60 mg elemental/día a partir de la semana 28 hasta el parto, solo si hay anemia confirmada",
      "Hierro elemental 30–60 mg/día a partir de la semana 16-20, o desde el inicio si hay anemia (Hb <11 g/dL en 1er/3er trimestre, <10.5 en 2do trimestre); aumentar a 120-200 mg/día en anemia",
      "Hierro IV durante toda la gestación como única forma de suplementación efectiva",
      "No se recomienda suplementación rutinaria de hierro; solo medidas dietéticas"
    ],
    ans:1,
    exp:"La NOM-007 y la GPC recomiendan suplementación rutinaria de hierro elemental 30-60 mg/día a partir de las semanas 16-20 (aunque algunas guías lo inician desde el primer trimestre). Anemia en embarazo: Hb <11 g/dL en 1er y 3er trimestre; <10.5 g/dL en 2do trimestre. Ante anemia diagnosticada: aumentar la dosis a 100-200 mg de hierro elemental/día. El hierro se absorbe mejor en ayunas con vitamina C y se inhibe por té, café, calcio y antiácidos. La deficiencia de hierro es la causa más frecuente de anemia en el embarazo.",
    tip:"Hierro embarazo: 30-60 mg elemental/día desde 16-20 sem. Anemia (Hb <11/10.5/11 g/dL según trimestre): 120-200 mg/día. Tomar en ayunas + vit C. Evitar con calcio.",
    ref:"NOM-007-SSA2-2016 / GPC Atención y cuidados multidisciplinarios en el embarazo 2022"
  },
  {
    cat:"pre", catName:"Control Prenatal",
    q:"¿Cuál es el manejo recomendado de la bacteriuria asintomática (BA) en el embarazo?",

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function init(){
  shuffle(questions);
  currentQ=0;score=0;answers=[];
  catStats={pre:{c:0,t:0},con:{c:0,t:0},par:{c:0,t:0}};
  const r=document.getElementById('resultsArea');
  r.classList.remove('show');r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion(){
  const qa=questions[currentQ],total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const L=['A','B','C','D'];
  let h=`<div class="question-card">
    <div class="q-category cat-${qa.cat}">${qa.catName}</div>
    <div class="q-number">Pregunta ${currentQ+1} de ${total}</div>
    <div class="q-text">${qa.q}</div>
    <div class="options">`;
  qa.opts.forEach((o,i)=>h+=`<button class="option-btn" onclick="selectAnswer(${i})">
    <span class="option-letter">${L[i]}</span><span>${o}</span></button>`);
  h+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=h;
}

function selectAnswer(idx){
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const ok=idx===qa.ans;
  btns.forEach((b,i)=>{b.classList.add('disabled');b.onclick=null;
    if(i===qa.ans)b.classList.add('correct-answer');
    if(i===idx&&!ok)b.classList.add('wrong-answer');});
  if(!catStats[qa.cat])catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(ok){score++;catStats[qa.cat].c++;}
  if(!examMode){
    fb.className=ok?'feedback correct-fb show':'feedback wrong-fb show';
    fb.innerHTML=ok
      ?`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`
      :`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;
  }
  answers.push({q:qa.q,correct:ok,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,tip:qa.tip,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion(){currentQ++;if(currentQ>=questions.length)showResults();else renderQuestion();}

function showResults(){
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'🏆 ¡Excelente dominio! Listo para el ENARM.':pct>=70?'👏 ¡Muy bien! Repasa las áreas con menor puntaje.':pct>=50?'📚 Aceptable, hay áreas de oportunidad.':'⚠️ Refuerza este tema. Revisa las GPC correspondientes.';
  const cats=[
    {name:'Control Prenatal',key:'pre',color:'#38bdf8'},
    {name:'Condiciones Específicas del Embarazo',key:'con',color:'#34d399'},
    {name:'Parto, Puerperio y Recién Nacido',key:'par',color:'#a78bfa'}
  ];
  let h=`<div class="results-header"><div class="score-big">${pct}%</div><div class="score-label">${score} de ${questions.length} correctas</div><div class="score-msg">${msg}</div></div>
  <div class="chart-section"><div class="chart-title"><span>📊</span> Rendimiento por Categoría</div><div class="bar-chart">`;
  cats.forEach(c=>{const s=catStats[c.key]||{c:0,t:0};const p=s.t>0?Math.round((s.c/s.t)*100):0;if(s.t>0)h+=`<div class="bar-row"><div class="bar-label">${c.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${c.color};">${p}% (${s.c}/${s.t})</div></div></div>`;});
  h+=`</div></div><div class="chart-section"><div class="chart-title"><span>🎯</span> Resumen General</div><div class="donut-wrap">
    <svg class="donut-svg" viewBox="0 0 42 42">
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#38bdf8" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
      <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
      <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
    </svg>
    <div class="donut-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#38bdf8;"></div>Correctas: ${score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
      <div class="legend-item"><div class="legend-dot" style="background:#8896b3;"></div>Total: ${questions.length}</div>
    </div></div></div>
  <div class="chart-section"><div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{h+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
    <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
    <div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div>
    <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
    <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
  </div>`;});
  h+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const r=document.getElementById('resultsArea');r.innerHTML=h;r.classList.add('show');r.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
init();
</script>
</body>
</html>
