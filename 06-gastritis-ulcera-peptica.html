<script>
let examMode = false;

function setMode(mode) {
  examMode = (mode === 'examen');
  document.getElementById('btnRepaso').classList.toggle('active', !examMode);
  document.getElementById('btnExamen').classList.toggle('active', examMode);
  init();
}

const questions = [
  {
    cat:"gast", catName:"Gastritis",
    q:"Mujer de 35 años con artritis reumatoide en tratamiento crónico con naproxeno 500 mg c/12 h. Acude por epigastralgia intensa de 3 días de evolución, náusea y un episodio de hematemesis de escasa cuantía. La endoscopia muestra múltiples erosiones superficiales en antro y cuerpo gástrico sin úlcera definida. ¿Cuál es el diagnóstico?",
    opts:["Úlcera gástrica tipo I de Johnson","Síndrome de Zollinger-Ellison","Gastritis aguda erosiva por AINEs","Gastropatía por reflujo biliar"],
    ans:2,
    exp:"La gastritis aguda erosiva por AINEs es la causa más frecuente de erosiones gástricas en pacientes con uso crónico de antiinflamatorios. Los AINEs inhiben la COX-1, reduciendo la síntesis de prostaglandinas protectoras (PGE2), lo que disminuye el moco gástrico, el bicarbonato y el flujo sanguíneo de la mucosa. La GPC señala que las erosiones superficiales múltiples en antro y cuerpo sin ulceración profunda son el hallazgo endoscópico típico de gastritis erosiva por AINEs.",
    tip:"<strong>Mecanismo dual de daño por AINEs:</strong> Efecto tópico directo (irritación mucosa) + efecto sistémico (inhibición COX-1 → ↓PGE2 → ↓moco y bicarbonato). Los AINEs selectivos COX-2 (celecoxib) tienen menor riesgo GI pero no lo eliminan. Siempre asociar IBP en uso crónico de AINEs con factores de riesgo.",
    ref:"GPC: Profilaxis, diagnóstico y tratamiento de gastritis aguda (erosiva) en adultos en los tres niveles de atención. SSA/IMSS/ISSSTE."
  },
  {
    cat:"gast", catName:"Gastritis",
    q:"Paciente masculino de 28 años con ingesta abundante de alcohol etílico (>10 bebidas) la noche anterior. Refiere epigastralgia intensa, náusea y vómito de contenido gástrico sin sangre. A la EF: dolor epigástrico leve a la palpación, sin irritación peritoneal. Amilasa y lipasa normales. ¿Cuál es la causa más probable de su cuadro?",
    opts:["Pancreatitis aguda leve","Síndrome de Mallory-Weiss","Úlcera duodenal perforada","Gastritis aguda por alcohol"],
    ans:3,
    exp:"El alcohol produce gastritis aguda por efecto tópico directo: altera la barrera mucosa gástrica al disolver la capa de moco, aumentar la permeabilidad epitelial y estimular la secreción ácida. La GPC establece que en el contexto de ingesta aguda de alcohol, la epigastralgia con náusea y vómito sin fiebre ni datos de irritación peritoneal, con amilasa/lipasa normales, orienta a gastritis aguda por alcohol como diagnóstico de exclusión clínica.",
    tip:"<strong>Gastritis por alcohol vs Pancreatitis:</strong> En gastritis alcohólica: dolor epigástrico que mejora al vomitar, sin irradiación dorsal, amilasa normal. En pancreatitis: dolor intenso con irradiación en cinturón, amilasa/lipasa >3 veces el valor normal, posible íleo. Siempre pedir amilasa/lipasa para diferenciar.",
    ref:"GPC: Profilaxis, diagnóstico y tratamiento de gastritis aguda (erosiva) en adultos en los tres niveles de atención. SSA/IMSS/ISSSTE."
  },
  {
    cat:"hpyl", catName:"H. pylori",
    q:"Hombre de 45 años con epigastralgia de 6 meses, sin uso de AINEs, sin pérdida de peso. Se le realiza endoscopia que muestra úlcera gástrica de 1 cm en curvatura menor. Las biopsias reportan gastritis crónica activa con presencia de bacilos curvos en la mucosa. ¿Cuál es el método diagnóstico considerado estándar de oro para confirmar H. pylori directamente desde la biopsia?",
    opts:["Prueba rápida de ureasa en biopsia + histología","Antígeno de H. pylori en heces","Prueba de aliento con urea C13","Serología (IgG anti-H. pylori)"],
    ans:0,
    exp:"El diagnóstico histológico mediante biopsia gástrica (tinción de Giemsa o hematoxilina-eosina) es el estándar de oro para identificar H. pylori directamente en la mucosa, especialmente en pacientes sometidos a endoscopia. La prueba rápida de ureasa en biopsia (CLO test) también es de alta utilidad endoscópica con sensibilidad de 90-95%. La histología identifica además el grado de gastritis, metaplasia intestinal y displasia. La GPC recomienda tomar biopsias de antro y cuerpo para aumentar la sensibilidad diagnóstica.",
    tip:"<strong>Métodos diagnósticos de H. pylori:</strong> Invasivos (requieren endoscopia): histología (oro), CLO test, cultivo. No invasivos: prueba de aliento C13 (mejor para confirmar erradicación), antígeno en heces (útil en seguimiento), serología (no distingue infección activa de pasada). La serología no sirve para confirmar erradicación.",
    ref:"GPC: Manejo de la úlcera péptica en adultos en el primer y segundo niveles de atención. IMSS-DGIS."
  },
  {
    cat:"hpyl", catName:"H. pylori",
    q:"Paciente de 52 años con diagnóstico de úlcera duodenal activa y confirmación de H. pylori por prueba de aliento positiva. No tiene alergias conocidas. ¿Cuál es el esquema de erradicación de primera línea recomendado por las GPC mexicanas?",
    opts:["Ciprofloxacino 500 mg c/12h + Claritromicina 500 mg c/12h por 7 días","Metronidazol 500 mg c/8h + Tetraciclina 500 mg c/6h + Bismuto + IBP por 14 días","Levofloxacino 500 mg c/24h + Amoxicilina 1g c/12h + IBP por 10 días","Claritromicina 500 mg c/12h + Amoxicilina 1g c/12h + IBP por 14 días"],
    ans:3,
    exp:"La triple terapia estándar (Claritromicina + Amoxicilina + IBP) por 14 días es el esquema de primera línea recomendado por las GPC mexicanas para erradicación de H. pylori en pacientes sin resistencia conocida a claritromicina. La duración de 14 días ha demostrado tasas de erradicación superiores a los esquemas de 7 días (85-90% vs 75-80%). El IBP se debe administrar 30 minutos antes del desayuno y la cena para maximizar su efecto.",
    tip:"<strong>Triple terapia de 14 días: C-A-I</strong> — Claritromicina + Amoxicilina + IBP. Si alergia a penicilina: sustituir amoxicilina por metronidazol. Si la tasa local de resistencia a claritromicina >15%: usar cuádruple terapia con bismuto de entrada. Confirmar erradicación con prueba de aliento C13 mínimo 4 semanas después de terminar el tratamiento (suspender IBP 2 semanas antes).",
    ref:"GPC: Manejo de la úlcera péptica en adultos en el primer y segundo niveles de atención. IMSS-DGIS."
  },
  {
    cat:"ulc", catName:"Úlcera Péptica",
    q:"Mujer de 38 años refiere dolor epigástrico que aparece 1-2 horas después de comer, se alivia con antiácidos pero regresa. Por las noches la despierta el dolor. No usa AINEs. ¿A qué tipo de úlcera corresponde este patrón clínico y cuál es su fisiopatología predominante?",

let currentQ = 0, score = 0, answers = [];
let catStats = { gast:{c:0,t:0}, ulc:{c:0,t:0}, hpyl:{c:0,t:0}, ze:{c:0,t:0}, cx:{c:0,t:0} };

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function init() {
  shuffle(questions);
  currentQ=0; score=0; answers=[];
  catStats = { gast:{c:0,t:0}, ulc:{c:0,t:0}, hpyl:{c:0,t:0}, ze:{c:0,t:0}, cx:{c:0,t:0} };
  const r=document.getElementById('resultsArea');
  r.classList.remove('show'); r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion() {
  const qa=questions[currentQ], total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const letters=['A','B','C','D'];
  let html=`<div class="question-card">
    <div class="q-category cat-${qa.cat}">${qa.catName}</div>
    <div class="q-number">Pregunta ${currentQ+1} de ${total}</div>
    <div class="q-text">${qa.q}</div>
    <div class="options">`;
  qa.opts.forEach((opt,i)=>{
    html+=`<button class="option-btn" onclick="selectAnswer(${i})" data-idx="${i}">
      <span class="option-letter">${letters[i]}</span><span>${opt}</span></button>`;
  });
  html+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=html;
}

function selectAnswer(idx) {
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const isCorrect=idx===qa.ans;
  btns.forEach((btn,i)=>{
    btn.classList.add('disabled'); btn.onclick=null;
    if(i===qa.ans) btn.classList.add('correct-answer');
    if(i===idx&&!isCorrect) btn.classList.add('wrong-answer');
  });
  if(!catStats[qa.cat]) catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(isCorrect){score++;catStats[qa.cat].c++;}
  if(!examMode){
    fb.className=isCorrect?'feedback correct-fb show':'feedback wrong-fb show';
    fb.innerHTML=isCorrect
      ?`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`
      :`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;
  }
  answers.push({q:qa.q,correct:isCorrect,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if(currentQ>=questions.length) showResults();
  else renderQuestion();
}

function showResults() {
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'🏆 ¡Dominio excelente de gastritis y úlcera péptica!':pct>=70?'👏 ¡Muy bien! Repasa los temas con menor puntaje.':pct>=50?'📚 Aceptable, refuerza las áreas débiles.':'⚠️ Revisa las GPC de úlcera péptica y gastritis.';
  const cats=[
    {name:'Gastritis',key:'gast',color:'#fbbf24'},
    {name:'Úlcera Péptica',key:'ulc',color:'#38bdf8'},
    {name:'H. pylori',key:'hpyl',color:'#a78bfa'},
    {name:'Zollinger-Ellison',key:'ze',color:'#2dd4bf'},
    {name:'Complicaciones',key:'cx',color:'#f472b6'},
  ];
  let html=`<div class="results-header">
    <div class="score-big">${pct}%</div>
    <div class="score-label">${score} de ${questions.length} correctas</div>
    <div class="score-msg">${msg}</div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📊</span> Rendimiento por Categoría</div>
    <div class="bar-chart">`;
  cats.forEach(cat=>{
    const s=catStats[cat.key]||{c:0,t:0};
    const p=s.t>0?Math.round((s.c/s.t)*100):0;
    html+=`<div class="bar-row"><div class="bar-label">${cat.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${cat.color};">${p}% (${s.c}/${s.t})</div></div></div>`;
  });
  html+=`</div></div>
  <div class="chart-section">
    <div class="chart-title"><span>🎯</span> Resumen General</div>
    <div class="donut-wrap">
      <svg class="donut-svg" viewBox="0 0 42 42">
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
        <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
      </svg>
      <div class="donut-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#38bdf8;"></div>Total: ${questions.length}</div>
      </div>
    </div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{
    html+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
      <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
      <div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div>
      <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
      <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
    </div>`;
  });
  html+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const res=document.getElementById('resultsArea');
  res.innerHTML=html; res.classList.add('show');
  res.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(header){header.classList.toggle('open');header.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}

init();
</script>
</body>
</html>
