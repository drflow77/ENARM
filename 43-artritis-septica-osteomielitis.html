<script>
let examMode = false;
let currentQ = 0, score = 0, answers = [], catStats = {};

function setMode(mode) {
  examMode = (mode === 'examen');
  document.getElementById('btnRepaso').classList.toggle('active', !examMode);
  document.getElementById('btnExamen').classList.toggle('active', examMode);
  init();
}

const questions = [
  {
    cat:"osteo", catName:"Osteomielitis",
    q:"Niño de 7 años con fiebre de 39°C de 3 días de evolución, dolor intenso y negativa a apoyar la pierna derecha. Hay calor y eritema sobre la metáfisis proximal de la tibia derecha. Leucocitosis de 18,000. ¿Cuál es el agente etiológico más frecuente?",
    opts:["Streptococcus pyogenes","Staphylococcus aureus","Pseudomonas aeruginosa","Haemophilus influenzae"],
    ans:1,
    exp:"Staphylococcus aureus es responsable del 80-90% de los casos de osteomielitis hematógena aguda en todos los grupos de edad. Su capacidad de producir biofilm y adherirse a la matriz ósea facilita la infección. En neonatos también cobran importancia los estreptococos del grupo B.",
    tip:"<strong>Regla de oro:</strong> S. aureus = primera causa de osteomielitis en todas las edades. Excepción importante: drepanocitosis → Salmonella spp.",
    ref:"GPC Prevención, diagnóstico oportuno y tratamiento de la osteomielitis hematógena aguda, IMSS 2014."
  },
  {
    cat:"osteo", catName:"Osteomielitis",
    q:"En la osteomielitis hematógena aguda pediátrica, ¿cuál es el sitio de localización más frecuente y la razón anatómica?",
    opts:["Epífisis de huesos largos, por mayor densidad ósea","Metáfisis de huesos largos, por circulación sinusoidal lenta que favorece la colonización bacteriana","Diáfisis humeral, por ser el hueso más largo","Cuerpo vertebral, por su abundante vascularización"],
    ans:1,
    exp:"La metáfisis de los huesos largos (fémur distal, tibia proximal, húmero proximal) es el sitio preferente. En esta zona, los capilares hacen asa brusca, la circulación es lenta y sinusoidal, y hay escasa actividad fagocítica, lo que facilita la colonización bacteriana hematógena.",
    tip:"<strong>Metáfisis</strong> = zona de crecimiento + circulación lenta = sitio favorito de infección en niños. Fémur distal y tibia proximal son los más frecuentes.",
    ref:"GPC Osteomielitis hematógena aguda, IMSS 2014."
  },
  {
    cat:"osteo", catName:"Osteomielitis",
    q:"En osteomielitis aguda de 5 días de evolución, ¿cuál es el hallazgo radiológico más temprano esperado?",
    opts:["Destrucción cortical y reacción perióstica","Secuestro óseo rodeado de involucro","Aumento de partes blandas (edema de tejidos perióseos)","Esclerosis ósea difusa"],
    ans:2,
    exp:"Los cambios óseos radiológicos en osteomielitis tardan 10-21 días en aparecer. El hallazgo más temprano es el edema/aumento de partes blandas. La reacción perióstica aparece en 7-10 días, y la destrucción ósea evidente después de 14-21 días.",
    tip:"<strong>Rx normal los primeros días NO descarta osteomielitis.</strong> RM detecta cambios desde 24-48h (sensibilidad 82-100%).",
    ref:"GPC Osteomielitis hematógena aguda, IMSS 2014."
  },
  {
    cat:"osteo", catName:"Osteomielitis",
    q:"Para el diagnóstico temprano de osteomielitis aguda con radiografía normal, ¿cuál es la técnica de imagen de elección?",
    opts:["Gammagrafía ósea con Tc-99m","Resonancia magnética","Tomografía computada","Ultrasonido musculoesquelético"],
    ans:1,
    exp:"La RM tiene sensibilidad del 82-100% y especificidad del 75-99%. Detecta edema medular, absceso subperióstico y extensión a partes blandas desde las primeras 24-48h. La gammagrafía es sensible pero menos específica y no delimita bien la extensión ni es útil en neonatos.",
    tip:"<strong>RM = gold standard</strong> para osteomielitis temprana. Además permite planear drenaje si hay absceso subperióstico.",
    ref:"GPC Osteomielitis hematógena aguda, IMSS 2014."
  },
  {
    cat:"osteo", catName:"Osteomielitis",
    q:"¿En qué grupo de pacientes Salmonella spp. desplaza a S. aureus como causa más frecuente de osteomielitis?",
    opts:["Diabéticos con pie diabético","Pacientes con anemia de células falciformes (drepanocitosis)","Usuarios de drogas intravenosas","Neonatos prematuros"],
    ans:1,
    exp:"En la drepanocitosis, Salmonella spp. es el agente causal más frecuente de osteomielitis (>50% de los casos). Los infartos óseos isquémicos y la disfunción esplénica predisponen a bacteriemia por Salmonella con tropismo óseo. S. aureus sigue siendo el segundo agente más común.",
    tip:"<strong>Drepanocitosis + osteomielitis = Salmonella.</strong> Todos los demás = S. aureus. Excepción clásica del ENARM.",
    ref:"GPC Osteomielitis hematógena aguda, IMSS 2014."
  },
  {
    cat:"osteo", catName:"Osteomielitis",
    q:"La tríada clásica de la osteomielitis crónica está formada por:",
    opts:["Fiebre alta, bacteriemia y leucocitosis persistente","Dolor crónico, trayecto fistuloso y secuestro óseo","Edema, eritema y limitación funcional","Reacción perióstica, esclerosis y atrofia muscular"],
    ans:1,
    exp:"La osteomielitis crónica se caracteriza por: (1) secuestro óseo (fragmento necrótico avascular), (2) involucro (cortical neoformada que rodea el secuestro) y (3) cloaca/fístula (trayecto por donde drena material purulento). El secuestro actúa como cuerpo extraño manteniendo la infección crónica.",
    tip:"<strong>Crónica = secuestro + involucro + cloaca.</strong> El secuestro es avascular → los antibióticos no llegan → necesita cirugía (sequestrectomía).",
    ref:"GPC Osteomielitis hematógena aguda, IMSS 2014."
  },
  {
    cat:"osteo", catName:"Osteomielitis",
    q:"Mujer de 55 años diabética presenta fiebre y dolor lumbar de 2 semanas con elevación de PCR y VSG. RM muestra hiperintensidad en T2 en L3-L4 con colapso discal. ¿Cuál es el diagnóstico y la vía patogénica principal?",
    opts:["Hernia de disco lumbar L3-L4 por mecanismo degenerativo","Espondilodiscitis bacteriana por diseminación hematógena","Síndrome de cauda equina por compresión tumoral","Artritis psoriásica lumbar por mecanismo autoinmune"],
    ans:1,
    exp:"La espondilodiscitis (osteomielitis vertebral) se presenta con dolor lumbar subagudo, fiebre y reactantes de fase aguda elevados. La RM es el gold standard diagnóstico. En adultos la vía hematógena es la más frecuente; la diabetes, inmunosupresión y procedimientos urológicos son los principales factores de riesgo.",
    tip:"<strong>Adulto + lumbalgia + fiebre + VSG/PCR altos = espondilodiscitis.</strong> S. aureus es el agente más común. Buscar siempre foco primario (endocarditis, ITU).",
    ref:"GPC Artritis séptica aguda en niños y adultos, IMSS 2016."
  },
  {
    cat:"osteo", catName:"Osteomielitis",
    q:"Niño de 8 años con osteomielitis hematógena aguda no complicada. Luego de mejoría clínica con IV en 4 días y PCR en descenso. ¿Cuál es el esquema de tratamiento recomendado?",
    opts:["Solo antibiótico IV durante 6 semanas","Solo antibiótico oral por 2 semanas","Antibiótico IV hasta mejoría clínica y PCR en descenso, luego oral para completar 4-6 semanas totales","Antibiótico IV por 3 semanas seguido de profilaxis oral por 6 meses"],
    ans:2,
    exp:"La terapia secuencial (IV→oral) es el estándar actual: antibiótico IV hasta mejoría clínica y PCR normalizada (habitualmente 3-7 días), seguido de antibiótico oral hasta completar 4-6 semanas totales. Esta estrategia evita hospitalizaciones prolongadas con eficacia similar a la terapia IV prolongada.",
    tip:"<strong>IV hasta mejoría + PCR en descenso → oral hasta completar 4-6 semanas.</strong> No son necesarias 6 semanas de IV.",
    ref:"GPC Osteomielitis hematógena aguda, IMSS 2014."
  },
  {
    cat:"artr", catName:"Artritis Séptica",
    q:"Hombre de 35 años con gonorrea reciente presenta artritis migratoria, tenosinovitis y dermatitis pustulosa. Posteriormente desarrolla artritis monoarticular de rodilla con líquido turbio. ¿Cuál es el agente causal más probable?",

function shuffle(arr) { for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} }

function init() {
  shuffle(questions);
  currentQ=0; score=0; answers=[];
  catStats={osteo:{c:0,t:0},artr:{c:0,t:0}};
  const r=document.getElementById('resultsArea');
  r.classList.remove('show'); r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion() {
  const qa=questions[currentQ];
  const total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const letters=['A','B','C','D'];
  let html=`<div class="question-card">
    <div class="q-category cat-${qa.cat}">${qa.catName}</div>
    <div class="q-number">Pregunta ${currentQ+1} de ${total}</div>
    <div class="q-text">${qa.q}</div>
    <div class="options">`;
  qa.opts.forEach((opt,i)=>{
    html+=`<button class="option-btn" onclick="selectAnswer(${i})" data-idx="${i}">
      <span class="option-letter">${letters[i]}</span><span>${opt}</span></button>`;
  });
  html+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=html;
}

function selectAnswer(idx) {
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const isCorrect=idx===qa.ans;
  btns.forEach((btn,i)=>{
    btn.classList.add('disabled'); btn.onclick=null;
    if(i===qa.ans) btn.classList.add('correct-answer');
    if(i===idx&&!isCorrect) btn.classList.add('wrong-answer');
  });
  if(!catStats[qa.cat]) catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(isCorrect){score++;catStats[qa.cat].c++;}
  if(!examMode){
    if(isCorrect){
      fb.className='feedback correct-fb show';
      fb.innerHTML=`<div class="feedback-title">✅ ¡Correcto!</div>
        <div>${qa.exp}</div>
        <div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div>
        <div class="ref">📖 ${qa.ref}</div>`;
    } else {
      fb.className='feedback wrong-fb show';
      fb.innerHTML=`<div class="feedback-title">❌ Incorrecto</div>
        <div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div>
        <div style="margin-top:8px;">${qa.exp}</div>
        <div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div>
        <div class="ref">📖 ${qa.ref}</div>`;
    }
  }
  answers.push({q:qa.q,correct:isCorrect,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,tip:qa.tip,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if(currentQ>=questions.length) showResults();
  else renderQuestion();
}

function showResults() {
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  let msg=pct>=90?'🏆 ¡Excelente dominio! Listo para el ENARM.':
          pct>=70?'👏 ¡Muy bien! Repasa las áreas con menor puntaje.':
          pct>=50?'📚 Aceptable, hay áreas de oportunidad.':'⚠️ Refuerza este tema. Revisa las GPC correspondientes.';
  const cats=[
    {name:'Osteomielitis',key:'osteo',color:'#2dd4bf'},
    {name:'Artritis Séptica',key:'artr',color:'#fbbf24'},
  ];
  let html=`<div class="results-header">
    <div class="score-big">${pct}%</div>
    <div class="score-label">${score} de ${questions.length} correctas</div>
    <div class="score-msg">${msg}</div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📊</span> Rendimiento por Categoría</div>
    <div class="bar-chart">`;
  cats.forEach(cat=>{
    const s=catStats[cat.key]||{c:0,t:0};
    const p=s.t>0?Math.round((s.c/s.t)*100):0;
    if(s.t>0) html+=`<div class="bar-row">
      <div class="bar-label">${cat.name}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${cat.color};">${p}% (${s.c}/${s.t})</div></div>
    </div>`;
  });
  html+=`</div></div>
  <div class="chart-section">
    <div class="chart-title"><span>🎯</span> Resumen General</div>
    <div class="donut-wrap">
      <svg class="donut-svg" viewBox="0 0 42 42">
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4"
          stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4"
          stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
        <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
      </svg>
      <div class="donut-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#2dd4bf;"></div>Total: ${questions.length}</div>
      </div>
    </div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{
    html+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
      <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
      <div class="review-answer">${a.correct
        ?`<strong>✅ ${a.correctAns}</strong>`
        :`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`
      }</div>
      <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
      <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
    </div>`;
  });
  html+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const res=document.getElementById('resultsArea');
  res.innerHTML=html; res.classList.add('show');
  res.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}

init();
</script>

</html>
