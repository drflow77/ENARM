  .retry-btn:hover { transform:scale(1.05); }

<script>
let examMode = false;

function setMode(mode) {
  examMode = (mode === 'examen');
  document.getElementById('btnRepaso').classList.toggle('active', !examMode);
  document.getElementById('btnExamen').classList.toggle('active', examMode);
  init();
}

const questions = [
  {
    cat:"ob", catName:"Obesidad/IMC",
    q:"Paciente masculino de 38 años con peso de 110 kg y talla de 1.70 m. Su IMC calculado es 38.1 kg/m². Según la clasificación de la OMS adoptada por las GPC mexicanas, ¿en qué categoría de obesidad se encuentra?",
    opts:["Obesidad grado II (IMC 35-39.9)","Obesidad grado I (IMC 30-34.9)","Sobrepeso (IMC 25-29.9)","Obesidad grado III / mórbida (IMC ≥40)"],
    ans:0,
    exp:"La clasificación de la OMS establece: sobrepeso IMC 25-29.9, obesidad grado I IMC 30-34.9, obesidad grado II IMC 35-39.9 y obesidad grado III o mórbida IMC ≥40. Un IMC de 38.1 corresponde a obesidad grado II. La GPC Tratamiento quirúrgico de la obesidad en el adulto (2018) utiliza esta misma clasificación para estratificar el riesgo y definir indicaciones quirúrgicas.",
    tip:"<strong>Clasificación IMC (OMS):</strong> 18.5-24.9 = Normal | 25-29.9 = Sobrepeso | 30-34.9 = Obesidad I | 35-39.9 = Obesidad II | ≥40 = Obesidad III/Mórbida. Recuerda: la cirugía bariátrica se indica desde grado II (≥35) si hay comorbilidades, o grado III (≥40) sin comorbilidades.",
    ref:"GPC: Tratamiento quirúrgico de la obesidad en el adulto. IMSS-678-13. Actualización 2018."
  },
  {
    cat:"ind", catName:"Indicaciones/Criterios",
    q:"¿Cuáles son las indicaciones estándar para cirugía bariátrica en el adulto según la GPC mexicana?",
    opts:["IMC ≥35 sin comorbilidades o IMC ≥30 con DM2","IMC ≥30 con cualquier comorbilidad o IMC ≥35 sin comorbilidades","IMC ≥45 en cualquier caso o IMC ≥40 con comorbilidades","IMC ≥40 sin comorbilidades, o IMC ≥35 con comorbilidades mayores (DM2, HTA, apnea del sueño, dislipidemia)"],
    ans:3,
    exp:"Las indicaciones estándar para cirugía bariátrica según la GPC son: IMC ≥40 kg/m² sin importar comorbilidades, o IMC ≥35 kg/m² con presencia de al menos una comorbilidad mayor relacionada con la obesidad (diabetes mellitus tipo 2, hipertensión arterial, síndrome de apnea obstructiva del sueño, dislipidemia, entre otras). Estos criterios aplican cuando el tratamiento médico previo ha sido insuficiente.",
    tip:"<strong>Regla del 35/40:</strong> IMC ≥40 → indicación absoluta. IMC 35-39.9 → indicación condicional (necesita comorbilidad). Las comorbilidades que califican: DM2, HTA, apnea del sueño, dislipidemia, ERGE severo, esteatohepatitis, artropatía incapacitante. Siempre debe haber fracaso previo de tratamiento médico-nutricional.",
    ref:"GPC: Tratamiento quirúrgico de la obesidad en el adulto. IMSS-678-13. Actualización 2018."
  },
  {
    cat:"bar", catName:"Procedimientos Bariátricos",
    q:"¿Cuál es el mecanismo de acción principal del bypass gástrico en Y de Roux?",
    opts:["Restrictivo exclusivo: reduce el volumen gástrico sin alterar la absorción","Solo hormonal: aumenta GLP-1 sin componente restrictivo","Malabsortivo exclusivo: deriva la mayor parte del intestino delgado","Restrictivo y malabsortivo: crea un pequeño reservorio gástrico y deriva el intestino delgado proximal"],
    ans:3,
    exp:"El bypass gástrico en Y de Roux (BGYR) combina un mecanismo restrictivo (creación de un pequeño reservorio gástrico de 15-30 mL) con uno malabsortivo (anastomosis gastro-yeyunal que evita el duodeno y yeyuno proximal). Además tiene efectos hormonales importantes: aumenta GLP-1, PYY y disminuye grelina. La GPC lo considera el estándar de oro por su mayor pérdida de peso y remisión de comorbilidades.",
    tip:"<strong>Mecanismos bariátricos:</strong> BYPASS = Restrictivo + Malabsortivo + Hormonal (el más completo). MANGA/SLEEVE = Solo Restrictivo + algo Hormonal (elimina fondo gástrico productor de grelina). BANDA = Solo Restrictivo reversible. A mayor complejidad, mayor pérdida de peso pero más riesgo de deficiencias nutricionales.",
    ref:"GPC: Tratamiento quirúrgico de la obesidad en el adulto. IMSS-678-13. Actualización 2018."
  },
  {
    cat:"bar", catName:"Procedimientos Bariátricos",
    q:"Paciente de 32 años con IMC de 42 kg/m² y DM2 de 5 años de evolución. Se decide realizar manga gástrica laparoscópica (sleeve gastrectomy). ¿Cuál es el mecanismo principal de este procedimiento?",
    opts:["Restrictivo y malabsortivo con derivación del yeyuno","Restrictivo exclusivo mediante resección de la curvatura mayor del estómago","Malabsortivo exclusivo con preservación gástrica total","Restrictivo con banda ajustable en el cardias"],
    ans:1,
    exp:"La manga gástrica o sleeve gastrectomy es un procedimiento exclusivamente restrictivo que consiste en la resección de aproximadamente el 80% del estómago a lo largo de la curvatura mayor, creando un tubo gástrico de 100-150 mL. Adicionalmente elimina el fondo gástrico, principal productor de grelina (hormona del hambre), contribuyendo al efecto saciante. No altera la absorción intestinal.",
    tip:"<strong>Manga gástrica = Restrictiva + Antigrelina:</strong> Al resecar el fondo gástrico se elimina el 60-70% de la producción de grelina. No hay malabsorción, por lo que las deficiencias nutricionales son menores que en el bypass. Pérdida de exceso de peso: 50-60%. Es la cirugía más realizada mundialmente por su menor complejidad técnica.",
    ref:"GPC: Tratamiento quirúrgico de la obesidad en el adulto. IMSS-678-13. Actualización 2018."
  },
  {
    cat:"bar", catName:"Procedimientos Bariátricos",
    q:"¿Cuál es la característica que distingue a la banda gástrica ajustable de los otros procedimientos bariátricos?",
    opts:["Es el único procedimiento reversible y puramente restrictivo sin resección ni derivación intestinal","Es el procedimiento con mayor pérdida de exceso de peso","Produce la mayor remisión de diabetes mellitus tipo 2","Es el procedimiento de elección en adolescentes con obesidad mórbida"],
    ans:0,
    exp:"La banda gástrica ajustable es el único procedimiento bariátrico completamente reversible y puramente restrictivo. Consiste en colocar una banda de silicona alrededor del cardias que crea un pequeño reservorio proximal. No implica resección gástrica ni derivación intestinal. Su ajustabilidad permite modificar el grado de restricción. Sin embargo, tiene mayor tasa de reoperación y menor pérdida de peso a largo plazo comparada con el bypass y la manga.",
    tip:"<strong>Banda gástrica:</strong> Ventajas = Reversible, sin resección, menor morbimortalidad operatoria. Desventajas = Menor pérdida de peso (40-50% del exceso), alta tasa de revisión (30-40% a 10 años por deslizamiento, erosión o falla del sistema). Actualmente es la menos utilizada de las tres técnicas principales.",
    ref:"GPC: Tratamiento quirúrgico de la obesidad en el adulto. IMSS-678-13. Actualización 2018."
  },
  {
    cat:"cx", catName:"Complicaciones",
    q:"Paciente de 45 años, día 3 postoperatorio de bypass gástrico en Y de Roux. Presenta fiebre de 38.8°C, taquicardia de 110 lpm, dolor abdominal y drenaje con aspecto bilioso por el Jackson-Pratt. ¿Cuál es la complicación más grave que se debe descartar primero?",

    tip:"<strong>Requisitos preoperatorios bariátrica:</strong> ≥6 meses de tratamiento médico supervisado + evaluación psicológica + evaluación nutricional + valoración anestésica + estudios complementarios (EGD, PSG si sospecha apnea, ecocardiograma en riesgo cardiovascular). El equipo multidisciplinario es OBLIGATORIO: cirujano + nutriólogo + psicólogo + internista/endocrinólogo.",

let currentQ = 0, score = 0, answers = [];
let catStats = { ob:{c:0,t:0}, bar:{c:0,t:0}, ind:{c:0,t:0}, cx:{c:0,t:0}, met:{c:0,t:0} };

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function init() {
  shuffle(questions);
  currentQ=0; score=0; answers=[];
  catStats = { ob:{c:0,t:0}, bar:{c:0,t:0}, ind:{c:0,t:0}, cx:{c:0,t:0}, met:{c:0,t:0} };
  const r=document.getElementById('resultsArea');
  r.classList.remove('show'); r.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  renderQuestion();
}

function renderQuestion() {
  const qa=questions[currentQ], total=questions.length;
  document.getElementById('progressBar').style.width=(currentQ/total*100)+'%';
  document.getElementById('progressText').textContent=`${currentQ+1} / ${total}`;
  document.getElementById('nextBtn').classList.remove('show');
  const letters=['A','B','C','D'];
  let html=`<div class="question-card">
    <div class="q-category cat-${qa.cat}">${qa.catName}</div>
    <div class="q-number">Pregunta ${currentQ+1} de ${total}</div>
    <div class="q-text">${qa.q}</div>
    <div class="options">`;
  qa.opts.forEach((opt,i)=>{
    html+=`<button class="option-btn" onclick="selectAnswer(${i})" data-idx="${i}">
      <span class="option-letter">${letters[i]}</span><span>${opt}</span></button>`;
  });
  html+=`</div><div class="feedback" id="feedback"></div></div>`;
  document.getElementById('quizArea').innerHTML=html;
}

function selectAnswer(idx) {
  const qa=questions[currentQ];
  const btns=document.querySelectorAll('.option-btn');
  const fb=document.getElementById('feedback');
  const isCorrect=idx===qa.ans;
  btns.forEach((btn,i)=>{
    btn.classList.add('disabled'); btn.onclick=null;
    if(i===qa.ans) btn.classList.add('correct-answer');
    if(i===idx&&!isCorrect) btn.classList.add('wrong-answer');
  });
  if(!catStats[qa.cat]) catStats[qa.cat]={c:0,t:0};
  catStats[qa.cat].t++;
  if(isCorrect){score++;catStats[qa.cat].c++;}
  if(!examMode){
    fb.className=isCorrect?'feedback correct-fb show':'feedback wrong-fb show';
    fb.innerHTML=isCorrect
      ?`<div class="feedback-title">✅ ¡Correcto!</div><div>${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`
      :`<div class="feedback-title">❌ Incorrecto</div><div><strong>Respuesta correcta:</strong> ${qa.opts[qa.ans]}</div><div style="margin-top:8px;">${qa.exp}</div><div class="tip"><strong>💡 Tip clínico:</strong> ${qa.tip}</div><div class="ref">📖 ${qa.ref}</div>`;
  }
  answers.push({q:qa.q,correct:isCorrect,userAns:qa.opts[idx],correctAns:qa.opts[qa.ans],cat:qa.catName,exp:qa.exp,ref:qa.ref});
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if(currentQ>=questions.length) showResults();
  else renderQuestion();
}

function showResults() {
  document.getElementById('quizArea').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent=`${questions.length} / ${questions.length}`;
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=90?'🏆 ¡Dominio excelente de obesidad y cirugía bariátrica!':pct>=70?'👏 ¡Muy bien! Repasa los temas con menor puntaje.':pct>=50?'📚 Aceptable, refuerza las áreas débiles.':'⚠️ Revisa las GPC de tratamiento quirúrgico de la obesidad.';
  const cats=[
    {name:'Obesidad/IMC',key:'ob',color:'#fbbf24'},
    {name:'Procedimientos Bariátricos',key:'bar',color:'#38bdf8'},
    {name:'Indicaciones/Criterios',key:'ind',color:'#a78bfa'},
    {name:'Complicaciones',key:'cx',color:'#f472b6'},
    {name:'Síndrome Metabólico',key:'met',color:'#34d399'},
  ];
  let html=`<div class="results-header">
    <div class="score-big">${pct}%</div>
    <div class="score-label">${score} de ${questions.length} correctas</div>
    <div class="score-msg">${msg}</div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📊</span> Rendimiento por Categoría</div>
    <div class="bar-chart">`;
  cats.forEach(cat=>{
    const s=catStats[cat.key]||{c:0,t:0};
    const p=s.t>0?Math.round((s.c/s.t)*100):0;
    html+=`<div class="bar-row"><div class="bar-label">${cat.name}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${cat.color};">${p}% (${s.c}/${s.t})</div></div></div>`;
  });
  html+=`</div></div>
  <div class="chart-section">
    <div class="chart-title"><span>🎯</span> Resumen General</div>
    <div class="donut-wrap">
      <svg class="donut-svg" viewBox="0 0 42 42">
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#1a2235" stroke-width="4"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#34d399" stroke-width="4" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="25" stroke-linecap="round"/>
        <circle cx="21" cy="21" r="15.915" fill="none" stroke="#f87171" stroke-width="4" stroke-dasharray="${100-pct} ${pct}" stroke-dashoffset="${25-pct}" stroke-linecap="round"/>
        <text x="21" y="22.5" text-anchor="middle" font-size="6" font-weight="700" fill="#e8ecf4" font-family="Plus Jakarta Sans">${pct}%</text>
      </svg>
      <div class="donut-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#34d399;"></div>Correctas: ${score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>Incorrectas: ${questions.length-score}</div>
        <div class="legend-item"><div class="legend-dot" style="background:#38bdf8;"></div>Total: ${questions.length}</div>
      </div>
    </div>
  </div>
  <div class="chart-section">
    <div class="chart-title"><span>📋</span> Revisión de Respuestas</div>`;
  answers.forEach((a,i)=>{
    html+=`<div class="review-card ${a.correct?'review-correct':'review-wrong'}">
      <div class="review-q">${i+1}. ${a.q} <span style="font-size:0.72rem;color:var(--text-dim);">[${a.cat}]</span></div>
      <div class="review-answer">${a.correct?`<strong>✅ ${a.correctAns}</strong>`:`<em>❌ Tu respuesta: ${a.userAns}</em><br><strong>✅ Correcta: ${a.correctAns}</strong>`}</div>
      <div style="margin-top:8px;font-size:0.8rem;color:var(--text-dim);line-height:1.5;">${a.exp}</div>
      <div style="margin-top:6px;font-size:0.75rem;color:var(--text-dim);opacity:0.7;font-style:italic;">📖 ${a.ref}</div>
    </div>`;
  });
  html+=`</div><button class="retry-btn" onclick="init()">🔄 Reintentar</button>`;
  const res=document.getElementById('resultsArea');
  res.innerHTML=html; res.classList.add('show');
  res.scrollIntoView({behavior:'smooth'});
}

function toggleSpec(header){header.classList.toggle('open');header.nextElementSibling.classList.toggle('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}

init();
</script>
</body>
</html>
